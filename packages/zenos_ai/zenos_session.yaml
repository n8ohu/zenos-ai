###############################################################################
# ZenOS Session Beacon
# v0.1.1-experimental — feat/ready-player-2
#
# Latches assist_pipeline.run.start, encodes conversation_id as an opaque
# reference code, and stashes it in a session_beacon drawer in the household
# cabinet (5-min expiry).
#
# Encoding: strip dashes + reverse. Looks like a hex reference code.
# Not recognizable as a UUID or session ID by an LLM agent.
# Decode: reverse + reinsert dashes at positions 8, 12, 16, 20.
#
# Schrodinger test: agent reads session_beacon drawer, carries the reference
# code as caller_token — without knowing what it is. We decode it on our end
# to confirm it matches the conversation_id that fired the pipeline.
# If it matches: capture + retrieval + carry-forward all confirmed.
#
# The drawer MUST NOT expose the raw conversation_id or the test fails —
# agent would be reading a known value, not an opaque token.
#
# EXPERIMENTAL:
# - Single active beacon slot. Not multi-user safe.
# - Temporal correlation — most recent beacon = active session.
# - Verify trigger.event.data.conversation_id path on H:\ via Developer
#   Tools if zen_session_debug shows empty cid after first conversation.
# - expires_after: seconds. 300 = 5 minutes.
###############################################################################

input_text:
  zen_session_debug:
    name: "ZenOS: Session Debug"
    icon: mdi:bug-outline
    max: 255
    initial: ""

automation:

  - id: zen_session_beacon_writer
    alias: "ZenOS: Session Beacon Writer"
    description: >-
      Experimental. Latches assist_pipeline.run.start, encodes conversation_id
      as opaque reference code, writes session_beacon to household cabinet
      (5-min expiry). Agent carries the code without knowing what it is.
    mode: queued
    max: 5

    triggers:
      - trigger: event
        event_type: assist_pipeline.run.start

    actions:
      - variables:
          _cid:    "{{ trigger.event.data.conversation_id | default('') }}"
          _device: "{{ trigger.event.data.device_id | default('') }}"
          _user:   "{{ trigger.event.context.user_id | default('') }}"
          _cab:    "{{ states('sensor.zen_default_household_cabinet_resolved') }}"

      # Encode: strip dashes + reverse. Decode: reverse + dashes at 8,12,16,20.
      - variables:
          _ref: "{{ _cid | replace('-', '') | reverse }}"

      # Debug slot — shows raw cid for path verification. Strip after confirmed.
      - action: input_text.set_value
        target:
          entity_id: input_text.zen_session_debug
        data:
          value: "cid={{ _cid }} | ref={{ _ref }} | device={{ _device }} | user={{ _user }}"

      - if:
        - condition: template
          value_template: "{{ _cid != '' and _cab not in ['', 'unknown', 'unavailable'] }}"
        then:
        - action: script.zen_dojotools_filecabinet
          data:
            action_type: update
            volume_entity_id: "{{ _cab }}"
            key: session_beacon
            value: >-
              {{ {
                'msg': 'ZenOS session reference: ' ~ _ref ~ '. Present this reference when requested.',
                'ref': _ref,
                'ts': now().isoformat()
              } | tojson }}
            expires_after: "300"
            set_timestamp: true
            force_action: true
            caller_token: zen_session_beacon
