###############################################################################
# ZenOS-AI — System Health Package
# v4.5.1 — Expansion slot rename: secondary/tertiary/quaternary_user +
#           secondary_ai_user → expansion_1-4. expansion_5 added.
#
# Changelog:
#   v2.4.0 (2026-03-22) — master_switch gate removed from active component
#                          counters (state sensor + active_components attribute).
#                          Now uses meta.enabled | default(true). Mirrors GA
#                          supersummary change (feat/ga batch).
#   v2.3.0 (2026-03-20) — Cabset expansion: 4 new optional cabinet resolvers
#                          (secondary_user, tertiary_user, quaternary_user,
#                          secondary_ai_user). Vault cabinet: label only, no
#                          resolver, no knowledge-pipeline traversal ever.
#   v4.5.1 (2026-03-23) — Expansion slot rename: secondary/tertiary/quaternary_user
#                          + secondary_ai_user → expansion_1-4. expansion_5 added.
#   v2.2.0 (2026-03-19) — zen_system_cabinet_resolved added (7th resolver).
#                          FG-38 v3 three-round normalization applied to
#                          _zt_val, _ss_v, _sched, _sum_d across all health
#                          sensors. UAT-passed fix/ga-batch-1.
#   v2.1.0 (2026-03-19) — Highlander resolver architecture. 6 resolver sensors
#                          (non-trigger, always-live). Health sensors trigger-based.
#
# There can only be ONE source of truth for cabinet entity IDs.
#
# RESOLVERS (sensor.zen_*_cabinet_resolved) are regular (non-trigger) template
# sensors. They evaluate at HA startup, have their values immediately — no
# clock, no race, no unavailable window. Everything in the system reads cabinet
# entity IDs from these sensors.
#
# HEALTH SENSORS are trigger-based (zen_health_tick + zen_resolver_refresh +
# ha_start). They read from the resolvers via states(). Since resolvers are
# always-live, the availability check is clean on first fire.
#
# Resolvers (11 — always-live):
#   - sensor.zen_dojo_cabinet_resolved
#   - sensor.zen_kata_cabinet_resolved
#   - sensor.zen_system_cabinet_resolved
#   - sensor.zen_default_household_cabinet_resolved
#   - sensor.zen_default_ai_user_cabinet_resolved
#   - sensor.zen_default_family_cabinet_resolved
#   - sensor.zen_default_user_cabinet_resolved
#   (pool user/ai_user cabs enumerated via label_entities, no ordinal resolvers)
#
# NOTE: zen_vault_cabinet has NO resolver by design. Vault is structurally
#   absent from all knowledge-pipeline traversals. Access gated via identity.
#
# Health sensors (trigger-based):
#   - sensor.zen_monastery_health
#   - sensor.zen_summarizer_health
#   - sensor.zen_supersummary_health
#   - sensor.zen_cabinet_health
#   - sensor.zen_agent_health
###############################################################################

template:

  ###########################################################################
  # Cabinet Resolvers — regular (non-trigger) template sensors.
  # Evaluate at HA startup. No trigger, no clock, no race window.
  # ONE source of truth for cabinet entity IDs. All consumers read from here.
  # Labels used (slugs): zen_dojo_cabinet, zen_kata_cabinet, zen_system_cabinet,
  #   zen_default_household_cabinet, zen_default_ai_user_cabinet,
  #   zen_default_family_cabinet, zen_default_user_cabinet
  ###########################################################################
  - sensor:
      - name: Zen Dojo Cabinet Resolved
        unique_id: zen_dojo_cabinet_resolved
        state: >-
          {{ label_entities('zen_dojo_cabinet')
             | select('match', 'sensor\.')
             | first | default('unavailable') }}
        availability: >-
          {{ label_entities('zen_dojo_cabinet')
             | select('match', 'sensor\.')
             | list | count > 0 }}

      - name: Zen Kata Cabinet Resolved
        unique_id: zen_kata_cabinet_resolved
        state: >-
          {{ label_entities('zen_kata_cabinet')
             | select('match', 'sensor\.')
             | first | default('unavailable') }}
        availability: >-
          {{ label_entities('zen_kata_cabinet')
             | select('match', 'sensor\.')
             | list | count > 0 }}

      - name: Zen System Cabinet Resolved
        unique_id: zen_system_cabinet_resolved
        state: >-
          {{ label_entities('zen_system_cabinet')
             | select('match', 'sensor\.')
             | first | default('unavailable') }}
        availability: >-
          {{ label_entities('zen_system_cabinet')
             | select('match', 'sensor\.')
             | list | count > 0 }}

      - name: Zen Default Household Cabinet Resolved
        unique_id: zen_default_household_cabinet_resolved
        state: >-
          {%- set _sv = state_attr('sensor.zenos_system_cabinet', 'variables') -%}
          {%- set _sv = _sv if _sv is mapping else {} -%}
          {%- set _se = _sv.get('cab_schema_version', {}) -%}
          {%- set _ma = ((_se.get('value', 0) if _se is mapping else 0) | int(0)) >= 1 -%}
          {%- set _cands = label_entities('zen_default_household_cabinet') | select('match', 'sensor\.') | list -%}
          {%- if _ma -%}{%- set ns = namespace(r='unavailable') -%}
          {%- for e in _cands -%}{%- if ns.r == 'unavailable' and states(e) == 'online_mounted' -%}{%- set ns.r = e -%}{%- endif -%}{%- endfor -%}
          {{ ns.r }}{%- else -%}{{ _cands | first | default('unavailable') }}{%- endif -%}
        availability: >-
          {%- set _sv = state_attr('sensor.zenos_system_cabinet', 'variables') -%}
          {%- set _sv = _sv if _sv is mapping else {} -%}
          {%- set _se = _sv.get('cab_schema_version', {}) -%}
          {%- set _ma = ((_se.get('value', 0) if _se is mapping else 0) | int(0)) >= 1 -%}
          {%- set _cands = label_entities('zen_default_household_cabinet') | select('match', 'sensor\.') | list -%}
          {%- if _ma -%}{%- set ns = namespace(r=false) -%}
          {%- for e in _cands -%}{%- if states(e) == 'online_mounted' -%}{%- set ns.r = true -%}{%- endif -%}{%- endfor -%}
          {{ ns.r }}{%- else -%}{{ _cands | count > 0 }}{%- endif -%}

      - name: Zen Default AI User Cabinet Resolved
        unique_id: zen_default_ai_user_cabinet_resolved
        state: >-
          {%- set _sv = state_attr('sensor.zenos_system_cabinet', 'variables') -%}
          {%- set _sv = _sv if _sv is mapping else {} -%}
          {%- set _se = _sv.get('cab_schema_version', {}) -%}
          {%- set _ma = ((_se.get('value', 0) if _se is mapping else 0) | int(0)) >= 1 -%}
          {%- set _cands = label_entities('zen_default_ai_user_cabinet') | select('match', 'sensor\.') | list -%}
          {%- if _ma -%}{%- set ns = namespace(r='unavailable') -%}
          {%- for e in _cands -%}{%- if ns.r == 'unavailable' and states(e) == 'online_mounted' -%}{%- set ns.r = e -%}{%- endif -%}{%- endfor -%}
          {{ ns.r }}{%- else -%}{{ _cands | first | default('unavailable') }}{%- endif -%}
        availability: >-
          {%- set _sv = state_attr('sensor.zenos_system_cabinet', 'variables') -%}
          {%- set _sv = _sv if _sv is mapping else {} -%}
          {%- set _se = _sv.get('cab_schema_version', {}) -%}
          {%- set _ma = ((_se.get('value', 0) if _se is mapping else 0) | int(0)) >= 1 -%}
          {%- set _cands = label_entities('zen_default_ai_user_cabinet') | select('match', 'sensor\.') | list -%}
          {%- if _ma -%}{%- set ns = namespace(r=false) -%}
          {%- for e in _cands -%}{%- if states(e) == 'online_mounted' -%}{%- set ns.r = true -%}{%- endif -%}{%- endfor -%}
          {{ ns.r }}{%- else -%}{{ _cands | count > 0 }}{%- endif -%}

      - name: Zen Default Family Cabinet Resolved
        unique_id: zen_default_family_cabinet_resolved
        state: >-
          {%- set _sv = state_attr('sensor.zenos_system_cabinet', 'variables') -%}
          {%- set _sv = _sv if _sv is mapping else {} -%}
          {%- set _se = _sv.get('cab_schema_version', {}) -%}
          {%- set _ma = ((_se.get('value', 0) if _se is mapping else 0) | int(0)) >= 1 -%}
          {%- set _cands = label_entities('zen_default_family_cabinet') | select('match', 'sensor\.') | list -%}
          {%- if _ma -%}{%- set ns = namespace(r='unavailable') -%}
          {%- for e in _cands -%}{%- if ns.r == 'unavailable' and states(e) == 'online_mounted' -%}{%- set ns.r = e -%}{%- endif -%}{%- endfor -%}
          {{ ns.r }}{%- else -%}{{ _cands | first | default('unavailable') }}{%- endif -%}
        availability: >-
          {%- set _sv = state_attr('sensor.zenos_system_cabinet', 'variables') -%}
          {%- set _sv = _sv if _sv is mapping else {} -%}
          {%- set _se = _sv.get('cab_schema_version', {}) -%}
          {%- set _ma = ((_se.get('value', 0) if _se is mapping else 0) | int(0)) >= 1 -%}
          {%- set _cands = label_entities('zen_default_family_cabinet') | select('match', 'sensor\.') | list -%}
          {%- if _ma -%}{%- set ns = namespace(r=false) -%}
          {%- for e in _cands -%}{%- if states(e) == 'online_mounted' -%}{%- set ns.r = true -%}{%- endif -%}{%- endfor -%}
          {{ ns.r }}{%- else -%}{{ _cands | count > 0 }}{%- endif -%}

      - name: Zen Default User Cabinet Resolved
        unique_id: zen_default_user_cabinet_resolved
        state: >-
          {%- set _sv = state_attr('sensor.zenos_system_cabinet', 'variables') -%}
          {%- set _sv = _sv if _sv is mapping else {} -%}
          {%- set _se = _sv.get('cab_schema_version', {}) -%}
          {%- set _ma = ((_se.get('value', 0) if _se is mapping else 0) | int(0)) >= 1 -%}
          {%- set _cands = label_entities('zen_default_user_cabinet') | select('match', 'sensor\.') | list -%}
          {%- if _ma -%}{%- set ns = namespace(r='unavailable') -%}
          {%- for e in _cands -%}{%- if ns.r == 'unavailable' and states(e) == 'online_mounted' -%}{%- set ns.r = e -%}{%- endif -%}{%- endfor -%}
          {{ ns.r }}{%- else -%}{{ _cands | first | default('unavailable') }}{%- endif -%}
        availability: >-
          {%- set _sv = state_attr('sensor.zenos_system_cabinet', 'variables') -%}
          {%- set _sv = _sv if _sv is mapping else {} -%}
          {%- set _se = _sv.get('cab_schema_version', {}) -%}
          {%- set _ma = ((_se.get('value', 0) if _se is mapping else 0) | int(0)) >= 1 -%}
          {%- set _cands = label_entities('zen_default_user_cabinet') | select('match', 'sensor\.') | list -%}
          {%- if _ma -%}{%- set ns = namespace(r=false) -%}
          {%- for e in _cands -%}{%- if states(e) == 'online_mounted' -%}{%- set ns.r = true -%}{%- endif -%}{%- endfor -%}
          {{ ns.r }}{%- else -%}{{ _cands | count > 0 }}{%- endif -%}

      # ── Pool user/ai_user members ───────────────────────────────────────────
      # No ordinal resolver sensors — pool members enumerated via
      # label_entities('zen_user_cabinet') and label_entities('zen_ai_user_cabinet').
      # Explicit entity_id required when targeting a pool member directly.

  ###########################################################################
  # 1️⃣ ZEN MONASTERY HEALTH — global cognition rollup
  ###########################################################################
  - trigger:
      - platform: homeassistant
        event: start
      - platform: event
        event_type: zen_health_tick
      - platform: event
        event_type: zen_resolver_refresh
        alias: Manual refire
    sensor:
      - name: Zen Monastery Health
        unique_id: zen_monastery_health
        device_class: enum
        availability: >-
          {{
            states('sensor.zen_dojo_cabinet_resolved') not in ['unknown','unavailable','none']
            and
            states('sensor.zen_kata_cabinet_resolved') not in ['unknown','unavailable','none']
          }}
        state: >-
          {#- -------- Resolve cabinets by label -------- #}
          {%- set dojo_cab = states('sensor.zen_dojo_cabinet_resolved') %}
          {%- set kata_cab = states('sensor.zen_kata_cabinet_resolved') %}

          {%- if not is_state('input_boolean.zen_summarizers_enabled', 'on') %}
            disabled
          {%- elif dojo_cab in ['unknown','unavailable','none'] %}
            critical
          {%- elif kata_cab in ['unknown','unavailable','none'] %}
            critical
          {%- else %}
            {%- set kata = state_attr(kata_cab,'variables') or {} %}
            {%- set dojo = state_attr(dojo_cab,'variables') or {} %}
            {%- set _sum_raw = kata.get('zen_summary', {}) %}
            {%- set summary = _sum_raw if _sum_raw is mapping else (_sum_raw | from_json if _sum_raw is string else {}) %}
            {%- set ts = summary.get('timestamp') if summary is mapping else none %}
            {%- set recent = ts and (now() - as_datetime(ts) < timedelta(minutes=15)) %}
            {%- set stale = ts and (now() - as_datetime(ts) >= timedelta(minutes=15)) %}
            {%- set crit_stale = ts and (now() - as_datetime(ts) >= timedelta(minutes=30)) %}
            {%- set _zt_drawer = kata.get('zen_template', {}) %}
            {%- set _zt_v1 = _zt_drawer.get('value', {}) if _zt_drawer is mapping else {} %}
            {%- set _zt_v2 = _zt_v1 if _zt_v1 is mapping else (_zt_v1 | from_json if _zt_v1 is string else {}) %}
            {%- set _zt_val = _zt_v2 if _zt_v2 is mapping else (_zt_v2 | from_json if _zt_v2 is string else {}) %}
            {%- set schema_ok = kata and (_zt_val is mapping) and _zt_val.get('structure', {}) is mapping %}

            {%- set _ns = namespace(active=[]) %}
            {%- for _k, _raw in dojo.items() %}
              {%- set _d_val = _raw.get('value', _raw) if _raw is mapping else {} %}
              {%- set _d_v2 = _d_val if _d_val is mapping else (_d_val | from_json if _d_val is string else {}) %}
              {%- set _d = _d_v2 if _d_v2 is mapping else (_d_v2 | from_json if _d_v2 is string else {}) %}
              {%- if _d.get('kata_key','') | trim != '' and _d.get('trigger_subscriptions') is not none %}
                {%- set _meta = _d.get('meta', {}) -%}
                {%- set _meta = _meta if _meta is mapping else {} -%}
                {%- if _meta.get('enabled', true) | bool %}
                  {%- set _ns.active = _ns.active + [_d.get('kata_key', _k)] %}
                {%- endif %}
              {%- endif %}
            {%- endfor %}
            {%- set active = _ns.active %}

            {%- set _ss_drawer = kata.get('zen_supersummary_status', {}) %}
            {%- set _ss_val = _ss_drawer.get('value', {}) if _ss_drawer is mapping else {} %}
            {%- set _ss_val = _ss_val if _ss_val is mapping else (_ss_val | from_json if _ss_val is string else {}) %}
            {%- set _ss_status = _ss_val.get('status', 'unknown') %}
            {%- set monk_err = _ss_status in ['error','timeout','none','null','unknown'] %}

            {#- ------------------------ CRITICAL ------------------------ #}
            {%- if not schema_ok %}
              critical
            {%- elif monk_err and crit_stale %}
              critical
            {%- elif active|count > 0 and not summary %}
              critical

            {#- ------------------------ WARN ------------------------- #}
            {%- elif monk_err %}
              warn
            {%- elif crit_stale %}
              warn
            {%- elif stale %}
              warn
            {%- elif not recent %}
              warn
            {%- elif active|count == 0 %}
              warn

            {#- --------------------------- OK --------------------------- #}
            {%- else %}
              ok
            {%- endif %}
          {%- endif %}
        attributes:
          reason: >-
            {%- set dojo_cab = states('sensor.zen_dojo_cabinet_resolved') %}
            {%- set kata_cab = states('sensor.zen_kata_cabinet_resolved') %}
            {%- if not is_state('input_boolean.zen_summarizers_enabled', 'on') %}
              Summarizers disabled via zen_summarizers_enabled helper.
            {%- elif dojo_cab in ['unknown','unavailable','none'] %}
              Dojo cabinet resolver is {{ dojo_cab }} — labels may not be assigned.
            {%- elif kata_cab in ['unknown','unavailable','none'] %}
              Kata cabinet resolver is {{ kata_cab }} — labels may not be assigned.
            {%- else %}
              {%- set kata = state_attr(kata_cab,'variables') or {} %}
              {%- set dojo = state_attr(dojo_cab,'variables') or {} %}
              {%- set _sum_raw = kata.get('zen_summary', {}) %}
              {%- set summary = _sum_raw if _sum_raw is mapping else (_sum_raw | from_json if _sum_raw is string else {}) %}
              {%- set ts = summary.get('timestamp') if summary is mapping else none %}
              {%- set stale = ts and (now() - as_datetime(ts) >= timedelta(minutes=15)) %}
              {%- set crit_stale = ts and (now() - as_datetime(ts) >= timedelta(minutes=30)) %}
              {%- set _zt_drawer = kata.get('zen_template', {}) %}
              {%- set _zt_v1 = _zt_drawer.get('value', {}) if _zt_drawer is mapping else {} %}
              {%- set _zt_v2 = _zt_v1 if _zt_v1 is mapping else (_zt_v1 | from_json if _zt_v1 is string else {}) %}
              {%- set _zt_val = _zt_v2 if _zt_v2 is mapping else (_zt_v2 | from_json if _zt_v2 is string else {}) %}
              {%- set schema_ok = kata and (_zt_val is mapping) and _zt_val.get('structure', {}) is mapping %}
              {%- set _ns = namespace(active=[]) %}
              {%- for _k, _raw in dojo.items() %}
                {%- set _d_val = _raw.get('value', _raw) if _raw is mapping else {} %}
                {%- set _d_v2 = _d_val if _d_val is mapping else (_d_val | from_json if _d_val is string else {}) %}
                {%- set _d = _d_v2 if _d_v2 is mapping else (_d_v2 | from_json if _d_v2 is string else {}) %}
                {%- if _d.get('kata_key','') | trim != '' and _d.get('trigger_subscriptions') is not none %}
                  {%- set _meta = _d.get('meta', {}) -%}
                  {%- set _meta = _meta if _meta is mapping else {} -%}
                  {%- if _meta.get('enabled', true) | bool %}
                    {%- set _ns.active = _ns.active + [_d.get('kata_key', _k)] %}
                  {%- endif %}
                {%- endif %}
              {%- endfor %}
              {%- set _ss_drawer = kata.get('zen_supersummary_status', {}) %}
              {%- set _ss_val = _ss_drawer.get('value', {}) if _ss_drawer is mapping else {} %}
              {%- set _ss_val = _ss_val if _ss_val is mapping else (_ss_val | from_json if _ss_val is string else {}) %}
              {%- set _ss_status = _ss_val.get('status', 'unknown') %}
              {%- set monk_err = _ss_status in ['error','timeout','none','null','unknown'] %}
              {%- set _age_min = ((now() - as_datetime(ts)).total_seconds() / 60) | int if ts else 0 %}
              {%- if not schema_ok %}
                zen_template schema missing from kata cabinet — run zen_admintools_reset_template.
              {%- elif monk_err and crit_stale %}
                SuperSummary status {{ _ss_status }} and zen_summary is {{ _age_min }} min old — fire summary_force to recover.
              {%- elif _ns.active | count > 0 and not summary %}
                {{ _ns.active | count }} active KFC components but no zen_summary in kata — fire summary_force or wait for next scheduler tick.
              {%- elif monk_err %}
                SuperSummary status is {{ _ss_status }} — no successful run recorded in kata (zen_supersummary_status drawer).
              {%- elif crit_stale %}
                zen_summary is {{ _age_min }} min old (threshold: 30 min) — fire summary_force to refresh.
              {%- elif stale %}
                zen_summary is {{ _age_min }} min old (threshold: 15 min) — awaiting next Ninja run or fire summary_force.
              {%- elif not ts %}
                No zen_summary in kata yet — Ninja Summarizer has not run since boot. Fire summary_force.
              {%- elif _ns.active | count == 0 %}
                No active KFC components in dojo — components need kata_key and trigger_subscriptions to be eligible.
              {%- else %}
                All checks passed.
              {%- endif %}
            {%- endif %}

          dojo_cabinet: "{{ states('sensor.zen_dojo_cabinet_resolved') }}"
          kata_cabinet: "{{ states('sensor.zen_kata_cabinet_resolved') }}"

          dojo_ok: >-
            {{ states('sensor.zen_dojo_cabinet_resolved')
               not in ['unknown','unavailable','none'] }}
               
          kata_ok: >-
            {{ states('sensor.zen_kata_cabinet_resolved')
               not in ['unknown','unavailable','none'] }}
               
          schema_ok: >-
            {%- set _vars = state_attr(states('sensor.zen_kata_cabinet_resolved'),'variables') or {} %}
            {%- set _zt_drawer = _vars.get('zen_template', {}) %}
            {%- set _zt_v1 = _zt_drawer.get('value', {}) if _zt_drawer is mapping else {} %}
            {%- set _zt_v2 = _zt_v1 if _zt_v1 is mapping else (_zt_v1 | from_json if _zt_v1 is string else {}) %}
            {%- set _zt_val = _zt_v2 if _zt_v2 is mapping else (_zt_v2 | from_json if _zt_v2 is string else {}) %}
            {{ (_zt_val is mapping) and _zt_val.get('structure', {}) is mapping }}

          ninja_summary_status: >-
            {%- set _kc = states('sensor.zen_kata_cabinet_resolved') %}
            {%- if _kc in ['unknown','unavailable','none'] %}
              unavailable
            {%- else %}
              {%- set _k = state_attr(_kc,'variables') or {} %}
              {%- set _sched_raw = _k.get('zen_scheduler', {}) %}
              {%- set _sched = _sched_raw if _sched_raw is mapping else (_sched_raw | from_json if _sched_raw is string else {}) %}
              {%- set _ts = _sched.get('timestamp') if _sched is mapping else none %}
              {%- set _stale = _ts and (now() - as_datetime(_ts) >= timedelta(minutes=20)) %}
              {%- set _task = states('input_text.zenos_ai_task_entity') | trim
                  not in ['','unknown','unavailable'] %}
              {%- if not _task %}warn
              {%- elif not _sched %}warn
              {%- elif _stale %}warn
              {%- else %}ok
              {%- endif %}
            {%- endif %}

          supersummary_status: >-
            {%- set _kc = states('sensor.zen_kata_cabinet_resolved') %}
            {%- if _kc in ['unknown','unavailable','none'] %}
              unavailable
            {%- else %}
              {%- set _k    = state_attr(_kc,'variables') or {} %}
              {%- set _ss_d = _k.get('zen_supersummary_status', {}) %}
              {%- set _ss_v = _ss_d.get('value', {}) if _ss_d is mapping else {} %}
              {%- set _ss_v = _ss_v if _ss_v is mapping else (_ss_v | from_json if _ss_v is string else {}) %}
              {%- set _monk = _ss_v.get('status', 'unknown') %}
              {%- set _sum_d = _k.get('zen_summary', {}) %}
              {%- set _sum_d = _sum_d if _sum_d is mapping else (_sum_d | from_json if _sum_d is string else {}) %}
              {%- set _ts   = _sum_d.get('timestamp') if _sum_d is mapping else none %}
              {%- set _stale = _ts and (now() - as_datetime(_ts) >= timedelta(minutes=15)) %}
              {%- set _crit  = _ts and (now() - as_datetime(_ts) >= timedelta(minutes=30)) %}
              {%- if _monk in ['error','timeout','none','null'] %}warn
              {%- elif _crit %}warn
              {%- elif _stale %}warn
              {%- else %}ok
              {%- endif %}
            {%- endif %}

          active_components: >-
            {%- set _dc = states('sensor.zen_dojo_cabinet_resolved') %}
            {%- set _dojo = state_attr(_dc, 'variables') or {} %}
            {%- set _ns = namespace(active=[]) %}
            {%- for _k, _raw in _dojo.items() %}
              {%- set _d_val = _raw.get('value', _raw) if _raw is mapping else {} %}
              {%- set _d_v2 = _d_val if _d_val is mapping else (_d_val | from_json if _d_val is string else {}) %}
              {%- set _d = _d_v2 if _d_v2 is mapping else (_d_v2 | from_json if _d_v2 is string else {}) %}
              {%- if _d.get('kata_key','') | trim != '' and _d.get('trigger_subscriptions') is not none %}
                {%- set _meta = _d.get('meta', {}) -%}
                {%- set _meta = _meta if _meta is mapping else {} -%}
                {%- if _meta.get('enabled', true) | bool %}
                  {%- set _ns.active = _ns.active + [_d.get('kata_key', _k)] %}
                {%- endif %}
              {%- endif %}
            {%- endfor %}
            {{ _ns.active | tojson }}

          last_timestamp: >-
            {%- set _vars = state_attr(states('sensor.zen_kata_cabinet_resolved'),'variables') or {} %}
            {%- set _sum_d = _vars.get('zen_summary', {}) %}
            {%- set _sum_d = _sum_d if _sum_d is mapping else (_sum_d | from_json if _sum_d is string else {}) %}
            {{ _sum_d.get('timestamp') | default('none') }}

          pipeline_master: "{{ is_state('input_boolean.zen_summarizers_enabled', 'on') }}"
          supersummary_enabled: "{{ is_state('input_boolean.zen_supersummarizer_enabled', 'on') }}"
          ninja_summarizer_enabled: "{{ is_state('input_boolean.zen_ninja_summarizer_enabled', 'on') }}"

  ###########################################################################
  # 2️⃣ NINJA SUMMARIZER HEALTH
  ###########################################################################
  - trigger:
      - platform: homeassistant
        event: start
      - platform: event
        event_type: zen_health_tick
      - platform: event
        event_type: zen_resolver_refresh
        alias: Manual refire
    sensor:
      - name: Zen Summarizer Health
        unique_id: zen_summarizer_health
        device_class: enum
        availability: >-
          {{
            states('sensor.zen_kata_cabinet_resolved') not in ['unknown','unavailable','none']
          }}
        state: >-
          {%- set kata_cab = states('sensor.zen_kata_cabinet_resolved') %}
          {%- if not is_state('input_boolean.zen_ninja_summarizer_enabled', 'on') %}
            disabled
          {%- elif kata_cab in ['unknown','unavailable','none'] %}
            critical
          {%- else %}
            {%- set kata = state_attr(kata_cab,'variables') or {} %}
            {%- set _drawer_raw = kata.get('zen_scheduler', {}) %}
            {%- set drawer = _drawer_raw if _drawer_raw is mapping else (_drawer_raw | from_json if _drawer_raw is string else {}) %}
            {%- set ts = drawer.get('timestamp') if drawer is mapping else none %}
            {%- set stale = ts and (now() - as_datetime(ts) >= timedelta(minutes=20)) %}
            {%- set recent = ts and not stale %}
            {%- set ai_task_set = states('input_text.zenos_ai_task_entity') | trim
                not in ['', 'unknown', 'unavailable'] %}
            {%- if not ai_task_set %}
              warn
            {%- elif not drawer %}
              warn
            {%- elif stale %}
              warn
            {%- else %}
              ok
            {%- endif %}
          {%- endif %}
        attributes:
          reason: >-
            {%- set kata_cab = states('sensor.zen_kata_cabinet_resolved') %}
            {%- if not is_state('input_boolean.zen_ninja_summarizer_enabled', 'on') %}
              Ninja Summarizer disabled via zen_ninja_summarizer_enabled helper.
            {%- elif kata_cab in ['unknown','unavailable','none'] %}
              Kata cabinet resolver is {{ kata_cab }} — labels may not be assigned.
            {%- else %}
              {%- set kata = state_attr(kata_cab,'variables') or {} %}
              {%- set _drawer_raw = kata.get('zen_scheduler', {}) %}
              {%- set drawer = _drawer_raw if _drawer_raw is mapping else (_drawer_raw | from_json(none) if _drawer_raw is string else {}) %}
              {%- set ts = drawer.get('timestamp') if drawer is mapping else none %}
              {%- set stale = ts and (now() - as_datetime(ts) >= timedelta(minutes=20)) %}
              {%- set ai_task_set = states('input_text.zenos_ai_task_entity') | trim not in ['', 'unknown', 'unavailable'] %}
              {%- set _age_min = ((now() - as_datetime(ts)).total_seconds() / 60) | int if ts else 0 %}
              {%- if not ai_task_set %}
                AI task entity not configured — input_text.zenos_ai_task_entity is blank.
              {%- elif not drawer %}
                zen_scheduler drawer missing from kata — Ninja Summarizer has never run.
              {%- elif stale %}
                zen_scheduler last run {{ _age_min }} min ago (threshold: 20 min) — pipeline may be stalled.
              {%- else %}
                All checks passed.
              {%- endif %}
            {%- endif %}

          kata_cabinet: "{{ states('sensor.zen_kata_cabinet_resolved') }}"
          ai_task_entity: "{{ states('input_text.zenos_ai_task_entity') | trim }}"
          last_timestamp: >-
            {%- set _vars = state_attr(states('sensor.zen_kata_cabinet_resolved'),'variables') or {} %}
            {%- set _sched_d = _vars.get('zen_scheduler', {}) %}
            {%- set _sched_d = _sched_d if _sched_d is mapping else (_sched_d | from_json if _sched_d is string else {}) %}
            {{ _sched_d.get('timestamp') | default('none') }}

          component_timings: >-
            {%- set _kc = states('sensor.zen_kata_cabinet_resolved') %}
            {%- set _vars = state_attr(_kc, 'variables') or {} %}
            {%- set _ns = namespace(timings={}) %}
            {%- for k, raw in _vars.items() if k.startswith('zen_ninja_last_run_') %}
              {%- set _v = raw.get('value', {}) if raw is mapping else {} %}
              {%- set _v = _v if _v is mapping else (_v | from_json if _v is string else {}) %}
              {%- set slug = k[19:] %}
              {%- set _ns.timings = _ns.timings | combine({slug: _v}) %}
            {%- endfor %}
            {{ _ns.timings | tojson }}

  ###########################################################################
  # 3️⃣ SUPER SUMMARY (High Priestess)
  ###########################################################################
  - trigger:
      - platform: homeassistant
        event: start
      - platform: event
        event_type: zen_health_tick
      - platform: event
        event_type: zen_resolver_refresh
        alias: Manual refire
    sensor:
      - name: Zen SuperSummary Health
        unique_id: zen_supersummary_health
        device_class: enum
        availability: >-
          {{
            states('sensor.zen_kata_cabinet_resolved') not in ['unknown','unavailable','none']
          }}
        state: >-
          {%- set kata_cab = states('sensor.zen_kata_cabinet_resolved') %}
          {%- if not is_state('input_boolean.zen_supersummarizer_enabled', 'on') %}
            disabled
          {%- elif kata_cab in ['unknown','unavailable','none'] %}
            critical
          {%- else %}
            {%- set kata = state_attr(kata_cab,'variables') or {} %}
            {%- set _sum_raw = kata.get('zen_summary', {}) %}
            {%- set summary = _sum_raw if _sum_raw is mapping else (_sum_raw | from_json if _sum_raw is string else {}) %}
            {%- set _ss_d = kata.get('zen_supersummary_status', {}) %}
            {%- set _ss_v = _ss_d.get('value', {}) if _ss_d is mapping else {} %}
            {%- set _ss_v = _ss_v if _ss_v is mapping else (_ss_v | from_json if _ss_v is string else {}) %}
            {%- set monk = _ss_v.get('status', 'unknown') %}
            {%- set ts = summary.get('timestamp') if summary is mapping else none %}
            {%- set stale = ts and (now() - as_datetime(ts) >= timedelta(minutes=15)) %}
            {%- set crit_stale = ts and (now() - as_datetime(ts) >= timedelta(minutes=30)) %}
            {%- if monk in ['error','timeout','none','null'] %}
              warn
            {%- elif crit_stale %}
              warn
            {%- elif stale %}
              warn
            {%- else %}
              ok
            {%- endif %}
          {%- endif %}
        attributes:
          reason: >-
            {%- set kata_cab = states('sensor.zen_kata_cabinet_resolved') %}
            {%- if not is_state('input_boolean.zen_supersummarizer_enabled', 'on') %}
              SuperSummary disabled via zen_supersummarizer_enabled helper.
            {%- elif kata_cab in ['unknown','unavailable','none'] %}
              Kata cabinet resolver is {{ kata_cab }} — labels may not be assigned.
            {%- else %}
              {%- set kata = state_attr(kata_cab,'variables') or {} %}
              {%- set _ss_d = kata.get('zen_supersummary_status', {}) %}
              {%- set _ss_v = _ss_d.get('value', {}) if _ss_d is mapping else {} %}
              {%- set _ss_v = _ss_v if _ss_v is mapping else (_ss_v | from_json(none) if _ss_v is string else {}) %}
              {%- set monk = (_ss_v.get('status', 'unknown') if _ss_v is mapping else 'unknown') %}
              {%- set _sum_raw = kata.get('zen_summary', {}) %}
              {%- set summary = _sum_raw if _sum_raw is mapping else (_sum_raw | from_json(none) if _sum_raw is string else {}) %}
              {%- set ts = (summary.get('timestamp') if summary is mapping else none) %}
              {%- set _age_min = ((now() - as_datetime(ts)).total_seconds() / 60) | int if ts else 0 %}
              {%- set crit_stale = ts and (now() - as_datetime(ts) >= timedelta(minutes=30)) %}
              {%- set stale = ts and (now() - as_datetime(ts) >= timedelta(minutes=15)) %}
              {%- if monk in ['error','timeout','none','null'] %}
                SuperSummary status is {{ monk }} — no successful run recorded in kata (zen_supersummary_status drawer).
              {%- elif crit_stale %}
                zen_summary is {{ _age_min }} min old (threshold: 30 min) — fire summary_force to refresh.
              {%- elif stale %}
                zen_summary is {{ _age_min }} min old (threshold: 15 min) — awaiting next Ninja run.
              {%- else %}
                All checks passed.
              {%- endif %}
            {%- endif %}

          kata_cabinet: "{{ states('sensor.zen_kata_cabinet_resolved') }}"
          monk_status: >-
            {%- set _vars = state_attr(states('sensor.zen_kata_cabinet_resolved'),'variables') or {} %}
            {%- set _ss_d = _vars.get('zen_supersummary_status', {}) %}
            {%- set _ss_v = _ss_d.get('value', {}) if _ss_d is mapping else {} %}
            {%- set _ss_v = _ss_v if _ss_v is mapping else (_ss_v | from_json if _ss_v is string else {}) %}
            {{ _ss_v.get('status', 'unknown') }}
          last_timestamp: >-
            {%- set _vars = state_attr(states('sensor.zen_kata_cabinet_resolved'),'variables') or {} %}
            {%- set _sum_d = _vars.get('zen_summary', {}) %}
            {%- set _sum_d = _sum_d if _sum_d is mapping else (_sum_d | from_json if _sum_d is string else {}) %}
            {{ _sum_d.get('timestamp') | default('none') }}

          pipeline_master: "{{ is_state('input_boolean.zen_summarizers_enabled', 'on') }}"
          supersummary_enabled: "{{ is_state('input_boolean.zen_supersummarizer_enabled', 'on') }}"
          last_duration_seconds: >-
            {%- set _vars = state_attr(states('sensor.zen_kata_cabinet_resolved'),'variables') or {} %}
            {%- set _ss_d = _vars.get('zen_supersummary_status', {}) %}
            {%- set _ss_v = _ss_d.get('value', {}) if _ss_d is mapping else {} %}
            {%- set _ss_v = _ss_v if _ss_v is mapping else (_ss_v | from_json if _ss_v is string else {}) %}
            {{ _ss_v.get('duration_seconds', none) | default('none', true) }}
          last_run_at: >-
            {%- set _vars = state_attr(states('sensor.zen_kata_cabinet_resolved'),'variables') or {} %}
            {%- set _ss_d = _vars.get('zen_supersummary_status', {}) %}
            {%- set _ss_v = _ss_d.get('value', {}) if _ss_d is mapping else {} %}
            {%- set _ss_v = _ss_v if _ss_v is mapping else (_ss_v | from_json if _ss_v is string else {}) %}
            {{ _ss_v.get('run_started_at', none) | default('none', true) }}


###############################################################################
# Auto-fire pipeline when a summarizer kill switch is re-enabled.
# Fires zen_event kind:summary_force → scheduler force_summary branch →
# SuperSummary + Ninja dispatch + zen_health_tick in one pass.
###############################################################################
automation:

  - id: zen_pipeline_autofire_on_enable
    alias: ZenOS — Auto-fire pipeline on summarizer enable
    description: >-
      When any summarizer kill switch is turned on, immediately fire the
      summary pipeline rather than waiting for the next scheduled tick.
    trigger:
      - platform: state
        entity_id: input_boolean.zen_summarizers_enabled
        to: "on"
        id: master
      - platform: state
        entity_id: input_boolean.zen_ninja_summarizer_enabled
        to: "on"
        id: ninja
      - platform: state
        entity_id: input_boolean.zen_supersummarizer_enabled
        to: "on"
        id: supersummary
    action:
      - choose:
          - conditions: "{{ trigger.id == 'master' }}"
            sequence:
              - event: zen_event
                event_data:
                  event:
                    kind: summary_force
          - conditions: "{{ trigger.id == 'ninja' }}"
            sequence:
              - event: zen_event
                event_data:
                  event:
                    kind: ninja_force
          - conditions: "{{ trigger.id == 'supersummary' }}"
            sequence:
              - event: zen_event
                event_data:
                  event:
                    kind: supersummary_force
    mode: single
    max_exceeded: silent