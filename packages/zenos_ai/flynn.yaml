###############################################################################
# FLYNN — UNIFIED ENGINE (v4.5.6)
# Canon-safe, no nested Jinja in service calls, fully HA-legal.
#
# Includes:
#   - RC1 Config (input_text helpers)
#   - Flynn Unified Engine (onboarding Q&A)
#   - Flynn Stepgate Sentinel (boot guard / installer / diagnostic)
#   - Flynn helper scripts (assign_labels, initialize_cabinets, bootstrap_content)
###############################################################################


###############################################################################
# RC1 CONFIG — 4 fields, settable via Settings > Helpers
# New users: fill these in after install, then restart HA.
# Flynn reads them at Gate 3 (bootstrap).
###############################################################################
input_text:
  zenos_conversation_agent:
    name: "ZenOS: Conversation Agent"
    icon: mdi:robot
    max: 255

  zenos_household_name:
    name: "ZenOS: Household Name"
    icon: mdi:home
    max: 255

  zenos_primary_user:
    name: "ZenOS: Primary User"
    icon: mdi:account
    max: 255

  zenos_persona_name:
    name: "ZenOS: Persona Name"
    icon: mdi:account-star
    max: 255

  zenos_reasoning_task:
    name: "ZenOS: Reasoning Task"
    icon: mdi:brain
    max: 255

  zenos_ai_task_entity:
    name: "ZenOS: AI Task Entity"
    icon: mdi:robot-outline
    max: 255

input_boolean:
  zenos_cab_init_rearm:
    name: "ZenOS: Cabinet Init Rearm"
    icon: mdi:shield-lock-outline

  zen_squirrel:
    name: "ZenOS: Secret Squirrel Mode"
    icon: mdi:incognito

  zen_flynn_override:
    name: "ZenOS: Flynn Override"
    icon: mdi:wrench-outline


###############################################################################
# COMPANION SELECTS
# Overlay UI controls for the four critical input_texts.
# Each select reads its current value from the canonical input_text and writes
# back to it on change — input_texts remain the canonical source of truth.
# Options are dynamically resolved from HA state at render time.
###############################################################################

template:
  - select:
      - name: "ZenOS: Persona"
        unique_id: zen_select_persona
        icon: mdi:account-star
        state: "{{ states('input_text.zenos_persona_name') }}"
        # @todo - no need to coerce sensor.zen_default_ai_user_cabinet_resolved to a list and then check the length at the end - there is onle one cab(s)!
        options: >-
          {%- import 'zenos_ai/zenos_cabinets.jinja' as CABS -%}
          {%- set cabs = [states('sensor.zen_default_ai_user_cabinet_resolved')] -%}
          {%- set names = namespace(list=[]) -%}
          {%- for cab in cabs -%}
            {%- set essence = CABS.cabinet_drawer_value(cab, 'zenai_essence') | from_json() -%}
            {%- set name = essence.get('identity', {}).get('name', '') | trim -%}
            {%- if name not in ['', 'your AI', 'unknown'] -%}
              {%- set names.list = names.list + [name] -%}
            {%- endif -%}
          {%- endfor -%}
          {{ names.list if names.list | length > 0 else ['unknown'] }}
        select_option:
          action: input_text.set_value
          target:
            entity_id: input_text.zenos_persona_name
          data:
            value: "{{ option }}"

      - name: "ZenOS: Primary User"
        unique_id: zen_select_primary_user
        icon: mdi:account
        state: "{{ states('input_text.zenos_primary_user') }}"
        options: >-
          {%- set people = namespace(list=[]) -%}
          {%- for p in states.person -%}
            {%- if state_attr(p.entity_id, 'user_id') is not none -%}
              {%- set people.list = people.list + [p.name] -%}
            {%- endif -%}
          {%- endfor -%}
          {{ people.list if people.list | length > 0 else ['unknown'] }}
        select_option:
          action: input_text.set_value
          target:
            entity_id: input_text.zenos_primary_user
          data:
            value: "{{ option }}"

      - name: "ZenOS: Conversation Agent"
        unique_id: zen_select_conversation_agent
        icon: mdi:robot
        state: "{{ states('input_text.zenos_conversation_agent') }}"
        options: >-
          {%- set agents = states | selectattr('entity_id', 'match', '^conversation\.') | list -%}
          {{ agents | map(attribute='entity_id') | list
             if agents | length > 0 else ['unknown'] }}
        select_option:
          action: input_text.set_value
          target:
            entity_id: input_text.zenos_conversation_agent
          data:
            value: "{{ option }}"

      - name: "ZenOS: AI Task"
        unique_id: zen_select_ai_task
        icon: mdi:robot-outline
        state: "{{ states('input_text.zenos_ai_task_entity') }}"
        options: >-
          {%- set tasks = states | selectattr('entity_id', 'match', '^ai_task\.') | list -%}
          {{ tasks | map(attribute='entity_id') | list
             if tasks | length > 0 else ['unknown'] }}
        select_option:
          action: input_text.set_value
          target:
            entity_id: input_text.zenos_ai_task_entity
          data:
            value: "{{ option }}"


###############################################################################
# STEPGATE SENTINEL
# Triggers on HA start + all 3 health sensor changes.
# Walks gates top-down, stops at first non-green, takes corrective action.
# Idempotent. Re-engages on health regression.
###############################################################################
automation:
  - alias: "Flynn: Boot Warmup — Auto Force Summary"
    id: flynn_boot_warmup_force_summary
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
    conditions: []
    actions:
      - delay: "00:00:30"
      - event: zen_event
        event_data:
          event:
            kind: summary_force

  - alias: "Flynn: Boot Warmup — Emit warmup_expired after window"
    id: zen_warmup_timer
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
    conditions: []
    actions:
      - delay: "00:00:05"
      - variables:
          _warmup_minutes: >-
            {%- set _hh = states('sensor.zen_default_household_cabinet_resolved') -%}
            {%- set _cfg_raw = (state_attr(_hh, 'variables') or {}).get('zen_scheduler_config', {}) -%}
            {%- set _v = _cfg_raw.get('value', _cfg_raw) if _cfg_raw is mapping else {} -%}
            {%- set _v = (_v | from_json) if _v is string else _v -%}
            {{ (_v.get('warmup_minutes', 5) | int(5)) if _v is mapping else 5 }}
      - delay:
          minutes: "{{ _warmup_minutes }}"
      - event: zen_event
        event_data:
          event:
            kind: warmup_expired
            source: zen_warmup_timer
            warmup_minutes: "{{ _warmup_minutes }}"
            timestamp: "{{ now().isoformat() }}"

  - alias: "Flynn: Stepgate Sentinel"
    id: flynn_stepgate_sentinel
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
        id: ha_start
      # Recovery net: re-evaluates every 5 min so sentinel self-heals after
      # ha_reload_all kills in-flight runs without a health state change.
      # Fast early-exit (was_green check) makes this cheap when system is ok.
      - trigger: time_pattern
        minutes: /5
    # ---------------------------------------------------------
    # Only trigger on state change of health cabinets (enum) - not on attributes
    # @todo - might be able to use. not_to: unavailable
    # ---------------------------------------------------------
      - trigger: state
        entity_id: sensor.zen_label_health
        to:
        - critical
        - error
        - warn
        - ok
      - trigger: state
        entity_id: sensor.zen_cabinet_health
        to:
        - critical
        - error
        - warn
        - ok
      - trigger: state
        entity_id: sensor.zen_monastery_health
        to:
        - critical
        - error
        - warn
        - ok
      # Wake on cabinet mount/dismount so gates re-evaluate immediately
      - trigger: event
        event_type: zen_event
        event_data:
          event:
            kind: cabinet_mounted
        id: cab_mounted
      - trigger: event
        event_type: zen_event
        event_data:
          event:
            kind: cabinet_dismounted
        id: cab_dismounted
      # Warmup window expired — re-evaluate all gates with warmup=false.
      # Surfaces any pending cabinet warn notification after boot has settled.
      - trigger: event
        event_type: zen_event
        event_data:
          event:
            kind: warmup_expired
        id: warmup_expired
    conditions: []
    actions:
      # Capture green state + OOBE state BEFORE delay
      - variables:
          was_green: "{{ is_state('binary_sensor.flynn_system_ready', 'on') }}"
          _oobe_ai_cab: "{{ states('sensor.zen_default_ai_user_cabinet_resolved') }}"
          #_oobe_cab_vars: >-
          #  {{ state_attr(_oobe_ai_cab, 'variables') | default({}, true)
          #     if _oobe_ai_cab != '' else {} }}
          _oobe_cab_vars: >-
            {%- import 'zenos_ai/zenos_cabinets.jinja' as CABS -%}
            {{- CABS.cabinet_variables(_oobe_ai_cab) | from_json() -}}
          _oobe_complete: "{{ '_oobe_complete' in _oobe_cab_vars }}"
          #_oobe_essence_raw: "{{ _oobe_cab_vars.get('zenai_essence', {}) }}"
          #_oobe_essence_val: >-
          #  {{ _oobe_essence_raw.get('value', _oobe_essence_raw)
          #     if _oobe_essence_raw is mapping else {} }}
          _oobe_essence_val: >-
            {%- import 'zenos_ai/zenos_cabinets.jinja' as CABS -%}
            {{- CABS.cabinet_drawer_value(_oobe_ai_cab, 'zenai_essence') | from_json() -}}
          #_oobe_name: >-
          #  {{ (_oobe_essence_val.get('identity', {}).get('name', '') | trim)
          #     if _oobe_essence_val is mapping else '' }}
          _oobe_name: >-
            {{- (_oobe_essence_val.get('identity', {}).get('name', '') | trim) -}}
          _oobe_pending: "{{ not _oobe_complete and (_oobe_name in ['', 'your AI', 'unknown']) }}"
          _early_in_warmup: >-
            {%- import 'zenos_ai/zenos_health.jinja' as HEALTH -%}
            {{ HEALTH.is_warmup() | trim | bool }}
          _early_init_cabs: >-
            {%- set _sde = state_attr('sensor.zen_cabinet_health', 'slot_to_default_entity') | default({}) -%}
            {%- set _sde = _sde if _sde is mapping else (_sde | from_json if _sde is string else {}) -%}
            {%- set ns = namespace(found=false) -%}
            {%- for slot, eid in _sde.items() -%}{%- if states(eid) == 'init' -%}{%- set ns.found = true -%}{%- endif -%}{%- endfor -%}
            {{ ns.found }}
      # Early exit: skip when all gates truly green AND oobe done AND no init cabs.
      # Optional slots stay ok in cabinet_health even with init-state cabs — we
      # check cabinet_states directly so Flynn can't be fooled by health rollup.
      - if: >
          {{ was_green
             and is_state('sensor.zen_label_health', 'ok')
             and is_state('sensor.zen_cabinet_health', 'ok')
             and is_state('sensor.zen_monastery_health', ['ok', 'warn'])
             and not _oobe_pending
             and not _early_init_cabs
             and 'kfc_template' in (state_attr(states('sensor.zen_dojo_cabinet_resolved'), 'variables') or {})
             and 'zen_template'  in (state_attr(states('sensor.zen_kata_cabinet_resolved'), 'variables') or {}) }}
        then:
          - stop: "No-op: all gates green, schemas seeded"
      - delay: "00:00:10"
      - if: "{{ trigger.id == 'ha_start' }}"
        then:
          - action: persistent_notification.create
            data:
              title: "ZenOS-AI: Warming up"
              message: >
                Flynn here. HA just restarted — I'm bringing the monastery online.
                Summarizer pipeline is running. This notification dismisses
                automatically when I'm fully ready. Nothing is broken.
              notification_id: flynn_warmup
      - variables:
          label_health: "{{ states('sensor.zen_label_health') }}"
          cabinet_health: "{{ states('sensor.zen_cabinet_health') }}"
          monastery_health: "{{ states('sensor.zen_monastery_health') }}"

      #####################################################################
      # GATE 0: Labels missing — create them
      #####################################################################
      - choose:
          - conditions: "{{ label_health == 'critical' }}"
            sequence:
              - variables:
                  #raw_labels: "{{ state_attr('sensor.zen_label_health', 'required_labels') }}"
                  label_list: >-
                    {%- import 'zenos_ai/zenos_health.jinja' as HEALTH -%}
                    {{ HEALTH.required_labels() | from_json([]) }}

              # ---------------------------------------------
              # @related homeassistant.create_label
              # ---------------------------------------------
              - alias: "Flynn: Create missing labels via DojoTools"
                action: script.zen_dojotools_labels
                data:
                  action_type: create
                  label_list: "{{ label_list }}"
                  confirm: true
              - action: persistent_notification.create
                data:
                  title: "ZenOS-AI: Almost there — restart needed"
                  message: >
                    Hey, it's Flynn. I just laid the groundwork — labels are in place.
                    I need you to restart Home Assistant before I can finish wiring things up.
                    After the restart, open a conversation with me and we'll pick up right where we left off.
                  notification_id: flynn_labels_created
              - stop: "Gate 0: Labels created, restart needed"

      #####################################################################
      # GATE 1: Labels exist but unassigned
      #####################################################################
      - choose:
          - conditions: "{{ label_health == 'warn' }}"
            sequence:
              - alias: "Flynn: Assign labels to cabinet entities"
                action: script.flynn_assign_labels
                data: {}
              - stop: "Gate 1: Labels assigned, waiting for health update"

      # Clear label notification if we got past gates 0-1
      - action: persistent_notification.dismiss
        data:
          notification_id: flynn_labels_created

      #####################################################################
      # GATE 2: Cabinets not ok
      #
      # BOOT-SAFETY: Flynn NEVER auto-initializes cabinets. Doing so at boot
      # is indistinguishable from wiping live data (incident: 2026-03-23).
      # If cabinets are missing or damaged, notify the operator and stop.
      # Initialization requires explicit operator action — never autonomous.
      #
      # Three cases:
      #   error/critical  — always stop, urgent notification
      #   warn + outside warmup window + not ha_start — friendly notify + stop
      #   warn + inside warmup window OR ha_start — log only, continue
      #####################################################################
      - variables:
          _cab_warn: "{{ cabinet_health == 'warn' }}"
          _cab_hard: "{{ cabinet_health in ['error', 'critical'] }}"
          _in_warmup: >-
            {%- import 'zenos_ai/zenos_health.jinja' as HEALTH -%}
            {{ HEALTH.is_warmup() | trim | bool }}
          _is_ha_start: "{{ trigger.id == 'ha_start' }}"
      - choose:
          # Case A: hard failure — always stop
          - conditions: "{{ _cab_hard }}"
            sequence:
              - alias: "Flynn: Notify operator — cabinet check needed"
                action: persistent_notification.create
                data:
                  title: "ZenOS-AI: Cabinet Check Needed"
                  message: >
                    Flynn detected a cabinet health issue ({{ cabinet_health }}).
                    Missing required slots: {{ state_attr('sensor.zen_cabinet_health', 'missing_cabinets') }}.
                    Before touching anything — make sure you have a current HA backup.
                    Then open a conversation with me and say "initialize my cabinets" to proceed.
                    Note: sensor.zenos_system_cabinet (prompt substrate) is managed by
                    zen_admintools_zenos_prompt_loader and zen_admintools_cabinetadmin_factory —
                    not writeable via FileCabinet or by me. Use those admin tools for syscab repair.
                  notification_id: flynn_cabinets_need_attention
              - action: system_log.write
                data:
                  level: warning
                  message: >-
                    Flynn Gate 2: cabinet_health={{ cabinet_health }},
                    missing={{ state_attr('sensor.zen_cabinet_health', 'missing_cabinets') }}.
                    Auto-initialization is disabled. Operator action required.
              - stop: "Gate 2: Cabinet check needed — operator action required"
          # Case B: warn outside warmup, not ha_start — friendly notify (once) + continue
          - conditions: "{{ _cab_warn and not _in_warmup and not _is_ha_start }}"
            sequence:
              - alias: "Flynn: Fire alert_once — cabinet upgrade available"
                event: zen_event
                event_data:
                  event:
                    kind: alert_fire
                    alert_key: cab_schema_upgrade_available
                    severity: warn
                    message: >-
                      One or more cabinets are on a pre-RC2 schema. Everything is working —
                      this is just a housekeeping note. Make sure you have a current HA backup,
                      then open a conversation with me and say "upgrade my cabinets" when you're ready.
                      No rush.
              - action: system_log.write
                data:
                  level: info
                  message: >-
                    Flynn Gate 2: cabinet_health=warn (legacy schema),
                    reason={{ state_attr('sensor.zen_cabinet_health', 'reason') }}.
                    Non-blocking — schema upgrade available. Continuing.
          # Case C: warn during warmup OR ha_start — log only, continue
          - conditions: "{{ _cab_warn }}"
            sequence:
              - action: system_log.write
                data:
                  level: info
                  message: >-
                    Flynn Gate 2: cabinet_health=warn during warmup/ha_start — continuing.
                    reason={{ state_attr('sensor.zen_cabinet_health', 'reason') }}.

      # Clear cab upgrade alert when schema is healthy
      - if:
        - condition: template
          value_template: "{{ not _cab_warn and not _cab_hard }}"
        then:
        - event: zen_event
          event_data:
            event:
              kind: alert_clear
              alert_key: cab_schema_upgrade_available

      #####################################################################
      # WARMUP EXIT: Infrastructure (Gates 0-2) has run. Defer everything
      # else — cabinet init, bootstrap, OOBE — until system is settled.
      # warmup_expired zen_event re-triggers Flynn once the window clears.
      #####################################################################
      - if: "{{ _early_in_warmup or trigger.id == 'ha_start' }}"
        then:
          - stop: "Warmup in progress — Gates 2.1+ deferred"

      #####################################################################
      # GATE 2.1: Init-state cabinets — virgin cabs needing first-time boot
      # touch. Safe to auto-initialize: state=init means sensor has evaluated
      # at least once with no VolumeInfo (genuinely virgin, not a boot race).
      # The GUID gate inside flynn_initialize_cabinets blocks any cab that has
      # VolumeInfo, so live data is never at risk.
      # Infrastructure-only — no monastery required.
      #
      # BOOT SAFETY: Skipped during warmup and ha_start. In that window,
      # recorder may not have restored variables yet — a live cabinet can
      # transiently show state=init before its first re-evaluation completes.
      # After warmup the state is stable: init = genuinely virgin.
      #####################################################################
      - variables:
          _has_init_cabs: >-
            {%- set _sde = state_attr('sensor.zen_cabinet_health', 'slot_to_default_entity') | default({}) -%}
            {%- set _sde = _sde if _sde is mapping else (_sde | from_json if _sde is string else {}) -%}
            {%- set ns = namespace(found=false) -%}
            {%- for slot, eid in _sde.items() -%}{%- if states(eid) == 'init' -%}{%- set ns.found = true -%}{%- endif -%}{%- endfor -%}
            {{ ns.found }}
      - if: "{{ _has_init_cabs and not _in_warmup and not _is_ha_start }}"
        then:
          - action: script.flynn_initialize_cabinets
            data: {}

      #####################################################################
      # GATE 2.5: Mount-aware mode — core defaults must be online_mounted
      # Legacy mode (cab_schema_version absent or 0): skip, no disruption.
      # Mount-aware mode (cab_schema_version >= 1): required defaults must
      # all be online_mounted before bootstrap is useful. Dismounted defaults
      # indicate a broken migration or operator error.
      #####################################################################
      - variables:
          _cab_schema_v: >-
            {%- set _sv = state_attr('sensor.zenos_system_cabinet', 'variables') | default({}, true) -%}
            {%- set _sv = _sv if _sv is mapping else {} -%}
            {%- set _se = _sv.get('cab_schema_version', {}) -%}
            {%- set _se = _se if _se is mapping else {} -%}
            {{ _se.get('value', 0) | int(0) }}
          _mount_aware: "{{ _cab_schema_v >= 1 }}"
      - if: "{{ _mount_aware }}"
        then:
          - variables:
              _req_default_resolvers:
                - sensor.zen_default_ai_user_cabinet_resolved
                - sensor.zen_default_user_cabinet_resolved
                - sensor.zen_default_household_cabinet_resolved
          - variables:
              _unmounted_defaults: >-
                {%- set ns = namespace(bad=[]) -%}
                {%- for r in _req_default_resolvers -%}
                  {%- set eid = states(r) -%}
                  {%- if eid in ['', 'unavailable', 'unknown', 'none'] or states(eid) != 'online_mounted' -%}
                    {%- set ns.bad = ns.bad + [r] -%}
                  {%- endif -%}
                {%- endfor -%}
                {{ ns.bad }}
          - if: "{{ _unmounted_defaults | count > 0 }}"
            then:
              - action: system_log.write
                data:
                  level: warning
                  message: >-
                    Flynn Gate 2.5: mount-aware mode active but required default cabinet(s) not
                    online_mounted: {{ _unmounted_defaults | join(', ') }}.
                    Run migration script or mount the affected cabinet(s) to proceed.
              - stop: "Gate 2.5: Required default cabinets not online_mounted"

      #####################################################################
      # GATE 3: Monastery not ok
      # Resolvers must be settled before bootstrap is useful.
      # unknown = resolvers not ready (labels unassigned or sensors not loaded)
      # warn   = schema ok, agent usable — schema seed only, no content bootstrap
      # critical = content missing — full bootstrap
      #####################################################################
      - variables:
          _resolver_dojo: "{{ states('sensor.zen_dojo_cabinet_resolved') }}"
          _resolver_kata: "{{ states('sensor.zen_kata_cabinet_resolved') }}"
          _resolver_system: "{{ states('sensor.zen_system_cabinet_resolved') }}"
          _resolvers_ready: >-
            {{ [_resolver_dojo, _resolver_kata, _resolver_system]
               | select('in', ['unknown', 'unavailable', 'none', ''])
               | list | count == 0 }}
      - choose:
          - conditions: "{{ monastery_health == 'unknown' or not _resolvers_ready }}"
            sequence:
              - stop: >-
                  Gate 3: Resolvers not settled
                  (dojo={{ _resolver_dojo }}, kata={{ _resolver_kata }}, system={{ _resolver_system }}) —
                  waiting for label assignment to propagate

      # Schema gate — runs regardless of monastery state (warn or critical).
      # kfc_template and zen_template are infrastructure, not content.
      # reset_template is idempotent — safe on every boot.
      # bootstrap_content's internal check will skip if already pressed.
      - variables:
          _schema_ok: >-
            {{ 'kfc_template' in (state_attr(_resolver_dojo, 'variables') or {})
               and 'zen_template' in (state_attr(_resolver_kata, 'variables') or {}) }}
      - if: "{{ not _schema_ok }}"
        then:
          - alias: "Flynn: Seed schema templates"
            action: script.zen_admintools_reset_template
            data: {}

      - choose:
          - conditions: "{{ monastery_health == 'critical' }}"
            sequence:
              - alias: "Flynn: Bootstrap content"
                action: script.flynn_bootstrap_content
                data:
                  conversation_agent_entity: "{{ states('input_text.zenos_conversation_agent') }}"
                  household_name: "{{ states('input_text.zenos_household_name') }}"
                  primary_user: "{{ states('input_text.zenos_primary_user') }}"
                  persona_name: "{{ states('input_text.zenos_persona_name') }}"
              - stop: "Gate 3: Bootstrap in progress"

      #####################################################################
      # GATE 3.5: OOBE — system ready but persona not yet configured
      # NOTE: _oobe_pending (top of action list) is stale here — computed
      # before the 10s delay and before gate actions ran. Re-read the cabinet
      # fresh so we catch names written by Gate 3 bootstrap in this same run.
      #####################################################################
      - variables:
          _g35_ai_cab: "{{ states('sensor.zen_default_ai_user_cabinet_resolved') }}"
          _g35_cab_vars: >-
            {{ state_attr(_g35_ai_cab, 'variables') | default({}, true)
               if _g35_ai_cab != '' else {} }}
          _g35_complete: "{{ '_oobe_complete' in _g35_cab_vars }}"
          _g35_name: >-
            {%- import 'zenos_ai/zenos_health.jinja' as health -%}
            {%- set _probe = health.essence_probe(_g35_ai_cab) | from_json -%}
            {{ (_probe.get('name', '') | trim) if _probe is mapping else '' }}
          _g35_input_name: "{{ states('input_text.zenos_persona_name') | trim }}"
      - choose:
          # Case 1: placeholder in cabinet but input_text has a name → write it and dismiss
          - conditions: >-
              {{ not _g35_complete
                 and _g35_name in ['', 'your AI', 'unknown']
                 and _g35_input_name != '' }}
            sequence:
              - action: script.zen_dojotools_filecabinet
                data:
                  action_type: create
                  force_action: true
                  set_timestamp: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ _g35_ai_cab }}"
                  key: "zenai_essence"
                  value: >-
                    {% import 'zenos_ai/zen_os_1.jinja' as zen %}
                    {% set defaults = zen.essence_defaults() | from_json %}
                    {{ defaults | combine({'identity': defaults.get('identity',{}) | combine({'name': _g35_input_name})}) | tojson }}
              - action: persistent_notification.dismiss
                data:
                  notification_id: flynn_oobe_pending
          # Case 2: placeholder in cabinet and input_text empty → genuine OOBE, notify
          - conditions: >-
              {{ not _g35_complete
                 and _g35_name in ['', 'your AI', 'unknown']
                 and _g35_input_name == '' }}
            sequence:
              - action: persistent_notification.create
                data:
                  title: "ZenOS-AI: Ready — let's name your agent"
                  message: >
                    Hey! I'm Flynn. Your system is up and running but I still need to know who's moving in.
                    Open a conversation with me and let's get your agent set up — I'll walk you through
                    naming your AI, wiring up your household, and setting delegation.
                  notification_id: flynn_oobe_pending
        # Case 3: cabinet has a real name or _oobe_complete → dismiss
        default:
          - action: persistent_notification.dismiss
            data:
              notification_id: flynn_oobe_pending

      #####################################################################
      # GATE 4: All green — notify on transition only, verify sensors first.
      # Reaching Gate 4 is necessary but not sufficient — monastery unavailable
      # or agent health not ok means the system is not actually green yet.
      #####################################################################
      - action: persistent_notification.dismiss
        data:
          notification_id: flynn_warmup
      - choose:
          - conditions: >-
              {{ not was_green
                 and is_state('sensor.zen_monastery_health', ['ok', 'warn'])
                 and is_state('sensor.zen_agent_health', ['ok', 'warn'])
                 and not _early_init_cabs }}
            sequence:
              - variables:
                  _g4_monk: "{{ states('sensor.zen_monastery_health') }}"
                  _g4_agent: "{{ states('sensor.zen_agent_health') }}"
                  _g4_truly_green: >-
                    {{ _g4_monk == 'ok' and _g4_agent == 'ok' }}
              - action: persistent_notification.create
                data:
                  title: >-
                    {{ 'ZenOS-AI: All green — your agent is ready'
                       if _g4_truly_green else
                       'ZenOS-AI: Agent is ready (settling)' }}
                  message: >-
                    {% if _g4_truly_green %}
                    Everything's copacetic. All gates green, identity model wired, system is fully operational.
                    Your household is set, your principal slots are filled, and delegation is live.
                    Open a conversation and say hi — I'll hand you off to the real talent.
                    {% else %}
                    Your agent is up and the gates are clear. The monastery is still settling —
                    summary pipeline will be live shortly. Open a conversation any time.
                    {% endif %}
                  notification_id: flynn_system_ready


###############################################################################
# HELPER SCRIPTS
###############################################################################
script:

  #############################################################################
  # FLYNN: ASSIGN LABELS
  # Reads slot_to_label and slot_to_default_entity from cabinet health sensor.
  # Single source of truth — no independent mapping tables.
  # Assigns parent 'Zen Cabinet' + slot-specific label to each entity.
  # Also assigns broad labels (Zen Default Household, etc.) to cabinet entities.
  #############################################################################
  flynn_assign_labels:
    alias: "Flynn: Assign Labels to Cabinet Entities"
    mode: single
    sequence:
      - variables:
          slot_to_label: >
            {%- import 'zenos_ai/zenos_health.jinja' as HEALTH -%}
            {{- HEALTH.slot_to_label() | from_json() -}}
          slot_to_entity: >
            {%- import 'zenos_ai/zenos_health.jinja' as HEALTH -%}
            {{- HEALTH.slot_to_default_entity() | from_json() -}}


          parent_label: "Zen Cabinet"
          # Broad labels → default cabinet entity
          broad_labels:
            - label: "Zen Default Household"
              entity: "sensor.zenos_default_household_cabinet"
            - label: "Zen Default Family"
              entity: "sensor.zenos_default_family_cabinet"
            # Each default_* entity also carries its broad type label —
            # label_entities('zen_X_cabinet') must resolve on single-instance installs
            - label: "Zen Household Cabinet"
              entity: "sensor.zenos_default_household_cabinet"
            - label: "Zen Family Cabinet"
              entity: "sensor.zenos_default_family_cabinet"
            - label: "Zen User Cabinet"
              entity: "sensor.zenos_default_user_cabinet"
            - label: "Zen AI User Cabinet"
              entity: "sensor.zenos_default_ai_user_cabinet"

      # Step 1: Assign parent 'Zen Cabinet' label to all default entities
      - repeat:
          for_each: "{{ slot_to_entity.values() | list }}"
          sequence:
            - action: homeassistant.add_label_to_entity
              data:
                label_id: "{{ parent_label | slugify }}"
                entity_id: "{{ repeat.item }}"

      # Step 2: Assign slot-specific labels to their entities
      - repeat:
          for_each: "{{ slot_to_entity.keys() | list }}"
          sequence:
            - variables:
                slot: "{{ repeat.item }}"
                label_name: "{{ slot_to_label[slot] | default('') }}"
                entity_id: "{{ slot_to_entity[slot] }}"
            - choose:
                - conditions: "{{ label_name != '' }}"
                  sequence:
                    - action: homeassistant.add_label_to_entity
                      data:
                        label_id: "{{ label_name | slugify }}"
                        entity_id: "{{ entity_id }}"

      # Step 3: Assign broad labels to their default cabinet entities
      - repeat:
          for_each: "{{ broad_labels }}"
          sequence:
            - action: homeassistant.add_label_to_entity
              data:
                label_id: "{{ repeat.item.label | slugify }}"
                entity_id: "{{ repeat.item.entity }}"

      # Step 4: Tag static health sensor entities
      # These are not in the slot system — must be stamped explicitly on every provision.
      # add_label_to_entity is idempotent — safe to re-run on existing installs.
      - variables:
          health_sensor_labels:
            - entity: sensor.zen_label_health
              labels: [zen_health, system_status, zen, labels]
            - entity: sensor.zen_cabinet_health
              labels: [zen_health, system_status, zen, cabinet]
            - entity: sensor.zen_monastery_health
              labels: [zen_health, system_status, zen, monastery, zen_system]
            - entity: sensor.zen_summarizer_health
              labels: [zen_health, system_status, zen, zen_system, ninja_summarizer]
            - entity: sensor.zen_supersummary_health
              labels: [zen_health, system_status, zen, zen_system, zen_summary]
            - entity: sensor.zen_flynn_health
              labels: [zen_health, system_status, zen_flynn]
            - entity: binary_sensor.flynn_system_ready
              labels: [zen_health, system_status, zen_flynn]
            - entity: sensor.zen_agent_health
              labels: [zen_health, system_status, agent]
            - entity: sensor.zen_prompt_health
              labels: [zen_health, system_status, zen]
            - entity: sensor.zen_prompt_length
              labels: [zen_health, system_status, zen]
      - repeat:
          for_each: "{{ health_sensor_labels }}"
          sequence:
            - variables:
                _hs_entity: "{{ repeat.item.entity }}"
                _hs_labels: "{{ repeat.item.labels }}"
            - repeat:
                for_each: "{{ _hs_labels }}"
                sequence:
                  - action: homeassistant.add_label_to_entity
                    data:
                      entity_id: "{{ _hs_entity }}"
                      label_id: "{{ repeat.item }}"

      - event: flynn_stepgate_event
        event_data:
          gate: 1
          action: labels_assigned
          timestamp: "{{ now().isoformat() }}"

  #############################################################################
  # FLYNN: INITIALIZE CABINETS
  # Reads missing_cabinets from cabinet health sensor.
  # For each missing required slot, calls CabinetAdmin initialize.
  #############################################################################
  flynn_initialize_cabinets:
    alias: "Flynn: Initialize Required Cabinets"
    mode: single
    sequence:
      - variables:
          raw_missing: "{{ state_attr('sensor.zen_cabinet_health', 'missing_cabinets') }}"
          missing_list: >-
            {%- set ns = namespace(slots=[]) -%}
            {%- if raw_missing is string and raw_missing != 'none' -%}
              {%- set ns.slots = raw_missing.split(', ') | map('trim') | list -%}
            {%- elif raw_missing is iterable and raw_missing is not string -%}
              {%- set ns.slots = raw_missing | list -%}
            {%- endif -%}
            {%- set _sde = state_attr('sensor.zen_cabinet_health', 'slot_to_default_entity') | default({}) -%}
            {%- set _sde = _sde if _sde is mapping else (_sde | from_json if _sde is string else {}) -%}
            {%- for slot, eid in _sde.items() -%}
              {%- if states(eid) == 'init' and slot not in ns.slots -%}{%- set ns.slots = ns.slots + [slot] -%}{%- endif -%}
            {%- endfor -%}
            {{ ns.slots }}
          slot_to_entity_raw: "{{ state_attr('sensor.zen_cabinet_health', 'slot_to_default_entity') }}"
          slot_to_entity: "{{ slot_to_entity_raw if slot_to_entity_raw is mapping else (slot_to_entity_raw | from_json if slot_to_entity_raw is string else {}) }}"
          # Slot → CabinetAdmin cabinet_type mapping
          slot_to_type:
            system: "System Cabinet"
            dojo: "Dojo Cabinet"
            kata: "Kata Cabinet"
            default_household: "Household Cabinet"
            default_family: "Family Cabinet"
            default_user: "User Cabinet"
            default_ai_user: "AI User Cabinet"
            expansion_1: "Expansion Cabinet"
            expansion_2: "Expansion Cabinet"
            expansion_3: "Expansion Cabinet"
            expansion_4: "Expansion Cabinet"
            expansion_5: "Expansion Cabinet"
            history: "History Cabinet"
            index: "Index Cabinet"

      - repeat:
          for_each: "{{ missing_list }}"
          sequence:
            - variables:
                slot: "{{ repeat.item | trim }}"
                entity_id: "{{ slot_to_entity.get(slot, '') }}"
                cabinet_type: "{{ slot_to_type.get(slot, 'AI Data Storage Cabinet') }}"
            - if: >-
                {{ entity_id != ''
                   and states(entity_id) not in ['online_mounted', 'online_unmounted'] }}
              # ABSOLUTE BLOCK — NO CODE OVERRIDE EXISTS OR WILL EVER EXIST.
              # online_mounted / online_unmounted = live cabinet with VolumeInfo.
              # A cabinet in either of those states is NEVER initialized by code.
              # If it has data, it does not get wiped. Period.
              #
              # Legitimate paths to initialize a cabinet that has data:
              #   1. Deprovision via state machine: online_mounted → online_unmounted → init
              #      Then the operator calls cabinetadmin initialize explicitly.
              #   2. Operator calls zen_admintools_cabinetadmin directly with full intent.
              # Both require deliberate operator action. Flynn does neither autonomously.
              # See: boot-wipe incident 2026-03-23.
              then:
                - variables:
                    _cab_vars: "{{ state_attr(entity_id, 'variables') | default(none) }}"
                    _vi_raw: "{{ _cab_vars.get('AI_Cabinet_VolumeInfo', none) if _cab_vars is mapping else none }}"
                    _has_volumeinfo: "{{ _vi_raw is not none }}"
                # GUID GATE — REINIT IS DEAD.
                # If AI_Cabinet_VolumeInfo exists in variables, this cabinet has data.
                # State showing 'init' is a boot race artifact — data is intact.
                # Invariant: GUID present = absolute stop. No override. No force.
                # See: req_reinit_dead_external_gate_2026-03-23.md
                - if: "{{ _has_volumeinfo }}"
                  then:
                    - action: system_log.write
                      data:
                        level: warning
                        message: >-
                          Flynn GUID gate: {{ entity_id }} shows state={{ states(entity_id) }}
                          but AI_Cabinet_VolumeInfo is present — cabinet has data.
                          Init blocked. Boot race artifact. Will self-heal on next write.
                    - stop: "REINIT BLOCKED — {{ entity_id }} has VolumeInfo. Data present. Not a missing cabinet."
                - action: script.zen_admintools_cabinetadmin
                  data:
                    mode: init
                    confirm_action: true
                    target_cabinet: "{{ entity_id }}"
                    cab_type: "{{ cabinet_type }}"

      - event: flynn_stepgate_event
        event_data:
          gate: 2
          action: cabinets_initialized
          missing: "{{ missing_list }}"
          timestamp: "{{ now().isoformat() }}"

  #############################################################################
  # FLYNN: BOOTSTRAP CONTENT
  # Validates conversation agent FIRST — no partial bootstrap.
  # Stamps config values, triggers prompt loader, writes _onboarding flag.
  #############################################################################
  flynn_bootstrap_content:
    alias: "Flynn: Bootstrap Content"
    mode: single
    fields:
      conversation_agent_entity:
        name: Conversation Agent Entity
        description: "Entity ID of the conversation agent (e.g., conversation.xxx)"
        default: ""
        selector:
          entity:
            filter:
              domain: conversation
      household_name:
        name: Household Name
        default: ""
        selector:
          text:
      primary_user:
        name: Primary User
        default: ""
        selector:
          entity:
            filter:
              domain: person
      persona_name:
        name: Persona Name
        default: ""
        selector:
          text:
    sequence:
      - variables:
          agent: "{{ conversation_agent_entity | default('') }}"

      # VALIDATE CONVERSATION AGENT FIRST
      - choose:
          - conditions: "{{ agent == '' or states(agent) in ['unavailable', 'unknown'] or states[agent] is none }}"
            sequence:
              - action: persistent_notification.create
                data:
                  title: "ZenOS-AI: One thing needed before I can continue"
                  message: >
                    Hey, Flynn here. I need a conversation agent to finish setup.
                    Go to Settings > Helpers and set 'ZenOS: Conversation Agent' to your agent entity ID.
                    Fill in the other three ZenOS helpers too (Household Name, Primary User, Persona Name), then restart HA.
                    After that, open a conversation with me and we'll pick up from here.
                  notification_id: flynn_agent_required
              - stop: "Gate 3: Conversation agent invalid or missing"

      # Agent valid — dismiss any prior warning
      - action: persistent_notification.dismiss
        data:
          notification_id: flynn_agent_required

      # Resolve reasoning task entity — auto-select if unset
      # Uses validated agent as fallback; requires explicit config if multiple agents found
      - variables:
          _rt_current: "{{ states('input_text.zenos_reasoning_task') | trim }}"
          _rt_all: "{{ states.conversation | map(attribute='entity_id') | list }}"
          _rt_auto: "{{ _rt_all | first if _rt_all | count == 1 else '' }}"
          _rt_resolved: >-
            {{ _rt_current if _rt_current not in ['','unknown','unavailable']
               else (_rt_auto if _rt_auto != '' else agent) }}

      - if: "{{ _rt_current in ['','unknown','unavailable'] }}"
        then:
          - if: "{{ _rt_resolved == '' }}"
            then:
              - action: persistent_notification.create
                data:
                  title: "ZenOS-AI: Reasoning Task Required"
                  message: >
                    Flynn here. Multiple conversation agents found and none is
                    configured as the reasoning task. Go to Settings > Helpers
                    and set 'ZenOS: Reasoning Task' to your preferred
                    conversation agent entity ID, then restart HA.
                  notification_id: flynn_reasoning_task_required
              - stop: "Gate 3: Reasoning task unresolvable — multiple agents"
                error: true
            else:
              - action: input_text.set_value
                target:
                  entity_id: input_text.zenos_reasoning_task
                data:
                  value: "{{ _rt_resolved }}"
              - action: persistent_notification.dismiss
                data:
                  notification_id: flynn_reasoning_task_required

      # Resolve AI task entity — auto-select if unset
      # 0 found: warn (non-fatal — summarizer will fail gracefully)
      # 1 found: auto-write
      # multiple found: require explicit config, stop
      - variables:
          _at_current: "{{ states('input_text.zenos_ai_task_entity') | trim }}"
          _at_all: "{{ states.ai_task | map(attribute='entity_id') | list }}"
          _at_auto: "{{ _at_all | first if _at_all | count == 1 else '' }}"

      - if: "{{ _at_current in ['','unknown','unavailable'] }}"
        then:
          - if: "{{ _at_all | count == 0 }}"
            then:
              - action: persistent_notification.create
                data:
                  title: "ZenOS-AI: AI Task Entity Not Found"
                  message: >
                    Flynn here. No ai_task entities found on this system.
                    The AI summarizer requires one. Install an AI provider
                    integration (e.g. OpenAI, Google AI) that exposes an
                    ai_task entity, then restart HA.
                  notification_id: flynn_ai_task_missing
            else:
              - if: "{{ _at_auto == '' }}"
                then:
                  - action: persistent_notification.create
                    data:
                      title: "ZenOS-AI: AI Task Entity Required"
                      message: >
                        Flynn here. Multiple ai_task entities found and none is
                        configured. Go to Settings > Helpers and set
                        'ZenOS: AI Task Entity' to your preferred ai_task
                        entity ID, then restart HA.
                      notification_id: flynn_ai_task_required
                  - stop: "Gate 3: AI task entity ambiguous — multiple found"
                    error: true
                else:
                  - action: input_text.set_value
                    target:
                      entity_id: input_text.zenos_ai_task_entity
                    data:
                      value: "{{ _at_auto }}"
                  - action: persistent_notification.dismiss
                    data:
                      notification_id: flynn_ai_task_required
                  - action: persistent_notification.dismiss
                    data:
                      notification_id: flynn_ai_task_missing
        else:
          - action: persistent_notification.dismiss
            data:
              notification_id: flynn_ai_task_required
          - action: persistent_notification.dismiss
            data:
              notification_id: flynn_ai_task_missing

      # Stamp config values into cabinets via FileCabinet
      # force_action: false — only write if drawer is empty; never overwrite existing AI config
      - choose:
          - conditions: "{{ household_name | default('') != '' }}"
            sequence:
              - action: script.zen_dojotools_filecabinet
                data:
                  action_type: create
                  force_action: false
                  set_timestamp: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ states('sensor.zen_default_household_cabinet_resolved') }}"
                  key: "_household_name"
                  value: "{{ household_name }}"

      # Read current AI cab name before writing — needed to guard both the
      # persona_name write (below) and the default seed write.
      - variables:
          _seed_ai_cab: "{{ states('sensor.zen_default_ai_user_cabinet_resolved') }}"
          _seed_cab_vars: >-
            {{ state_attr(_seed_ai_cab, 'variables') | default({}, true)
               if _seed_ai_cab != '' else {} }}
          _seed_essence_raw: "{{ _seed_cab_vars.get('zenai_essence', {}) }}"
          _seed_essence_val: >-
            {{ _seed_essence_raw.get('value', _seed_essence_raw)
               if _seed_essence_raw is mapping else {} }}
          _seed_name: >-
            {{ (_seed_essence_val.get('identity', {}).get('name', '') | trim)
               if _seed_essence_val is mapping else '' }}

      # Write persona name into essence only when input_text has a name AND the
      # cabinet still holds the placeholder. force_action: true required to
      # overwrite the placeholder that bootstrap already wrote.
      - choose:
          - conditions: "{{ persona_name | default('') != '' and _seed_name in ['', 'your AI', 'unknown'] }}"
            sequence:
              - action: script.zen_dojotools_filecabinet
                data:
                  action_type: create
                  force_action: true
                  set_timestamp: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ states('sensor.zen_default_ai_user_cabinet_resolved') }}"
                  key: "zenai_essence"
                  value: >-
                    {% import 'zenos_ai/zen_os_1.jinja' as zen %}
                    {% set defaults = zen.essence_defaults() | from_json %}
                    {{ defaults | combine({'identity': defaults.get('identity',{}) | combine({'name': persona_name})}) | tojson }}

      # Write default essence seed if AI user cab has no persona name yet.
      # Uses essence_defaults() — name stays 'your AI' so Gate 3.5 OOBE fires.
      - choose:
          - conditions: "{{ _seed_ai_cab != '' and _seed_name == '' }}"
            sequence:
              - action: script.zen_dojotools_filecabinet
                data:
                  action_type: create
                  force_action: false
                  set_timestamp: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ _seed_ai_cab }}"
                  key: zenai_essence
                  value: >-
                    {% import 'zenos_ai/zen_os_1.jinja' as zen %}
                    {{ zen.essence_defaults() }}

      # Press zen_template (Kata) and kfc_template (Dojo) if either is missing
      - variables:
          _b3_kata_cab: "{{ states('sensor.zen_kata_cabinet_resolved') }}"
          _b3_dojo_cab: "{{ states('sensor.zen_dojo_cabinet_resolved') }}"
          _b3_has_zen_template: >-
            {{ 'zen_template' in (state_attr(_b3_kata_cab, 'variables') | default({}, true))
               if _b3_kata_cab != '' else false }}
          _b3_has_kfc_template: >-
            {{ 'kfc_template' in (state_attr(_b3_dojo_cab, 'variables') | default({}, true))
               if _b3_dojo_cab != '' else false }}
      - if: "{{ not _b3_has_zen_template or not _b3_has_kfc_template }}"
        then:
          - action: script.zen_admintools_reset_template
            data: {}

      # Trigger prompt loader to stamp purpose/directives/cortex
      - action: script.zen_admintools_zenos_prompt_loader
        data: {}

      # Wire household membership — fills HoH and prime slots, links partners, builds manifest.
      # Idempotent: household_add_member blocks if slot already occupied (existing installs safe).
      - variables:
          _b3_hh_cab: "{{ states('sensor.zen_default_household_cabinet_resolved') }}"
          _b3_user_cab: "{{ states('sensor.zen_default_user_cabinet_resolved') }}"
          _b3_ai_cab: "{{ states('sensor.zen_default_ai_user_cabinet_resolved') }}"
          _b3_fam_cab: "{{ states('sensor.zen_default_family_cabinet_resolved') }}"
      - if: "{{ _b3_user_cab not in ['', 'unknown', 'unavailable'] }}"
        then:
          - action: script.zen_dojotools_identity
            data:
              mode: household_add_member
              member_entity: "{{ _b3_user_cab }}"
              member_type: user
      - if: "{{ _b3_ai_cab not in ['', 'unknown', 'unavailable'] }}"
        then:
          - action: script.zen_dojotools_identity
            data:
              mode: household_add_member
              member_entity: "{{ _b3_ai_cab }}"
              member_type: ai_user
      - if: >-
          {{ _b3_user_cab not in ['', 'unknown', 'unavailable']
             and _b3_ai_cab not in ['', 'unknown', 'unavailable'] }}
        then:
          - action: script.zen_dojotools_identity
            data:
              mode: link_partners
              member_entity: "{{ _b3_user_cab }}"
              ai_entity: "{{ _b3_ai_cab }}"
      # Wire default family into household graph — idempotent, skips if already wired.
      - if: "{{ _b3_fam_cab not in ['', 'unknown', 'unavailable'] }}"
        then:
          - action: script.zen_dojotools_identity
            data:
              mode: household_add_family
              family_entity: "{{ _b3_fam_cab }}"
      - if: >-
          {{ _b3_user_cab not in ['', 'unknown', 'unavailable']
             and _b3_fam_cab not in ['', 'unknown', 'unavailable'] }}
        then:
          - action: script.zen_dojotools_identity
            data:
              mode: family_add_member
              family_entity: "{{ _b3_fam_cab }}"
              member_entity: "{{ _b3_user_cab }}"
              member_type: user
      - if: >-
          {{ _b3_ai_cab not in ['', 'unknown', 'unavailable']
             and _b3_fam_cab not in ['', 'unknown', 'unavailable'] }}
        then:
          - action: script.zen_dojotools_identity
            data:
              mode: family_add_member
              family_entity: "{{ _b3_fam_cab }}"
              member_entity: "{{ _b3_ai_cab }}"
              member_type: ai_user
      - action: script.zen_dojotools_identity
        data:
          mode: build_identity_manifest

      # Stamp gc_eligible flag into AI_Cabinet_VolumeInfo for all canonical cabinets.
      # force_action: false — only writes if drawer absent (fresh install path).
      # Existing installs already have this field via GC self-heal; skip is correct.
      # If gc_eligible is already true on a cabinet, force_action: false honors it —
      # the drawer exists, so the write is skipped entirely.
      # Kata gets gc_eligible: true — runtime churn cabinet, GC should run by default.
      # All others default to false — operator opt-in.
      # force_action: false honors any existing value (e.g. operator already set true).
      - variables:
          _b3_all_cabs: >-
            {{ [
              states('sensor.zen_dojo_cabinet_resolved'),
              states('sensor.zen_default_household_cabinet_resolved'),
              states('sensor.zen_default_family_cabinet_resolved'),
              states('sensor.zen_default_user_cabinet_resolved'),
              states('sensor.zen_default_ai_user_cabinet_resolved')
            ] | reject('in', ['', 'unknown', 'unavailable']) | list }}
      - repeat:
          for_each: "{{ _b3_all_cabs }}"
          sequence:
            - action: script.zen_dojotools_filecabinet
              data:
                action_type: create
                force_action: false
                set_timestamp: false
                show_hidden_volumes: false
                volume_entity_id:
                  - "{{ repeat.item }}"
                key: AI_Cabinet_VolumeInfo
                value: '{"flags": {"gc_eligible": false}}'
      - action: script.zen_dojotools_filecabinet
        data:
          action_type: create
          force_action: false
          set_timestamp: false
          show_hidden_volumes: false
          volume_entity_id:
            - "{{ states('sensor.zen_kata_cabinet_resolved') }}"
          key: AI_Cabinet_VolumeInfo
          value: '{"flags": {"gc_eligible": true}}'

      # Seed home mode schedule timers — only on first build, per timer (bare = never set).
      # initial: was removed from input_datetime definitions to prevent boot-time resets.
      # Each timer is guarded independently so partial restores are respected.
      - if: "{{ states('input_datetime.zen_am_start') in ['', 'unknown', 'unavailable'] }}"
        then:
          - action: input_datetime.set_datetime
            target:
              entity_id: input_datetime.zen_am_start
            data:
              time: "06:00:00"
      - if: "{{ states('input_datetime.zen_morning_start') in ['', 'unknown', 'unavailable'] }}"
        then:
          - action: input_datetime.set_datetime
            target:
              entity_id: input_datetime.zen_morning_start
            data:
              time: "08:00:00"
      - if: "{{ states('input_datetime.zen_daytime_start') in ['', 'unknown', 'unavailable'] }}"
        then:
          - action: input_datetime.set_datetime
            target:
              entity_id: input_datetime.zen_daytime_start
            data:
              time: "10:00:00"
      - if: "{{ states('input_datetime.zen_evening_start') in ['', 'unknown', 'unavailable'] }}"
        then:
          - action: input_datetime.set_datetime
            target:
              entity_id: input_datetime.zen_evening_start
            data:
              time: "17:00:00"
      - if: "{{ states('input_datetime.zen_night_start') in ['', 'unknown', 'unavailable'] }}"
        then:
          - action: input_datetime.set_datetime
            target:
              entity_id: input_datetime.zen_night_start
            data:
              time: "21:00:00"
      - if: "{{ states('input_datetime.zen_late_night_start') in ['', 'unknown', 'unavailable'] }}"
        then:
          - action: input_datetime.set_datetime
            target:
              entity_id: input_datetime.zen_late_night_start
            data:
              time: "23:00:00"
      - if: "{{ states('input_datetime.zen_quiet_hours_start') in ['', 'unknown', 'unavailable'] }}"
        then:
          - action: input_datetime.set_datetime
            target:
              entity_id: input_datetime.zen_quiet_hours_start
            data:
              time: "23:00:00"
      - if: "{{ states('input_datetime.zen_quiet_hours_end') in ['', 'unknown', 'unavailable'] }}"
        then:
          - action: input_datetime.set_datetime
            target:
              entity_id: input_datetime.zen_quiet_hours_end
            data:
              time: "06:00:00"
      - if: "{{ states('input_datetime.zen_work_hours_start') in ['', 'unknown', 'unavailable'] }}"
        then:
          - action: input_datetime.set_datetime
            target:
              entity_id: input_datetime.zen_work_hours_start
            data:
              time: "09:00:00"
      - if: "{{ states('input_datetime.zen_work_hours_end') in ['', 'unknown', 'unavailable'] }}"
        then:
          - action: input_datetime.set_datetime
            target:
              entity_id: input_datetime.zen_work_hours_end
            data:
              time: "17:00:00"

      # Write _onboarding flag
      - action: script.flynn_unified_engine
        data:
          action_type: flag_complete

      - event: flynn_stepgate_event
        event_data:
          gate: 3
          action: bootstrap_complete
          timestamp: "{{ now().isoformat() }}"


###############################################################################
# UNIFIED ENGINE (ONBOARDING Q&A)
###############################################################################
  flynn_unified_engine:
    alias: "Flynn: Unified Engine"
    mode: parallel
    max: 20

    fields:
      action_type:
        name: Flynn Action
        selector:
          select:
            options:
              - schema_new
              - schema_load
              - flag_complete
              - flag_reset
              - answer_store
              - answer_clear
              - drawer_set
              - drawer_get
        default: schema_load

      drawer:
        name: Drawer
        default: ""
      key:
        name: Key
        default: ""
      value:
        name: Value
        default: ""

    sequence:

      #########################################################################
      # 1 — STANDARD VARIABLE LOADING
      #########################################################################
      - variables:
          act: "{{ action_type }}"
          sys_cab: "{{ states('sensor.zen_default_user_cabinet') }}"
          onboarding_root: "{{ state_attr('sensor.flynn_onboarding','value') or {} }}"
          drawers: "{{ onboarding_root.get('drawers',{}) }}"
          now_ts: "{{ now().isoformat() }}"
          effective_drawer: "{{ drawer | default('global') }}"
          effective_key: "{{ key | default('value') }}"
          safe_value: "{{ value }}"

      #########################################################################
      # 2 — SCHEMA_NEW
      #########################################################################
      - choose:
          - conditions: "{{ act == 'schema_new' }}"
            sequence:
              - variables:
                  new_schema_json: >-
                    {{
                      {
                        "meta":{
                          "created": now_ts,
                          "version": 1
                        },
                        "tree": {
                          "intro": {
                            "required": true,
                            "next": "name"
                          },
                          "name": {
                            "required": true,
                            "next": "complete"
                          },
                          "complete": {
                            "required": false
                          }
                        }
                      } | tojson
                    }}

              - service: script.zen_dojotools_filecabinet
                data:
                  action_type: create
                  set_timestamp: true
                  show_hidden_volumes: false
                  force_action: true
                  volume_entity_id:
                    - "{{ sys_cab }}"
                  key: "_onboarding_schema"
                  value: "{{ new_schema_json }}"
                  label_input: "Flynn Onboarding Schema"

              - event: flynn_onboarding_updated
                event_data:
                  type: schema_new
                  timestamp: "{{ now_ts }}"

              - stop: "Schema created"

      #########################################################################
      # 3 — SCHEMA_LOAD
      #########################################################################
          - conditions: "{{ act == 'schema_load' }}"
            sequence:

              - variables:
                  schema: "{{ state_attr('sensor.flynn_onboarding_schema','value') or {} }}"
                  schema_json: >-
                    {{
                      dict(meta=schema.get('meta', {}))
                        | combine(schema.get('tree', {}), recursive=true)
                        | tojson
                    }}

              - choose:
                  - conditions: "{{ schema is mapping }}"
                    sequence:
                      - service: script.zen_dojotools_filecabinet
                        data:
                          action_type: create
                          set_timestamp: true
                          show_hidden_volumes: false
                          force_action: true
                          volume_entity_id:
                            - "{{ sys_cab }}"
                          key: "_onboarding"
                          value: "{{ schema_json }}"
                          label_input: "Flynn Onboarding"

              - stop: "Schema loaded"

      #########################################################################
      # 4 — FLAG_COMPLETE
      #########################################################################
          - conditions: "{{ act == 'flag_complete' }}"
            sequence:

              - variables:
                  updated: >-
                    {{
                      onboarding_root
                      | combine({"complete": now_ts}, recursive=True)
                      | tojson
                    }}

              - service: script.zen_dojotools_filecabinet
                data:
                  action_type: update
                  force_action: true
                  set_timestamp: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ sys_cab }}"
                  key: "_onboarding"
                  value: "{{ updated }}"
                  label_input: "Flynn Onboarding"

              - event: flynn_onboarding_updated
                event_data:
                  type: flag_complete
                  timestamp: "{{ now_ts }}"

              - stop: "Flagged complete"

      #########################################################################
      # 5 — FLAG_RESET
      #########################################################################
          - conditions: "{{ act == 'flag_reset' }}"
            sequence:

              - variables:
                  reset_payload: "{{ {'complete': None, 'drawers':{}} | tojson }}"

              - service: script.zen_dojotools_filecabinet
                data:
                  action_type: update
                  set_timestamp: true
                  force_action: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ sys_cab }}"
                  key: "_onboarding"
                  value: "{{ reset_payload }}"
                  label_input: "Flynn Onboarding"

              - event: flynn_onboarding_updated
                event_data:
                  type: flag_reset
                  timestamp: "{{ now_ts }}"

              - stop: "Onboarding reset"

      #########################################################################
      # 6 — ANSWER_STORE
      #########################################################################
          - conditions: "{{ act == 'answer_store' }}"
            sequence:

              - variables:
                  updated_json: >-
                    {{
                      onboarding_root
                      | combine({
                          "drawers":{
                            effective_drawer:{
                              effective_key: safe_value
                            }
                          }
                        }, recursive=True)
                      | tojson
                    }}

              - service: script.zen_dojotools_filecabinet
                data:
                  action_type: update
                  force_action: true
                  show_hidden_volumes: false
                  set_timestamp: true
                  volume_entity_id:
                    - "{{ sys_cab }}"
                  key: "_onboarding"
                  value: "{{ updated_json }}"
                  label_input: "Flynn Onboarding"

              - event: flynn_onboarding_updated
                event_data:
                  type: answer_store
                  drawer: "{{ effective_drawer }}"
                  key: "{{ effective_key }}"
                  timestamp: "{{ now_ts }}"

              - stop: "Answer stored"

      #########################################################################
      # 7 — ANSWER_CLEAR
      #########################################################################
          - conditions: "{{ act == 'answer_clear' }}"
            sequence:

              - variables:
                  cleared: >-
                    {{
                      onboarding_root
                      | combine({
                          "drawers":{
                            effective_drawer:{}
                          }
                        }, recursive=True)
                      | tojson
                    }}

              - service: script.zen_dojotools_filecabinet
                data:
                  action_type: update
                  set_timestamp: true
                  show_hidden_volumes: false
                  force_action: true
                  volume_entity_id:
                    - "{{ sys_cab }}"
                  key: "_onboarding"
                  value: "{{ cleared }}"
                  label_input: "Flynn Onboarding"

              - event: flynn_onboarding_updated
                event_data:
                  type: answer_clear
                  drawer: "{{ effective_drawer }}"
                  timestamp: "{{ now_ts }}"

              - stop: "Answer cleared"

      #########################################################################
      # 8 — DRAWER_SET
      #########################################################################
          - conditions: "{{ act == 'drawer_set' }}"
            sequence:

              - variables:
                  updated_json: >-
                    {{
                      onboarding_root
                      | combine({
                          "drawers":{
                            effective_drawer:{
                              effective_key: safe_value
                            }
                          }
                        }, recursive=True)
                      | tojson
                    }}

              - service: script.zen_dojotools_filecabinet
                data:
                  action_type: update
                  set_timestamp: true
                  show_hidden_volumes: false
                  force_action: true
                  volume_entity_id:
                    - "{{ sys_cab }}"
                  key: "_onboarding"
                  value: "{{ updated_json }}"
                  label_input: "Flynn Onboarding"

              - event: flynn_onboarding_updated
                event_data:
                  type: drawer_set
                  drawer: "{{ effective_drawer }}"
                  key: "{{ effective_key }}"
                  timestamp: "{{ now_ts }}"

              - stop: "Drawer updated"

      #########################################################################
      # 9 — DRAWER_GET (NOP — just return vars)
      #########################################################################
          - conditions: "{{ act == 'drawer_get' }}"
            sequence:
              - stop: "Drawer get complete"

      #########################################################################
      # DEFAULT / FALLBACK
      #########################################################################
      - stop: "Flynn: No matching action"


###############################################################################
# AGENT BUILDER — DojoTool pattern, semaphore-gated help
# Guides Flynn through initial household/agent configuration.
# First call always shows help (stamps _flynn_builder_ack) so it auto-fires
# exactly once. All writes are non-destructive: skip if already set.
###############################################################################
  flynn_build_agent:
    alias: "Flynn: Agent Builder"
    description: >
      Flynn Agent Builder (1.0.0). Configure household name, primary user, agent
      name, and family members into the AI user and household cabinets.
      First call always shows help with Flynn's user conversation script
      pre-filled with current state. All writes non-destructive.
    mode: queued
    max: 2

    fields:
      mode:
        name: Mode
        description: "help = setup instructions (auto on first call). build = write fields. status = show current state. oobe = full home onboarding protocol."
        default: help
        selector:
          select:
            options:
              - help
              - build
              - status
              - oobe

      household_name:
        name: Household Name
        description: "Your household name (e.g. 'The Garcia House'). Non-destructive."
        default: ""
        selector:
          text:

      persona_name:
        name: Agent Name
        description: "Your AI assistant's name. Written to essence identity.name. Non-destructive."
        default: ""
        selector:
          text:

      primary_user:
        name: Primary User
        description: "Primary household member display name. Written to essence identity.primary_user. Non-destructive."
        default: ""
        selector:
          text:

      family_members:
        name: Family Members (JSON)
        description: "JSON list e.g. [{\"name\": \"Alex\", \"role\": \"partner\"}]. Written to zenai_family. Skipped if key already exists."
        default: "[]"
        selector:
          text:

    sequence:

      #########################################################################
      # 1 — LOAD CURRENT STATE
      #########################################################################
      - variables:
          ai_cab: "{{ states('sensor.zen_default_ai_user_cabinet_resolved') }}"
          hh_cab: "{{ states('sensor.zen_default_household_cabinet_resolved') }}"
          ai_cab_vars: >-
            {{ state_attr(ai_cab, 'variables') | default({}, true)
               if ai_cab != '' else {} }}
          hh_cab_vars: >-
            {{ state_attr(hh_cab, 'variables') | default({}, true)
               if hh_cab != '' else {} }}
          essence_raw: "{{ ai_cab_vars.get('zenai_essence', {}) }}"
          essence_val: >-
            {{ essence_raw.get('value', essence_raw)
               if essence_raw is mapping else {} }}
          identity: "{{ essence_val.get('identity', {}) }}"
          has_ack: "{{ '_flynn_builder_ack' in ai_cab_vars }}"
          effective_mode: "{{ 'help' if (not has_ack and mode | default('help') != 'oobe') else mode | default('help') }}"
          cur_persona: "{{ identity.get('name', '') | trim }}"
          cur_hh_raw: "{{ hh_cab_vars.get('_household_name', '') }}"
          cur_household: >-
            {{ cur_hh_raw.get('value', cur_hh_raw) | trim
               if cur_hh_raw is mapping else cur_hh_raw | trim }}
          cur_primary_user: "{{ identity.get('primary_user', '') | trim }}"

      #########################################################################
      # 2 — DISPATCH
      #########################################################################
      - choose:

          #####################################################################
          # HELP — auto-fires on first call; stamps ack so it only fires once
          #####################################################################
          - conditions: "{{ effective_mode == 'help' }}"
            sequence:

              # Stamp the ack on first call so help doesn't auto-fire again.
              # Instructions for clearing this gate are ONLY in this help output.
              - choose:
                  - conditions: "{{ not has_ack }}"
                    sequence:
                      - action: script.zen_dojotools_filecabinet
                        data:
                          action_type: create
                          force_action: true
                          set_timestamp: true
                          show_hidden_volumes: false
                          volume_entity_id:
                            - "{{ ai_cab }}"
                          key: "_flynn_builder_ack"
                          value: "seen"

              - variables:
                  help_json: >-
                    {{
                      {
                        "status": "info",
                        "tool": "flynn_build_agent",
                        "version": "1.0.0",
                        "message": "Flynn Agent Builder. I've logged that you've read this briefing — it won't auto-fire again. Use mode: build to configure.",
                        "current_state": {
                          "persona_name": cur_persona if cur_persona != '' else "(not set)",
                          "household_name": cur_household if cur_household != '' else "(not set)",
                          "primary_user": cur_primary_user if cur_primary_user != '' else "(not set)"
                        },
                        "fields": {
                          "household_name": "Household name. Skipped if already set.",
                          "persona_name": "Agent name (essence identity.name). Skipped if already set.",
                          "primary_user": "Primary user name (essence identity.primary_user). Skipped if already set.",
                          "family_members": "JSON list [{\"name\": \"Alex\", \"role\": \"partner\"}]. Skipped if zenai_family key exists."
                        },
                        "user_script": {
                          "role": "You are Flynn. Walk the user through these questions, then call mode: build with their answers.",
                          "questions": [
                            "What would you like to call your home? (e.g. 'The Garcia House', 'Casa Verde')",
                            "What's your name? You're the main person I'll be working with.",
                            "What do you want to name your AI assistant?",
                            "Who else lives here? Give me names and how they're connected — partner, kids, housemates, whatever applies."
                          ],
                          "when_done": "Call this tool with mode: build and the field values filled in. I'll only write what's missing and confirm what was set."
                        }
                      } | tojson
                    }}

              - stop: Return help
                response_variable: help_json

          #####################################################################
          # STATUS — read-only, no writes
          #####################################################################
          - conditions: "{{ effective_mode == 'status' }}"
            sequence:
              - variables:
                  status_json: >-
                    {{
                      {
                        "status": "ok",
                        "tool": "flynn_build_agent",
                        "current_state": {
                          "persona_name": cur_persona if cur_persona != '' else "(not set)",
                          "household_name": cur_household if cur_household != '' else "(not set)",
                          "primary_user": cur_primary_user if cur_primary_user != '' else "(not set)"
                        },
                        "ready": cur_persona != '' and cur_household != '' and cur_primary_user != ''
                      } | tojson
                    }}
              - stop: Return status
                response_variable: status_json

          #####################################################################
          # OOBE — relay full onboarding protocol from zen_flynn_oobe
          #####################################################################
          - conditions: "{{ effective_mode == 'oobe' }}"
            sequence:
              - action: script.zen_flynn_oobe
                data:
                  mode: run
                response_variable: _oobe_result
              - variables:
                  oobe_json: "{{ _oobe_result | tojson }}"
              - stop: Return OOBE protocol
                response_variable: oobe_json

          #####################################################################
          # BUILD — non-destructive field writes
          #####################################################################
          - conditions: "{{ effective_mode == 'build' }}"
            sequence:

              - variables:
                  in_hn: "{{ household_name | default('') | trim }}"
                  in_pn: "{{ persona_name | default('') | trim }}"
                  in_pu: "{{ primary_user | default('') | trim }}"
                  in_fam: "{{ family_members | default('[]') | trim }}"
                  do_household: "{{ in_hn != '' and cur_household == '' }}"
                  do_persona: "{{ in_pn != '' and cur_persona == '' }}"
                  do_primary_user: "{{ in_pu != '' and cur_primary_user == '' }}"
                  do_family: >-
                    {{ in_fam not in ['[]', '', 'null']
                       and 'zenai_family' not in ai_cab_vars }}
                  # Build merged identity and essence in one pass to avoid double-write
                  new_identity: >-
                    {{
                      identity
                      | combine({'name': in_pn} if (in_pn != '' and cur_persona == '') else {})
                      | combine({'primary_user': in_pu} if (in_pu != '' and cur_primary_user == '') else {})
                    }}
                  new_essence_json: >-
                    {{
                      (essence_val | combine({'identity': new_identity}) | tojson)
                      if (in_pn != '' and cur_persona == '') or (in_pu != '' and cur_primary_user == '')
                      else ''
                    }}

              # Household name → household cabinet
              - choose:
                  - conditions: "{{ do_household }}"
                    sequence:
                      - action: script.zen_dojotools_filecabinet
                        data:
                          action_type: create
                          force_action: true
                          set_timestamp: true
                          show_hidden_volumes: false
                          volume_entity_id:
                            - "{{ hh_cab }}"
                          key: "_household_name"
                          value: "{{ in_hn }}"

              # Persona name + primary user → AI user cabinet essence (one write, both fields)
              - choose:
                  - conditions: "{{ new_essence_json != '' }}"
                    sequence:
                      - action: script.zen_dojotools_filecabinet
                        data:
                          action_type: create
                          force_action: true
                          set_timestamp: true
                          show_hidden_volumes: false
                          volume_entity_id:
                            - "{{ ai_cab }}"
                          key: "zenai_essence"
                          value: "{{ new_essence_json }}"

              # Family members → AI user cabinet (only if zenai_family key absent)
              - choose:
                  - conditions: "{{ do_family }}"
                    sequence:
                      - action: script.zen_dojotools_filecabinet
                        data:
                          action_type: create
                          force_action: true
                          set_timestamp: true
                          show_hidden_volumes: false
                          volume_entity_id:
                            - "{{ ai_cab }}"
                          key: "zenai_family"
                          value: "{{ in_fam | from_json | tojson }}"

              - variables:
                  build_result: >-
                    {{
                      {
                        "status": "ok",
                        "tool": "flynn_build_agent",
                        "wrote": {
                          "household_name": do_household,
                          "persona_name": do_persona,
                          "primary_user": do_primary_user,
                          "family": do_family
                        },
                        "note": "Fields with wrote: false were already set or not provided."
                      } | tojson
                    }}

              - stop: Build complete
                response_variable: build_result

      #########################################################################
      # DEFAULT FALLBACK
      #########################################################################
      - stop: "Flynn Build Agent: no matching mode"
