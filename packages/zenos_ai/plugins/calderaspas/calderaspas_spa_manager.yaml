###############################################################################
# ZenOS-AI DojoTools: HotSprings Caldera Spas Spa Manager
# Version: 5.2.0
# Manufacturer: Watkins / Caldera Spas — Utopia Series (Florence trim)
# Hardware: 360-gal saltwater, FreshWater IQ salt system, ESPHome-connected
#
# Scripts:
#   zen_dojotools_spa_manager — Full spa status + intent-based control (v5.1.0)
#
# Actions:
#   status      — Full live status (default, no inputs required)
#   lights      — Light color, zone, on/off, brightness, cycle speed
#   jets        — Jets on/off, zone (all/left/right/waterfall), speed (low/high)
#   audio       — Audio on/off, volume (0–100), source selection
#   temperature — Water temperature setpoint (80–104°F)
#   cover       — Open or close the Covana spa cover
#   chemistry   — Chemistry evaluation + dosing (or pass raw strip readings)
#
# MIGRATED FROM: calderaspas_spa_manager.yaml v4.5.0 (chemistry-only)
# v5.0.0 2026-04-12: Full rewrite — action router + status + all control domains
# v5.1.0 2026-04-12: Physical topology — jet zones, seat map, waterfall alias, diverter notes
# v5.2.0 2026-04-12: log action — IQ eval, todos, calendar event, boost/cover/temp/supplies
###############################################################################

script:
  zen_dojotools_spa_manager:
    alias: Zen DojoTools — Caldera Spas Spa Manager
    description: "Zen DojoTools Spa Manager (5.2.0) — Caldera Spas Utopia Florence\n\
      \nCANONICAL: Use this tool for ALL spa intents — status, control, chemistry,\
      \ log, help. Do not use raw HA service calls or individual entity controls.\n\
      \nACTIONS (action field):\n  status      — Live snapshot: temp, lights, jets,\
      \ audio, cover, chemistry.\n  lights      — light_state, light_color, light_zone,\
      \ light_brightness, cycle_speed.\n  jets        — jets_state, jets_zone (all/left/right/waterfall),\
      \ jets_speed.\n  audio       — audio_state, audio_volume, audio_source.\n  temperature\
      \ — target_temperature (80-104 F).\n  cover       — cover_action (open/close).\n\
      \  chemistry   — strip readings (salt/chlorine/ph/alk/hardness) or omit for\
      \ live IQ.\n  log         — Session wrap-up: reads live IQ, evaluates chemistry,\n\
      \                creates todos for out-of-range params, logs to calendar.\n  \
      \              Optional: boost_chlorine, close_cover, set_hold_temp,\n        \
      \          add_supplies, log_notes. Call this after a soak or chem check.\n \
      \ help        — help_topic (index/overview/jets/lights/audio/chemistry/\n    \
      \            troubleshooting/maintenance/controls/actions).\n\nQUICK MAP:\n \
      \ Left = EAST (deck) — Jet Pump 2, EcstaSeat, Acquarella Waterfall always on.\n\
      \  Right = WEST — Jet Pump 1, LumbarSsage, single-speed.\n  jets_zone: waterfall\
      \ = alias for left.\n\nBackward compatible: chemistry fields without action\
      \ → chemistry path."
    mode: single
    icon: mdi:hot-tub
    fields:
      action:
        name: Action
        description: >-
          Control domain: status (default), lights, jets, audio, temperature, cover, chemistry, help.
        selector:
          select:
            options:
            - status
            - lights
            - jets
            - audio
            - temperature
            - cover
            - chemistry
            - log
            - help
        required: false
      log_notes:
        name: Log Notes
        description: >-
          Optional notes to attach to the calendar log entry. (action: log)
          e.g. "after party", "pre-guests", "post-drain refill"
        selector:
          text:
        required: false
      boost_chlorine:
        name: Boost Chlorine
        description: >-
          Fire the FreshWater IQ salt boost — forces max chlorine output for 24h.
          Use when chlorine is critically low. (action: log)
        selector:
          boolean:
        required: false
        default: false
      close_cover:
        name: Close Cover
        description: >-
          Close the Covana motorized cover after logging. (action: log)
        selector:
          boolean:
        required: false
        default: false
      set_hold_temp:
        name: Set Hold Temperature
        description: >-
          Set water temperature setpoint after session (80-104 °F).
          Use to drop temp to hold/eco after soaking. (action: log)
        selector:
          number:
            min: 80
            max: 104
            unit_of_measurement: "°F"
        required: false
      soak_persons:
        name: Number of Bathers
        description: >-
          Number of people who soaked. Used to calculate fairy dust (oxidizer) dose.
          1 tsp per person per hour. (action: log)
        selector:
          number:
            min: 1
            max: 8
            mode: box
        required: false
      soak_duration_hours:
        name: Soak Duration (hours)
        description: >-
          How long the soak lasted in hours (decimals OK — e.g. 1.5).
          Used with soak_persons to calculate oxidizer dose. (action: log)
        selector:
          number:
            min: 0.25
            max: 8
            step: 0.25
            mode: box
        required: false
      add_supplies:
        name: Add Supplies to Shopping List
        description: >-
          Add needed chemistry products to todo.mealie_sweetwater_hot_tubs. (action: log)
        selector:
          boolean:
        required: false
        default: false
      help_topic:
        name: Help Topic
        description: >-
          Topic to retrieve (action: help). Omit for the topic index.
          Options: overview, jets, lights, audio, chemistry, troubleshooting, maintenance, controls, actions
        selector:
          select:
            options:
            - overview
            - jets
            - lights
            - audio
            - chemistry
            - troubleshooting
            - maintenance
            - controls
            - actions
        required: false
      light_state:
        name: Light State
        description: "Turn spa lights on or off. (action: lights)"
        selector:
          select:
            options: ['on', 'off']
        required: false
      light_color:
        name: Light Color
        description: "Color for light zone(s). Options: Violet, Blue, Cyan, Green, White, Yellow, Red, Cycle. (action: lights)"
        selector:
          select:
            options: [Violet, Blue, Cyan, Green, White, Yellow, Red, Cycle]
        required: false
      light_zone:
        name: Light Zone
        description: "Zone to target. Default: all. Options: all, underwater, exterior, waterfall, topside. (action: lights)"
        selector:
          select:
            options: [all, underwater, exterior, waterfall, topside]
        required: false
        default: all
      light_brightness:
        name: Light Brightness
        description: "Brightness 0–100 (maps to Caldera 0–5 intensity scale). Applied to specified zone or all zones. (action: lights)"
        selector:
          number:
            min: 0
            max: 100
        required: false
      cycle_speed:
        name: Cycle Speed
        description: "Color cycle speed when light_color is Cycle. Options: Off, Slow, Normal, Fast. (action: lights)"
        selector:
          select:
            options: [Off, Slow, Normal, Fast]
        required: false
      jets_state:
        name: Jets State
        description: "Turn jets on or off. (action: jets)"
        selector:
          select:
            options: ['on', 'off']
        required: false
      jets_zone:
        name: Jets Zone
        description: >-
          Zone to target (action: jets).
          all = both pumps.
          left = east side / EcstaSeat + Acquarella Waterfall (Jet Pump 2, dual-speed).
          right = west side / LumbarSsage (Jet Pump 1, single-speed).
          waterfall = alias for left — use when intent is specifically the waterfall feature.
          Default: all.
        selector:
          select:
            options: [all, left, right, waterfall]
        required: false
        default: all
      jets_speed:
        name: Jets Speed
        description: >-
          Speed for jets (action: jets). Applies to left/east zone only — right/west is single-speed.
          low (50%) = gentle circulation mode, waterfall runs softly.
          high (100%) = full EcstaSeat therapy, waterfall at full blast.
          Ignored when jets_state: off or jets_zone: right.
        selector:
          select:
            options: [low, high]
        required: false
      audio_state:
        name: Audio State
        description: "Turn spa audio on or off. (action: audio)"
        selector:
          select:
            options: ['on', 'off']
        required: false
      audio_volume:
        name: Audio Volume
        description: "Volume 0–100. (action: audio)"
        selector:
          number:
            min: 0
            max: 100
        required: false
      audio_source:
        name: Audio Source
        description: "Audio source name. Check status for available options. (action: audio)"
        selector:
          text:
        required: false
      target_temperature:
        name: Target Temperature
        description: "Water temperature setpoint in °F. Range: 80–104. (action: temperature)"
        selector:
          number:
            min: 80
            max: 104
            unit_of_measurement: "°F"
        required: false
      cover_action:
        name: Cover Action
        description: "Open or close the Covana spa cover. (action: cover)"
        selector:
          select:
            options: [open, close]
        required: false
      salt_ppm:
        name: Salt (ppm)
        selector:
          number:
            min: 0
            max: 5000
            unit_of_measurement: ppm
            mode: box
        required: false
      free_chlorine_ppm:
        name: Free Chlorine (ppm)
        selector:
          number:
            min: 0
            max: 10
            unit_of_measurement: ppm
            mode: box
        required: false
      ph:
        name: pH Level
        selector:
          number:
            min: 6
            max: 9
            step: 0.1
            mode: box
        required: false
      alkalinity_ppm:
        name: Alkalinity (ppm)
        selector:
          number:
            min: 0
            max: 300
            unit_of_measurement: ppm
            mode: box
        required: false
      hardness_ppm:
        name: Calcium Hardness (ppm)
        selector:
          number:
            min: 0
            max: 500
            unit_of_measurement: ppm
            mode: box
        required: false
    sequence:

    # ──────────────────────────────────────────────────────────────────
    # 1. Normalize inputs + determine effective action
    # ──────────────────────────────────────────────────────────────────
    - variables:
        _action: "{{ action | default('status', true) }}"
        _has_chem: >-
          {{ (salt_ppm is defined and salt_ppm is not none)
             or (free_chlorine_ppm is defined and free_chlorine_ppm is not none)
             or (ph is defined and ph is not none)
             or (alkalinity_ppm is defined and alkalinity_ppm is not none)
             or (hardness_ppm is defined and hardness_ppm is not none) }}
        _effective_action: >-
          {{ 'chemistry' if (_has_chem | bool) and _action == 'status' else _action }}

    # ──────────────────────────────────────────────────────────────────
    # 2. Route by action
    # ──────────────────────────────────────────────────────────────────
    - choose:

      # ── HELP ──────────────────────────────────────────────────────
      - conditions: "{{ _effective_action == 'help' }}"
        sequence:
        - variables:
            _topic: "{{ help_topic | default('index', true) }}"
        - choose:

          # ── HELP: INDEX (default) ──────────────────────────────────
          - conditions: "{{ _topic == 'index' }}"
            sequence:
            - variables:
                help_response:
                  tool: zen_dojotools_spa_manager
                  version: 5.1.0
                  canonical_note: >-
                    Canonical interface for all spa operations. Use this tool
                    for every spa intent — status, control, chemistry, and help.
                  topics:
                    overview: spa hardware, orientation, pump map
                    jets: jet system zones, speeds, diverter, waterfall alias
                    lights: zones, colors, effects, intensity scale
                    audio: sources, volume, EQ notes
                    chemistry: target ranges, dosing, FreshWater IQ
                    troubleshooting: chloramine trap, pH creep, foam, cloudy water
                    maintenance: schedule, filter, IQ cartridge, cover
                    controls: topside switches, runtime sensors, locks
                    actions: full field reference for all 7 actions
                  usage: "Pass help_topic: <topic> to retrieve a section"
                  tip: >-
                    Start with 'overview' for spa map, 'jets' for zone/pump detail,
                    'chemistry' for water care. Call status for live readings.
            - stop: Help index
              response_variable: help_response

          # ── HELP: OVERVIEW ────────────────────────────────────────
          - conditions: "{{ _topic == 'overview' }}"
            sequence:
            - variables:
                help_response:
                  topic: overview
                  spa_hardware:
                    manufacturer: Watkins / Caldera Spas
                    model: Utopia Series — Florence trim
                    capacity: 6 persons
                    volume_gal: 360
                    total_jets: 46
                    salt_system: FreshWater IQ 2020 (saltwater chlorination)
                    controller: ESPHome via m5stack-atom
                    cover: Covana motorized — open/close via cover action
                    pumps: 2x ReliaFlo 2.5HP (one dual-speed, one single-speed)
                  orientation:
                    front: NORTH — closest to house
                    left: EAST — toward deck (Jet Pump 2 / EcstaSeat / waterfall)
                    right: WEST (Jet Pump 1 / LumbarSsage)
                    note: Standing at topside panel — left=east deck side, right=west
                  seat_map:
                    left_east: EcstaSeat — neck/shoulder/upper-back therapy + Acquarella Waterfall
                    right_west: LumbarSsage — lower back and lumbar therapy
                    note: Circuit therapy = rotate between seats for full-body session
                  known_states:
                    cover_unavailable: Covana ESPHome offline — cover operable manually
                    heater_off_at_setpoint: normal — spa holding temp, not an error
                    salt_power_6pct: intentional at target chemistry — only raise if chlorine chronically low
            - stop: Help overview
              response_variable: help_response

          # ── HELP: JETS ────────────────────────────────────────────
          - conditions: "{{ _topic == 'jets' }}"
            sequence:
            - variables:
                help_response:
                  topic: jets
                  pump_left_east:
                    entity: fan.hot_tub_jets_left
                    pump_id: Jet Pump 2 — dual-speed 2.5HP
                    side: east (toward deck)
                    seat_zone: EcstaSeat
                    jet_types: [2x Atlas Neck (above waterline), 2x Euro-Pulse, 2x VersaSsage, 2x AdaptaSsage, Euro Directional]
                    waterfall: Acquarella Waterfall — ALWAYS fires when this pump is on
                    speeds:
                      low_50pct: gentle circulation + soft waterfall — relaxation / warmup
                      high_100pct: full EcstaSeat therapy blast + waterfall at full flow
                    diverter:
                      location: NE corner (front-left of tub, near house)
                      system_1: max jets + waterfall (14 Euro Directional + Neck + Euro-Pulse)
                      system_2: Euphoria set + waterfall (6 Euro + AdaptaSsage + Euphoria)
                      combo: diverter mid-position — both systems simultaneously
                      note: physical/manual only — not software controlled
                  pump_right_west:
                    entity: fan.hot_tub_jets_right
                    pump_id: Jet Pump 1 — single-speed 2.5HP
                    side: west
                    seat_zone: LumbarSsage
                    jet_types: [2x OrbiSsage, 2x VersaSsage, 2x AdaptaSsage, 4x Euro Directional]
                    therapy_focus: lower back and lumbar (L1-L5)
                    speed: on/off only — no speed control
                    diverter:
                      system_1: LumbarSsage seat jets
                      system_2: EcstaSeat partial (Euphoria + AdaptaSsage + VersaSsage)
                      note: physical/manual only
                  group_entity: fan.hot_tub_jets (combines left + right)
                  waterfall_shortcut: "jets_zone: waterfall = alias for left — Pump 2 always fires waterfall"
                  jet_therapy:
                    atlas_neck: 2 directional above-waterline jets — upper trap + cervical spine
                    euro_pulse: 2 pulsating jets — percussion pattern, best for knots
                    versassage: 2 rotating oscillating jets — broad coverage, mid/upper back
                    adaptassage: 2 adjustable aim jets — rotate face to target specific areas
                    orbissage: 2 orbital-motion jets — signature lumbar (L1-L5) therapy, center lower back on these
                    euphoria: large-orifice deep-tissue rotating jet — System 2 on both sides via diverter
                    circuit_tip: >-
                      Start EcstaSeat (left) jets low — 5 min warmup + waterfall.
                      Increase to high for 10 min full therapy. Switch to LumbarSsage (right)
                      10-15 min. Return to EcstaSeat low for cool-down. Full circuit = 30-45 min.
            - stop: Help jets
              response_variable: help_response

          # ── HELP: LIGHTS ──────────────────────────────────────────
          - conditions: "{{ _topic == 'lights' }}"
            sequence:
            - variables:
                help_response:
                  topic: lights
                  group_entity: light.hot_tub_lights
                  zones:
                    underwater: color + intensity (number.calderaspas_hot_tub_intensity_underwater 0-5)
                    exterior: color + intensity (number.calderaspas_hot_tub_intensity_exterior 0-5)
                    waterfall: color + intensity (number.calderaspas_hot_tub_intensity_waterfall 0-5)
                    topside: color + intensity (number.calderaspas_hot_tub_intensity_topside 0-5)
                  colors: [Violet, Blue, Cyan, Green, White, Yellow, Red, Cycle]
                  cycle_speeds: [Off, Slow, Normal, Fast]
                  effects_via_group: [Violet, Blue, Cyan, Green, White, Yellow, Red, Cycle Slow, Cycle Normal, Cycle Fast, Cycle Off]
                  intensity_note: tool accepts 0-100 and maps to 0-5 scale automatically
                  routing:
                    zone_all: uses group light effect — fastest, all zones same color
                    zone_specific: uses per-zone select entity — individual zone color
                    on_off: light_state controls group entity
                  fields:
                    light_state: "on / off"
                    light_color: color name from colors list
                    light_zone: "all (default) / underwater / exterior / waterfall / topside"
                    light_brightness: 0-100
                    cycle_speed: "Off / Slow / Normal / Fast — only when color=Cycle"
            - stop: Help lights
              response_variable: help_response

          # ── HELP: AUDIO ───────────────────────────────────────────
          - conditions: "{{ _topic == 'audio' }}"
            sequence:
            - variables:
                help_response:
                  topic: audio
                  main_switch: switch.calderaspas_hot_tub_audio
                  volume: number.calderaspas_hot_tub_volume (0-100)
                  source_select: select.calderaspas_hot_tub_audio_source
                  sources: [iPOD, TV, Aux, Bluetooth]
                  now_playing:
                    title: text.calderaspas_hot_tub_song_title
                    artist: text.calderaspas_hot_tub_artist_name
                  eq_entities:
                    bass: number.calderaspas_hot_tub_bass
                    treble: number.calderaspas_hot_tub_treble
                    balance: number.calderaspas_hot_tub_balance
                    subwoofer: number.calderaspas_hot_tub_subwoofer
                    note: EQ not exposed as tool fields — check status for current values
                  fields:
                    audio_state: "on / off"
                    audio_volume: 0-100
                    audio_source: iPOD / TV / Aux / Bluetooth
            - stop: Help audio
              response_variable: help_response

          # ── HELP: CHEMISTRY ───────────────────────────────────────
          - conditions: "{{ _topic == 'chemistry' }}"
            sequence:
            - variables:
                help_response:
                  topic: chemistry
                  system: FreshWater IQ 2020 saltwater chlorination
                  iq_sensors:
                    chlorine: sensor.calderaspas_hot_tub_iq_chlorine
                    ph: sensor.calderaspas_hot_tub_iq_ph
                    orp: sensor.calderaspas_hot_tub_iq_orp (ground truth — >600 mV = sanitizer active)
                    salt: sensor.calderaspas_hot_tub_iq_salt
                    hours_remaining: sensor.calderaspas_hot_tub_iq_hours_left
                  salt_power:
                    entity: number.calderaspas_hot_tub_salt_power
                    note: IQ output %. Raise if chlorine chronically low; lower if chronically high
                    salt_boost: switch.calderaspas_hot_tub_salt_boost — forces 24h max output
                  targets:
                    salt_ppm: "1500-2250 (ideal 1750-2000)"
                    free_chlorine_ppm: 1-5
                    ph: "7.2-7.8 (ideal 7.4-7.6)"
                    alkalinity_ppm: "40-120 (ideal 80)"
                    hardness_ppm: "25-75 (saltwater tolerates lower than traditional)"
                    orp_mv: ">600 = sanitizer active"
                  dosing:
                    salt_low: 1 cup per 250 ppm deficit — add to filter, jets high 5 min, retest
                    salt_high: partial drain/refill only — no chemical fix
                    chlorine_low: 1 cap sanitizer to skimmer filter housing, jets high
                    chlorine_high: open cover 15 min, retest — sunlight degrades chlorine
                    ph_low: pH Increaser (sodium carbonate) — tbsp amounts, sneak up
                    ph_high: pH Down (sodium bisulfate/dry acid) to filter area, jets high, retest 30 min
                    alkalinity_low: baking soda (sodium bicarbonate) — tbsp amounts
                    alkalinity_high: pH Down in increments or partial drain
                    hardness_high: Vanishing Act XL pillow near filter, retest 24h
                    hardness_low: calcium hardness increaser in small amounts
                  rules:
                    - Always correct alkalinity BEFORE pH
                    - Do not adjust pH for 48h after TA correction
                    - Vent cover 30 min before testing if sealed for >4h (chloramine trap risk)
                    - ORP is more reliable than strip chlorine reading when cover has been closed
                  fields:
                    note: pass any/all strip readings — omit all for live IQ readings only
                    backward_compat: chemistry fields without action= also routes to chemistry
            - stop: Help chemistry
              response_variable: help_response

          # ── HELP: TROUBLESHOOTING ─────────────────────────────────
          - conditions: "{{ _topic == 'troubleshooting' }}"
            sequence:
            - variables:
                help_response:
                  topic: troubleshooting
                  chloramine_trap:
                    symptom: ORP >600 mV but chlorine reads low AND pH reads high (7.5+)
                    cause: Sealed cover traps chloramines in headspace — skews strip readings. ORP is truth.
                    fix: Open cover, vent 30 min, retest before ANY chemistry additions
                  ph_creep:
                    symptom: pH drifting up toward 8.0+ over days
                    cause: Saltwater electrolysis + aeration (jets/waterfall) naturally raise pH. Normal.
                    fix: Routine pH Down additions. Target 7.4-7.6. Correct TA first if also elevated.
                  cloudy_water:
                    causes: [high pH, high alkalinity, low sanitizer, calcium precipitation, dirty filter]
                    steps:
                      - Correct pH to 7.2-7.6 first
                      - Correct alkalinity 40-120 ppm
                      - Dose chlorine if below 1 ppm
                      - Clean or replace filter cartridge
                      - Run jets high 15 min to circulate
                  foam:
                    causes: [body oils/lotions, detergent residue, low calcium, old water]
                    fix: Foam Off to skimmer (small dose). Check hardness. If persistent — drain and refill.
                  chlorine_smell:
                    note: Strong smell = chloramines (depleted sanitizer), NOT excess chlorine
                    fix: >-
                      Fairy dust shock — 2-3x normal dose of MPS (potassium peroxymonosulfate)
                      to skimmer, jets high 15 min, cover open. Oxidizes chloramines directly.
                      Routine post-soak oxidizer use prevents this from developing.
                  oxidizer_routine:
                    product: 43% potassium peroxymonosulfate (MPS) — "fairy dust"
                    dose: 1 tsp per person per hour soaked
                    method: add to skimmer filter housing, jets high 15 min
                    timing: after every soak session
                    why: >-
                      Breaks down body oils, sunscreen, lotions, and combined chlorine before
                      they stress the IQ system. Single most impactful routine step for a
                      saltwater spa. Keeps water clear, ORP healthy, chlorine demand low.
                  cover_unavailable:
                    cause: Covana ESPHome controller offline — common after power cycle
                    fix: Check Covana device on network. Cover still operable with physical remote.
                  heater_wont_reach_setpoint:
                    causes: [ambient temp too low, cover open too long, heater element issue]
                    check: sensor.calderaspas_hot_tub_heater_runtime — high runtime = struggling
                  jets_wont_turn_on:
                    check_1: switch.hot_tub_main_power — must be on
                    check_2: switch.calderaspas_hot_tub_active — must be on
                    check_3: spa_lock engaged — check switch.calderaspas_hot_tub_spa_lock
            - stop: Help troubleshooting
              response_variable: help_response

          # ── HELP: MAINTENANCE ─────────────────────────────────────
          - conditions: "{{ _topic == 'maintenance' }}"
            sequence:
            - variables:
                help_response:
                  topic: maintenance
                  after_each_use:
                    - >-
                      FAIRY DUST (oxidizer) — add 1 tsp per person per hour soaked to the
                      skimmer filter housing with jets on high for 15 min. Product: 43%
                      potassium peroxymonosulfate (MPS). Breaks down body oils, lotions,
                      chloramines; takes organic load off the IQ salt system. Do this
                      every soak — it's the single most impactful routine maintenance step.
                      Example: 2 people × 1.5 hrs = 3 tsp.
                    - Check pH (target 7.4-7.6) — correct before next soak
                    - Rinse filter if heavy bather load
                  weekly:
                    - Call status action — review chlorine, pH, ORP, salt IQ readings
                    - Wipe waterline with spa surface cleaner
                    - Check IQ cartridge hours remaining
                  monthly:
                    - Remove and rinse filter cartridge (filter cleaner spray)
                    - Verify salt level and IQ output %
                    - Inspect cover seal and Covana mechanism
                  quarterly:
                    - Deep-clean filter overnight in filter cleaner solution
                    - Strip test for hardness and alkalinity
                    - Inspect jets and diverter valves for debris or stiffness
                  drain_and_refill:
                    frequency: every 3-4 months for a 6-person spa
                    steps:
                      - Drain fully
                      - Clean shell with spa surface cleaner
                      - Inspect and replace IQ cartridge if hours near zero
                      - Check cover for waterlogging (>20-25 lbs weight gain = replace)
                      - Refill and re-balance chemistry before use
                  freshwater_iq_cartridge:
                    hours_entity: sensor.calderaspas_hot_tub_iq_hours_left
                    replace_when: 0 hours or IQ readings become erratic
                    product: Watkins FreshWater IQ replacement cartridge
                  clean_cycle:
                    entity: switch.calderaspas_hot_tub_clean_cycle
                    when: after heavy use, before guests, when chemistry is borderline
                  runtime_monitoring:
                    jets_1: sensor.calderaspas_hot_tub_jets_1_runtime
                    jets_2: sensor.calderaspas_hot_tub_jets_2_runtime
                    heater: sensor.calderaspas_hot_tub_heater_runtime
                    circulation: sensor.calderaspas_hot_tub_circulation_pump_runtime
                    lifetime: sensor.calderaspas_hot_tub_lifetime_runtime
            - stop: Help maintenance
              response_variable: help_response

          # ── HELP: CONTROLS ────────────────────────────────────────
          - conditions: "{{ _topic == 'controls' }}"
            sequence:
            - variables:
                help_response:
                  topic: controls
                  note: >-
                    Topside panel and HA/tool controls mirror the same hardware.
                    Panel takes priority for physical overrides.
                  buttons_entity: sensor.calderaspas_hot_tub_buttons
                  switches:
                    clean_cycle:
                      entity: switch.calderaspas_hot_tub_clean_cycle
                      use: extended filtration + IQ cycle after heavy use or borderline chemistry
                    summer_timer:
                      entity: switch.calderaspas_hot_tub_summer_timer
                      use: reduces heating frequency in summer — energy saving
                    salt_boost:
                      entity: switch.calderaspas_hot_tub_salt_boost
                      use: forces IQ to max output for 24h — use when chlorine critically low
                    spa_lock:
                      entity: switch.calderaspas_hot_tub_spa_lock
                      use: locks topside panel — prevents accidental changes
                    temperature_lock:
                      entity: switch.calderaspas_hot_tub_temperature_lock
                      use: locks temperature setpoint
                    main_power:
                      entity: switch.hot_tub_main_power
                      use: master power — use with caution, requires full warmup on restart
                    audio:
                      entity: switch.calderaspas_hot_tub_audio
                      use: audio system on/off (also available via audio action)
                    lights:
                      entity: switch.calderaspas_hot_tub_lights
                      use: lights on/off (also available via lights action)
                  runtime_sensors:
                    jets_1: sensor.calderaspas_hot_tub_jets_1_runtime
                    jets_2: sensor.calderaspas_hot_tub_jets_2_runtime
                    heater: sensor.calderaspas_hot_tub_heater_runtime
                    lights: sensor.calderaspas_hot_tub_lights_runtime
                    circulation_pump: sensor.calderaspas_hot_tub_circulation_pump_runtime
                    lifetime: sensor.calderaspas_hot_tub_lifetime_runtime
                  electrical:
                    subpanel_breaker: switch.spa_subpanel_breaker (SPAN panel — 240V whole-spa circuit)
                    subpanel_priority: select.spa_subpanel_priority (never/soc_threshold/off_grid — battery priority)
                    subpanel_power: sensor.spa_subpanel_power
            - stop: Help controls
              response_variable: help_response

          # ── HELP: ACTIONS ─────────────────────────────────────────
          - conditions: "{{ _topic == 'actions' }}"
            sequence:
            - variables:
                help_response:
                  topic: actions
                  status:
                    fields: none required
                    returns: full live snapshot — temp, lights, jets (with topology), audio, cover, chemistry IQ
                  lights:
                    light_state: "on / off"
                    light_color: "Violet / Blue / Cyan / Green / White / Yellow / Red / Cycle"
                    light_zone: "all (default) / underwater / exterior / waterfall / topside"
                    light_brightness: "0-100 (auto-mapped to 0-5 intensity)"
                    cycle_speed: "Off / Slow / Normal / Fast — only with color=Cycle"
                    note: all fields independent — set any combination
                  jets:
                    jets_state: "on / off"
                    jets_zone: "all (default) / left / right / waterfall"
                    jets_speed: "low / high — left/east only; right is on/off"
                    note: waterfall=alias for left; low=gentle+waterfall, high=full therapy
                  audio:
                    audio_state: "on / off"
                    audio_volume: 0-100
                    audio_source: "iPOD / TV / Aux / Bluetooth"
                  temperature:
                    target_temperature: "80-104 °F"
                    note: check current temp + heater state via status
                  cover:
                    cover_action: "open / close"
                    note: state may be 'unavailable' if Covana controller offline
                  chemistry:
                    salt_ppm: optional strip reading
                    free_chlorine_ppm: optional strip reading
                    ph: optional strip reading
                    alkalinity_ppm: optional strip reading
                    hardness_ppm: optional strip reading
                    note: omit all for live IQ readings + recommendations only
                    backward_compat: chemistry field(s) without action= also routes here
                  log:
                    log_notes: optional free text attached to calendar event
                    boost_chlorine: "true/false — fires IQ salt boost (24h max output)"
                    close_cover: "true/false — closes Covana cover after logging"
                    set_hold_temp: "80-104 °F — set hold/eco temp after soak"
                    add_supplies: "true/false — adds needed products to sweetwater todo list"
                    note: >-
                      Always creates todos in household_chores + calendar event in
                      ai_assistant_calendar. Optional fields layer actions on top.
                      Call after a soak or chemistry check — one call does it all.
                  help:
                    help_topic: "index (default) / overview / jets / lights / audio / chemistry / troubleshooting / maintenance / controls / actions"
                    note: omit help_topic for the topic index
            - stop: Help actions
              response_variable: help_response

          default:
          - variables:
              help_response:
                error: unknown_topic
                message: "Unknown help_topic: {{ _topic }}"
                valid_topics: [index, overview, jets, lights, audio, chemistry, troubleshooting, maintenance, controls, actions]
          - stop: Help unknown topic
            response_variable: help_response

      # ── LOG ───────────────────────────────────────────────────────
      - conditions: "{{ _effective_action == 'log' }}"
        sequence:

        # 1. Read live state + resolve inputs
        - variables:
            _chlorine: "{{ states('sensor.calderaspas_hot_tub_iq_chlorine') | float(0) }}"
            _ph:       "{{ states('sensor.calderaspas_hot_tub_iq_ph') | float(0) }}"
            _orp:      "{{ states('sensor.calderaspas_hot_tub_iq_orp') | float(0) }}"
            _salt:     "{{ states('sensor.calderaspas_hot_tub_iq_salt') | float(0) }}"
            _hours:    "{{ states('sensor.calderaspas_hot_tub_iq_hours_left') | float(0) }}"
            _salt_pwr: "{{ states('number.calderaspas_hot_tub_salt_power') | float(0) }}"
            _cur_temp: "{{ states('sensor.calderaspas_hot_tub_current_temperature') | float(0) }}"
            _tgt_temp: "{{ state_attr('climate.calderaspas_hot_tub_temperature', 'temperature') | default(102) }}"
            _cover_st: "{{ states('cover.covana_hot_tub_cover_controls') }}"
            _do_boost:    "{{ boost_chlorine | default(false, true) | bool }}"
            _do_cover:    "{{ close_cover | default(false, true) | bool }}"
            _hold_t:      "{{ set_hold_temp | default(none, true) }}"
            _do_supplies: "{{ add_supplies | default(false, true) | bool }}"
            _notes:       "{{ log_notes | default('', true) | trim }}"
            _persons:     "{{ soak_persons | default(0, true) | int(0) }}"
            _soak_hrs:    "{{ soak_duration_hours | default(0, true) | float(0) }}"
            _oxidizer_tsp: "{{ (_persons * _soak_hrs) | round(1) if (_persons > 0 and _soak_hrs > 0) else 0 }}"
            _do_oxidizer: "{{ _oxidizer_tsp > 0 }}"
            _ts:          "{{ now().strftime('%Y-%m-%dT%H:%M:%S') }}"
            _ts_end:      "{{ (now() + timedelta(hours=1)).strftime('%Y-%m-%dT%H:%M:%S') }}"
            _date_str:    "{{ now().strftime('%Y-%m-%d %H:%M') }}"

        # 2. Evaluate chemistry
        - variables:
            _ph_low:    "{{ _ph > 0 and _ph < 7.2 }}"
            _ph_high:   "{{ _ph > 7.8 }}"
            _chl_low:   "{{ _chlorine > 0 and _chlorine < 1 }}"
            _chl_high:  "{{ _chlorine > 5 }}"
            _salt_low:  "{{ _salt > 0 and _salt < 1500 }}"
            _salt_high: "{{ _salt > 2250 }}"
            _orp_warn:  "{{ _orp > 0 and _orp < 600 }}"
            _hrs_warn:  "{{ _hours < 200 }}"
            _issues: >-
              {%- set ns = namespace(items=[]) -%}
              {%- if _ph_high %}  {%- set ns.items = ns.items + ['pH ' ~ _ph ~ ' HIGH (>7.8) — add pH Down'] -%}{%- endif -%}
              {%- if _ph_low %}   {%- set ns.items = ns.items + ['pH ' ~ _ph ~ ' LOW (<7.2) — add pH Increaser'] -%}{%- endif -%}
              {%- if _chl_low %}  {%- set ns.items = ns.items + ['Chlorine ' ~ _chlorine ~ ' ppm LOW — dose or boost IQ'] -%}{%- endif -%}
              {%- if _chl_high %} {%- set ns.items = ns.items + ['Chlorine ' ~ _chlorine ~ ' ppm HIGH — vent cover 15 min'] -%}{%- endif -%}
              {%- if _salt_low %}  {%- set ns.items = ns.items + ['Salt ' ~ _salt ~ ' ppm LOW — add spa salt'] -%}{%- endif -%}
              {%- if _salt_high %} {%- set ns.items = ns.items + ['Salt ' ~ _salt ~ ' ppm HIGH — partial drain/refill'] -%}{%- endif -%}
              {%- if _orp_warn %}  {%- set ns.items = ns.items + ['ORP ' ~ _orp ~ ' mV LOW (<600) — sanitizer weak'] -%}{%- endif -%}
              {%- if _hrs_warn %}  {%- set ns.items = ns.items + ['IQ cartridge ' ~ _hours ~ ' hrs remaining — order replacement'] -%}{%- endif -%}
              {{ ns.items }}
            _all_clear: "{{ _issues | length == 0 }}"

        # 3. Optional actions — salt boost
        - if: "{{ _do_boost }}"
          then:
          - action: switch.turn_on
            target:
              entity_id: switch.calderaspas_hot_tub_salt_boost

        # 4. Optional actions — close cover
        - if: "{{ _do_cover and _cover_st not in ['closed', 'unavailable'] }}"
          then:
          - action: cover.close_cover
            target:
              entity_id: cover.covana_hot_tub_cover_controls

        # 5. Optional actions — hold temperature
        - if: "{{ _hold_t is not none }}"
          then:
          - action: climate.set_temperature
            target:
              entity_id: climate.calderaspas_hot_tub_temperature
            data:
              temperature: "{{ _hold_t | int }}"

        # 6. Todo items — household_chores (one per issue)
        - if: "{{ _ph_high }}"
          then:
          - action: todo.add_item
            target:
              entity_id: todo.household_chores
            data:
              item: "Hot Tub: pH {{ _ph }} HIGH — add pH Down to filter, jets high, retest 30 min"

        - if: "{{ _ph_low }}"
          then:
          - action: todo.add_item
            target:
              entity_id: todo.household_chores
            data:
              item: "Hot Tub: pH {{ _ph }} LOW — add pH Increaser, sneak up on it"

        - if: "{{ _chl_low }}"
          then:
          - action: todo.add_item
            target:
              entity_id: todo.household_chores
            data:
              item: "Hot Tub: Chlorine {{ _chlorine }} ppm LOW — 1 cap to skimmer, jets high; or fire IQ boost"

        - if: "{{ _chl_high }}"
          then:
          - action: todo.add_item
            target:
              entity_id: todo.household_chores
            data:
              item: "Hot Tub: Chlorine {{ _chlorine }} ppm HIGH — open cover 15 min, retest"

        - if: "{{ _salt_low }}"
          then:
          - action: todo.add_item
            target:
              entity_id: todo.household_chores
            data:
              item: "Hot Tub: Salt {{ _salt }} ppm LOW — add FreshWater Spa Salt to filter"

        - if: "{{ _salt_high }}"
          then:
          - action: todo.add_item
            target:
              entity_id: todo.household_chores
            data:
              item: "Hot Tub: Salt {{ _salt }} ppm HIGH — partial drain and refill needed"

        - if: "{{ _hrs_warn }}"
          then:
          - action: todo.add_item
            target:
              entity_id: todo.household_chores
            data:
              item: "Hot Tub: IQ cartridge {{ _hours | int }} hrs remaining — order Watkins FreshWater IQ replacement"

        # Oxidizer (fairy dust) post-soak dose
        - if: "{{ _do_oxidizer }}"
          then:
          - action: todo.add_item
            target:
              entity_id: todo.household_chores
            data:
              item: >-
                Hot Tub: Add {{ _oxidizer_tsp }} tsp fairy dust (potassium peroxymonosulfate oxidizer)
                to skimmer — {{ _persons }} person(s) × {{ _soak_hrs }} hr(s). Jets high 15 min.

        # 7. Supplies — sweetwater list
        - if: "{{ _do_supplies and _ph_high }}"
          then:
          - action: todo.add_item
            target:
              entity_id: todo.mealie_sweetwater_hot_tubs
            data:
              item: "pH Down (sodium bisulfate / dry acid)"

        - if: "{{ _do_supplies and _ph_low }}"
          then:
          - action: todo.add_item
            target:
              entity_id: todo.mealie_sweetwater_hot_tubs
            data:
              item: "pH Increaser (sodium carbonate)"

        - if: "{{ _do_supplies and _chl_low }}"
          then:
          - action: todo.add_item
            target:
              entity_id: todo.mealie_sweetwater_hot_tubs
            data:
              item: "Chlorine sanitizer (liquid or granular)"

        - if: "{{ _do_supplies and _salt_low }}"
          then:
          - action: todo.add_item
            target:
              entity_id: todo.mealie_sweetwater_hot_tubs
            data:
              item: "FreshWater Spa Salt"

        - if: "{{ _do_supplies and _hrs_warn }}"
          then:
          - action: todo.add_item
            target:
              entity_id: todo.mealie_sweetwater_hot_tubs
            data:
              item: "Watkins FreshWater IQ replacement cartridge ({{ _hours | int }} hrs remaining)"

        - if: "{{ _do_supplies and _do_oxidizer }}"
          then:
          - action: todo.add_item
            target:
              entity_id: todo.mealie_sweetwater_hot_tubs
            data:
              item: "43% potassium peroxymonosulfate oxidizer (fairy dust) — running low"

        # 8. Calendar log event
        - variables:
            _cal_desc: >-
              Hot Tub Chemistry Log — {{ _date_str }}
              {%- if _notes %}
              Notes: {{ _notes }}
              {%- endif %}

              READINGS:
              • Chlorine: {{ _chlorine }} ppm (target 1-5)
              • pH: {{ _ph }} (target 7.2-7.8)
              • ORP: {{ _orp }} mV (>600 = sanitizer active)
              • Salt: {{ _salt }} ppm (target 1500-2250)
              • IQ Cartridge: {{ _hours | int }} hrs remaining
              • Salt Power: {{ _salt_pwr }}%
              • Water Temp: {{ _cur_temp }}°F / setpoint {{ _tgt_temp }}°F

              {%- if _issues | length > 0 %}

              ISSUES ({{ _issues | length }}):
              {%- for i in _issues %}
              ⚠ {{ i }}
              {%- endfor %}
              {%- else %}

              ✓ All parameters in range.
              {%- endif %}

              {%- if _do_oxidizer %}

              POST-SOAK:
              • Fairy dust dose: {{ _oxidizer_tsp }} tsp MPS ({{ _persons }} person(s) × {{ _soak_hrs }} hr(s))
                Add to skimmer filter housing, jets high 15 min.
              {%- endif %}
              {%- if _do_boost or _do_cover or _hold_t is not none %}

              ACTIONS TAKEN:
              {%- if _do_boost %}  • IQ salt boost fired (24h max output){%- endif %}
              {%- if _do_cover %}  • Cover closed{%- endif %}
              {%- if _hold_t is not none %}  • Hold temp set to {{ _hold_t }}°F{%- endif %}
              {%- endif %}

        - action: calendar.create_event
          target:
            entity_id: calendar.ai_assistant_calendar
          data:
            summary: "Hot Tub Chemistry — {{ 'Issues: ' ~ (_issues | length) if not _all_clear else 'All Clear' }} ({{ now().strftime('%m/%d') }})"
            start_date_time: "{{ _ts }}"
            end_date_time: "{{ _ts_end }}"
            description: "{{ _cal_desc }}"

        # 9. Return summary
        - variables:
            final_result:
              action: log
              status: ok
              timestamp: "{{ _ts }}"
              readings:
                chlorine_ppm: "{{ _chlorine }}"
                ph: "{{ _ph }}"
                orp_mv: "{{ _orp }}"
                salt_ppm: "{{ _salt }}"
                iq_hours_remaining: "{{ _hours | int }}"
                salt_power_pct: "{{ _salt_pwr }}"
                temp_current_f: "{{ _cur_temp }}"
                temp_setpoint_f: "{{ _tgt_temp }}"
              chemistry_status: "{{ 'all_clear' if _all_clear else 'issues_found' }}"
              issues: "{{ _issues }}"
              todos_created: "{{ _issues | length + (1 if _do_oxidizer else 0) }}"
              oxidizer_dose:
                persons: "{{ _persons }}"
                hours: "{{ _soak_hrs }}"
                dose_tsp: "{{ _oxidizer_tsp }}"
                instruction: "{{ 'Add ' ~ _oxidizer_tsp ~ ' tsp MPS (fairy dust) to skimmer, jets high 15 min' if _do_oxidizer else 'no soak data provided' }}"
              calendar_logged: true
              supplies_added: "{{ _do_supplies }}"
              actions_taken:
                boost_chlorine: "{{ _do_boost }}"
                cover_closed: "{{ _do_cover }}"
                hold_temp_set: "{{ _hold_t }}"
              notes: "{{ _notes }}"
        - stop: Log complete
          response_variable: final_result

      # ── STATUS ────────────────────────────────────────────────────
      - conditions: "{{ _effective_action == 'status' }}"
        sequence:
        - variables:
            _cur_temp: "{{ states('sensor.calderaspas_hot_tub_current_temperature') | float(0) }}"
            _tgt_temp: "{{ state_attr('climate.calderaspas_hot_tub_temperature', 'temperature') | default(102) }}"
            _hvac_action: "{{ state_attr('climate.calderaspas_hot_tub_temperature', 'hvac_action') | default('unknown') }}"
            _lights_on: "{{ is_state('light.hot_tub_lights', 'on') }}"
            _lights_effect: "{{ state_attr('light.hot_tub_lights', 'effect') | default('none', true) }}"
            _jets_state: "{{ states('fan.hot_tub_jets') }}"
            _jets_l_pct: "{{ state_attr('fan.hot_tub_jets_left', 'percentage') | default(0) | int }}"
            _jets_r_state: "{{ states('fan.hot_tub_jets_right') }}"
            _audio_on: "{{ is_state('switch.calderaspas_hot_tub_audio', 'on') }}"
            _audio_vol: "{{ states('number.calderaspas_hot_tub_volume') | default('unknown', true) }}"
            _audio_src: "{{ states('select.calderaspas_hot_tub_audio_source') | default('unknown', true) }}"
            _audio_src_opts: "{{ state_attr('select.calderaspas_hot_tub_audio_source', 'options') | default([]) }}"
            _song: "{{ states('text.calderaspas_hot_tub_song_title') | default('', true) }}"
            _artist: "{{ states('text.calderaspas_hot_tub_artist_name') | default('', true) }}"
            _cover_state: "{{ states('cover.covana_hot_tub_cover_controls') }}"
            _active: "{{ is_state('switch.calderaspas_hot_tub_active', 'on') }}"
            _water_filled: "{{ is_state('input_boolean.hot_tub_water_filled', 'on') }}"
            _iq_chlorine: "{{ states('sensor.calderaspas_hot_tub_iq_chlorine') | default('unknown', true) }}"
            _iq_ph: "{{ states('sensor.calderaspas_hot_tub_iq_ph') | default('unknown', true) }}"
            _iq_orp: "{{ states('sensor.calderaspas_hot_tub_iq_orp') | default('unknown', true) }}"
            _iq_salt: "{{ states('sensor.calderaspas_hot_tub_iq_salt') | default('unknown', true) }}"
            _iq_hours_left: "{{ states('sensor.calderaspas_hot_tub_iq_hours_left') | default('unknown', true) }}"
            _salt_pwr: "{{ states('number.calderaspas_hot_tub_salt_power') | default('unknown', true) }}"
            _color_uw: "{{ states('select.calderaspas_hot_tub_color_underwater') | default('unknown', true) }}"
            _color_ext: "{{ states('select.calderaspas_hot_tub_color_exterior') | default('unknown', true) }}"
            _color_wf: "{{ states('select.calderaspas_hot_tub_color_waterfall') | default('unknown', true) }}"
            _color_top: "{{ states('select.calderaspas_hot_tub_color_topside') | default('unknown', true) }}"
            _cycle_spd: "{{ states('select.calderaspas_hot_tub_color_cycle_speed') | default('Off', true) }}"
            _int_uw: "{{ states('number.calderaspas_hot_tub_intensity_underwater') | default(0) }}"
            _int_ext: "{{ states('number.calderaspas_hot_tub_intensity_exterior') | default(0) }}"
            _int_wf: "{{ states('number.calderaspas_hot_tub_intensity_waterfall') | default(0) }}"
            _int_top: "{{ states('number.calderaspas_hot_tub_intensity_topside') | default(0) }}"
        - variables:
            _htb_labeled: "{{ label_entities('hot_tub') }}"
            _todo_entity: >-
              {{ _htb_labeled | select('match', 'todo\\..*') | first | default('') }}
            _cal_entity: >-
              {{ _htb_labeled | select('match', 'calendar\\..*') | first | default('') }}
        - if: "{{ _todo_entity != '' }}"
          then:
          - action: todo.get_items
            target:
              entity_id: "{{ _todo_entity }}"
            data:
              status: needs_action
            response_variable: _todo_resp
        - if: "{{ _cal_entity != '' }}"
          then:
          - action: calendar.get_events
            target:
              entity_id: "{{ _cal_entity }}"
            data:
              start_date_time: "{{ (now() - timedelta(days=14)).isoformat() }}"
              end_date_time: "{{ now().isoformat() }}"
            response_variable: _cal_resp
        - variables:
            _open_todos: >-
              {%- set items = ((_todo_resp | default({})).get(_todo_entity, {}) or {}).get('items', []) -%}
              {%- set ns = namespace(r=[]) -%}
              {%- for it in items -%}
                {%- set s = it.summary | lower -%}
                {%- if 'hot tub' in s or 'spa' in s or 'ph ' in s or 'ph:' in s
                       or 'salt' in s or 'chlorine' in s or 'mps' in s
                       or 'oxidizer' in s or 'alkalinity' in s or 'cartridge' in s
                       or 'drain' in s or 'refill' in s -%}
                  {%- set ns.r = ns.r + [it.summary] -%}
                {%- endif -%}
              {%- endfor -%}
              {{ ns.r }}
            _recent_log: >-
              {%- set events = ((_cal_resp | default({})).get(_cal_entity, {}) or {}).get('events', []) -%}
              {%- set ns = namespace(r=[]) -%}
              {%- for ev in events -%}
                {%- set s = ev.summary | lower -%}
                {%- if 'hot tub' in s or 'spa' in s or 'chemistry' in s or 'soak' in s -%}
                  {%- set ns.r = ns.r + [ev.start ~ ' — ' ~ ev.summary] -%}
                {%- endif -%}
              {%- endfor -%}
              {{ ns.r | reverse | list }}
        - variables:
            final_result: >-
              {{
                {
                  "action": "status",
                  "power": {
                    "active": _active,
                    "water_filled": _water_filled
                  },
                  "temperature": {
                    "current_f": _cur_temp,
                    "target_f": _tgt_temp,
                    "heater": _hvac_action,
                    "range_f": {"min": 80, "max": 104}
                  },
                  "lights": {
                    "on": _lights_on,
                    "group_effect": _lights_effect,
                    "zones": {
                      "underwater": {"color": _color_uw, "intensity_0_5": _int_uw},
                      "exterior":   {"color": _color_ext, "intensity_0_5": _int_ext},
                      "waterfall":  {"color": _color_wf,  "intensity_0_5": _int_wf},
                      "topside":    {"color": _color_top, "intensity_0_5": _int_top}
                    },
                    "cycle_speed": _cycle_spd,
                    "color_options": ["Violet","Blue","Cyan","Green","White","Yellow","Red","Cycle"],
                    "effect_list":   ["Violet","Blue","Cyan","Green","White","Yellow","Red","Cycle Slow","Cycle Normal","Cycle Fast","Cycle Off"]
                  },
                  "jets": {
                    "group_state": _jets_state,
                    "left": {
                      "physical_side": "east (toward deck)",
                      "pump": "Jet Pump 2 — dual-speed 2.5HP",
                      "seat_zone": "EcstaSeat",
                      "jet_types": ["2x Atlas Neck (above waterline)", "2x Euro-Pulse", "2x VersaSsage", "2x AdaptaSsage", "Euro Directional"],
                      "waterfall": "Acquarella Waterfall — always fires when this pump is on",
                      "diverter": "Manual valve near NE corner (front-left): System 1 = max jets + waterfall, System 2 = Euphoria set + waterfall, mid = combination",
                      "state": "on" if _jets_l_pct > 0 else "off",
                      "speed": "high" if _jets_l_pct >= 100 else ("low" if _jets_l_pct >= 50 else "off"),
                      "percentage": _jets_l_pct,
                      "speed_note": "low (50%) = gentle circulation + soft waterfall; high (100%) = full therapy + waterfall blast"
                    },
                    "right": {
                      "physical_side": "west",
                      "pump": "Jet Pump 1 — single-speed 2.5HP",
                      "seat_zone": "LumbarSsage",
                      "jet_types": ["2x OrbiSsage", "2x VersaSsage", "2x AdaptaSsage", "4x Euro Directional"],
                      "therapy_focus": "lower back and lumbar",
                      "diverter": "Manual valve selects System 1 (LumbarSsage) or System 2 (EcstaSeat partial: Euphoria + AdaptaSsage + VersaSsage)",
                      "state": _jets_r_state,
                      "speed_note": "single-speed on/off only"
                    },
                    "waterfall_intent": "Use jets_zone: waterfall (or left) to activate the Acquarella Waterfall. Low speed = gentle, high = full flow."
                  },
                  "audio": {
                    "on": _audio_on,
                    "volume_0_100": _audio_vol,
                    "source": _audio_src,
                    "source_options": _audio_src_opts,
                    "now_playing": {
                      "title": _song,
                      "artist": _artist
                    }
                  },
                  "cover": {
                    "state": _cover_state,
                    "note": "Covana motorized cover"
                  },
                  "chemistry": {
                    "iq_chlorine_ppm": _iq_chlorine,
                    "iq_ph": _iq_ph,
                    "iq_orp_mv": _iq_orp,
                    "iq_salt_ppm": _iq_salt,
                    "cartridge_hours_remaining": _iq_hours_left,
                    "salt_power_pct": _salt_pwr
                  },
                  "controls_available": ["lights","jets","audio","temperature","cover","chemistry"],
                  "open_todos": {
                    "source": _todo_entity if _todo_entity != '' else "unresolved (label: hot_tub)",
                    "items": _open_todos
                  },
                  "recent_log": {
                    "source": _cal_entity if _cal_entity != '' else "unresolved (label: hot_tub)",
                    "entries": _recent_log
                  }
                }
              }}
        - stop: Status complete
          response_variable: final_result

      # ── LIGHTS ────────────────────────────────────────────────────
      - conditions: "{{ _effective_action == 'lights' }}"
        sequence:
        - variables:
            _zone: "{{ light_zone | default('all', true) }}"
            _color: "{{ light_color | default(none, true) }}"
            _state: "{{ light_state | default(none, true) }}"
            _bri: "{{ light_brightness | default(none, true) }}"
            _cyc_spd: "{{ cycle_speed | default(none, true) }}"
            _intensity: >-
              {{ (_bri | int(0) / 100 * 5) | round(0) | int if _bri is not none else none }}

        # On/Off via group light
        - if: "{{ _state == 'on' }}"
          then:
          - action: light.turn_on
            target:
              entity_id: light.hot_tub_lights

        - if: "{{ _state == 'off' }}"
          then:
          - action: light.turn_off
            target:
              entity_id: light.hot_tub_lights

        # Color — all zones via group effect
        - if: "{{ _color is not none and _zone == 'all' }}"
          then:
          - action: light.turn_on
            target:
              entity_id: light.hot_tub_lights
            data:
              effect: >-
                {{ _color if _color not in ['Cycle'] else
                   ('Cycle ' ~ (_cyc_spd if _cyc_spd not in [none, 'Off'] else 'Normal')) }}

        # Color — per-zone via select entity
        - if: "{{ _color is not none and _zone != 'all' }}"
          then:
          - action: select.select_option
            target:
              entity_id: "select.calderaspas_hot_tub_color_{{ _zone }}"
            data:
              option: "{{ _color }}"

        # Brightness — all zones
        - if: "{{ _intensity is not none and _zone == 'all' }}"
          then:
          - action: number.set_value
            target:
              entity_id:
              - number.calderaspas_hot_tub_intensity_underwater
              - number.calderaspas_hot_tub_intensity_exterior
              - number.calderaspas_hot_tub_intensity_waterfall
              - number.calderaspas_hot_tub_intensity_topside
            data:
              value: "{{ _intensity }}"

        # Brightness — per zone
        - if: "{{ _intensity is not none and _zone != 'all' }}"
          then:
          - action: number.set_value
            target:
              entity_id: "number.calderaspas_hot_tub_intensity_{{ _zone }}"
            data:
              value: "{{ _intensity }}"

        # Cycle speed (standalone — applies when color is already Cycle)
        - if: "{{ _cyc_spd is not none and _color is none }}"
          then:
          - action: select.select_option
            target:
              entity_id: select.calderaspas_hot_tub_color_cycle_speed
            data:
              option: "{{ _cyc_spd }}"

        - variables:
            final_result: >-
              {{
                {"action": "lights", "status": "ok",
                 "zone": _zone, "color": _color, "state": _state,
                 "brightness_0_100": _bri, "intensity_0_5": _intensity,
                 "cycle_speed": _cyc_spd}
              }}
        - stop: Lights complete
          response_variable: final_result

      # ── JETS ──────────────────────────────────────────────────────
      - conditions: "{{ _effective_action == 'jets' }}"
        sequence:
        - variables:
            _jzone_raw: "{{ jets_zone | default('all', true) }}"
            _jzone: "{{ 'left' if _jzone_raw == 'waterfall' else _jzone_raw }}"
            _jstate: "{{ jets_state | default(none, true) }}"
            _jspeed: "{{ jets_speed | default('high', true) }}"
            _jpct: "{{ 50 if _jspeed == 'low' else 100 }}"

        # All zones on
        - if: "{{ _jstate == 'on' and _jzone == 'all' }}"
          then:
          - action: fan.turn_on
            target:
              entity_id: fan.hot_tub_jets_right
          - action: fan.set_percentage
            target:
              entity_id: fan.hot_tub_jets_left
            data:
              percentage: "{{ _jpct }}"

        # All zones off
        - if: "{{ _jstate == 'off' and _jzone == 'all' }}"
          then:
          - action: fan.turn_off
            target:
              entity_id: fan.hot_tub_jets

        # Left zone on (dual-speed)
        - if: "{{ _jstate == 'on' and _jzone == 'left' }}"
          then:
          - action: fan.set_percentage
            target:
              entity_id: fan.hot_tub_jets_left
            data:
              percentage: "{{ _jpct }}"

        # Left zone off
        - if: "{{ _jstate == 'off' and _jzone == 'left' }}"
          then:
          - action: fan.turn_off
            target:
              entity_id: fan.hot_tub_jets_left

        # Right zone on (single-speed)
        - if: "{{ _jstate == 'on' and _jzone == 'right' }}"
          then:
          - action: fan.turn_on
            target:
              entity_id: fan.hot_tub_jets_right

        # Right zone off
        - if: "{{ _jstate == 'off' and _jzone == 'right' }}"
          then:
          - action: fan.turn_off
            target:
              entity_id: fan.hot_tub_jets_right

        - variables:
            final_result: >-
              {{
                {"action": "jets", "status": "ok",
                 "zone_requested": _jzone_raw,
                 "zone_resolved": _jzone,
                 "waterfall_firing": _jzone in ['left', 'all'],
                 "state": _jstate,
                 "speed": _jspeed if _jstate == 'on' else "n/a",
                 "left_zone": "east / EcstaSeat + Acquarella Waterfall — dual-speed (low=gentle, high=full)",
                 "right_zone": "west / LumbarSsage — single-speed on/off"}
              }}
        - stop: Jets complete
          response_variable: final_result

      # ── AUDIO ─────────────────────────────────────────────────────
      - conditions: "{{ _effective_action == 'audio' }}"
        sequence:
        - variables:
            _astate: "{{ audio_state | default(none, true) }}"
            _avol: "{{ audio_volume | default(none, true) }}"
            _asrc: "{{ audio_source | default(none, true) }}"

        - if: "{{ _astate == 'on' }}"
          then:
          - action: switch.turn_on
            target:
              entity_id: switch.calderaspas_hot_tub_audio

        - if: "{{ _astate == 'off' }}"
          then:
          - action: switch.turn_off
            target:
              entity_id: switch.calderaspas_hot_tub_audio

        - if: "{{ _avol is not none }}"
          then:
          - action: number.set_value
            target:
              entity_id: number.calderaspas_hot_tub_volume
            data:
              value: "{{ _avol | int }}"

        - if: "{{ _asrc is not none }}"
          then:
          - action: select.select_option
            target:
              entity_id: select.calderaspas_hot_tub_audio_source
            data:
              option: "{{ _asrc }}"

        - variables:
            final_result: >-
              {{
                {"action": "audio", "status": "ok",
                 "state": _astate, "volume": _avol, "source": _asrc}
              }}
        - stop: Audio complete
          response_variable: final_result

      # ── TEMPERATURE ───────────────────────────────────────────────
      - conditions: "{{ _effective_action == 'temperature' }}"
        sequence:
        - variables:
            _tgt: "{{ target_temperature | default(none, true) }}"

        - if: "{{ _tgt is not none }}"
          then:
          - action: climate.set_temperature
            target:
              entity_id: climate.calderaspas_hot_tub_temperature
            data:
              temperature: "{{ _tgt | int }}"

        - variables:
            final_result: >-
              {{
                {"action": "temperature", "status": "ok" if _tgt is not none else "no_change",
                 "target_f": _tgt,
                 "current_f": states('sensor.calderaspas_hot_tub_current_temperature') | float(0),
                 "range_f": {"min": 80, "max": 104}}
              }}
        - stop: Temperature complete
          response_variable: final_result

      # ── COVER ─────────────────────────────────────────────────────
      - conditions: "{{ _effective_action == 'cover' }}"
        sequence:
        - variables:
            _caction: "{{ cover_action | default(none, true) }}"

        - if: "{{ _caction == 'open' }}"
          then:
          - action: cover.open_cover
            target:
              entity_id: cover.covana_hot_tub_cover_controls

        - if: "{{ _caction == 'close' }}"
          then:
          - action: cover.close_cover
            target:
              entity_id: cover.covana_hot_tub_cover_controls

        - variables:
            final_result: >-
              {{
                {"action": "cover", "status": "ok" if _caction is not none else "no_action",
                 "cover_action": _caction,
                 "cover_state": states('cover.covana_hot_tub_cover_controls'),
                 "note": "Covana motorized cover — state may be unavailable if cover controller offline"}
              }}
        - stop: Cover complete
          response_variable: final_result

      # ── CHEMISTRY ─────────────────────────────────────────────────
      - conditions: "{{ _effective_action == 'chemistry' }}"
        sequence:
        - variables:
            salt_ppm: '{{ salt_ppm | default(none) }}'
            free_chlorine_ppm: '{{ free_chlorine_ppm | default(none) }}'
            ph: '{{ ph | default(none) }}'
            alkalinity_ppm: '{{ alkalinity_ppm | default(none) }}'
            hardness_ppm: '{{ hardness_ppm | default(none) }}'
            hot_tub_ents: '{{ label_entities(''hot_tub'') }}'
            spa_records: >-
              {%- set filter_ents = states
                | selectattr('entity_id','match','^(calendar|todo)\\.')
                | map(attribute='entity_id') | list -%}
              {%- set targets = intersect(hot_tub_ents, filter_ents) -%}
              {{ targets | tojson }}
            spa_esp_interface: >-
              {%- set temp_ents = label_entities('temperature') -%}
              {%- set hot_tub_ents = label_entities('hot_tub') -%}
              {%- set hot_tub_current_temp_sensor = intersect(hot_tub_ents, temp_ents) | list | first -%}
              {{
                {
                  "hot_tub_entities": device_entities(device_id(hot_tub_current_temp_sensor)) | default([]),
                  "config_entry_id": config_entry_id(hot_tub_current_temp_sensor) | default(''),
                  "domain": config_entry_attr(config_entry_id(hot_tub_current_temp_sensor), 'domain') | default(''),
                  "title": config_entry_attr(config_entry_id(hot_tub_current_temp_sensor), 'title') | default(''),
                  "state": config_entry_attr(config_entry_id(hot_tub_current_temp_sensor), 'state') | string | default(''),
                  "source": config_entry_attr(config_entry_id(hot_tub_current_temp_sensor), 'source') | default(''),
                  "disabled_by": config_entry_attr(config_entry_id(hot_tub_current_temp_sensor), 'disabled_by') | default('')
                } | tojson
              }}
            spa_info: >-
              {{
                {
                  "manufacturer": "Watkins",
                  "brand": "Caldera Spas",
                  "model": "Utopia",
                  "trim": "Florence",
                  "seats": 6,
                  "total_jets": 46,
                  "target_temp": 102,
                  "temp_units": "F",
                  "water_volume": 360,
                  "chemistry": "saltwater",
                  "salt_generator": "FreshWater IQ 2020",
                  "orientation": "front=north(house), left=east(deck), right=west",
                  "pumps": {"jet_pump_2": "left/east — EcstaSeat + waterfall, dual-speed", "jet_pump_1": "right/west — LumbarSsage, single-speed"},
                  "more_info": "Consult hot_tub_manager drawer in Dojo for detailed instructions."
                }
              }}
            salt_result: >-
              {{
                {
                  "chemical": "salt",
                  "product": "Freshwater Spa Salt",
                  "provided": salt_ppm,
                  "measured": states("sensor.calderaspas_hot_tub_iq_salt") | default(""),
                  "target_min": 1500,
                  "target_max": 2250,
                  "recommendation": (
                    "Provide measurement to check salt levels."
                    if salt_ppm is none else
                    "Add approximately " ~ ((2250 - salt_ppm) / 250) | round(1) ~ " cup(s) of spa salt to the filter. Run jets on high for 5 minutes, then retest. Sneak up on it."
                    if salt_ppm < 2250 else
                    "Salt is too high. Drain and refill partially."
                    if salt_ppm > 2750 else
                    "Salt level is ideal."
                  )
                }
              }}
            chlorine_result: >-
              {{
                {
                  "chemical": "free_chlorine",
                  "provided": free_chlorine_ppm,
                  "measured": {
                    "chlorine": states("sensor.calderaspas_hot_tub_iq_chlorine") | default(""),
                    "ORP": states("sensor.calderaspas_hot_tub_iq_orp") | default("")
                  },
                  "target_min": 1,
                  "target_max": 5,
                  "recommendation": (
                    "Provide measurement to check."
                    if free_chlorine_ppm is none else
                    "Add 1 cap of chlorine sanitizer to the skimmer filter housing with jets on high."
                    if free_chlorine_ppm < 1 else
                    "Chlorine too high. Leave cover open for 15 minutes and retest."
                    if free_chlorine_ppm > 5 else
                    "Chlorine is ideal."
                  )
                }
              }}
            ph_result: >-
              {{
                {
                  "chemical": "ph",
                  "provided": ph,
                  "measured": states("sensor.calderaspas_hot_tub_iq_ph") | default(""),
                  "target_min": 7.2,
                  "target_max": 7.8,
                  "recommendation": (
                    "Provide measurement to check."
                    if ph is none else
                    "Add ~" ~ ((7.2 - ph) / 0.2) | round(0, 'ceil') ~ " tbsp pH Increaser sodium carbonate. Do not adjust for 48h after TA correction."
                    if ph < 7.2 else
                    "Add ~" ~ ((ph - 7.5) * 6) | round(1) ~ " tbsp pH Down (sodium bisulfate / dry acid) to the filter area with jets on high. Retest in 30 min. Sneak up on it."
                    if ph > 7.8 else
                    "pH is ideal."
                  )
                }
              }}
            alk_result: >-
              {{
                {
                  "chemical": "alkalinity",
                  "provided": alkalinity_ppm,
                  "target_min": 40,
                  "target_max": 120,
                  "recommendation": (
                    "Provide measurement to check."
                    if alkalinity_ppm is none else
                    "Add ~" ~ ((80 - alkalinity_ppm) / 10) | round(0, 'ceil') ~ " tbsp baking soda (sodium bicarbonate) to raise toward 80 ppm. Always adjust TA before pH."
                    if alkalinity_ppm < 40 else
                    "Reduce TA with pH Down (dry acid) in small increments or partial drain. Do not adjust pH for 48h after TA correction."
                    if alkalinity_ppm > 120 else
                    "Alkalinity is ideal."
                  )
                }
              }}
            hardness_result: >-
              {{
                {
                  "chemical": "hardness",
                  "provided": hardness_ppm,
                  "target_min": 25,
                  "target_max": 75,
                  "recommendation": (
                    "Provide measurement to check."
                    if hardness_ppm is none else
                    "Use Vanishing Act XL pillow near the filter. Retest in 24h."
                    if hardness_ppm > 75 else
                    "Calcium too low. Add hardness increaser in small amounts."
                    if hardness_ppm < 25 else
                    "Hardness is acceptable for a saltwater spa."
                  )
                }
              }}
            chloramine_trap_suspected: >-
              {%- set orp_val = states('sensor.calderaspas_hot_tub_iq_orp') | float(-1) -%}
              {%- set orp_ok = orp_val >= 600 -%}
              {%- set ph_elevated = ph is not none and ph >= 7.5 -%}
              {%- set chl_at_floor = free_chlorine_ppm is not none and free_chlorine_ppm <= 1.2 -%}
              {{ orp_ok and ph_elevated and chl_at_floor }}
            chloramine_warning: >-
              {%- if chloramine_trap_suspected | bool -%}
              Chloramine trap likely detected. The sealed motorized cover may have allowed
              chloramines to accumulate in the headspace, suppressing free chlorine readings
              and driving pH up (ORP is normal, meaning sanitizer is actually active —
              the strip reading is unreliable). Open and vent the cover for ~30 minutes,
              then retest before making any chemistry adjustments.
              {%- else -%}{%- endif -%}
            final_result: >-
              {{
                {
                  "action": "chemistry",
                  "spa_info": spa_info | default({}),
                  "chloramine_trap": {
                    "suspected": chloramine_trap_suspected | bool,
                    "warning": chloramine_warning | trim
                  },
                  "salt": salt_result | default({}),
                  "chlorine": chlorine_result | default({}),
                  "ph": ph_result | default({}),
                  "alkalinity": alk_result | default({}),
                  "hardness": hardness_result | default({})
                }
              }}
        - stop: Chemistry complete
          response_variable: final_result

      default:
      - variables:
          final_result: >-
            {{
              {"error": "unknown_action",
               "message": "Unknown action: " ~ _effective_action ~ ". Valid: status, lights, jets, audio, temperature, cover, chemistry.",
               "valid_actions": ["status","lights","jets","audio","temperature","cover","chemistry"]}
            }}
      - stop: Unknown action
        response_variable: final_result
