###############################################################################
# ZenOS-AI — One-shot repair: family cabinet VolumeInfo rogue key cleanup
#
# Problem:
#   Three rogue keys exist on the family cabinet after pre-guard writes:
#     AI_Cabinet_VolumeInfo      → stomped JSON string {"flags": {"gc_eligible": false}}
#     ai_cabinet_volumeinfo      → slugified copy — THIS IS THE GOOD DATA
#     _ai_cabinet_volumeinfo     → underscore variant (unknown content)
#
# What this script does:
#   1. Reads ai_cabinet_volumeinfo (the good VolumeInfo dict)
#   2. Validates it has a real id before touching anything
#   3. Writes it back to AI_Cabinet_VolumeInfo with proper {value: {}} wrapper
#      via set_variable_legacy (direct — does NOT go through FileCabinet)
#   4. Clears _ai_cabinet_volumeinfo via set_variable_legacy (direct —
#      FileCabinet blocks _ keys including delete, so must bypass it here)
#   5. Deletes ai_cabinet_volumeinfo via FileCabinet delete action
#
# Safety:
#   - confirm_action: true required (script exits otherwise)
#   - dry_run: true logs all planned writes without executing them
#   - Validates good data BEFORE any write — aborts if id is empty
#   - Step 3 fires first; steps 4+5 only run if step 3 returns confirmed: true
#
# Usage:
#   1. Add this file to your packages directory temporarily
#   2. Reload scripts (or full reload)
#   3. Run zen_repair_fam_cab_volumeinfo from Developer Tools > Actions
#      with confirm_action: true (and dry_run: true first to verify)
#   4. Remove this file after repair is complete
#
# Target: sensor.zen_default_family_cabinet_resolved
#   Override with cabinet_entity field if your setup differs.
###############################################################################

script:
  zen_repair_fam_cab_volumeinfo:
    alias: "ZenOS Repair: Family Cabinet VolumeInfo Rogue Keys"
    description: >-
      One-shot repair for the three-rogue-key VolumeInfo incident on the family
      cabinet. Reads good data from ai_cabinet_volumeinfo, writes it back to
      AI_Cabinet_VolumeInfo, clears the two rogue keys. Requires confirm_action: true.
    fields:
      confirm_action:
        name: Confirm Action
        description: "Must be true — script exits without making any changes otherwise."
        required: true
        default: false
        selector:
          boolean:
      dry_run:
        name: Dry Run
        description: "If true, logs all planned writes but does NOT execute them. Run dry first."
        required: false
        default: true
        selector:
          boolean:
      cabinet_entity:
        name: Cabinet Entity
        description: >-
          Target family cabinet sensor entity_id. Defaults to
          sensor.zen_default_family_cabinet_resolved. Override only if your
          family cabinet resolves to a different entity.
        required: false
        selector:
          entity:
            domain: sensor
    mode: single
    sequence:

    # ── Guard: confirmation required ─────────────────────────────────────────
    - variables:
        confirm_action: "{{ confirm_action | default(false) | bool }}"
        dry_run: "{{ dry_run | default(true) | bool }}"
    - if: "{{ not confirm_action }}"
      then:
        - variables:
            _abort:
              status: aborted
              reason: "confirm_action not set. Set confirm_action: true to proceed. Use dry_run: true first."
        - stop: Confirmation required
          response_variable: _abort

    # ── Resolve cabinet entity ────────────────────────────────────────────────
    - variables:
        _target_cab: >-
          {%- set _ce = cabinet_entity | default('') | trim -%}
          {%- if _ce != '' -%}
            {{ _ce }}
          {%- else -%}
            {{ states('sensor.zen_default_family_cabinet_resolved') }}
          {%- endif -%}

    - if: "{{ _target_cab in ['', 'unknown', 'unavailable'] }}"
      then:
        - variables:
            _abort:
              status: aborted
              reason: "Could not resolve family cabinet entity. Pass cabinet_entity explicitly."
              resolved: "{{ _target_cab }}"
        - stop: Cabinet not resolved
          response_variable: _abort

    # ── Read all three rogue keys ─────────────────────────────────────────────
    - variables:
        _cab_vars: "{{ state_attr(_target_cab, 'variables') | default({}, true) }}"
        _cab_vars_mapped: "{{ _cab_vars if _cab_vars is mapping else {} }}"

    # The GOOD key — slugified, flat dict, no {value:} wrapper
    - variables:
        _good_raw: "{{ _cab_vars_mapped.get('ai_cabinet_volumeinfo', {}) }}"
        _good_mapped: "{{ _good_raw if _good_raw is mapping else (_good_raw | from_json if _good_raw is string else {}) }}"
        _good_id: "{{ _good_mapped.get('id', '') | trim }}"

    # The STOMPED key — should be a JSON string {"flags": {"gc_eligible": false}}
    - variables:
        _stomped_raw: "{{ _cab_vars_mapped.get('AI_Cabinet_VolumeInfo', {}) }}"
        _stomped_str: "{{ _stomped_raw if _stomped_raw is string else (_stomped_raw | tojson) }}"

    # The UNDERSCORE key — unknown content, log it
    - variables:
        _under_raw: "{{ _cab_vars_mapped.get('_ai_cabinet_volumeinfo', {}) }}"
        _under_str: "{{ _under_raw if _under_raw is string else (_under_raw | tojson if _under_raw is mapping else '') }}"

    # ── Validate good data has a real id ─────────────────────────────────────
    - if: "{{ _good_id == '' }}"
      then:
        - variables:
            _abort:
              status: aborted
              reason: >-
                ai_cabinet_volumeinfo exists but has no 'id' field — not safe to
                proceed. Check the cabinet manually before re-running.
              ai_cabinet_volumeinfo_content: "{{ _good_mapped }}"
        - stop: No valid id in good data
          response_variable: _abort

    # ── Log planned operations ────────────────────────────────────────────────
    - action: system_log.write
      data:
        level: warning
        message: >-
          zen_repair_fam_cab_volumeinfo: {{ 'DRY RUN — no writes' if dry_run else 'LIVE RUN' }}.
          Target: {{ _target_cab }}.
          Good id: {{ _good_id }}.
          Stomped AI_Cabinet_VolumeInfo: {{ _stomped_str | truncate(120) }}.
          Underscore _ai_cabinet_volumeinfo: {{ _under_str | truncate(120) }}.
          Plan:
            (1) write good data → AI_Cabinet_VolumeInfo (with value wrapper),
            (2) clear _ai_cabinet_volumeinfo via set_variable_legacy,
            (3) delete ai_cabinet_volumeinfo via FileCabinet.

    # ── DRY RUN exit ─────────────────────────────────────────────────────────
    - if: "{{ dry_run }}"
      then:
        - variables:
            _dry_result:
              status: dry_run
              message: "Dry run complete — no writes made. Check system log for planned operations."
              target_cabinet: "{{ _target_cab }}"
              good_id: "{{ _good_id }}"
              good_data_keys: "{{ _good_mapped.keys() | list }}"
              stomped_value: "{{ _stomped_str }}"
              underscore_value: "{{ _under_str }}"
        - stop: Dry run complete
          response_variable: _dry_result

    # ── STEP 1: Write good VolumeInfo → AI_Cabinet_VolumeInfo ─────────────────
    # Direct set_variable_legacy — does NOT go through FileCabinet.
    # Writes with {value: {}} wrapper so FG-38 read chain unwraps correctly.
    - event: set_variable_legacy
      event_data:
        key: AI_Cabinet_VolumeInfo
        value: "{{ _good_mapped }}"
        volume_entity: "{{ _target_cab }}"
        set_timestamp: true
        # set_timestamp: true → sensor stores {value: <what_you_passed>, timestamp: ...}
        # DO NOT pre-wrap with {value: ...} — that creates double-nesting.

    # Wait for state to settle, then verify
    - delay: "00:00:01"
    - variables:
        _verify_vars: "{{ state_attr(_target_cab, 'variables') | default({}, true) }}"
        _verify_vars_mapped: "{{ _verify_vars if _verify_vars is mapping else {} }}"
        _verify_raw: "{{ _verify_vars_mapped.get('AI_Cabinet_VolumeInfo', {}) }}"
        _verify_raw_mapped: "{{ _verify_raw if _verify_raw is mapping else (_verify_raw | from_json if _verify_raw is string else {}) }}"
        _verify_val_raw: "{{ _verify_raw_mapped.get('value', _verify_raw_mapped) }}"
        _verify_val: "{{ _verify_val_raw if _verify_val_raw is mapping else (_verify_val_raw | from_json if _verify_val_raw is string else {}) }}"
        _verify_id: "{{ _verify_val.get('id', '') | trim }}"
        _step1_ok: "{{ _verify_id == _good_id }}"

    - if: "{{ not _step1_ok }}"
      then:
        - variables:
            _abort:
              status: error
              reason: >-
                Step 1 FAILED — AI_Cabinet_VolumeInfo write did not verify.
                Expected id: {{ _good_id }}, got: {{ _verify_id }}.
                Stopping — ai_cabinet_volumeinfo and _ai_cabinet_volumeinfo NOT cleaned up.
              expected_id: "{{ _good_id }}"
              got_id: "{{ _verify_id }}"
        - action: system_log.write
          data:
            level: error
            message: "zen_repair_fam_cab_volumeinfo: Step 1 FAILED. VolumeInfo write did not verify. Aborting cleanup."
        - stop: Step 1 failed — aborting
          response_variable: _abort

    - action: system_log.write
      data:
        level: info
        message: "zen_repair_fam_cab_volumeinfo: Step 1 OK — AI_Cabinet_VolumeInfo restored, id={{ _good_id }}."

    # ── STEP 2: Clear _ai_cabinet_volumeinfo via set_variable_legacy ──────────
    # FileCabinet blocks _ keys (including delete). Must go direct.
    # Writing {} effectively empties the drawer. Redirector handles the write.
    - event: set_variable_legacy
      event_data:
        key: _ai_cabinet_volumeinfo
        value: "{{ {'_repaired': true, 'cleared_by': 'zen_repair_fam_cab_volumeinfo', 'timestamp': now().isoformat()} }}"
        volume_entity: "{{ _target_cab }}"
        set_timestamp: true

    - action: system_log.write
      data:
        level: info
        message: "zen_repair_fam_cab_volumeinfo: Step 2 OK — _ai_cabinet_volumeinfo cleared (marked repaired)."

    # ── STEP 3: Delete ai_cabinet_volumeinfo via FileCabinet ─────────────────
    # Normal FileCabinet delete — ai_cabinet_volumeinfo has no _ prefix so it
    # goes through normally.
    - action: script.zen_dojotools_filecabinet
      data:
        action_type: delete
        volume_entity_id: "{{ _target_cab }}"
        key: ai_cabinet_volumeinfo
        force_action: true
      response_variable: _step3_result

    - action: system_log.write
      data:
        level: info
        message: >-
          zen_repair_fam_cab_volumeinfo: Step 3 — FileCabinet delete ai_cabinet_volumeinfo.
          Result: {{ _step3_result }}.

    # ── Final response ────────────────────────────────────────────────────────
    - variables:
        _final:
          status: success
          message: "Family cabinet VolumeInfo repaired. Three rogue keys resolved."
          target_cabinet: "{{ _target_cab }}"
          restored_id: "{{ _good_id }}"
          step1_AI_Cabinet_VolumeInfo: "restored — id={{ _good_id }}"
          step2__ai_cabinet_volumeinfo: "cleared (marked repaired)"
          step3_ai_cabinet_volumeinfo: "{{ _step3_result.get('status', 'unknown') if _step3_result is mapping else _step3_result }}"
          next_step: >-
            Run zen_admintools_cabinetadmin_stamp on {{ _target_cab }} to verify
            VolumeInfo is fully correct and cabinet_ro flag is properly set.
    - stop: Repair complete
      response_variable: _final
