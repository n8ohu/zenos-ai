###############################################################################
# ZenOS-AI — Maintenance Scripts
# Version: 4.5.6
#
# ONE-TIME REPAIR SCRIPTS — NOT intended for ongoing use or LLM exposure.
# Do not add these to MCP, dojotools, or any AI-accessible interface.
# Run manually via HA Developer Tools > Services, then retire.
#
# Scripts in this file:
#   zen_maint_4_5_6_identity_family_repair
#     Target: Installs that shipped before v4.5.6 and never had the default
#             family cabinet wired into the household identity graph.
#     Safe:   Idempotent — underlying identity ops are no-ops if already wired.
#     After:  Run once, verify identity manifest, done. Script can be left in
#             place (no-op on re-run) or removed after confirmation.
#
#   zen_maint_4_5_6_stamp_cab_guid
#     Target: Any single cabinet with an empty id field in VolumeInfo.
#     Safe:   Idempotent — no-op if id is already present.
#     Use:    Call directly to stamp one cab, or called by roster_guid_repair.
#     After:  Verify cabinet state re-derived correctly after stamp.
#
#   zen_maint_4_5_6_roster_guid_repair
#     Target: Installs where default cabs (household/family/user/ai_user) have
#             empty id in VolumeInfo — causes empty guid in roster entries.
#             Affects: pre-provisioner installs (Nathan, Phil, Zach).
#     Safe:   Reads current member lists dynamically — no hardcoded topology.
#             Stamp is idempotent. Re-wire is a clean remove+re-add cycle.
#     After:  Verify membership tree shows populated guids. Run once per install.
#
###############################################################################

script:

  zen_maint_4_5_6_identity_family_repair:
    sequence:
    # Resolve canonical cabinets
    - variables:
        _fam_cab: "{{ states('sensor.zen_default_family_cabinet_resolved') }}"
        _user_cab: "{{ states('sensor.zen_default_user_cabinet_resolved') }}"
        _ai_cab: "{{ states('sensor.zen_default_ai_user_cabinet_resolved') }}"
    - if: "{{ _fam_cab in ['', 'unknown', 'unavailable'] }}"
      then:
        - variables:
            result:
              status: error
              message: "Default family cabinet not resolved. Ensure sensor.zen_default_family_cabinet_resolved is online."
        - stop: Family cabinet not available
          response_variable: result
    # Wire family into household graph (idempotent — safe to re-run)
    - action: script.zen_dojotools_identity
      data:
        mode: household_add_family
        family_entity: "{{ _fam_cab }}"
    - if: "{{ _user_cab not in ['', 'unknown', 'unavailable'] }}"
      then:
        - action: script.zen_dojotools_identity
          data:
            mode: family_add_member
            family_entity: "{{ _fam_cab }}"
            member_entity: "{{ _user_cab }}"
            member_type: user
    - if: "{{ _ai_cab not in ['', 'unknown', 'unavailable'] }}"
      then:
        - action: script.zen_dojotools_identity
          data:
            mode: family_add_member
            family_entity: "{{ _fam_cab }}"
            member_entity: "{{ _ai_cab }}"
            member_type: ai_user
    - action: script.zen_dojotools_identity
      data:
        mode: build_identity_manifest
    - variables:
        result:
          status: ok
          message: "4.5.6 identity family graph repair complete."
          family_cabinet: "{{ _fam_cab }}"
          user_cabinet: "{{ _user_cab }}"
          ai_user_cabinet: "{{ _ai_cab }}"
          timestamp: "{{ now().isoformat() }}"
    - stop: Repair complete
      response_variable: result
    alias: "[MAINT 4.5.6] Identity Family Graph Repair"
    description: >-
      ONE-TIME REPAIR — v4.5.6 patch.
      Wires the default family cabinet into the household identity graph for
      installs that bootstrapped before v4.5.6. Calls household_add_family +
      family_add_member for default user and AI user, then rebuilds manifest.
      Idempotent. Do not expose to LLM or AI tools.
    icon: mdi:wrench

  zen_maint_4_5_6_stamp_cab_guid:
    fields:
      cabinet_entity:
        description: Cabinet entity ID to stamp a GUID on.
        required: true
    sequence:
    - variables:
        _cab: "{{ cabinet_entity | trim }}"
    - if: "{{ _cab in ['', 'unknown', 'unavailable'] }}"
      then:
        - variables:
            result:
              status: error
              message: "cabinet_entity is required."
        - stop: Missing cabinet_entity
          response_variable: result
    # Read current VolumeInfo
    - variables:
        _vi_raw: >-
          {%- set _v = state_attr(_cab, 'variables') | default({}, true) -%}
          {%- set _v = _v if _v is mapping else {} -%}
          {%- set _vi = _v.get('AI_Cabinet_VolumeInfo', {}) -%}
          {%- set _vi = _vi.get('value', _vi) if _vi is mapping else {} -%}
          {%- set _vi = _vi | from_json if _vi is string else _vi -%}
          {{ _vi | tojson }}
    - variables:
        _existing_id: >-
          {%- set _vi = _vi_raw | from_json if _vi_raw is string else (_vi_raw if _vi_raw is mapping else {}) -%}
          {{ _vi.get('id', '') | string | trim }}
    - if: "{{ _existing_id != '' }}"
      then:
        - variables:
            result:
              status: ok
              was_stamped: false
              guid: "{{ _existing_id }}"
              cabinet_entity: "{{ _cab }}"
              message: "GUID already present — no action taken."
        - stop: Already stamped
          response_variable: result
    # Generate v4-style UUID (all ranges capped at 65536 — HA sandbox MAX_RANGE=100000)
    - variables:
        _new_guid: >-
          {%- set p1a = range(0, 65536) | random -%}
          {%- set p1b = range(0, 65536) | random -%}
          {%- set p2  = range(0, 65536) | random -%}
          {%- set p3  = range(0, 4096)  | random -%}
          {%- set p4  = range(0, 4096)  | random -%}
          {%- set p5  = range(0, 65536) | random -%}
          {%- set p6a = range(0, 65536) | random -%}
          {%- set p6b = range(0, 65536) | random -%}
          {{ '%04x%04x-%04x-4%03x-8%03x-%04x%04x%04x' | format(p1a, p1b, p2, p3, p4, p5, p6a, p6b) }}
    # Patch id into VolumeInfo and write back via set_variable_legacy (same path as admintools)
    - variables:
        _vi_patched: >-
          {%- set _vi = _vi_raw | from_json if _vi_raw is string else (_vi_raw if _vi_raw is mapping else {}) -%}
          {{ (_vi | combine({'id': _new_guid})) | tojson }}
    - event: set_variable_legacy
      event_data:
        key: AI_Cabinet_VolumeInfo
        value: "{{ _vi_patched }}"
        set_timestamp: true
        volume_entity: "{{ _cab }}"
        _cabinetadmin_init: true
        force: true
    # Re-derive cabinet state
    - event: zen_event
      event_data:
        kind: cabinet_boot_touch
        component: maint_4_5_6
        severity: info
        summary: "Post-stamp boot touch for {{ _cab }}"
        metadata:
          volume_entity: "{{ _cab }}"
    - delay:
        milliseconds: 500
    - variables:
        result:
          status: ok
          was_stamped: true
          guid: "{{ _new_guid }}"
          cabinet_entity: "{{ _cab }}"
          message: "GUID stamped successfully."
    - stop: Stamp complete
      response_variable: result
    alias: "[MAINT 4.5.6] Stamp Cabinet GUID"
    description: >-
      ONE-TIME REPAIR — v4.5.6 patch.
      Stamps a new id field into a cabinet's VolumeInfo if the id is empty.
      Idempotent — no-op if id already present. Used standalone or called by
      zen_maint_4_5_6_roster_guid_repair. Do not expose to LLM or AI tools.
    icon: mdi:identifier

  zen_maint_4_5_6_roster_guid_repair:
    sequence:
    # Resolve canonical cabs
    - variables:
        _hh_cab: "{{ states('sensor.zen_default_household_cabinet_resolved') }}"
        _fam_cab: "{{ states('sensor.zen_default_family_cabinet_resolved') }}"
        _user_cab: "{{ states('sensor.zen_default_user_cabinet_resolved') }}"
        _ai_cab: "{{ states('sensor.zen_default_ai_user_cabinet_resolved') }}"
    - if: >-
        {{ [_hh_cab, _fam_cab, _user_cab, _ai_cab]
           | select('in', ['', 'unknown', 'unavailable']) | list | count > 0 }}
      then:
        - variables:
            result:
              status: error
              message: "One or more default cabs not resolved. Check resolvers."
        - stop: Resolver error
          response_variable: result
    # Read current family and household member lists (dynamic — works for any topology)
    - variables:
        _fam_members_raw: >-
          {%- set _v = state_attr(_fam_cab, 'variables') | default({}, true) -%}
          {%- set _v = _v if _v is mapping else {} -%}
          {%- set _m = _v.get('members', {}) -%}
          {%- set _m = _m if _m is mapping else (_m | from_json if _m is string else {}) -%}
          {%- set _m = _m.get('value', _m) if _m is mapping else {} -%}
          {{ _m | tojson }}
        _hh_members_raw: >-
          {%- set _v = state_attr(_hh_cab, 'variables') | default({}, true) -%}
          {%- set _v = _v if _v is mapping else {} -%}
          {%- set _m = _v.get('members', {}) -%}
          {%- set _m = _m if _m is mapping else (_m | from_json if _m is string else {}) -%}
          {%- set _m = _m.get('value', _m) if _m is mapping else {} -%}
          {{ _m | tojson }}
    - variables:
        _fam_users: >-
          {%- set _m = _fam_members_raw | from_json if _fam_members_raw is string else (_fam_members_raw if _fam_members_raw is mapping else {}) -%}
          {{ _m.get('users', []) | map(attribute='entity_id') | list | tojson }}
        _fam_ai_users: >-
          {%- set _m = _fam_members_raw | from_json if _fam_members_raw is string else (_fam_members_raw if _fam_members_raw is mapping else {}) -%}
          {{ _m.get('ai_users', []) | map(attribute='entity_id') | list | tojson }}
        _hh_users: >-
          {%- set _m = _hh_members_raw | from_json if _hh_members_raw is string else (_hh_members_raw if _hh_members_raw is mapping else {}) -%}
          {{ _m.get('users', []) | map(attribute='entity_id') | list | tojson }}
        _hh_ai_users: >-
          {%- set _m = _hh_members_raw | from_json if _hh_members_raw is string else (_hh_members_raw if _hh_members_raw is mapping else {}) -%}
          {{ _m.get('ai_users', []) | map(attribute='entity_id') | list | tojson }}
    # Phase 1: Stamp GUIDs on all 4 default cabs (idempotent — skips if already present)
    - action: script.zen_maint_4_5_6_stamp_cab_guid
      data:
        cabinet_entity: "{{ _hh_cab }}"
      response_variable: _stamp_hh
    - action: script.zen_maint_4_5_6_stamp_cab_guid
      data:
        cabinet_entity: "{{ _fam_cab }}"
      response_variable: _stamp_fam
    - action: script.zen_maint_4_5_6_stamp_cab_guid
      data:
        cabinet_entity: "{{ _user_cab }}"
      response_variable: _stamp_user
    - action: script.zen_maint_4_5_6_stamp_cab_guid
      data:
        cabinet_entity: "{{ _ai_cab }}"
      response_variable: _stamp_ai
    # Phase 2: Teardown — remove all roster entries (so re-add bakes in new GUIDs)
    - repeat:
        for_each: "{{ _fam_users | from_json }}"
        sequence:
          - action: script.zen_dojotools_identity
            data:
              mode: family_remove_member
              family_entity: "{{ _fam_cab }}"
              member_entity: "{{ repeat.item }}"
    - repeat:
        for_each: "{{ _fam_ai_users | from_json }}"
        sequence:
          - action: script.zen_dojotools_identity
            data:
              mode: family_remove_member
              family_entity: "{{ _fam_cab }}"
              member_entity: "{{ repeat.item }}"
    - action: script.zen_dojotools_identity
      data:
        mode: household_remove_family
        family_entity: "{{ _fam_cab }}"
    - repeat:
        for_each: "{{ _hh_users | from_json }}"
        sequence:
          - action: script.zen_dojotools_identity
            data:
              mode: household_remove_member
              member_entity: "{{ repeat.item }}"
              member_type: user
    - repeat:
        for_each: "{{ _hh_ai_users | from_json }}"
        sequence:
          - action: script.zen_dojotools_identity
            data:
              mode: household_remove_member
              member_entity: "{{ repeat.item }}"
              member_type: ai_user
    # Phase 3: Re-wire — add back in correct order, now with GUIDs in VolumeInfo
    - action: script.zen_dojotools_identity
      data:
        mode: household_add_family
        family_entity: "{{ _fam_cab }}"
    - repeat:
        for_each: "{{ _fam_users | from_json }}"
        sequence:
          - action: script.zen_dojotools_identity
            data:
              mode: family_add_member
              family_entity: "{{ _fam_cab }}"
              member_entity: "{{ repeat.item }}"
              member_type: user
    - repeat:
        for_each: "{{ _fam_ai_users | from_json }}"
        sequence:
          - action: script.zen_dojotools_identity
            data:
              mode: family_add_member
              family_entity: "{{ _fam_cab }}"
              member_entity: "{{ repeat.item }}"
              member_type: ai_user
    - repeat:
        for_each: "{{ _hh_users | from_json }}"
        sequence:
          - action: script.zen_dojotools_identity
            data:
              mode: household_add_member
              member_entity: "{{ repeat.item }}"
              member_type: user
    - repeat:
        for_each: "{{ _hh_ai_users | from_json }}"
        sequence:
          - action: script.zen_dojotools_identity
            data:
              mode: household_add_member
              member_entity: "{{ repeat.item }}"
              member_type: ai_user
    # Phase 4: Rebuild manifest
    - action: script.zen_dojotools_identity
      data:
        mode: build_identity_manifest
    - variables:
        result:
          status: ok
          message: "4.5.6 roster GUID repair complete."
          stamps:
            household: "{{ _stamp_hh }}"
            family: "{{ _stamp_fam }}"
            user: "{{ _stamp_user }}"
            ai_user: "{{ _stamp_ai }}"
          timestamp: "{{ now().isoformat() }}"
    - stop: Repair complete
      response_variable: result
    alias: "[MAINT 4.5.6] Roster GUID Repair"
    description: >-
      ONE-TIME REPAIR — v4.5.6 patch.
      For installs where default cabs (household/family/user/ai_user) have empty
      id in VolumeInfo, causing empty guid fields in roster entries. Stamps GUIDs
      on all 4 cabs, then does a full remove+re-add cycle on all family and
      household members so roster entries get GUIDs baked in. Reads current
      member lists dynamically — safe for any topology. Idempotent stamp step.
      Do not expose to LLM or AI tools.
    icon: mdi:wrench
