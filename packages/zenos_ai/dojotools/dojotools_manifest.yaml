###############################################################################
# ZenOS-AI DojoTools: Manifest
# Version: 4.5.5
#
# Scripts:
#   zen_dojotools_manifest — Runtime health and volume manifest (v4.5.x)
#
# MIGRATED FROM: scripts.yaml (2026-03-06)
#
# FG-14 FIXED: 3x boolean: {} selectors stripped on migration
#
# === UAT PASS — 2026-03-06 ===
# Auditor: Claude (Anthropic, Sonnet 4.6)
# HALMark: 0.9.11-draft — PASS Level 3 (Steward Safe) — no remaining FG hits
# UAT Cases: 1/1 PASS
#
# zen_dojotools_manifest:
#   read action → 10 volumes returned, all healthy, full metadata clean ✓
#
# config check → go; script reload → clean ✓
# ==============================
###############################################################################

script:
  zen_dojotools_manifest:
    alias: Zen DojoTools Manifest
    description: 'Zen DojoTools Manifest (4.5.x) Sandbox Safe! Runtime-only health,
      zero persistent health storage. Authoritative manifest  scanner for AI_Cabinet
      volumes. Extracts users, metadata, context, capacity, access flags, ACLs, drawers.
      Writes ONLY the compiled manifest to the Zen Default Household cabinet.
  
      '
    icon: mdi:home-map-marker
    fields:
      show_hidden:
        selector:
          boolean:
        name: show hidden
        description: Include hidden/system volumes in results?
      show_stacks:
        selector:
          boolean:
        name: Show Stacks
        description: Include online_unmounted (stacks) cabinets in results. Default false.
        default: false
      extended:
        selector:
          boolean:
        name: Extended
        description: 'Return full metadata (context, labels, timestamps, ACLs, drawer
          index, health detail). Default: compact (entity_id, friendly_name, id, drawer
          count, capacity %, status, writeable).'
        default: false
      caller_token:
        name: Caller Token
        required: false
        default: ''
        selector:
          text:
        description: 'Reserved. Governance stub — echoed in response. SP1 enforcement
          not yet active.'
    sequence:
    # --------------------------------------------------------------
    # Always normalize User/AI inputs so we don't have to react JIT
    # --------------------------------------------------------------
    - variables:
        caller_token: "{{- caller_token | default('') -}}"
    - variables:
        zen_default_house_cab: "{{- states('sensor.zen_default_household_cabinet_resolved') -}}"
        manifest_key: zen_library_manifest
        read_hidden: "{{- show_hidden | default(false) -}}"
        read_extended: "{{- extended | default(false) -}}"
        read_stacks: "{{- show_stacks | default(false) -}}"
        hide_labels:
        - hidden_volume
        - read_only_volume
        - system_volume
        - hidden_cabinet
        - read_only_cabinet
        - system_cabinet
        exempt_labels:
        - internal
        - hidden
        - system
        ignore_label_prefixes:
        - _
        - .
        always_hide_drawers:
        - AI_Cabinet_VolumeInfo
        max_chars: 131072
        warn_threshold: 0.8
        controller_schema: 1
        # @todo - no backward compat with id vs. guid
        # @todo - Why on earth is this being created as a string with all these tojson statements????
        manifest: >
          {%- macro compute_health(info, pct_chars, writeable, readable) -%}
            {%- set expected_guid = info.get('id') -%}
            {%- set actual_guid   = info.get('id') -%}
            {%- set guid_mismatch = (expected_guid != actual_guid) -%}
            {%- set storage_warning = (pct_chars >= (warn_threshold * 100)) -%}
          
            {%- set status = 'ready' -%}
            {%- if guid_mismatch -%}
              {%- set status = 'error' -%}
            {%- elif storage_warning -%}
              {%- set status = 'warning' -%}
            {%- endif -%}
          
            {
              "status": "{{- status -}}",
              "guid_mismatch": {{- guid_mismatch | tojson -}},
              "storage_warning": {{- storage_warning | tojson -}},
              "writeable": {{- writeable | tojson -}},
              "readable": {{- readable | tojson -}}
            }
          {%- endmacro -%}
          
          {%- macro build_drawer_index(vars) -%}
            {%- if vars is mapping 
                and vars.get('_label_index') is mapping
                and vars['_label_index'].get('value') is defined 
            -%}
              {{- vars['_label_index']['value'] | tojson -}}
            {%- else -%}
              {{- {} | tojson -}}
            {%- endif -%}
          {%- endmacro -%}
          
          
          {%- macro acls_by_category(info) -%}
            {%- set raw_acls = info.get('acls', {}) -%}
            {%- set ns = namespace(by_cat={}, nested=[]) -%}
          
            {%- for category, entries in raw_acls.items() if entries is sequence -%}
          
              {%- set ns.nested = [] -%}
          
              {%- set direct = entries | selectattr('entity_guid','defined') | map(attribute='entity_guid') | list -%}
              {%- set family = entries | selectattr('family_guid','defined') | map(attribute='family_guid') | list -%}
          
              {%- for entry in entries if entry is mapping -%}
                {%- for k,v in entry.items() if v is mapping -%}
                  {%- if 'entity_guid' in v -%}
                    {%- set ns.nested = ns.nested + [v.entity_guid] -%}
                  {%- endif -%}
                  {%- if 'family_guid' in v -%}
                    {%- set ns.nested = ns.nested + [v.family_guid] -%}
                  {%- endif -%}
                  {%- if 'household_guid' in v -%}
                    {%- set ns.nested = ns.nested + [v.household_guid] -%}
                  {%- endif -%}
                {%- endfor -%}
              {%- endfor -%}
          
          
              {%- set merged = (direct + family + ns.nested) | reject('none') | unique | list -%}
            
            
              {%- if merged | length > 0 -%}
                {%- set ns.by_cat = ns.by_cat | combine({ category: merged }) -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.by_cat | tojson -}}
          
          {%- endmacro -%}
          
          {%- set result = namespace(data={}) -%}
          {%- for ent in states.sensor | map(attribute='entity_id') | list -%}
            {%- set vars = state_attr(ent, 'variables') -%}
          
            {%- if vars is mapping 
                  and (vars.get('AI_Cabinet_VolumeInfo') is not none) 
                  and (
                    states(ent) in ['online_mounted', 'Variables'] 
                    or (read_stacks and states(ent) == 'online_unmounted')
                  ) 
          -%}
              {%- set _vi_raw = vars.AI_Cabinet_VolumeInfo -%}
              {%- set _vi_norm = (_vi_raw | from_json) if _vi_raw is string else _vi_raw -%}
              {%- set _vi_val = _vi_norm.get('value', {}) if _vi_norm is mapping else {} -%}
              {%- set info = _vi_val if _vi_val is mapping else (_vi_val | from_json if _vi_val is string else {}) -%}
              {%- set st = states[ent] -%}
              {%- set friendly = st.attributes.friendly_name | default(ent) -%}
              {%- set lc = st.last_changed.isoformat() -%}
              {%- set lu = st.last_updated.isoformat() -%}
              {%- set volume_labels = labels(ent) | default([]) -%}
          
              {%- set skip_hidden =
                (not read_hidden)
                and (hide_labels | select('in', volume_labels) | list | count > 0)
                and (volume_labels | select('in', exempt_labels) | list | count == 0)
              -%}
              {%- if skip_hidden -%}
                {%- continue -%}
              {%- endif -%}
          
              {%- set raw_drawers = vars.keys() | list -%}
              {%- set ns = namespace(drawers=[]) -%}
          
              {%- for d in raw_drawers -%}
                {%- if d not in always_hide_drawers
                      and not d.startswith('_')
                      and not d.startswith('.') 
                -%}
                  {%- set val = vars.get(d, {}) -%}
                  {%- set val_value = val.get('value') if val is mapping else {} -%}
          
                  {%- if val is mapping and val_value is mapping and val_value.get('mount_point', false) -%}
                    {%- set ns.drawers = ns.drawers + [
                      d ~ ' [mount:' ~ (
                        val_value.get('target_entity_id') 
                          if val_value.get('target_entity_id')
                        else val_value.get('target_volume_id') 
                          if val_value.get('target_volume_id')
                        else '?'
                        ) ~ ']'
                      ]
                    -%}
                  {%- else -%}
                    {%- set ns.drawers = ns.drawers + [d] -%}
                  {%- endif -%}
                {%- endif -%}
              {%- endfor -%}
              
              {%- set drawers = ns.drawers | sort -%}
          
              {%- set raw_json = vars | tojson -%}
              {%- set char_count = raw_json | length -%}
              {%- set pct_chars = (char_count / max_chars * 100) | round(1) -%}
              {%- set storage_warning = pct_chars >= (warn_threshold * 100) -%}
          
              {%- set flags = info.get('flags', {}) -%}
              {%- set writeable = (not flags.get('read_only', false))
                                  and (info.get('schema_version', 0) | float <= controller_schema)
                                  and not storage_warning -%}
              {%- set readable = (not storage_warning) -%}
          
              {%- set drawer_index = build_drawer_index(vars) | trim | from_json -%}
              {%- set acls_obj = acls_by_category(info) | from_json -%}
              {%- set health_obj =
                compute_health(info, pct_chars, writeable, readable) | from_json
              -%}
          
              {%- if read_extended -%}
                {%- set rec = 
                  {
                    'entity_id': ent,
                    'friendly_name': friendly,
                    'context': vars.get('_context', {}),
                    'metadata': {
                      'id': info.get('id'),
                      'schema_version': info.get('schema_version'),
                      'labels': volume_labels | sort,
                      'timestamps': { 'last_changed': lc, 'last_updated': lu }
                    },
                    'stats': { 'drawer_count': drawers | count },
                    'capacity': {
                      'chars_used': char_count, 
                      'chars_max': max_chars,
                      'percent_used': pct_chars, 
                      'warning': storage_warning
                    },
                    'access': { 'writeable': writeable, 'readable': readable },
                    'drawer_index': drawer_index,
                    'acls_by_category': acls_obj,
                    'health': health_obj
                  } -%}
              {%- else -%}
                {%- set rec = 
                  {
                    'entity_id': ent,
                    'friendly_name': friendly,
                    'id': info.get('id'),
                    'drawers': drawers | count,
                    'capacity': pct_chars | string + '%',
                    'status': 'needs_touch' if states(ent) == 'Variables' else health_obj.get('status', 'unknown'),
                    'writeable': writeable,
                    'legacy_schema': states(ent) == 'Variables',
                    'legacy_message': 'Pre-RC2 cab — data intact. Needs a schema touch to migrate to RP2 state machine (one-way). Fire any set_variable or use force_action to provision.' if states(ent) == 'Variables' else none
                  } 
                -%}
              {%- endif -%}
              {%- set result.data = result.data | combine({ ent: rec }) -%}
            {%- endif -%}
          {%- endfor -%}
          
          {{- result.data -}}
    - event: set_variable_legacy
      event_data:
        key: "{{- manifest_key -}}"
        value: "{{- manifest -}}"
        set_timestamp: true
        volume_entity: "{{- zen_default_house_cab -}}"
    - variables:
        manifest: "{{- manifest | combine({'caller_token': caller_token | default('')}) if manifest is mapping else manifest -}}"
    - alias: Return Manifest Data
      stop: Pass variable to response
      response_variable: manifest
    # Removed 'set_conversation_response' - never going to run after a stop!
    #- set_conversation_response: "{{- manifest -}}"
  system_tools_stamp_default_family_cabinet:
    sequence:
    - variables:
        new_guid: >
          {%- import 'zenos_ai/zenos_cabinets.jinja' as CABS -%}
          {{- CABS.cabinet_guid_new() -}}
    - alias: Stamp AI_Cabinet_VolumeInfo
      event: set_variable_zenos_default_family_cabinet
      event_data:
        key: AI_Cabinet_VolumeInfo
        value:
          id: "{{- new_guid -}}"
          friendly_name: ZenOS Default Family Cabinet
          name: ZenOS Default Family Cabinet
          description: Primary storage for household family data, lore, and member
            links.
          validation: ALLYOURBASEAREBELONGTOUS
          flags:
            system: false
            hidden: false
            read_only: false
            dojo: false
            kata: false
            history: false
            user: false
            family: true
            secure_mode: false
          owner: {}
          acls:
            owner: []
            partner: []
            family: []
            public: []
          entity_labels:
          - ai
          - zen
          - cabinet
          - volumeinfo
          - family
        set_timestamp: true
    - alias: Stamp _context
      event: set_variable_zenos_default_family_cabinet
      event_data:
        key: _context
        value:
          what_is_this: The Family Cabinet — primary storage for household family
            data, lore, and links to family members.
          why_is_it_here: Root for family-scoped data. Owner is Head of Household.
          usage_policy:
          - Prefer modifying in place unless scale or security requires a new drawer
            or volume.
          - Cross-link by label and purpose. Leave breadcrumbs if data is authoritative
            elsewhere.
          - Store static data in deep nested JSON; store dynamic data in wide drawers
            for fast seeks and less risky writes.
          - Summarize or prune as needed.
          - Family members are linked from here — store member-specific data in their
            own cabinet if accessible.
          growth_logic:
            on_split: Request a new subcabinet only if a drawer outgrows space or
              requires special access.
            split_triggers:
            - Exceeds index or storage limits.
            - New security domain.
            - Needs its own schedule or routine.
        set_timestamp: true
    alias: 'System - Tools: Stamp Default Family Cabinet'
    description: Stamp AI_Cabinet_VolumeInfo for the default family cabinet with
      a fresh UUID. No PII — configure owner/ACLs after stamping.
    icon: mdi:dresser-outline
    fields: {}
  dojotools_zen_inspect:
    alias: Zen DojoTools Inspect
    mode: parallel
    description: Inspect (4.5.x). Deep dive on one or more entities. Attributes
      are key-scanned for safety. Cabinet sensors expose header metadata only; use cabinet
      tools for full volume access.
    fields:
      entity_id:
        required: true
        selector:
          entity:
            multiple: true
      extended:
        required: false
        default: false
        selector:
          boolean:
        description: Light device/integration forensics.
      infer:
        required: false
        selector:
          boolean:
        description: Reserved for future local inference.
      timeout:
        selector:
          number:
            min: 30
            max: 300
            step: 0.25
        name: Timeout
        default: 60
        required: false
    sequence:
    - variables:
        entity_list: >
          {%- if entity_id is iterable and (entity_id is not string) -%}
            {{- entity_id -}}
          {%- else -%}
            [{{- entity_id -}}]
          {%- endif -%}
        extended_mode: "{{- extended | default(false) -}}"
        infer_mode: "{{- infer | default(false) -}}"
        timeout_s: "{{- timeout | default(60) -}}"
        results: []
    - repeat:
        for_each: "{{- entity_list -}}"
        sequence:
        - variables:
            current_entity: "{{- repeat.item | string -}}"
            state_obj: >
              {%- set s = states[current_entity] -%} 
              {{- s if s is not none else none -}}
            has_state_obj: "{{- state_obj is not none -}}"
            domain: >
              {%- set dot = current_entity.find('.') -%}
              {%- if dot > 0 -%}
                {{- current_entity[:dot] -}}
              {%- else -%}
                unknown
              {%- endif -%}
            friendly_name: "{{- state_attr(current_entity, 'friendly_name') | default(current_entity) -}}"
            state_str: "{{- states(current_entity) if has_state_obj else 'unknown' -}}"
            last_changed: >
              {%- if has_state_obj -%}
                {{- as_timestamp(state_obj.last_changed, default=0) | timestamp_local -}}
              {%- else -%}
                {{- '' -}} 
              {%- endif -%}
            last_updated: >
              {%- if has_state_obj -%}
                {{- as_timestamp(state_obj.last_updated, default=0) | timestamp_local -}}
              {%- else -%} 
                {{- '' -}} 
              {%- endif -%}
            labels_raw: "{{- labels(current_entity) | default([]) -}}"
            safe_labels: >
              {%- if labels_raw is iterable and (labels_raw is not string) -%}
                {{- labels_raw | list -}}
              {%- else -%} 
                [] 
              {%- endif -%}
            attrs_raw: >
              {%- set s = states[current_entity] -%} 
              {%- if s is not none and s.attributes is mapping -%}
                {{- s.attributes -}}
              {%- else -%}
                {}
              {% endif -%}
            has_attrs: >
              {%- set s = states[current_entity] -%}
              {{- s is not none and s.attributes is mapping -}}
            attrs_is_stringified: "{{- attrs_raw is string -}}"
            cabinet_header: >
              {%- set raw = attrs_raw -%}
              {%- if raw is mapping -%}
                {% set vars = raw.get('variables') -%}
                {%- if vars is mapping -%}
                  {% set cab = vars.get('AI_Cabinet_VolumeInfo') -%}
                  {%- if cab is mapping and cab.get('value') is mapping -%}
                    {{- cab.get('value') -}}
                  {% else -%}
                    {}
                  {%- endif -%}
                {%- else -%} 
                  {} 
                {%- endif -%}
              {%- else -%}
                {}
              {% endif -%}
            # @todo - there's that "''" return again
            cabinet_signature: >
              {%- if cabinet_header is mapping -%}
                {{- cabinet_header.get('validation','') | string -}}
              {%- else -%}
                ''
              {%- endif -%}
            is_cabinet_sensor: >
              {{-
                domain == 'sensor' and cabinet_header is mapping
                  and cabinet_signature == 'ALLYOURBASEAREBELONGTOUS'
              -}}
            # @todo - there's that "''" return again
            cabinet_guid: >
              {%- if is_cabinet_sensor and cabinet_header.get('id') -%}
                {{- cabinet_header.get('id') -}}
              {%- else -%} 
              '' 
              {%- endif -%}
            cabinet_uninitialized: "{{- is_cabinet_sensor and not cabinet_header.get('id') -}}"
            volume_result: >
              {%- if is_cabinet_sensor -%}
                {{- {
                  "is_cabinet": true,
                  "id": cabinet_header.get("id"),
                  "version": cabinet_header.get("version"),
                  "friendly_name": cabinet_header.get("friendly_name"),
                  "name": cabinet_header.get("name"),
                  "description": cabinet_header.get("description"),
                  "validation": cabinet_signature,
                  "flags": (
                    cabinet_header.get("flags")
                    if cabinet_header.get("flags") is mapping
                    else {}
                  ),
                  "uninitialized": cabinet_uninitialized
                } -}}
              {%- else -%}
                {{- { "is_cabinet": false} -}}
              {%- endif -%}
            stat_class: "{{- state_attr(current_entity,'state_class') | default('', true) | string -}}"
            stat_uom: "{{- state_attr(current_entity,'unit_of_measurement') | default('', true) | string -}}"
            stats_eligible: "{{- stat_class in ['measurement','total','total_increasing'] and stat_uom != '' -}}"
            stats_reason: >
              {%- if not has_state_obj -%}
                Entity not found.
              {%- elif stats_eligible -%}
                Eligible based on state_class and unit_of_measurement.
              {% elif stat_class == '' and stat_uom == '' -%}
                Missing state_class and unit_of_measurement.
              {%- elif stat_class == '' -%}
                Missing state_class.
              {% elif stat_uom == '' -%}
                Missing unit_of_measurement.
              {%- else -%}
                Unsupported state_class for statistics.
              {%- endif -%}
            statistics_result: >
              {{- { "eligible": stats_eligible, "reason": stats_reason } -}}"
            extended_block: >
              {%- if extended_mode -%}
                {%- set dev_id = state_attr(current_entity, 'device_id') -%}
                {%- set dev = dev_id if dev_id is not none else none -%}
                {%- set area = dev and device_attr(dev, 'area_id') or none -%}
                {%  set identifiers = dev and device_attr(dev, 'identifiers') or none -%}
              
                {{- {
                  "device_id": dev,
                  "area_id": area,
                  "identifiers": identifiers
                } -}}
              {%- else -%}
                {}
              {%- endif -%}
            safe_attributes: >
              {%- if is_cabinet_sensor -%}
                { "notice": "Attributes suppressed for cabinet sensor. Use FileCabinet tools for full volume access." }
              {%- else -%}
                {# --- ORIGINAL SANITIZER BLOCK (UNCHANGED) --- #}
              
                {%- if attrs_is_stringified -%}
                  {# --- FALLBACK MODE: Home Assistant stringified the dict --- #}
                  {%- set s = states[current_entity] -%}
                  {%- set ns = namespace(out={}) -%}
              
                  {%- if s is not none -%}
                    {% for k in s.attributes.keys() -%}
                      {%- set v = state_attr(current_entity, k) -%}
                      {%- if v is string or v is number or v is boolean -%}
                        {% set ns.out = ns.out | combine({k: v}, recursive=true) -%}
                        {%- elif v is mapping -%}
                        {%- set ns.out = ns.out | combine({k: v}, recursive=true) -%}
                        {%- elif v is sequence and (v is not string) -%}
                        {%- set ns.out = ns.out | combine({k: v}, recursive=true) -%}
                      {%- else -%}
                        {%- set ns.out = ns.out | combine({k: v|string}, recursive=true) -%}
                      {%- endif -%}
                    {%- endfor -%}
                  {%- endif -%}
              
                  {{- ns.out -}}
                {%- else -%}
                  {# --- NORMAL MODE --- #}
                  {%- set raw = attrs_raw -%}
                  {%- set ns = namespace(out={}) -%}
              
                  {%- if raw is mapping -%}
                    {%- for k, v in raw.items() -%}
                      {%- if v is string or v is number or v is boolean -%}
                        {%- set ns.out = ns.out | combine({k: v}, recursive=true) -%}
                      {%- elif v is mapping -%}
                        {%- set ns.out = ns.out | combine({k: v}, recursive=true) -%}
                      {%- elif v is sequence and (v is not string) -%}
                        {%- set ns.out = ns.out | combine({k: v}, recursive=true) -%}
                      {%- else -%}
                        {%- set ns.out = ns.out | combine({k: v|string}, recursive=true) -%}
                      {%- endif -%}
                    {%- endfor -%}
                  {%- endif -%}
              
                  {{- ns.out -}}
                {%- endif -%}
              {%- endif -%}
            entity_result: >
              {{- {
                "entity_id": current_entity,
                "friendly_name": friendly_name,
                "domain": domain,
                "state": state_str,
                "last_changed": last_changed,
                "last_updated": last_updated,
                "labels": safe_labels,
                "attributes": safe_attributes,
                "volume": volume_result,
                "statistics": statistics_result,
                "extended": extended_block,
              } -}}"
            results: "{{- (results + [entity_result]) | list -}}"
    - variables:
        inspect_result:
          results: "{{- results -}}"
          inputs:
            entity_id: "{{- entity_list -}}"
            extended: "{{- extended_mode -}}"
            infer: "{{- infer_mode -}}"
            timeout: "{{- timeout_s -}}"
          error:
    - stop: Inspect complete
      response_variable: inspect_result
