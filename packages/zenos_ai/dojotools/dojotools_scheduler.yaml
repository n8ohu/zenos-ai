###############################################################################
# ZenOS-AI DojoTools: Scheduler
# Version: 4.5.0
#
# Automations:
#   Zen DojoTools Scheduler — time/event orchestrator for the Dojo system
#
# MIGRATED FROM: automations.yaml (2026-03-05)
# REFACTORED (4.1.0, 2026-03-10):
#   - Ninja Summarizer dispatch is now Dojo-driven (loop replaces 10 hardcoded
#     choose branches). Components register trigger_subscriptions + delay_seconds
#     in their Dojo drawer via zen_dojotools_kungfu_writer.
#   - Manifest, SuperSummary, FileCabinet GC remain as explicit choose branches.
#   - Custom triggers: copy zenos_ai/docs/examples/zen_dojotools_scheduler_custom.yaml
#     to your HA config, fill in your entity IDs, and subscribe components via
#     trigger_subscriptions in their KFC drawer — no changes to this file needed.
#
# DEPENDS ON:
#   script.zen_dojotools_inspect      (dojotools_index.yaml)
#   script.zen_dojotools_ninja_summarizer (dojotools_summarizers.yaml)
#   Zen Dojo Cabinet                  (label: Zen Dojo Cabinet)
#   Zen Kata Cabinet                  (label: Zen Kata Cabinet)
###############################################################################

automation:

  - id: '1758324323797'
    alias: Zen DojoTools Scheduler
    description: >-
      Zen DojoTools Scheduler (4.1.0). Handles activation of time, custom event,
      and state event triggers for the ZenOS-AI system. Ninja Summarizer dispatch
      is Dojo-driven — add trigger_subscriptions to a KFC drawer to subscribe.
      Manifest, SuperSummary, and FileCabinet GC remain explicit branches.
    triggers:
    - trigger: time
      at: 00:00:00
      weekday:
      - sat
      - fri
      - thu
      - wed
      - tue
      - mon
      - sun
      id: daily_midnight
    - trigger: time_pattern
      minutes: /15
      id: quarter_hour
    - trigger: homeassistant
      event: start
      id: ha_start
    - trigger: time_pattern
      hours: /1
      id: hourly_trigger
    - trigger: state
      entity_id:
      - sensor.zen_home_mode
      not_from:
      - unavailable
      - unknown
      to:
      id: home_mode_updates
    - alias: When zone.home count changes
      trigger: state
      entity_id:
      - zone.home
      id: home_occupancy_change
      to:
      not_from:
      - unknown
      - unavailable
    - trigger: persistent_notification
      update_type:
      - added
      - removed
      - updated
      notification_id: persistent_notification_updated
      id: persistent_notification
    - trigger: state
      entity_id:
      - group.all_doors
      not_to:
      - unknown
      - unavailable
      not_from:
      - unknown
      - unavailable
      id: door_opens_or_closes
    - trigger: state
      entity_id:
      - group.all_locks
      not_to:
      - unknown
      - unavailable
      not_from:
      - unknown
      - unavailable
      id: lock_changes
    - trigger: state
      entity_id:
      - input_select.zen_home_mode
      to: Home-Wake
      id: start_home_wake
    - trigger: state
      entity_id:
      - input_select.zen_home_mode
      to: Home-Evening
      id: start_home_evening
    - trigger: time
      at: '12:00:00'
      weekday:
      - sat
      - fri
      - thu
      - wed
      - tue
      - mon
      - sun
      id: daily_noon
    - trigger: state
      entity_id:
      - group.all_windows
      not_to:
      - unknown
      - unavailable
      not_from:
      - unknown
      - unavailable
      id: window_opens_or_closes
    - trigger: state
      entity_id:
      - group.garage_doors
      not_to:
      - unknown
      - unavailable
      not_from:
      - unknown
      - unavailable
      id: garage_door
    - trigger: time_pattern
      minutes: /10
      id: every_10_minutes
      enabled: true
    - trigger: time_pattern
      minutes: /5
      id: every_5_minutes
      enabled: true
    - trigger: event
      event_type: zen_event
      id: force_summary
      event_data:
        event:
          kind: summary_force
      alias: 'Zen Event: Force Summary (component)'
    - trigger: event
      event_type: zen_event
      id: force_gc
      event_data:
        event:
          kind: gc_force
      alias: 'Zen Event: Force FileCabinet GC'
    - trigger: event
      event_type: zen_event
      id: force_ninja
      event_data:
        event:
          kind: ninja_force
      alias: 'Zen Event: Force Ninja Summarizer (all KFCs, skip SuperSummary)'
    - trigger: event
      event_type: zen_event
      id: force_supersummary
      event_data:
        event:
          kind: supersummary_force
      alias: 'Zen Event: Force SuperSummary only (skip Ninja dispatch)'
    - trigger: event
      event_type: zen_event
      id: force_identity_manifest
      event_data:
        event:
          kind: identity_manifest_rebuild
      alias: 'Zen Event: Force Identity Manifest rebuild'
    actions:

    # ── Pre-fetch home overview ──────────────────────────────────────────────
    - action: script.zen_dojotools_inspect
      metadata: {}
      data:
        entity_id:
        - sensor.home_overview
        timeout: 30
      response_variable: home_overview

    # ── Extract zen_event component (for targeted force_summary) ────────────
    - variables:
        zen_event_component: >-
          {%- set ev   = trigger.get('event') if trigger is mapping else None -%}
          {%- set data = ev.get('data') if ev is mapping else None -%}
          {%- set comp = data.get('event', {}).get('component') if data is mapping else None -%}
          {{ comp | default('', true) }}

    # ── Explicit non-Ninja branches ──────────────────────────────────────────
    - choose:

      - conditions:
        - alias: Triggers for the Manifest
          condition: trigger
          id:
          - ha_start
          - daily_midnight
        sequence:
        - action: script.zen_dojotools_manifest
          metadata: {}
          data: {}
          response_variable: response_manifest
        alias: Run the Manifest

      - conditions:
        - alias: Triggers for the Identity Manifest
          condition: trigger
          id:
          - ha_start
          - daily_midnight
          - force_identity_manifest
        sequence:
        - action: script.zen_dojotools_identity
          metadata: {}
          data:
            mode: build_identity_manifest
          response_variable: response_identity_manifest
        alias: Run the Identity Manifest

      - conditions:
        - condition: trigger
          id:
          - daily_midnight
          - daily_noon
          - ha_start
          - every_10_minutes
          - force_summary
          - force_supersummary
        sequence:
        - variables:
            supplemental_prompt: >-
              {{
                {
                  "source": {"id": trigger.id | default(''), "platform": trigger.platform | default('')},
                  "home_overview": home_overview | default({}),
                  "notes": "Don't comment about the state of the component's master switch or script. Comment only on the items the component manages. Please ignore when you perform summarization."
                } | tojson
              }}
        - action: script.zen_dojotools_supersummary
          metadata: {}
          data:
            post_to_kata_cabinet: true
            supplemental_prompt: '{{ supplemental_prompt }}'
          response_variable: response_zen_summary
        alias: Zen Summary

      - conditions:
        - condition: trigger
          id:
          - daily_midnight
          - quarter_hour
          - force_gc
        sequence:
        - action: script.zen_dojotools_filecabinet_gc
          metadata: {}
          data:
            dry_run: false
          response_variable: response_filecabinet_gc
        alias: FileCabinet GC

      - conditions:
        - condition: trigger
          id:
          - quarter_hour
          - ha_start
        sequence:
        - event: zen_resolver_refresh
        alias: Health Sensor Retrigger


    # ── Dojo-driven Ninja Summarizer dispatch ────────────────────────────────
    # Reads all KFC drawers from the Dojo cabinet. Filters to those whose
    # trigger_subscriptions include the current trigger.id. For force_summary
    # with a zen_event_component set, only that component runs.
    # delay_seconds is skipped for force_summary / force_ninja (urgent path).
    # force_ninja remaps to ha_start scope — runs only boot-sequence KFCs.
    # force_supersummary skips this block entirely (gated by if above).
    - variables:
        _dojo_cab: "{{ states('sensor.zen_dojo_cabinet_resolved') }}"
        _kata_cab: "{{ states('sensor.zen_kata_cabinet_resolved') }}"
        _force_component: "{{ zen_event_component | default('', true) | slugify }}"
        _protected: "['AI_Cabinet_VolumeInfo', 'kfc_template', 'zen_library_manifest', 'zen_identity_manifest', '_context']"
        _subscribers: >-
          {%- set dojo_vars = state_attr(_dojo_cab, 'variables') | default({}, true) -%}
          {%- if _dojo_cab in ['unknown', 'unavailable'] or _kata_cab in ['unknown', 'unavailable'] -%}
            {{ [] }}
          {%- else -%}
            {%- set _raw_trig = trigger.id | default('') -%}
            {%- set trig_id   = 'ha_start' if _raw_trig == 'force_ninja' else _raw_trig -%}
            {%- set force_c   = zen_event_component | default('', true) | slugify -%}
            {%- set protected = ['AI_Cabinet_VolumeInfo', 'kfc_template', 'zen_library_manifest', 'zen_identity_manifest', '_context'] -%}
            {%- set ns = namespace(subs=[]) -%}
            {%- for key, drawer in dojo_vars.items() -%}
              {%- if not key.startswith('_') and key not in protected -%}
                {%- set val = drawer.get('value', drawer) if drawer is mapping else {} -%}
                {%- if val is mapping -%}
                  {%- set sub_list  = val.get('trigger_subscriptions', []) -%}
                  {%- set subscribed = trig_id in sub_list -%}
                  {%- set targeted   = force_c == '' or force_c == key -%}
                  {%- if subscribed and targeted -%}
                    {%- set ns.subs = ns.subs + [val | combine({'_drawer_key': key})] -%}
                  {%- endif -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.subs | sort(attribute='delay_seconds') }}
          {%- endif -%}

    - if: "{{ trigger.id != 'force_supersummary' }}"
      then:
        - repeat:
            for_each: "{{ _subscribers }}"
            sequence:
              - if:
                - condition: template
                  value_template: >-
                    {{ trigger.id not in ['force_summary', 'force_ninja']
                       and (repeat.item.delay_seconds | default(0) | int(0)) > 0 }}
                then:
                - delay:
                    seconds: "{{ repeat.item.delay_seconds | default(0) | int(0) }}"
              - action: script.zen_dojotools_filecabinet
                metadata: {}
                data:
                  action_type: read
                  show_hidden_volumes: false
                  volume_entity_id:
                  - "{{ _kata_cab }}"
                  key: "{{ repeat.item.kata_key | default(repeat.item._drawer_key) }}"
                response_variable: _iter_last_kata
              - variables:
                  _iter_prompt: >-
                    {{
                      {
                        "source":            {"id": trigger.id | default(''), "platform": trigger.platform | default('')},
                        "home_overview":     home_overview | default({}),
                        "last_kata_summary": _iter_last_kata | default({})
                      } | tojson
                    }}
              - action: script.zen_dojotools_ninja_summarizer
                metadata: {}
                data:
                  kung_fu_component_id: "{{ repeat.item.kata_key | default(repeat.item._drawer_key) }}"
                  post_to_kata_cabinet: true
                  supplemental_prompt: '{{ _iter_prompt }}'
                response_variable: _iter_ninja_response

    # ── Write scheduler heartbeat to Kata ───────────────────────────────────
    - variables:
        trigger_entity_id: >-
          {%- if 'from_state' in trigger and trigger.from_state -%}
            {{ trigger.from_state.entity_id }}
          {%- elif 'to_state' in trigger and trigger.to_state -%}
            {{ trigger.to_state.entity_id }}
          {%- elif 'entity_id' in trigger -%}
            {{ trigger.entity_id }}
          {%- endif -%}
        this_trigger: >-
          {{
            {
              "id":        trigger.id | default('unknown'),
              "platform":  trigger.platform | default('manual'),
              "entity_id": trigger_entity_id
            }
          }}
        final_response: >-
          {{
            {
              "status":    "success",
              "trigger":   this_trigger | default({}),
              "dispatched": _subscribers | default([]) | map(attribute='kata_key') | list
            } | tojson
          }}
    - action: script.zen_dojotools_filecabinet
      metadata: {}
      data:
        action_type: update
        set_timestamp: true
        show_hidden_volumes: false
        force_action: true
        volume_entity_id:
        - "{{ _kata_cab }}"
        key: zen_scheduler
        value: '{{ final_response }}'

    # ── Fire health tick — unblocks trigger-based health sensors ────────────
    - event: zen_health_tick

    mode: queued
    max: 5
