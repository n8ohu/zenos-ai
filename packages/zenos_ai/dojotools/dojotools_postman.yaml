# ============================================================================
# zen_postman_response_router
# Converts mobile_app_notification_action → zen_event(kind: postman_response)
# so postman's step 8.5 push-ack wait and any other subscriber can read it.
# ============================================================================
automation:

  - id: 'zen_postman_response_router'
    alias: Zen Postman Response Router
    description: >-
      Listens for mobile_app_notification_action events (button taps on
      actionable push notifications) and re-emits them as
      zen_event(kind: postman_response) so zen_dojotools_postman and
      any independent subscriber can correlate by tag.
    mode: parallel
    max: 10
    triggers:
      - trigger: event
        event_type: mobile_app_notification_action
    actions:
      - variables:
          _tag:       "{{ trigger.event.data.get('tag', '') | string | trim }}"
          _action:    "{{ trigger.event.data.get('action', '') | string | upper | trim }}"
          _device_id: "{{ trigger.event.data.get('device_id', '') | string | trim }}"

      - condition: template
        value_template: "{{ _tag.startswith('pm_') }}"

      - event: zen_event
        event_data:
          event:
            kind:      postman_response
            tag:       "{{ _tag }}"
            action:    "{{ _action }}"
            device_id: "{{ _device_id }}"
            severity:  info
            timestamp: "{{ now().isoformat() }}"
