###############################################################################
# ZenOS-AI DojoTools: Labels
# Version: 4.1.0
#
# Scripts:
#   zen_dojotools_labels — Label CRUD. Read/modify the HA label index.
#     Core primitive for label-based entity resolution across ZenOS.
#     Backbone of the label system — do not retire.
#
# MIGRATED FROM: scripts.yaml (2026-03-05)
###############################################################################

script:

  zen_dojotools_labels:
    sequence:
    - variables:
        action: '{{ action_type | default(''read'') | lower }}'
        label_index: '{{ labels() |sort }}'
        user_labels: '{{ label_list | default([]) }}'
        have_target_user_labels: '{{ ( user_labels | length > 0 ) }}'
        target_ent_list: '{{ target_entities | default([]) }}'
        have_target_ents: '{{ ( target_ent_list | length > 0 ) }}'
        labels_by_ent: "{% if have_target_ents %}\n  {\n  {%- for ent in target_ent_list
          %}\n    \"{{ ent }}\": {{ labels(ent) }}{{ \",\" if not loop.last else \"\"
          }}\n  {%- endfor %}\n  }\n{% else %}\n  {}\n{% endif %}"
        label_details_by_label: "{% if have_target_user_labels %}\n  {\n  {%- for lbl
          in user_labels %}\n    \"{{ lbl }}\": {\n      \"description\": \"{{ label_description(
          lbl ) | default('') }}\"\n    }{{ \",\" if not loop.last else \"\" }}\n  {%-
          endfor %}\n  }\n{% else %}\n  {}\n{% endif %}"
        minihelp: 'Minihelp: actions = create, read, delete, tag, untag, update, reset'
        results_list: []
        failures_list: []
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ action not in [''tag'',''untag'',''create'',''delete'',''update'',''read'',''reset'']
            }}'
          alias: Error - invalid Action
        sequence:
        - variables:
            response:
              status: error
              error: Invalid action_type '{{ action_type }}'. {{ minihelp }}
              index: '{{ label_index }}'
              caller_token: '{{ caller_token | default('''') }}'
        - stop: response
          response_variable: response
      - conditions:
        - condition: template
          value_template: '{{ action == ''create'' }}'
          alias: CREATE
        sequence:
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ user_labels | length == 0 }}'
              alias: User Labels are {}
            sequence:
            - variables:
                response:
                  status: error
                  error: Create requires at least one label. {{ minihelp }}
                  index: '{{ label_index }}'
                  caller_token: '{{ caller_token | default('''') }}'
            - stop: pass var scope
              response_variable: response
        - variables:
            to_create: "[{% for label in user_labels if label | slugify(separator='_') not in label_index %}\n
              \ \"{{ label }}\"{% if not loop.last %},{% endif %}\n{% endfor %}]"
            already_exists: "[{% for label in user_labels if label | slugify(separator='_') in label_index %}\n
              \ \"{{ label }}\"{% if not loop.last %},{% endif %}\n{% endfor %}]"
            target_labels: "{% if confirm %}\n  {{ to_create }}\n{% else %}\n  []\n{%
              endif %}"
        - variables:
            response:
              status: '{{ ''ok'' if target_labels | count > 0 else ''start'' }}'
              action: create
              to_create: '{{ to_create }}'
              already_exists: '{{ already_exists }}'
              confirm: '{{ confirm }}'
              target_labels: '{{ target_labels }}'
              message: "{% if target_labels | count > 0 %}\n  Started Create.\n{% else
                %}\n  Some or all labels already existed and were skipped. Confirmation
                required.\n{% endif %}"
              caller_token: '{{ caller_token | default('''') }}'
        - repeat:
            for_each: '{{ target_labels }}'
            sequence:
            - if:
              - condition: template
                value_template: '{{ new_icon | default('''', true) != '''' }}'
              then:
              - action: homeassistant.create_label
                metadata: {}
                data:
                  name: '{{ repeat.item }}'
                  description: '{{ new_description | default('''', true) }}'
                  icon: '{{ new_icon }}'
                  color: '{{ new_color | default(''primary'', true) }}'
              else:
              - action: homeassistant.create_label
                metadata: {}
                data:
                  name: '{{ repeat.item }}'
                  description: '{{ new_description | default('''', true) }}'
                  color: '{{ new_color | default(''primary'', true) }}'
        - variables:
            created_count: '{{ target_labels | count }}'
            response:
              status: '{{ ''ok'' if created_count > 0 else ''partial'' }}'
              action: create
              confirm: '{{ confirm }}'
              created_labels: '{{ target_labels }}'
              already_existed: '{{ already_exists }}'
              message: "{% if created_count > 0 %}\n  Create Action Complete.\n{% else
                %}\n  Create requires confirmation, no labels created.\n{% endif %}"
              caller_token: '{{ caller_token | default('''') }}'
        - stop: pass var scope
          response_variable: response
      - conditions:
        - alias: READ
          condition: template
          value_template: '{{ ( action == ''read'' ) or ( not action ) }}'
        sequence:
        - choose:
          - conditions:
            - alias: Valid READ
              condition: template
              value_template: '{{ action == ''read'' and ( have_target_user_labels or
                have_target_ents ) }}'
            sequence:
            - variables:
                response: "{{\n  {\n    \"status\": \"ok\",\n    \"action\": \"read\",\n
                  \   \"label_list\": user_labels,\n    \"label_details_by_label\":
                  label_details_by_label,\n    \"target_entities\": target_ent_list,\n
                  \   \"labels_by_ent\": labels_by_ent\n  }\n}}"
            - variables:
                response: "{{ response | combine({'caller_token': caller_token | default('')}) if response is mapping else response }}"
            - stop: Pass context
              response_variable: response
        - variables:
            response: "{{ {\n  'status': 'ok',\n  'action': 'read_index',\n  'target':
              '*',        \n  'index': label_index\n} }}"
        - variables:
            response: "{{ response | combine({'caller_token': caller_token | default('')}) if response is mapping else response }}"
        - stop: pass var scope
          response_variable: response
      - conditions:
        - alias: DELETE
          condition: template
          value_template: '{{ action == ''delete'' }}'
        sequence:
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ user_labels | length == 0 }}'
              alias: User Labels are {}
            sequence:
            - variables:
                response:
                  status: error
                  error: Delete requires at least one label. {{ minihelp }}
                  index: '{{ label_index }}'
                  caller_token: '{{ caller_token | default('''') }}'
            - stop: pass var scope
              response_variable: response
        - variables:
            to_delete: "[{% for label in user_labels if label | slugify(separator='_') in label_index %}\n
              \ \"{{ label }}\"{% if not loop.last %},{% endif %}\n{% endfor %}]"
            already_exists: "[{% for label in user_labels if label | slugify(separator='_') not in label_index %}\n
              \ \"{{ label }}\"{% if not loop.last %},{% endif %}\n{% endfor %}]"
            target_labels: "{% if confirm %}\n  {{ to_delete }}\n{% else %}\n  []\n{%
              endif %}"
        - variables:
            response:
              status: '{{ ''ok'' if target_labels | count > 0 else ''start'' }}'
              action: delete
              to_delete: '{{ to_delete }}'
              already_exists: '{{ already_exists }}'
              confirm: '{{ confirm }}'
              target_labels: '{{ target_labels }}'
              message: "{% if target_labels | count > 0 %}\n  Started Delete.\n{% else
                %}\n  Some or all labels were skipped. Confirmation required.\n{% endif
                %}"
              caller_token: '{{ caller_token | default('''') }}'
        - repeat:
            for_each: '{{ target_labels }}'
            sequence:
            - action: homeassistant.delete_label
              data:
                label_id: '{{ repeat.item | slugify(separator=''_'') }}'
        - variables:
            deleted_count: '{{ target_labels | count }}'
            response:
              status: '{{ ''ok'' if deleted_count > 0 else ''partial'' }}'
              action: delete
              confirm: '{{ confirm }}'
              deleted_labels: '{{ target_labels }}'
              message: "{% if deleted_count > 0 %}\n  Delete Action Complete.\n{% else
                %}\n  Delete requires confirmation, no labels deleted.\n{% endif %}"
              caller_token: '{{ caller_token | default('''') }}'
        - stop: pass var scope
          response_variable: response
        alias: DELETE
      - conditions:
        - condition: template
          value_template: '{{ action == ''tag'' }}'
          alias: TAG
        sequence:
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ user_labels | length == 0 }}'
              alias: Error - No Labels
            sequence:
            - variables:
                response:
                  status: error
                  error: Tag requires at least one label. {{ minihelp }}
                  index: '{{ label_index }}'
                  caller_token: '{{ caller_token | default('''') }}'
            - stop: pass var scope
              response_variable: response
          - conditions:
            - alias: Error - no Targets
              condition: template
              value_template: '{{ target_ent_list | length == 0 }}'
            sequence:
            - variables:
                response:
                  status: error
                  error: Tag requires at least one target entity. {{ minihelp }}
                  index: '{{ label_index }}'
                  caller_token: '{{ caller_token | default('''') }}'
            - stop: pass var scope
              response_variable: response
        - action: homeassistant.add_label_to_entity
          data:
            label_id: '{{ user_labels }}'
            entity_id: '{{ target_ent_list }}'
        - variables:
            response:
              status: ok
              action: tag
              affected_labels: '{{ user_labels }}'
              affected_entities: '{{ target_ent_list }}'
              caller_token: '{{ caller_token | default('''') }}'
        - stop: pass var scope
          response_variable: response
      - conditions:
        - alias: UNTAG
          condition: template
          value_template: '{{ action == ''untag'' }}'
        sequence:
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ user_labels | length == 0 }}'
              alias: Error - No Labels
            sequence:
            - variables:
                response:
                  status: error
                  error: Tag requires at least one label. {{ minihelp }}
                  index: '{{ label_index }}'
                  caller_token: '{{ caller_token | default('''') }}'
            - stop: pass var scope
              response_variable: response
          - conditions:
            - alias: Error - no Targets
              condition: template
              value_template: '{{ target_ent_list | length == 0 }}'
            sequence:
            - variables:
                response:
                  status: error
                  error: Tag requires at least one target entity. {{ minihelp }}
                  index: '{{ label_index }}'
                  caller_token: '{{ caller_token | default('''') }}'
            - stop: pass var scope
              response_variable: response
        - action: homeassistant.remove_label_from_entity
          data:
            label_id: '{{ user_labels }}'
            entity_id: '{{ target_ent_list }}'
        - variables:
            response:
              status: ok
              action: untag
              affected_labels: '{{ user_labels }}'
              affected_entities: '{{ target_ent_list }}'
              caller_token: '{{ caller_token | default('''') }}'
        - stop: pass var scope
          response_variable: response
      - conditions:
        - alias: RESET (soft)
          condition: template
          value_template: '{{ action == ''reset'' }}'
        sequence:
        - if:
          - condition: template
            value_template: '{{ not confirm }}'
          then:
          - variables:
              response:
                status: error
                error: >-
                  RESET requires confirm: true. This untags ALL entities from ALL
                  zen_ labels. Labels survive — only assignments are wiped. Use
                  when label IDs exist but assignments are wrong or missing. For
                  nuclear (delete labels too) use zen_admintools_reset_labels.
                caller_token: '{{ caller_token | default('''') }}'
          - stop: confirm required
            response_variable: response
        - variables:
            zen_labels: '{{ labels() | select(''match'', ''^zen_'') | list }}'
        - repeat:
            for_each: '{{ zen_labels }}'
            sequence:
            - variables:
                lbl_entities: '{{ label_entities(repeat.item) | list }}'
            - if:
              - condition: template
                value_template: '{{ lbl_entities | length > 0 }}'
              then:
              - action: homeassistant.remove_label_from_entity
                data:
                  label_id: '{{ repeat.item }}'
                  entity_id: '{{ lbl_entities }}'
        - event: zen_resolver_refresh
        - variables:
            response:
              status: ok
              action: reset
              labels_cleared: '{{ zen_labels | length }}'
              message: >-
                Soft reset complete. {{ zen_labels | length }} zen_ label(s)
                cleared. All assignments wiped. zen_resolver_refresh fired —
                Flynn will re-assign on next label health check.
              caller_token: '{{ caller_token | default('''') }}'
        - stop: pass var scope
          response_variable: response
      - conditions:
        - alias: UPDATE
          condition: template
          value_template: '{{ action == ''update'' }}'
        sequence:
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ user_labels | length == 0 }}'
              alias: No label specified
            sequence:
            - variables:
                response:
                  status: error
                  error: Update requires exactly one label. {{ minihelp }}
                  index: '{{ label_index }}'
                  caller_token: '{{ caller_token | default('''') }}'
            - stop: pass var scope
              response_variable: response
          - conditions:
            - condition: template
              value_template: '{{ user_labels | length > 1 }}'
              alias: Too many labels
            sequence:
            - variables:
                response:
                  status: error
                  error: Update operates on one label at a time. {{ minihelp }}
                  index: '{{ label_index }}'
                  caller_token: '{{ caller_token | default('''') }}'
            - stop: pass var scope
              response_variable: response
        - variables:
            _upd_name: '{{ user_labels[0] }}'
            _upd_id: '{{ user_labels[0] | slugify(separator=''_'') }}'
            _has_change: '{{ new_description | default('''', true) != '''' or new_icon
              | default('''', true) != '''' or new_color | default('''', true) != '''' }}'
            _force_rewrite: '{{ force_rewrite | default(false) | bool }}'
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ not _has_change }}'
            sequence:
            - variables:
                response:
                  status: error
                  error: Update requires at least one of new_description, new_icon, new_color.
                  caller_token: '{{ caller_token | default('''') }}'
            - stop: pass var scope
              response_variable: response
        - alias: Pre-read existing label metadata via HA REST API
          if:
            - condition: template
              value_template: '{{ not _force_rewrite }}'
          then:
            - action: rest_command.ha_api_get
              data:
                path: labels
              response_variable: _labels_r
        - variables:
            _labels_ok: '{{ not _force_rewrite and (_labels_r.status | default(0) | int == 200) }}'
            _labels_all: >-
              {{ _labels_r.content if _labels_ok and _labels_r.content is iterable else [] }}
            _existing: >-
              {%- set found = _labels_all | selectattr('label_id', 'eq', _upd_id) | list -%}
              {{ found | first | default({}) }}
            _upd_desc: >-
              {{ new_description if new_description | default('', true) != ''
                 else _existing.get('description', '') | default('', true) }}
            _upd_icon: >-
              {{ new_icon if new_icon | default('', true) != ''
                 else _existing.get('icon', '') | default('', true) }}
            _upd_color: >-
              {{ new_color if new_color | default('', true) != ''
                 else _existing.get('color', 'primary') | default('primary', true) }}
        - if:
          - condition: template
            value_template: '{{ not confirm }}'
          then:
          - variables:
              response:
                status: start
                action: update
                label: '{{ _upd_name }}'
                label_id: '{{ _upd_id }}'
                new_description: '{{ _upd_desc }}'
                new_icon: '{{ _upd_icon }}'
                new_color: '{{ _upd_color }}'
                preserved_from_existing: '{{ _labels_ok }}'
                message: Confirmation required. Update will delete and recreate the
                  label then restore all entity associations.
                caller_token: '{{ caller_token | default('''') }}'
          - stop: confirm required
            response_variable: response
        - variables:
            _upd_entities: '{{ label_entities(_upd_id) | list }}'
        - action: homeassistant.delete_label
          data:
            label_id: '{{ _upd_id }}'
        - if:
          - condition: template
            value_template: '{{ _upd_icon != '''' }}'
          then:
          - action: homeassistant.create_label
            data:
              name: '{{ _upd_name }}'
              description: '{{ _upd_desc }}'
              icon: '{{ _upd_icon }}'
              color: '{{ _upd_color }}'
          else:
          - action: homeassistant.create_label
            data:
              name: '{{ _upd_name }}'
              description: '{{ _upd_desc }}'
              color: '{{ _upd_color }}'
        - if:
          - condition: template
            value_template: '{{ _upd_entities | length > 0 }}'
          then:
          - action: homeassistant.add_label_to_entity
            data:
              label_id: '{{ _upd_id }}'
              entity_id: '{{ _upd_entities }}'
        - variables:
            response:
              status: ok
              action: update
              label: '{{ _upd_name }}'
              label_id: '{{ _upd_id }}'
              retagged_count: '{{ _upd_entities | length }}'
              preserved_from_existing: '{{ _labels_ok }}'
              message: >-
                Update complete. {{ _upd_entities | length }} entity association(s) restored.
                {% if _labels_ok %}Icon/color/description preserved from existing where not provided.
                {% else %}REST pre-read unavailable — only caller-provided fields applied.{% endif %}
              caller_token: '{{ caller_token | default('''') }}'
        - stop: pass var scope
          response_variable: response
        alias: UPDATE

    - choose:
      - conditions:
        - alias: No response defined yet
          condition: template
          value_template: '{{ response is not defined or response is string }}'
        sequence:
        - variables:
            response: '{{ response | default({''status'': ''error'', ''error'': ''Unknown
              error occurred.'', ''index'': label_index, ''help'': minihelp}) }}'
        - variables:
            response: "{{ response | combine({'caller_token': caller_token | default('')}) if response is mapping else response }}"
        - stop: Return
          response_variable: response
    alias: Zen DojoTools Labels
    description: 'Zen DojoTools Labels (4.1.0) — Label CRUD. Read, modify the index,
      tag and untag entities, create, delete, and update labels. Update (description,
      icon, color) deletes and recreates the label then restores all entity associations.
      Hint: Read details for one or more labels to find out what those labels are...'
    fields:
      action_type:
        description: '''create'', ''read'', ''delete'', ''tag'', ''untag'', ''update'',
          ''reset'''
        required: true
        selector:
          select:
            options:
            - create
            - read
            - delete
            - tag
            - untag
            - update
            - reset
        default: read
      target_entities:
        description: List of entity_ids to tag or untag. Required for 'tag' and 'untag'
          actions.
        required: false
        selector:
          entity:
            multiple: true
      label_list:
        description: List of labels (case-insensitive). Required for 'tag', 'untag',
          'create', 'delete', and 'update' (exactly one for update).
        required: false
        selector:
          text:
            multiple: true
      new_description:
        description: Label description. Used by 'create' and 'update'.
        required: false
        selector:
          text:
      new_icon:
        description: MDI icon slug (e.g. mdi:home). Used by 'create' and 'update'.
          Omit to use HA default. Empty string is rejected by HA.
        required: false
        selector:
          text:
      new_color:
        description: Label color. Used by 'create' (default primary) and 'update'.
        required: false
        selector:
          text:
      force_rewrite:
        description: >-
          UPDATE only. If true, skip the pre-read and overwrite — unprovided
          fields revert to HA defaults. Default false (patch semantics).
        required: false
        default: false
        selector:
          boolean:
      confirm:
        description: Required for writable / destructive actions, Function will alert
          when Confirmation is required - expect it for Create, Delete, Update.  Confirms
          write actions have been OK's by your user.  ASK USER before using with any
          function requiring confirmation.
        required: false
        default: false
        selector:
          boolean:
      caller_token:
        name: Caller Token
        required: false
        default: ''
        selector:
          text:
        description: 'Reserved. Governance stub — echoed in response. SP1 enforcement
          not yet active.'
    icon: mdi:label-multiple
