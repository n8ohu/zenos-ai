script:
  zen_admintools_reset_template:
    sequence:
    - variables:
        zen_template_seed: "{\n  \"structure\": {\n    \"system\": {\n      \"cortex\":
          null,\n      \"os_version\": null,\n      \"build_version\": null\n    },\n
          \   \"home_overview\": {\n      \"status\": null,\n      \"risks\": [],\n
          \     \"events\": []\n    },\n    \"active_components\": {},\n    \"zen_summary\":
          {\n      \"summary\": null,\n      \"attention\": null,\n      \"objective\":
          null,\n      \"subjective\": null,\n      \"urgency\": 0,\n      \"confidence\":
          0.0,\n      \"criticality\": 1,\n      \"emotion_queue\": [],\n      \"errors\":
          [],\n      \"timestamp\": null\n    }\n  },\n  \"example\": {\n    \"system\":
          {\n      \"cortex\": \"nominal\",\n      \"os_version\": \"ZenOS-AI (4.5.x)\",\n
          \     \"build_version\": \"SuperSummary 1.0.0-beta\"\n    },\n    \"home_overview\":
          {\n      \"status\": \"ok\",\n      \"risks\": [\"storm watch active\"],\n
          \     \"events\": [\"2025-09-23T07:15:00Z: power dip detected\"]\n    },\n
          \   \"active_components\": {\n      \"lights\": {\n        \"summary\": \"Living
          room lights on\",\n        \"attention\": \"Timer expiring\"\n      },\n      \"water_manager\":
          {\n        \"summary\": \"Chlorine low\",\n        \"attention\": \"Shock
          treatment due in 12h\"\n      }\n    },\n    \"zen_summary\": {\n      \"summary\":
          \"House stable, minor risks (weather, spa chemistry).\",\n      \"attention\":
          \"Spa needs treatment, monitor grid instability.\",\n      \"objective\":
          \"Maintain household comfort while addressing flagged components.\",\n      \"subjective\":
          \"Confident overall, cautious due to external conditions.\",\n      \"urgency\":
          6,\n      \"confidence\": 0.85,\n      \"criticality\": 3,\n      \"emotion_queue\":
          [\"calm\", \"alert\"],\n      \"errors\": [],\n      \"timestamp\": \"2025-09-23T12:15:00Z\"\n
          \   }\n  }\n}"
        kfc_template_seed: >-
          {{
            {
              "schema_version": "1.3.0",
              "structure": {
                "version": None,
                "friendly_name": None,
                "label": None,
                "component_summary": None,
                "component_instructions": None,
                "more_info": None,
                "tool": None,
                "trigger_subscriptions": [],
                "delay_seconds": 0,
                "kata_key": None,
                "drift_threshold": None,
                "emission_cooldown_minutes": None,
                "suggested_act_event": None,
                "index_call": None,
                "meta": {
                  "enabled": None,
                  "requires": {
                    "cert": None,
                    "level": None
                  }
                }
              },
              "example": {
                "version": "1.3.0",
                "friendly_name": "Alert Manager",
                "label": "Alert Manager",
                "component_summary": "Monitors system alerts and persistent notifications.",
                "component_instructions": "Focus on unacknowledged alerts. Escalate if count > 3.",
                "more_info": "Feeds into SuperSummary urgency score.",
                "tool": None,
                "trigger_subscriptions": ["ha_start", "daily_midnight", "hourly_trigger", "home_mode_updates", "alarm_panel"],
                "delay_seconds": 0,
                "kata_key": "alert_manager",
                "drift_threshold": 7,
                "emission_cooldown_minutes": 60,
                "suggested_act_event": None,
                "index_call": {
                  "label_1": "alert_manager",
                  "label_2": None,
                  "operator": "AND",
                  "filter_json": None,
                  "expand_entities": True,
                  "output_fields": []
                },
                "meta": {
                  "enabled": True,
                  "requires": {
                    "cert": "",
                    "level": 0
                  }
                }
              },
              "notes": {
                "meta.requires": "Stub in 1.2.0 — cert and level are stored but not enforced. zen_auth enforcement arrives in SP1.",
                "drift_threshold": "Urgency score at or above this value triggers a forced supersummary synthesis. Default 7.",
                "emission_cooldown_minutes": "Minimum minutes between urgency/action emissions for this component. Default 60. Prevents spam if urgency stays elevated across synthesis cycles.",
                "suggested_act_event": "Event kind string Monk may return when action_required is true. Must be in zen_summarizer_act_whitelist to emit."
              }
            } | tojson
          }}
    - variables:
        kata_template_seed: >-
          {{
            {
              "schema_version": "1.0.0",
              "structure": {
                "subjective": None,
                "general_inference": None,
                "attention": None,
                "objective": None,
                "events": [],
                "watchlist": [],
                "error": None,
                "post": True,
                "urgency": 0,
                "confidence": 0.0,
                "action_required": False,
                "suggested_act_desc": None,
                "suggested_act_event": None,
                "period": None,
                "last_emission_at": None
              },
              "example": {
                "subjective": "Household alert count rising.",
                "general_inference": "Three alerts unacknowledged since 06:00.",
                "attention": "Check alert backlog — 3 unacknowledged.",
                "objective": "Resolve unacknowledged alerts.",
                "events": ["2025-09-23T06:00:00Z: alert created"],
                "watchlist": ["alert_manager"],
                "error": None,
                "post": True,
                "urgency": 3,
                "confidence": 0.85,
                "action_required": False,
                "suggested_act_desc": None,
                "suggested_act_event": None,
                "period": "Home-Morning",
                "last_emission_at": None
              },
              "notes": {
                "period": "Semantic home mode at kata write time. One of: Home-Wake, Home-Morning, Home, Home-Evening, Night, Night-Late, Away, Paused. Ninja always stamps this from input_select.zen_home_mode — never trust Monk's returned value for this field.",
                "last_emission_at": "ISO timestamp of last urgency/action emission for this component. Null if no emission has fired. Used by cooldown gate — do not write manually.",
                "urgency": "0–10 integer. Ninja fires summary_force when urgency >= KFC drift_threshold.",
                "action_required": "Boolean. True means Monk identified an action needed. Triggers dojotool_call(urgency_handler) and three-layer gate for suggested_act_event."
              }
            } | tojson
          }}
        act_whitelist_seed: >-
          {{
            {
              "allowed_events": [],
              "note": "Operator-managed whitelist. Add event kind strings via zen_admintools_summarizer_act. Empty by default — all action emission is blocked until explicitly allowed."
            } | tojson
          }}
    - variables:
        _rtt_kata: "{{- states('sensor.zen_kata_cabinet_resolved') -}}"
        _rtt_dojo: "{{- states('sensor.zen_dojo_cabinet_resolved') -}}"
        _rtt_system: "{{- states('sensor.zen_system_cabinet_resolved') -}}"
    - action: script.zen_dojotools_filecabinet
      data:
        action_type: read
        show_hidden_volumes: false
        volume_entity_id:
          - "{{- _rtt_kata -}}"
        key: zen_template
      response_variable: _rtt_kata_read
    - variables:
        _rtt_kata_version: >-
          {%- set raw = _rtt_kata_read.result | default('{}') -%}
          {%- set val = (raw | from_json) if raw is string else raw -%}
          {{- val.get('schema_version', '') -}}
    - if: "{{- _rtt_kata_version != '1.2.0' -}}"
      then:
        - action: script.zen_dojotools_filecabinet
          data:
            action_type: update
            show_hidden_volumes: false
            force_action: true
            volume_entity_id:
              - "{{- _rtt_kata -}}"
            key: zen_template
            value: "{{- zen_template_seed -}}"
            set_timestamp: true
            label_input: zen_summary, zen, summary
    # kata_template — per-component Monk output schema
    - action: script.zen_dojotools_filecabinet
      data:
        action_type: read
        show_hidden_volumes: false
        volume_entity_id:
          - "{{- _rtt_kata -}}"
        key: kata_template
      response_variable: _rtt_kata_tmpl_read
    - variables:
        _rtt_kata_tmpl_version: >-
          {%- set raw = _rtt_kata_tmpl_read.result | default('{}') -%}
          {%- set val = (raw | from_json) if raw is string else raw -%}
          {%- set inner = val.get('value', val) if val is mapping else {} -%}
          {%- set inner2 = (inner | from_json) if inner is string else inner -%}
          {{- inner2.get('schema_version', '') if inner2 is mapping else '' -}}
    - if: "{{- _rtt_kata_tmpl_version != '1.0.0' -}}"
      then:
        - action: script.zen_dojotools_filecabinet
          data:
            action_type: update
            show_hidden_volumes: false
            force_action: true
            volume_entity_id:
              - "{{- _rtt_kata -}}"
            key: kata_template
            value: "{{- kata_template_seed -}}"
            set_timestamp: true
            label_input: zen_summary, zen, summary
    - if: "{{- _rtt_dojo != '' -}}"
      then:
        - action: script.zen_dojotools_filecabinet
          data:
            action_type: read
            show_hidden_volumes: false
            volume_entity_id:
              - "{{- _rtt_dojo -}}"
            key: kfc_template
          response_variable: _rtt_dojo_read
        - variables:
            _rtt_dojo_raw: >-
              {%- set raw = _rtt_dojo_read.result | default('{}') -%}
              {%- set val = (raw | from_json) if raw is string else raw -%}
              {%- set inner = val.get('value', val) if val is mapping else {} -%}
              {{- (inner | from_json) if inner is string else inner -}}
            _rtt_dojo_version: "{{- _rtt_dojo_raw.get('schema_version', '') if _rtt_dojo_raw is mapping else '' -}}"
            _kfc_is_string: "{{- _rtt_dojo_raw is string -}}"
        - if: "{{- _rtt_dojo_version != '1.3.0' or _kfc_is_string -}}"
          then:
            - action: script.zen_dojotools_filecabinet
              data:
                action_type: update
                show_hidden_volumes: false
                force_action: true
                volume_entity_id:
                  - "{{- _rtt_dojo -}}"
                key: kfc_template
                value: "{{- kfc_template_seed -}}"
                set_timestamp: true
                label_input: kfc, dojo, zen
        - alias: Upconvert KFC drawers 1.1.0 → 1.2.0
          if:
            - condition: template
              value_template: "{{- _rtt_dojo_version == '1.1.0' -}}"
          then:
            - variables:
                _dojo_all: >-
                  {{ state_attr(_rtt_dojo, 'variables') | default({}, true) }}
            - repeat:
                for_each: >-
                  {{- _dojo_all.keys() | reject('in', ['AI_Cabinet_VolumeInfo', 'kfc_template']) | list -}}
                sequence:
                  - variables:
                      _kfc_key: "{{- repeat.item -}}"
                      _kfc_raw: "{{- _dojo_all.get(repeat.item, {}) -}}"
                      _kfc_v1: >-
                        {%- set _r = _kfc_raw -%}
                        {%- set _v1 = _r.get('value', _r) if _r is mapping else {} -%}
                        {%- set _v2 = _v1 if _v1 is mapping else (_v1 | from_json if _v1 is string else {}) -%}
                        {{ _v2 if _v2 is mapping else (_v2 | from_json if _v2 is string else {}) }}
                  - if:
                      - condition: template
                        value_template: "{{- _kfc_v1 is mapping and _kfc_v1.get('kata_key', '') != '' -}}"
                    then:
                      - variables:
                          _kfc_existing_meta: >-
                            {%- set m = _kfc_v1.get('meta', {}) -%}
                            {{ m if m is mapping else {} }}
                          _kfc_existing_req: >-
                            {%- set r = _kfc_existing_meta.get('requires', {}) -%}
                            {{ r if r is mapping else {} }}
                          _kfc_meta: >-
                            {{
                              _kfc_existing_meta | combine({
                                'enabled': _kfc_existing_meta.get('enabled', true),
                                'requires': _kfc_existing_req | combine({
                                  'cert':  _kfc_existing_req.get('cert', ''),
                                  'level': _kfc_existing_req.get('level', 0)
                                })
                              })
                            }}
                          _kfc_updated: >-
                            {{ _kfc_v1 | combine({'meta': _kfc_meta}) | tojson }}
                      - action: script.zen_dojotools_filecabinet
                        data:
                          action_type: update
                          show_hidden_volumes: false
                          force_action: true
                          set_timestamp: false
                          volume_entity_id:
                            - "{{- _rtt_dojo -}}"
                          key: "{{- _kfc_key -}}"
                          value: "{{- _kfc_updated -}}"
        - alias: Upconvert KFC drawers 1.2.0 → 1.3.0
          if:
            - condition: template
              value_template: "{{- _rtt_dojo_version in ['1.1.0', '1.2.0'] -}}"
          then:
            - variables:
                _dojo_all_13: >-
                  {{ state_attr(_rtt_dojo, 'variables') | default({}, true) }}
            - repeat:
                for_each: >-
                  {{- _dojo_all_13.keys() | reject('in', ['AI_Cabinet_VolumeInfo', 'kfc_template']) | list -}}
                sequence:
                  - variables:
                      _kfc_key: "{{- repeat.item -}}"
                      _kfc_raw: "{{- _dojo_all_13.get(repeat.item, {}) -}}"
                      _kfc_v1: >-
                        {%- set _r = _kfc_raw -%}
                        {%- set _v1 = _r.get('value', _r) if _r is mapping else {} -%}
                        {%- set _v2 = _v1 if _v1 is mapping else (_v1 | from_json if _v1 is string else {}) -%}
                        {{ _v2 if _v2 is mapping else (_v2 | from_json if _v2 is string else {}) }}
                  - if:
                      - condition: template
                        value_template: "{{- _kfc_v1 is mapping and _kfc_v1.get('kata_key', '') != '' -}}"
                    then:
                      - variables:
                          _kfc_updated: >-
                            {{
                              _kfc_v1 | combine({
                                'drift_threshold': _kfc_v1.get('drift_threshold', 7),
                                'emission_cooldown_minutes': _kfc_v1.get('emission_cooldown_minutes', 60),
                                'suggested_act_event': _kfc_v1.get('suggested_act_event', none)
                              }) | tojson
                            }}
                      - action: script.zen_dojotools_filecabinet
                        data:
                          action_type: update
                          show_hidden_volumes: false
                          force_action: true
                          set_timestamp: false
                          volume_entity_id:
                            - "{{- _rtt_dojo -}}"
                          key: "{{- _kfc_key -}}"
                          value: "{{- _kfc_updated -}}"
    # System cabinet — seed zen_summarizer_act_whitelist if missing
    # Uses event bus (set_variable_zenos_system_cabinet) — filecabinet blocks syscab writes
    - if: "{{- _rtt_system != '' -}}"
      then:
        - variables:
            _rtt_sys_wl_raw: >-
              {%- import 'zenos_cabinets.jinja' as CABS -%}
              {{- CABS.cabinet_drawer_value(_rtt_system, 'zen_summarizer_act_whitelist', {}) | from_json() }}
            _rtt_sys_whitelist_exists: >-
              {{- _rtt_sys_wl_raw is mapping and _rtt_sys_wl_raw.keys() | list | length > 0 -}}
        - if: "{{- not _rtt_sys_whitelist_exists -}}"
          then:
            - event: set_variable_zenos_system_cabinet
              event_data:
                key: zen_summarizer_act_whitelist
                value: "{{- act_whitelist_seed -}}"
                set_timestamp: true
    alias: Zen AdminTools Reset Template
    description: >-
      Zen AdminTools Reset Templates (1.3.0). Presses zen_template and
      kata_template into the Kata cabinet, kfc_template into the Dojo cabinet,
      and zen_summarizer_act_whitelist into the System cabinet. Called by Flynn
      gate-3 if templates are missing or outdated. Upconverts KFC drawers from
      1.1.0 or 1.2.0 to 1.3.0 (adds drift_threshold, emission_cooldown_minutes,
      suggested_act_event). Idempotent.


  zen_admintools_summarizer_act:
    alias: Zen AdminTools Summarizer Act Whitelist
    description: >-
      Manages the zen_summarizer_act_whitelist drawer in the System cabinet.
      Controls which suggested_act_event kinds the ninja summarizer is allowed
      to emit on the event bus. Closed by default — operator must explicitly
      add event kinds. The kill switch (input_boolean.zen_action_emission_enabled)
      is a separate master toggle; this whitelist is a per-event-kind gate.
    icon: mdi:shield-check
    mode: single
    fields:
      action_type:
        name: Action Type
        description: list | add | remove | reset
        required: true
        selector:
          select:
            options:
              - list
              - add
              - remove
              - reset
      event:
        name: Event Kind
        description: The suggested_act_event kind string to add or remove. Required for add/remove.
        required: false
        selector:
          text:
      caller_token:
        name: Caller Token
        description: Opaque correlation token. Not interpreted by this script.
        required: false
        selector:
          text:

    sequence:
    - variables:
        caller_token: "{{- caller_token | default('') -}}"
        action_type: "{{- action_type | default('list') | lower -}}"
        event: "{{- event | default('') | trim -}}"
        _system: "{{- states('sensor.zen_system_cabinet_resolved') -}}"
    - if:
      - condition: template
        value_template: "{{- _system == '' -}}"
      then:
      - variables:
          _sa_stop:
            status: error
            message: System cabinet unavailable.
            caller_token: "{{- caller_token -}}"
      - stop: >-
          summarizer_act failed — system cabinet not resolved
        response_variable: _sa_stop
    # Read current whitelist — state_attr direct (filecabinet blocks all syscab writes)
    - variables:
        _wl_raw: >-
          {%- import 'zenos_cabinets.jinja' as CABS -%}
          {{- CABS.cabinet_drawer_value(_system, 'zen_summarizer_act_whitelist', {}) | from_json() -}}
        _wl_current: >-
          {%- set w = _wl_raw if _wl_raw is mapping else {} -%}
          {{ w.get('allowed_events', []) if w is mapping else [] }}
    # list
    - if:
      - condition: template
        value_template: "{{- action_type == 'list' -}}"
      then:
      - variables:
          result:
            status: success
            action_type: list
            allowed_events: "{{- _wl_current -}}"
            count: "{{- _wl_current | length -}}"
            caller_token: "{{- caller_token -}}"
      - stop: list complete
        response_variable: result
    # reset
    - if:
      - condition: template
        value_template: "{{- action_type == 'reset' -}}"
      then:
      - event: set_variable_zenos_system_cabinet
        event_data:
          key: zen_summarizer_act_whitelist
          value:
            allowed_events: []
            note: Operator-managed whitelist.
          set_timestamp: true
      - variables:
          result:
            status: success
            action_type: reset
            message: Whitelist cleared. All action emission blocked until events are re-added.
            caller_token: "{{- caller_token -}}"
      - stop: reset complete
        response_variable: result
    # add / remove — require event field
    - if:
      - condition: template
        value_template: "{{- event == '' -}}"
      then:
      - variables:
          _sa_missing_event:
            status: error
            message: event field required for add/remove.
            caller_token: "{{- caller_token -}}"
      - stop: >-
          summarizer_act add/remove requires event field
        response_variable: _sa_missing_event
    - variables:
        _wl_updated: >-
          {%- if action_type == 'add' -%}
            {%- if event not in _wl_current -%}
              {{ (_wl_current + [event]) | tojson }}
            {%- else -%}
              {{ _wl_current | tojson }}
            {%- endif -%}
          {%- else -%}
            {{ _wl_current | reject('equalto', event) | list | tojson }}
          {%- endif -%}
    - event: set_variable_zenos_system_cabinet
      event_data:
        key: zen_summarizer_act_whitelist
        value: >-
          {{ {'allowed_events': _wl_updated | from_json if _wl_updated is string else _wl_updated, 'note': 'Operator-managed whitelist.'} | tojson }}
        set_timestamp: true
    - variables:
        result:
          status: success
          action_type: "{{- action_type -}}"
          event: "{{- event -}}"
          allowed_events: >-
            {{ _wl_updated | from_json if _wl_updated is string else _wl_updated }}
          caller_token: "{{- caller_token -}}"
    - stop: "{{- action_type -}} complete"
      response_variable: result

  zen_admintools_reset_labels:
    alias: Zen AdminTools Reset Labels (NUCLEAR)
    description: >-
      ⚠️  NUCLEAR — deletes ALL zen_ labels and ALL their entity assignments.
      No undo. Flynn fires automatically (zen_label_health → critical triggers
      Stepgate Sentinel → Gate 0 recreates labels → Gate 1 re-assigns).

      What this does, in order:
        1. Untag all entities from every label with a zen_ ID
        2. Delete every zen_ label (zen_* IDs only — non-zen labels untouched)
        3. Fire zen_resolver_refresh so resolver sensors re-evaluate immediately

      Non-zen labels (home, media_players, hot_tub, etc.) are never touched.
      User cabinets are never touched.

      If you only need to wipe assignments (labels survive), use
      zen_dojotools_labels with action_type: reset instead.

      confirm: true is REQUIRED. This tool will refuse without it.
    icon: mdi:label-off
    mode: single
    fields:
      confirm:
        name: Confirm Nuclear Reset
        description: >-
          Must be true to proceed. This deletes all zen_ labels. No undo.
        required: true
        default: false
        selector:
          boolean:
      caller_token:
        name: Caller Token
        description: Opaque token passed through by the caller for correlation. Not interpreted by this script.
        required: false
        selector:
          text:

    sequence:
    # --------------------------------------------------------------
    # Always normalize User/AI inputs so we don't have to react JIT
    # --------------------------------------------------------------
    - variables:
        caller_token: "{{- caller_token | default('') -}}"
    - if:
      - condition: template
        value_template: "{{- not confirm -}}"
      then:
      - stop: >-
          Nuclear reset refused — confirm: true required. All zen_ labels and
          assignments will be permanently deleted. Set confirm: true to proceed.

    - variables:
        zen_labels: "{{- labels() | select('match', '^zen_') | list -}}"

    # Pass 1 — untag all entities from every zen_ label
    - repeat:
        for_each: "{{- zen_labels -}}"
        sequence:
        - variables:
            lbl_entities: "{{- label_entities(repeat.item) | list -}}"
        - if:
          - condition: template
            value_template: "{{- lbl_entities | length > 0 -}}"
          then:
          - action: homeassistant.remove_label_from_entity
            data:
              label_id: "{{- repeat.item -}}"
              entity_id: "{{- lbl_entities -}}"

    # Pass 2 — delete all zen_ labels
    - repeat:
        for_each: "{{- zen_labels -}}"
        sequence:
        - action: homeassistant.delete_label
          data:
            label_id: "{{- repeat.item -}}"

    # Pass 3 — kick resolvers; Flynn sentinel fires from zen_label_health change
    - event: zen_resolver_refresh

    - variables:
        result:
          status: success
          message: >-
            Nuclear label reset complete. {{ zen_labels | length }} zen_ label(s)
            deleted. zen_resolver_refresh fired. Flynn will recreate and reassign
            on next sentinel cycle.
          deleted_count: "{{- zen_labels | length -}}"
          caller_token: "{{- caller_token -}}"
    - stop: reset labels complete
      response_variable: result

  zen_admintools_cabinetadmin:
    alias: Zen AdminTools CabinetAdmin
    description: >-
      Low-level cabinet lifecycle tool. Manages ZenOS cabinet sensors at the
      hardware and provisioning layer. USE ONLY when a cabinet needs to be
      provisioned for the first time, recovered from a broken state, or
      diagnosed. Do NOT use for normal data operations — reading and writing
      drawer content uses zen_dojotools_filecabinet instead.

      Cabinet sensors have a state machine: init (no VolumeInfo yet) →
      online_unmounted → online_mounted. Cabinets must be provisioned (init
      mode) before any other system can use them. A cabinet in 'init' state
      has no identity, no GUID, and cannot hold user data.

      Key operations — call mode: help for full details:
      inspect — read all drawers; always run this first before any destructive op.
      init — stamp a virgin cabinet with VolumeInfo + GUID; safe, refuses if
        already initialized; requires cab_type for non-default cabinet roles.
      hammer — wipe all drawers and mark destroyed; use when init refuses due to
        residue; set confirm_init: true to re-stamp immediately after wipe;
        requires hammer_ok: true as explicit safety gate.
      restore — recover a cabinet that lost VolumeInfo from HA recorder restart.
      mount_status — list mounted/unmounted state across all zen_cabinet entities.
      repair_mount / repair_dismount — force mount state on a stuck cabinet;
        does not touch drawer content.
      reset_all — NUCLEAR, wipes all ring-0 system cabinets and reboots Flynn;
        requires confirm: true; user and expansion cabinets are untouched.

      Safety gates that block destructive ops: hammer requires hammer_ok: true;
      init on an unknown-state cabinet requires confirm_action: true; reset_all
      requires confirm: true. An AI must not set these without explicit human
      instruction — they exist to prevent accidental data loss.
    mode: parallel
    max: 10
    fields:
      mode:
        name: Operation Mode
        selector:
          select:
            options:
            - help
            - inspect
            - init
            - hammer
            - restore
            - reset
            - mount_status
            - repair_mount
            - repair_dismount
            - reset_all
            - flip_schema_version
        default: help
      target_cabinet:
        name: Target Cabinet
        selector:
          entity:
            filter:
            - domain: sensor
        default: ''
      cab_type:
        name: Cabinet Type (init only)
        description: >-
          Cabinet type passed to cabinetadmin_factory for virgin cabinet initialization
          (e.g. ai_user, household, AI Data Storage Cabinet). Default empty = stamp
          uses its own default type.
        required: false
        default: ''
        selector:
          text:
      confirm_action:
        name: Confirm Init (init only)
        description: >-
          Required when target cabinet state is unknown (no recorder history —
          could be virgin or a wiped initialized cab). Explicit human confirmation
          before stamping. Not required when state is init (unambiguously virgin).
        required: false
        default: false
        selector:
          boolean:
      confirm_init:
        name: Auto-Init After Hammer
        description: >-
          If true, run cabinetadmin_factory on the wiped cabinet immediately
          after hammer completes. Cabinet is re-stamped with a fresh GUID and
          VolumeInfo. Requires cab_type to set the correct cabinet type.
        required: false
        default: false
        selector:
          boolean:
      hammer_ok:
        name: Allow Hammer Destroy Mode
        selector:
          boolean:
        default: false
      confirm:
        name: Confirm Nuclear Reset (reset_all only)
        description: Required for reset_all. Wipes all ring-0 cabinets. No undo.
        required: false
        default: false
        selector:
          boolean:
      schema_version:
        name: Schema Version (flip_schema_version only)
        description: >-
          Target cab_schema_version value to write into syscab. If omitted,
          auto-flips (0→1 or 1→0). Integer. Controls legacy vs mount-aware mode.
        required: false
        selector:
          number:
            min: 0
            max: 9
            mode: box
      caller_token:
        name: Caller Token
        description: Opaque token passed through by the caller for correlation. Not interpreted by this script.
        required: false
        selector:
          text:
    sequence:
    # --------------------------------------------------------------
    # Always normalize User/AI inputs so we don't have to react JIT
    # --------------------------------------------------------------
    - variables:
        caller_token: "{{- caller_token | default('') -}}"
    - variables:
        canon_ring0_cabinets:
        - sensor.zenos_system_cabinet
        - sensor.zenos_system_history_cabinet
        - sensor.zenos_dojo_cabinet
        - sensor.zenos_kata_cabinet
        - sensor.zenos_history_cabinet
        - sensor.zenos_scratchpad_cabinet
        - sensor.zenos_default_household_cabinet
        - sensor.zenos_default_household_history_cabinet
        - sensor.zenos_default_family_cabinet
        - sensor.zenos_default_family_history_cabinet
        - sensor.zenos_default_user_cabinet
        - sensor.zenos_default_user_history_cabinet
        - sensor.zenos_default_ai_user_cabinet
        - sensor.zenos_default_ai_user_history_cabinet
    - variables:
        op: "{{- mode -}}"
        use_universe: >
          {{- target_cabinet|default('') in ['', None] -}}
        effective_targets: >
          {%- if use_universe -%}
            {{- canon_ring0_cabinets -}}
          {%- else -%}
            {{- [target_cabinet] -}}
          {%- endif -%}
    - if:
      - condition: template
        value_template: "{{- op == 'help' -}}"
      then:
      - variables:
          _help:
            status: info
            tool: zen_admintools_cabinetadmin
            summary: >-
              Cabinet admin tool for provisioning, inspection, and recovery of
              ZenOS cabinet sensors. Use for new hardware setup and
              troubleshooting. Not needed for normal household/member operations.
            when_to_use:
              provisioning_new_cab: >-
                New expansion cabinet added to HA → run inspect first to confirm
                state, then init (set cab_type to match intended role, e.g.
                'AI Data Storage Cabinet'). The cabinet must be in 'init' state
                (no VolumeInfo). Init is safe — it refuses if already initialized.
              cab_has_old_or_broken_volumeinfo: >-
                Provisioner fails because cabinet has stale VolumeInfo (e.g. old
                schema with 'guid' instead of 'id'). Run hammer with
                confirm_init: true and the correct cab_type. Hammer wipes the
                cabinet and stamps a fresh VolumeInfo in one step. Re-provision
                after.
              cab_stuck_mounted_or_dismounted: >-
                Cabinet sensor shows wrong mount state after a failed cycle.
                Use repair_mount or repair_dismount to force the correct state.
                Does not touch any drawer data.
              want_to_see_all_drawers: >-
                Run inspect on the target cabinet. Returns every drawer and its
                current value. Do this before any destructive operation.
              full_system_reset: >-
                reset_all wipes ALL ring-0 system cabinets and triggers Flynn
                bootstrap. Only use after a bad deployment or schema migration.
                confirm: true required. No undo. User cabinets are NOT touched.
            modes:
              help: Return this help text. No target needed.
              inspect: >-
                Read all drawers on the target cabinet and return their current
                values. Safe — read-only. No target = runs across all ring-0
                cabinets. Run this first when troubleshooting any cabinet issue.
              init: >-
                Stamp a virgin cabinet with VolumeInfo, GUID, and initial
                drawers. Refuses if cabinet is already initialized (good) or
                has residue (potentially_bad — hammer first). Cabinet must be
                in 'init' sensor state or 'unknown' (unknown requires
                confirm_action: true). Requires cab_type if non-default.
              hammer: >-
                Wipe all drawers and mark cabinet as destroyed (_hammered marker).
                Stronger than reset — the _hammered marker signals that the
                cabinet was intentionally wiped. Requires hammer_ok: true.
                Set confirm_init: true to immediately stamp a fresh VolumeInfo
                after wiping — saves a separate init call. Use when a cabinet
                has bad state that init refuses to overwrite.
              restore: >-
                Attempt to recover a cabinet that lost its VolumeInfo from HA
                recorder. Reads existing drawer state and repairs where possible.
              reset: >-
                Wipe all drawers from the target cabinet. No _hammered marker.
                Use when you want a clean cabinet without the destroyed tag.
              mount_status: >-
                Return mounted/unmounted state for every zen_cabinet entity.
                No target needed. Useful to see which cabinets are online_mounted
                vs online_unmounted at a glance.
              repair_mount: >-
                Force-write meta.mounted=true on a cabinet stuck in the wrong
                state. Use when cabinet should be mounted but sensor disagrees
                after a failed mount cycle. Does not modify any drawer content.
              repair_dismount: >-
                Force-write meta.mounted=false on a stuck cabinet. Mirror of
                repair_mount for the dismounted direction.
              reset_all: >-
                NUCLEAR — wipes ALL ring-0 canonical cabinets, reseeds schemas,
                and triggers Flynn bootstrap. No undo. User and expansion
                cabinets are NOT touched. confirm: true required.
              flip_schema_version: >-
                Toggle cab_schema_version in syscab (0=legacy, 1+=mount-aware).
                Controls Flynn operating mode. Normally not needed — only use
                during schema migrations or to recover a stuck Flynn.
            fields:
              target_cabinet: >-
                Cabinet entity to operate on. Leave blank for inspect, hammer,
                init, restore, reset, and repair ops = operates on all ring-0
                cabinets (inspect) or requires a target (others). mount_status
                and reset_all ignore this field.
              cab_type: >-
                Required for init (and hammer with confirm_init). Sets the
                cabinet type written into VolumeInfo. Common values: 'AI Data
                Storage Cabinet', 'AI Household Cabinet', 'AI Family Cabinet',
                'AI User Cabinet', 'Chat History Cabinet'. Default = factory
                default type.
              confirm_action: >-
                Required when cab state is 'unknown' (no recorder history —
                could be virgin or wiped-initialized). Explicit confirmation
                before init stamps. Not needed when state is 'init' (unambiguously
                virgin) or 'online_unmounted'.
              confirm_init: >-
                Hammer only. If true, stamps a fresh VolumeInfo immediately
                after wiping the cabinet. Equivalent to hammer + init in one
                call. Set cab_type accordingly.
              hammer_ok: Required for hammer mode. Explicit safety gate.
              confirm: Required for reset_all. Explicit safety gate.
      - stop: help returned
        response_variable: _help
    - choose:
      - conditions:
        - condition: template
          value_template: "{{- op == 'hammer' and not hammer_ok -}}"
        sequence:
        - variables:
            result:
              status: error
              message: 'Hammer mode requires hammer_ok: true'
              caller_token: "{{- caller_token -}}"
        - stop: hammer blocked
          response_variable: result
    - variables:
        inspect_acc: {}
        result: {}
    - repeat:
        for_each: "{{- effective_targets -}}"
        sequence:
        - variables:
            cab: "{{- repeat.item -}}"
            vars: "{{ state_attr(cab,'variables') | default({}, true) }}"
            drawers: "{{- vars.keys() | list -}}"
        - choose:
          - conditions:
            - condition: template
              value_template: "{{- op == 'inspect' -}}"
            sequence:
            - variables:
                _scroll_keys: >-
                  {%- set ns = namespace(s=[]) -%}
                  {%- for key, drawer in vars.items() if key != '_label_index' -%}
                    {%- set entry = drawer if drawer is mapping else {} -%}
                    {%- set mt = entry.get('meta', {}) -%}
                    {%- set mt = mt if mt is mapping else (mt | from_json if mt is string else {}) -%}
                    {%- if mt.get('ro', false) -%}
                      {%- set ns.s = ns.s + [key] -%}
                    {%- endif -%}
                  {%- endfor -%}
                  {{- ns.s -}}
            - variables:
                inspect_acc: >-
                  {{- inspect_acc | combine({
                    cab: {
                      'state': states(cab),
                      'drawers': drawers | reject('in', _scroll_keys) | list,
                      'scroll': _scroll_keys
                    }
                  }) -}}
          - conditions:
            - condition: template
              value_template: "{{- op == 'restore' -}}"
            sequence:
            - if:
              - condition: template
                value_template: "{{- vars == {} -}}"
              then:
              - event: set_variable_legacy
                event_data:
                  volume_entity: "{{- cab -}}"
                  key: _restored_marker
                  value:
                    value: restored
                    timestamp: "{{- now().isoformat() -}}"
                  set_timestamp: true
          - conditions:
            - condition: template
              value_template: "{{- op == 'reset' -}}"
            sequence:
            - event: clear_variables_legacy
              event_data:
                volume_entity: "{{- cab -}}"
                key: '*'
          - conditions:
            - condition: template
              value_template: "{{- op == 'hammer' -}}"
            sequence:
            - event: clear_variables_legacy
              event_data:
                volume_entity: "{{- cab -}}"
                key: '*'
            - event: set_variable_legacy
              event_data:
                volume_entity: "{{- cab -}}"
                key: _hammered
                value:
                  value: destroyed
                  timestamp: "{{- now().isoformat() -}}"
                set_timestamp: true
            - if: "{{- confirm_init | default(false) | bool -}}"
              then:
              - action: script.zen_admintools_cabinetadmin_factory
                data:
                  confirm_action: true
                  cabinet_entity: "{{- cab -}}"
                  cabinet_type: "{{- cab_type | default('') -}}"
                response_variable: _hammer_init_result
              - variables:
                  _hammer_init_guid: "{{- _hammer_init_result.get('guid', '') if _hammer_init_result is mapping else '' -}}"
          - conditions:
            - condition: template
              value_template: "{{- op == 'init' -}}"
            sequence:
            # ── Boot guard — refuse if cab not yet restored from recorder ──
            # unavailable = recorder hasn't restored yet, state is indeterminate.
            # unknown = no recorder history at all = truly virgin. Allow.
            - if:
              - condition: template
                value_template: "{{- states(cab) == 'unavailable' -}}"
              then:
              - variables:
                  result:
                    status: refused
                    mode: init
                    target: "{{- cab -}}"
                    action_taken: none
                    reason: cab_unavailable
              - stop: cab unavailable — wait for HA to stabilize
                response_variable: result
            # ── Unknown guard — require confirm_action when state is unknown ─
            # unknown = no recorder history. Could be truly virgin OR a wiped
            # initialized cab. Cannot distinguish without explicit confirmation.
            # init state = triggered + no VolumeInfo = unambiguously virgin → skip.
            - if:
              - condition: template
                value_template: "{{- states(cab) == 'unknown' and not (confirm_action | default(false)) -}}"
              then:
              - variables:
                  result:
                    status: refused
                    mode: init
                    target: "{{- cab -}}"
                    action_taken: none
                    reason: confirm_required
                    message: >-
                      Cabinet state is unknown (no recorder history). Cannot confirm
                      virgin status. Set confirm_action: true to proceed.
              - stop: confirm required — unknown cab state
                response_variable: result
            # ── Classifier ─────────────────────────────────────────────────
            - variables:
                _vars: >-
                  {%- set v = state_attr(cab, 'variables') | default(none, true) -%}
                  {{ v if v is mapping else {} }}
                has_volumeinfo: "{{- 'AI_Cabinet_VolumeInfo' in _vars -}}"
                has_label_index: "{{- '_label_index' in _vars -}}"
                has_context:     "{{- '_context' in _vars -}}"
                non_system_drawers: >-
                  {%- set sys = ['AI_Cabinet_VolumeInfo','_label_index','_context', '_restored_marker','_hammered'] -%}
                  {{- _vars.keys() | reject('in', sys) | reject('match', '^_') | list -}}
                #_vi_raw: "{{ _vars.get('AI_Cabinet_VolumeInfo', {}) }}"
                #_vi_val: >-
                #  {%- set r = _vi_raw.get('value', {}) if _vi_raw is mapping else {} -%}
                #  {{ r if r is mapping else (r | from_json if r is string else {}) }}
                _vi_val: >-
                  {%- import 'zenos_cabinets.jinja' as CABS -%}
                  {{- CABS.cabinet_drawer_value(cab, 'AI_Cabinet_VolumeInfo', {}) | from_json() -}}

                cabinet_guid: "{{- _vi_val.get('id', '') | string | trim -}}"
                cabinet_state_class: >-
                  {%- if not has_volumeinfo and not has_label_index and not has_context
                         and (non_system_drawers | length == 0)
                         and (cabinet_guid == '') -%}
                    virgin
                  {%- elif has_volumeinfo and cabinet_guid != '' -%}
                    good
                  {%- else -%}
                    potentially_bad
                  {%- endif -%}
            # ── Route ──────────────────────────────────────────────────────
            - choose:
              - conditions: "{{- cabinet_state_class == 'virgin' -}}"
                sequence:
                - action: script.zen_admintools_cabinetadmin_factory
                  data:
                    confirm_action: true
                    cabinet_entity: "{{- cab -}}"
                    cabinet_type: "{{- cab_type | default('') -}}"
                  response_variable: _stamp_result
                - variables:
                    result:
                      status: success
                      mode: init
                      target: "{{- cab -}}"
                      classification: virgin
                      action_taken: stamped
                      reason: initialized
                      stamp_result: "{{- _stamp_result -}}"
              - conditions: "{{- cabinet_state_class == 'good' -}}"
                sequence:
                - variables:
                    result:
                      status: refused
                      mode: init
                      target: "{{- cab -}}"
                      classification: good
                      action_taken: none
                      reason: already_initialized
                - stop: already initialized
                  response_variable: result
              default:
              # ── REARM GATE (potentially_bad only) ────────────────────────
              # Virgin and good cabs proceed automatically. Only potentially_bad
              # requires manual confirmation — residue present, human decides:
              # hammer or repair. Must rearm input_boolean.zenos_cab_init_rearm.
              - if:
                - condition: template
                  value_template: "{{- not is_state('input_boolean.zenos_cab_init_rearm', 'on') -}}"
                then:
                - variables:
                    result:
                      status: refused
                      mode: init
                      target: "{{- cab -}}"
                      classification: potentially_bad
                      action_taken: none
                      reason: rearm_required
                - stop: rearm required — potentially_bad cabinet
                  response_variable: result
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.zenos_cab_init_rearm
              - variables:
                  result:
                    status: refused
                    mode: init
                    target: "{{- cab -}}"
                    classification: "{{- cabinet_state_class -}}"
                    action_taken: none
                    reason: repair_required
              - stop: repair required
                response_variable: result
          # ── repair_mount — force meta.mounted: true (bypass state guards) ──
          - conditions:
            - condition: template
              value_template: "{{- op == 'repair_mount' -}}"
            sequence:
            - event: set_variable_legacy
              event_data:
                volume_entity: "{{- cab -}}"
                key: meta
                value: "{{ {'mounted': true} }}"
                set_timestamp: true
            - wait_template: "{{- states(cab) == 'online_mounted' -}}"
              timeout: '00:00:05'
              continue_on_timeout: true
            - event: zen_event
              event_data:
                event:
                  kind: cabinet_mounted
                  component: "{{- cab -}}"
                  severity: info
                  summary: "CabinetAdmin repair_mount: '{{ cab }}' forced to mounted (verified: {{ states(cab) == 'online_mounted' }})."
          # ── repair_dismount — force meta.mounted: false (bypass state guards) ─
          - conditions:
            - condition: template
              value_template: "{{- op == 'repair_dismount' -}}"
            sequence:
            - event: set_variable_legacy
              event_data:
                volume_entity: "{{- cab -}}"
                key: meta
                value: "{{ {'mounted': false} }}"
                set_timestamp: true
            - wait_template: "{{- states(cab) in ['online_unmounted', 'dismounted'] -}}"
              timeout: '00:00:05'
              continue_on_timeout: true
            - event: zen_event
              event_data:
                event:
                  kind: cabinet_dismounted
                  component: "{{- cab -}}"
                  severity: info
                  summary: "CabinetAdmin repair_dismount: '{{ cab }}' forced to dismounted (verified: {{ states(cab) in ['online_unmounted', 'dismounted'] }})."
    # ── inspect — emit accumulated result after loop ─────────────────────────
    - if:
      - condition: template
        value_template: "{{- op == 'inspect' -}}"
      then:
      - variables:
          inspect_acc: "{{ inspect_acc | combine({'caller_token': caller_token | default('')}) if inspect_acc is mapping else inspect_acc }}"
      - stop: inspect complete
        response_variable: inspect_acc
    # ── hammer — return result with optional init_guid ────────────────────────
    - if:
      - condition: template
        value_template: "{{- op == 'hammer' -}}"
      then:
      - variables:
          _hammer_result: >
            {{-
              {
                'status': 'ok',
                'op': 'hammer',
                'target': cab,
                'init_guid': _hammer_init_guid | default(''),
                'auto_init': confirm_init | default(false) | bool,
                'caller_token': caller_token | default('')
              }
            -}}
      - stop: hammer complete
        response_variable: _hammer_result
    # ── init — return result after classification and stamp ───────────────────
    - if:
      - condition: template
        value_template: "{{- op == 'init' -}}"
      then:
      - stop: init complete
        response_variable: result
    # ── mount_status — read mount state across all zen_cabinet entities ───────
    - if:
      - condition: template
        value_template: "{{- op == 'mount_status' -}}"
      then:
      - variables:
          _all_cabs: >-
            {{- label_entities('Zen Cabinet' | slugify) | list -}}
      - variables:
          mount_status_result: >-
            {%- set ns = namespace(m={}) -%}
            {%- for eid in _all_cabs -%}
              {%- set _v = state_attr(eid, 'variables') | default({}, true) -%}
              {%- set _v = _v if _v is mapping else {} -%}
              {%- set _mt = _v.get('meta', {}) -%}
              {%- set _mt = _mt if _mt is mapping else (_mt | from_json if _mt is string else {}) -%}
              {%- set ns.m = ns.m | combine({eid: {'state': states(eid), 'mounted': _mt.get('mounted', false)}}) -%}
            {%- endfor -%}
            {{ ns.m | combine({'caller_token': caller_token}) }}
      - stop: mount_status complete
        response_variable: mount_status_result
    # ── flip_schema_version — toggle cab_schema_version in syscab ────────────
    - if:
      - condition: template
        value_template: "{{- op == 'flip_schema_version' -}}"
      then:
      - variables:
          #_syscab_vars: "{{ state_attr('sensor.zenos_system_cabinet', 'variables') | default({}, true) }}"
          #_syscab_mapped: "{{- _syscab_vars if _syscab_vars is mapping else {} -}}"
          #_csve: "{{ _syscab_mapped.get('cab_schema_version', {}) }}"
          #_csve_mapped: "{{- _csve if _csve is mapping else {} -}}"
          #_current_v: "{{- _csve_mapped.get('value', 0) | int(0) -}}"
          _current_v: >
            {%- import 'zenos_cabinets.jinja' as CABS -%}
            {{- CABS.cabinet_drawer_value('sensor.zenos_system_cabinet', 'cab_schema_version', 0) | from_json() | int(0) -}}
          _new_v: "{{- schema_version | default(none) | int(-1) if schema_version | default(none) is not none else (1 if _current_v == 0 else 0) -}}"
      - event: set_variable_legacy
        event_data:
          key: cab_schema_version
          value: "{{ {'value': _new_v} }}"
          volume_entity: sensor.zenos_system_cabinet
          set_timestamp: true
      - variables:
          result:
            status: success
            message: "cab_schema_version {{ _current_v }} → {{ _new_v }} in syscab. Flynn now runs in {{ 'mount-aware' if _new_v >= 1 else 'legacy' }} mode."
            previous_value: "{{- _current_v -}}"
            new_value: "{{- _new_v -}}"
            caller_token: "{{- caller_token -}}"
      - stop: flip_schema_version complete
        response_variable: result
    # ── reset_all — nuclear cabinet wipe + reseed + Flynn bootstrap ──────────
    - if:
      - condition: template
        value_template: "{{- op == 'reset_all' -}}"
      then:
      - if:
        - condition: template
          value_template: "{{- not confirm -}}"
        then:
        - variables:
            result:
              status: error
              message: >-
                reset_all refused — confirm: true required. This wipes all ring-0
                canonical cabinets, reseeds schemas, and triggers Flynn bootstrap.
                No undo. Set confirm: true to proceed.
              caller_token: "{{- caller_token -}}"
        - stop: confirm required
          response_variable: result
      # Step 1 — wipe all ring-0 cabinets
      - repeat:
          for_each: "{{- canon_ring0_cabinets -}}"
          sequence:
          - event: clear_variables_legacy
            event_data:
              volume_entity: "{{- repeat.item -}}"
              key: '*'
      # Step 2 — reseed kfc_template + zen_template
      - action: script.zen_admintools_reset_template
        data: {}
      # Step 3 — kick resolvers; Flynn sentinel fires from zen_cabinet_health change
      - event: zen_resolver_refresh
      - variables:
          result:
            status: success
            message: >-
              reset_all complete. {{ canon_ring0_cabinets | length }} ring-0
              cabinet(s) wiped. Schemas reseeded via reset_template.
              zen_resolver_refresh fired. Flynn will bootstrap on next sentinel
              cycle. User cabinets were not touched.
            wiped_count: "{{- canon_ring0_cabinets | length -}}"
            caller_token: "{{- caller_token -}}"
      - stop: reset_all complete
        response_variable: result

    - variables:
        result:
          status: success
          message: "AdminTools completed '{{ op }}' on {{ effective_targets | length }} cabinet(s)."
          op: "{{- op -}}"
          target_count: "{{- effective_targets | length -}}"
          caller_token: "{{- caller_token -}}"
    - stop: complete
      response_variable: result

  zen_admintools_cabinetadmin_factory:
    sequence:
    - variables:
        owner_person: "{{- owner_person | default('') -}}"
        partner_person: "{{- partner_person | default('') -}}"
        cabinet_guid: "{{- cabinet_guid | default('') -}}"
        auto_profile: "{{- auto_profile | default(true) -}}"
        confirm_action: "{{- confirm_action | default(false) -}}"
        force_new_guid: "{{- force_new_guid | default(false) -}}"
        caller_token: "{{- caller_token | default('') -}}"
    - choose:
      - conditions:
        - condition: template
          value_template: "{{- not confirm_action -}}"
        sequence:
        - variables:
            response:
              status: error
              message: 'Confirmation required — set confirm_action: true.'
              caller_token: "{{- caller_token -}}"
        - stop: Confirmation required
          response_variable: response
    - variables:
        cabinet_entity: "{{- cabinet_entity | default('') -}}"
        cabinet_type: "{{- cabinet_type | default('AI Data Storage Cabinet') -}}"
        cabinet_friendly: "{{- state_attr(cabinet_entity,'friendly_name') | default(cabinet_entity) -}}"
        now_iso: "{{- now().isoformat() -}}"
        schema_version: 1
        cabinet_guid: >
          {{-
            '%04x%04x-%04x-%04x-%04x-%04x%04x%04x' 
              | format(range(0,65536)|random,range(0,65536)|random,range(0,65536)|random,range(0,65536)|random,range(0,65536)|random,range(0,65536)|random,range(0,65536)|random,range(0,65536)|random) 
              if (force_new_guid or not cabinet_guid) 
              else cabinet_guid 
          -}}
        labels_from_manifest: >
          {{- state_attr('sensor.zen_library_manifest','value') | default({}, true) -}}
        flag_profile: >
          {% if not auto_profile %}
            {{- explicit_flag_profile | default('standard') -}}
          {% else %}
            {%- set lbls = labels_from_manifest | string | lower -%}
            {%- if 'household_cabinet' in lbls -%}system
            {%- elif 'family_cabinet' in lbls -%}secure
            {%- elif 'user_cabinet' in lbls or 'ai_user' in lbls -%}public
            {%- elif 'kata_cabinet' in lbls or 'kata_storage' in lbls -%}system
            {%- elif 'chat_history' in lbls or cabinet_type | lower == 'chat history cabinet' -%}secure
            {%- elif 'archive_cabinet' in lbls or cabinet_type | lower == 'archive cabinet' %}system
            {%- else -%}standard
            {%- endif %}
          {%- endif -%}
        flags: >
          {%- set fp = flag_profile -%}
          {%- set is_kata = 'kata' in (cabinet_type | lower) -%}
          {%- set is_syscab = cabinet_entity == 'sensor.zenos_system_cabinet' -%}
          {%- if fp == 'system' -%}
            {%- set _f = {'system': True, 'hidden': False, 'read_only': True, 'secure_mode': True, 'gc_eligible': is_kata} -%}
          {%- elif fp == 'secure' %}
            {% set _f = {'system': False, 'hidden': True, 'read_only': True, 'secure_mode': True, 'gc_eligible': false} -%}
          {%- elif fp == 'public' %}
            {%- set _f = {'system': False, 'hidden': False, 'read_only': False, 'secure_mode': False, 'gc_eligible': false} -%}
          {%- else -%}
            {%- set _f = {'system': False, 'hidden': False, 'read_only': False, 'secure_mode': False, 'gc_eligible': false} -%}
          {%- endif -%}
          {{- _f | combine({'cabinet_ro': true} if is_syscab else {}) -}}
        acl_family: >
          {%- set fam_guid = family_guid | default('default-guid') -%}
          {%- set manifest = state_attr('sensor.zen_library_manifest','value') | default({}, true) -%}
          {%- set fam_name = 'My Family' -%} 
          {%- if manifest is mapping -%}
            {%- for ent, data in manifest.items() -%}
              {%- if data.metadata.id == fam_guid -%}
                {%- set fam_name = data.friendly_name | default('My Family') -%}
              {%- endif -%}
            {%- endfor -%}
          {%- endif -%}
          {{- [ { "family_guid": fam_guid, "nickname": fam_name } ] -}}
        mount_scan: "{{- mount_scan | default(true) -}}"
        existing_drawers: "{{ state_attr(cabinet_entity,'variables') | default({}, true) }}"
        mounts_out: >
          {%- if mount_scan and existing_drawers is mapping -%}
            {%- set ns = namespace(mounts=[]) -%}
            {%- for k in existing_drawers.keys() if '[' in k and 'mount:' in k -%}
              {%- set rel = k.split('[')[0].strip() -%}
              {%- set tgt = k.split('mount:')[1].split(']')[0] -%}
              {%- set ns.mounts = ns.mounts + [{'relation': rel, 'target_volume_id': tgt}] -%}
            {%- endfor -%}
            {{- ns.mounts -}}
          {%- else -%}
            []
          {%- endif -%}
        drawers_to_init:
          AI_Cabinet_VolumeInfo: >
            {{-
              {
                "id": cabinet_guid,
                "friendly_name": cabinet_friendly,
                "type": cabinet_type,
                "schema_version": schema_version,
                "created": now_iso,
                "updated": now_iso,
                "flags": flags,
                "acls": {
                  "owner": (
                    [{
                        "entity_id": owner_person,
                        "sid": state_attr(owner_person,"user_id") | default("no-sid"),
                        "role": "owner" 
                    }]
                    if owner_person and owner_person.startswith("person.")
                    else []
                  ),
                  "partner": (
                    [{
                      "entity_id": partner_person,
                      "sid": state_attr(partner_person,"user_id") | default("no-sid"),
                      "role": "partner"
                    }]
                    if partner_person and partner_person.startswith("person.")
                      else []
                  ),
                  "family": (
                    acl_family
                    if acl_family is iterable and not (acl_family is string)
                      else (acl_family | from_json)
                  )
                },
                "entity_labels":
                    (
                      ["chat","history","secure","context","transcript","cabinet"]
                      if cabinet_type | lower == 'chat history cabinet'
                       else ["system","cabinet","volumeinfo"]
                    )  
                } | tojson
            -}}
          _label_index: "{{- {} | tojson -}}"
          meta: "{{ {'mounted': cabinet_entity == 'sensor.zenos_system_cabinet'} | tojson }}"
          _zen_relationships: >
            {{-
              {
                "mounts_out": mounts_out,
                "mounts_in": [],
                "mount_policy": "allow_all" if flag_profile == 'system' else "restricted"
              } 
            | tojson
            -}}
    - choose:
      - conditions:
        - condition: template
          value_template: "{{- cabinet_entity in ['', None] -}}"
        sequence:
        - variables:
            response:
              status: error
              message: No cabinet_entity provided.
              caller_token: "{{- caller_token -}}"
        - stop: Missing entity
          response_variable: response
      - conditions:
        - condition: template
          value_template: >-
            {{
              state_attr(cabinet_entity, 'variables') is none
              or 'AI_Cabinet_VolumeInfo' not in (state_attr(cabinet_entity, 'variables') | default({}))
            }}
        alias: Initialize New Cabinet
        sequence:
        - repeat:
            for_each: "{{- drawers_to_init | dictsort -}}"
            sequence:
            - event: set_variable_legacy
              event_data:
                key: "{{- repeat.item[0] -}}"
                value: "{{- repeat.item[1] -}}"
                set_timestamp: true
                volume_entity: "{{- cabinet_entity -}}"
                _cabinetadmin_init: true
                force: true
        - event: zen_event
          event_data:
            kind: cabinet_boot_touch
            component: cabinetadmin_factory
            severity: info
            summary: 'Post-stamp boot touch for {{ cabinet_entity }}'
            metadata:
              volume_entity: "{{- cabinet_entity -}}"
        - variables:
            response:
              status: success
              guid: "{{- cabinet_guid -}}"
              message: "Cabinet '{{ cabinet_entity }}' initialized with GUID {{ cabinet_guid }}, profile '{{ flag_profile }}', and {{ mounts_out | length }} mounts."
              caller_token: "{{- caller_token -}}"
        - stop: Init complete
          response_variable: response
      - conditions:
        - condition: template
          value_template: "{{- state_attr(cabinet_entity,'variables') is mapping -}}"
        alias: Repair / Restamp
        sequence:
        - variables:
            #existing: "{{- state_attr(cabinet_entity,'variables') -}}"
            #existing_guid: >-
            #  {%- set info = existing.get('AI_Cabinet_VolumeInfo', {}) if existing is mapping else {} -%}
            #  {%- set _val = info.get('value', {}) if info is mapping else {} -%}
            #  {%- set _val = _val if _val is mapping else (_val | from_json if _val is string else {}) -%}
            existing_guid: >-
              {%- import 'zenos_cabinets.jinja' as CABS -%}
              {%- set _val = CABS.cabinet_drawer_value(cabinet_entity, 'AI_Cabinet_VolumeInfo', {}) | from_json() -%}
              {{- _val.get('id', '') -}}
            guid_changed: "{{- force_new_guid or existing_guid != cabinet_guid -}}"
        - choose:
          - conditions:
            - condition: template
              value_template: "{{- guid_changed -}}"
            sequence:
            - event: set_variable_legacy
              event_data:
                key: AI_Cabinet_VolumeInfo
                value: "{{- drawers_to_init['AI_Cabinet_VolumeInfo'] -}}"
                set_timestamp: true
                volume_entity: "{{- cabinet_entity -}}"
                _cabinetadmin_init: true
                force: true
        - event: zen_event
          event_data:
            kind: cabinet_boot_touch
            component: cabinetadmin_factory
            severity: info
            summary: 'Post-stamp boot touch for {{ cabinet_entity }}'
            metadata:
              volume_entity: "{{- cabinet_entity -}}"
        - variables:
            response:
              status: success
              guid: "{{- cabinet_guid -}}"
              message: "Repaired '{{ cabinet_entity }}' (profile '{{ flag_profile }}'). {% if guid_changed -%}GUID restamped: {{ cabinet_guid }}.{%- endif -%}"
              caller_token: "{{- caller_token -}}"
        - stop: Repair complete
          response_variable: response
      default:
      - variables:
          response:
            status: error
            message: Unknown cabinet state.
            caller_token: "{{- caller_token -}}"
      - stop: Fallback
        response_variable: response
    - variables:
        response: "{{ response | combine({'caller_token': caller_token | default('')}) if response is mapping else response }}"
    - stop: complete
      response_variable: response
    alias: Zen AdminTools CabinetAdmin Factory
    description: 'Factory tool for stamping or repairing Cabinet sensors. Requires confirm_action:
      true to run. Auto-detects flag profiles from cabinet type or manifest labels.
      Parses mount:[GUID] drawers into _zen_relationships. Accepts person.* entities
      for ACLs (SID=user_id). Supports Chat History and Archive Cabinets.

      '
    fields:
      confirm_action:
        name: Confirm Destructive Action
        description: Must be TRUE or script exits safely.
        selector:
          boolean:
        default: false
      cabinet_entity:
        name: Cabinet Entity
        selector:
          entity:
            filter:
            - domain: sensor
      cabinet_type:
        name: Cabinet Type
        selector:
          select:
            options:
            - AI Data Storage Cabinet
            - Zen Dojo Cabinet
            - Zen Kata Cabinet
            - User Cabinet
            - AI User Cabinet
            - Family Cabinet
            - Household Cabinet
            - System Cabinet
            - Partner Cabinet
            - Chat History Cabinet
            - Archive Cabinet
            - Other
        default: AI Data Storage Cabinet
      cabinet_guid:
        name: Cabinet GUID (optional)
        selector:
          text:
      force_new_guid:
        name: Force New GUID
        selector:
          boolean:
        default: false
      auto_profile:
        name: Auto-Detect Flag Profile
        selector:
          boolean:
        default: true
      explicit_flag_profile:
        name: Manual Flag Profile (if auto disabled)
        selector:
          select:
            options:
            - system
            - secure
            - public
            - standard
        default: standard
      mount_scan:
        name: Scan Mounts for Links
        selector:
          boolean:
        default: true
      owner_person:
        name: Owner (person)
        selector:
          entity:
            filter:
            - domain: person
      partner_person:
        name: Partner (person)
        selector:
          entity:
            filter:
            - domain: person
      family_guid:
        name: Family GUID
        selector:
          text:
      caller_token:
        name: Caller Token
        description: Opaque token passed through by the caller for correlation. Not interpreted by this script.
        required: false
        selector:
          text:
    icon: mdi:database-cog
