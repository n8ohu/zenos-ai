###############################################################################

script:
  zen_admintools_reset_template:
    sequence:
    - variables:
        zen_template_seed: "{\n  \"structure\": {\n    \"system\": {\n      \"cortex\":
          null,\n      \"os_version\": null,\n      \"build_version\": null\n    },\n
          \   \"home_overview\": {\n      \"status\": null,\n      \"risks\": [],\n
          \     \"events\": []\n    },\n    \"active_components\": {},\n    \"zen_summary\":
          {\n      \"summary\": null,\n      \"attention\": null,\n      \"objective\":
          null,\n      \"subjective\": null,\n      \"urgency\": 0,\n      \"confidence\":
          0.0,\n      \"criticality\": 1,\n      \"emotion_queue\": [],\n      \"errors\":
          [],\n      \"timestamp\": null\n    }\n  },\n  \"example\": {\n    \"system\":
          {\n      \"cortex\": \"nominal\",\n      \"os_version\": \"ZenOS-AI (4.0.0 RC2)\",\n
          \     \"build_version\": \"SuperSummary 1.0.0-beta\"\n    },\n    \"home_overview\":
          {\n      \"status\": \"ok\",\n      \"risks\": [\"storm watch active\"],\n
          \     \"events\": [\"2025-09-23T07:15:00Z: power dip detected\"]\n    },\n
          \   \"active_components\": {\n      \"lights\": {\n        \"summary\": \"Living
          room lights on\",\n        \"attention\": \"Timer expiring\"\n      },\n      \"water_manager\":
          {\n        \"summary\": \"Chlorine low\",\n        \"attention\": \"Shock
          treatment due in 12h\"\n      }\n    },\n    \"zen_summary\": {\n      \"summary\":
          \"House stable, minor risks (weather, spa chemistry).\",\n      \"attention\":
          \"Spa needs treatment, monitor grid instability.\",\n      \"objective\":
          \"Maintain household comfort while addressing flagged components.\",\n      \"subjective\":
          \"Confident overall, cautious due to external conditions.\",\n      \"urgency\":
          6,\n      \"confidence\": 0.85,\n      \"criticality\": 3,\n      \"emotion_queue\":
          [\"calm\", \"alert\"],\n      \"errors\": [],\n      \"timestamp\": \"2025-09-23T12:15:00Z\"\n
          \   }\n  }\n}"
        kfc_template_seed: >-
          {{
            {
              "schema_version": "1.2.0",
              "structure": {
                "version": None,
                "friendly_name": None,
                "master_switch": None,
                "label": None,
                "component_summary": None,
                "component_instructions": None,
                "more_info": None,
                "tool": None,
                "trigger_subscriptions": [],
                "delay_seconds": 0,
                "kata_key": None,
                "meta": {
                  "enabled": None,
                  "requires": {
                    "cert": None,
                    "level": None
                  }
                }
              },
              "example": {
                "version": "1.2.0",
                "friendly_name": "Alert Manager",
                "master_switch": "input_boolean.alert_manager_master_switch",
                "label": "Alert Manager",
                "component_summary": "Monitors system alerts and persistent notifications.",
                "component_instructions": "Focus on unacknowledged alerts. Escalate if count > 3.",
                "more_info": "Feeds into SuperSummary urgency score.",
                "tool": None,
                "trigger_subscriptions": ["ha_start", "daily_midnight", "hourly_trigger", "home_mode_updates", "alarm_panel"],
                "delay_seconds": 0,
                "kata_key": "alert_manager",
                "meta": {
                  "enabled": True,
                  "requires": {
                    "cert": "",
                    "level": 0
                  }
                }
              },
              "notes": {
                "master_switch": "Deprecated in 1.2.0. Use meta.enabled for on/off control. If an input_boolean with the kung_fu_system_switch label exists for this component, its state overrides meta.enabled.",
                "meta.requires": "Stub in 1.2.0 — cert and level are stored but not enforced. zen_auth enforcement arrives in SP1."
              }
            } | tojson
          }}
    - variables:
        _rtt_kata: "{{ states('sensor.zen_kata_cabinet_resolved') }}"
        _rtt_dojo: "{{ states('sensor.zen_dojo_cabinet_resolved') }}"
    - action: script.zen_dojotools_filecabinet
      data:
        action_type: read
        show_hidden_volumes: false
        volume_entity_id:
          - "{{ _rtt_kata }}"
        key: zen_template
      response_variable: _rtt_kata_read
    - variables:
        _rtt_kata_version: >-
          {%- set raw = _rtt_kata_read.result | default('{}') -%}
          {%- set val = (raw | from_json) if raw is string else raw -%}
          {{ val.get('schema_version', '') }}
    - if: "{{ _rtt_kata_version != '1.2.0' }}"
      then:
        - action: script.zen_dojotools_filecabinet
          data:
            action_type: update
            show_hidden_volumes: false
            force_action: true
            volume_entity_id:
              - "{{ _rtt_kata }}"
            key: zen_template
            value: '{{ zen_template_seed }}'
            set_timestamp: true
            label_input: zen_summary, zen, summary
    - if: "{{ _rtt_dojo != '' }}"
      then:
        - action: script.zen_dojotools_filecabinet
          data:
            action_type: read
            show_hidden_volumes: false
            volume_entity_id:
              - "{{ _rtt_dojo }}"
            key: kfc_template
          response_variable: _rtt_dojo_read
        - variables:
            _rtt_dojo_raw: >-
              {%- set raw = _rtt_dojo_read.result | default('{}') -%}
              {%- set val = (raw | from_json) if raw is string else raw -%}
              {%- set inner = val.get('value', val) if val is mapping else {} -%}
              {{ (inner | from_json) if inner is string else inner }}
            _rtt_dojo_version: "{{ _rtt_dojo_raw.get('schema_version', '') if _rtt_dojo_raw is mapping else '' }}"
            _kfc_is_string: "{{ _rtt_dojo_raw is string }}"
        - if: "{{ _rtt_dojo_version != '1.2.0' or _kfc_is_string }}"
          then:
            - action: script.zen_dojotools_filecabinet
              data:
                action_type: update
                show_hidden_volumes: false
                force_action: true
                volume_entity_id:
                  - "{{ _rtt_dojo }}"
                key: kfc_template
                value: '{{ kfc_template_seed | tojson }}'
                set_timestamp: true
                label_input: kfc, dojo, zen
        - alias: Upconvert KFC drawers 1.1.0 → 1.2.0
          if:
            - condition: template
              value_template: "{{ _rtt_dojo_version == '1.1.0' }}"
          then:
            - variables:
                _dojo_all: >-
                  {{ state_attr(_rtt_dojo, 'variables') | default({}, true) }}
            - repeat:
                for_each: >-
                  {{ _dojo_all.keys() | reject('in', ['AI_Cabinet_VolumeInfo', 'kfc_template']) | list }}
                sequence:
                  - variables:
                      _kfc_key: "{{ repeat.item }}"
                      _kfc_raw: "{{ _dojo_all.get(repeat.item, {}) }}"
                      _kfc_v1: >-
                        {%- set _r = _kfc_raw -%}
                        {%- set _v1 = _r.get('value', _r) if _r is mapping else {} -%}
                        {%- set _v2 = _v1 if _v1 is mapping else (_v1 | from_json if _v1 is string else {}) -%}
                        {{ _v2 if _v2 is mapping else (_v2 | from_json if _v2 is string else {}) }}
                  - if:
                      - condition: template
                        value_template: "{{ _kfc_v1 is mapping and _kfc_v1.get('kata_key', '') != '' }}"
                    then:
                      - variables:
                          _kfc_existing_meta: >-
                            {%- set m = _kfc_v1.get('meta', {}) -%}
                            {{ m if m is mapping else {} }}
                          _kfc_existing_req: >-
                            {%- set r = _kfc_existing_meta.get('requires', {}) -%}
                            {{ r if r is mapping else {} }}
                          _kfc_meta: >-
                            {{
                              _kfc_existing_meta | combine({
                                'enabled': _kfc_existing_meta.get('enabled', true),
                                'requires': _kfc_existing_req | combine({
                                  'cert':  _kfc_existing_req.get('cert', ''),
                                  'level': _kfc_existing_req.get('level', 0)
                                })
                              })
                            }}
                          _kfc_updated: >-
                            {{ _kfc_v1 | combine({'meta': _kfc_meta}) | tojson }}
                          _kfc_ms: "{{ _kfc_v1.get('master_switch', '') | trim }}"
                      - action: script.zen_dojotools_filecabinet
                        data:
                          action_type: update
                          show_hidden_volumes: false
                          force_action: true
                          set_timestamp: false
                          volume_entity_id:
                            - "{{ _rtt_dojo }}"
                          key: "{{ _kfc_key }}"
                          value: "{{ _kfc_updated }}"
                      - alias: Tag master switch with kung_fu_system_switch label
                        if:
                          - condition: template
                            value_template: "{{ _kfc_ms != '' }}"
                        then:
                          - action: homeassistant.add_label_to_entity
                            data:
                              entity_id: "{{ _kfc_ms }}"
                              label_id: kung_fu_system_switch
    alias: Zen AdminTools Reset Template
    description: >-
      Zen AdminTools Reset Templates (1.2.0). Presses zen_template into the Kata
      cabinet and kfc_template into the Dojo cabinet. Called by Flynn gate-3 if
      either template is missing or version is outdated. On upgrade from 1.1.0:
      adds meta.enabled + meta.requires to all existing KFC drawers and applies
      kung_fu_system_switch label to master switch entities. Idempotent.


  zen_admintools_reset_labels:
    alias: Zen AdminTools Reset Labels (NUCLEAR)
    description: >-
      ⚠️  NUCLEAR — deletes ALL zen_ labels and ALL their entity assignments.
      No undo. Flynn fires automatically (zen_label_health → critical triggers
      Stepgate Sentinel → Gate 0 recreates labels → Gate 1 re-assigns).

      What this does, in order:
        1. Untag all entities from every label with a zen_ ID
        2. Delete every zen_ label (zen_* IDs only — non-zen labels untouched)
        3. Fire zen_resolver_refresh so resolver sensors re-evaluate immediately

      Non-zen labels (home, media_players, hot_tub, etc.) are never touched.
      User cabinets are never touched.

      If you only need to wipe assignments (labels survive), use
      zen_dojotools_labels with action_type: reset instead.

      confirm: true is REQUIRED. This tool will refuse without it.
    icon: mdi:label-off
    mode: single
    fields:
      confirm:
        name: Confirm Nuclear Reset
        description: >-
          Must be true to proceed. This deletes all zen_ labels. No undo.
        required: true
        default: false
        selector:
          boolean:
      caller_token:
        name: Caller Token
        description: Opaque token passed through by the caller for correlation. Not interpreted by this script.
        required: false
        selector:
          text:

    sequence:
    # --------------------------------------------------------------
    # Always normalize User/AI inputs so we don't have to react JIT
    # --------------------------------------------------------------
    - variables:
        caller_token: "{{- caller_token | default('') -}}"
    - if:
      - condition: template
        value_template: '{{ not confirm }}'
      then:
      - stop: >-
          Nuclear reset refused — confirm: true required. All zen_ labels and
          assignments will be permanently deleted. Set confirm: true to proceed.

    - variables:
        zen_labels: '{{ labels() | select(''match'', ''^zen_'') | list }}'

    # Pass 1 — untag all entities from every zen_ label
    - repeat:
        for_each: '{{ zen_labels }}'
        sequence:
        - variables:
            lbl_entities: '{{ label_entities(repeat.item) | list }}'
        - if:
          - condition: template
            value_template: '{{ lbl_entities | length > 0 }}'
          then:
          - action: homeassistant.remove_label_from_entity
            data:
              label_id: '{{ repeat.item }}'
              entity_id: '{{ lbl_entities }}'

    # Pass 2 — delete all zen_ labels
    - repeat:
        for_each: '{{ zen_labels }}'
        sequence:
        - action: homeassistant.delete_label
          data:
            label_id: '{{ repeat.item }}'

    # Pass 3 — kick resolvers; Flynn sentinel fires from zen_label_health change
    - event: zen_resolver_refresh

    - variables:
        result: >-
          Nuclear label reset complete. {{ zen_labels | length }} zen_ label(s)
          deleted. zen_resolver_refresh fired. Flynn will recreate and reassign
          on next sentinel cycle.
    - variables:
        result: "{{ result | combine({'caller_token': caller_token | default('')}) if result is mapping else result }}"
    - stop: reset labels complete
      response_variable: result

  zen_admintools_cabinetadmin:
    alias: Zen AdminTools CabinetAdmin
    description: >-
      Zen AdminTools CabinetAdmin (4.0.0 RC2). Pattern A — strict redirector
      mode. All writes routed exclusively through set_variable_legacy /
      clear_variables_legacy for safe cabinet volume routing.

      Ops: inspect, restore, reset, hammer, init, reset_all.

      ⚠️  reset_all is NUCLEAR — wipes ALL ring-0 canonical cabinets, reseeds
      schemas, and triggers Flynn bootstrap. No undo. User cabinets are NOT
      touched. This tool calls zen_admintools_reset_template and fires Flynn
      sentinel via cabinet health sensor change. If you want to customize the
      sequence (skip a cabinet, change order), read the docs and call the
      individual tools directly — that is exactly what reset_all does under
      the hood. confirm: true required for reset_all.
    mode: parallel
    max: 10
    fields:
      mode:
        name: Operation Mode
        selector:
          select:
            options:
            - inspect
            - restore
            - reset
            - hammer
            - init
            - reset_all
        default: inspect
      target_cabinet:
        name: Target Cabinet
        selector:
          entity:
            filter:
            - domain: sensor
        default: ''
      hammer_ok:
        name: Allow Hammer Destroy Mode
        selector:
          boolean:
        default: false
      confirm:
        name: Confirm Nuclear Reset (reset_all only)
        description: Required for reset_all. Wipes all ring-0 cabinets. No undo.
        required: false
        default: false
        selector:
          boolean:
      caller_token:
        name: Caller Token
        description: Opaque token passed through by the caller for correlation. Not interpreted by this script.
        required: false
        selector:
          text:
    sequence:
    # --------------------------------------------------------------
    # Always normalize User/AI inputs so we don't have to react JIT
    # --------------------------------------------------------------
    - variables:
        caller_token: "{{- caller_token | default('') -}}"
    - variables:
        canon_ring0_cabinets:
        - sensor.zenos_system_cabinet
        - sensor.zenos_system_history_cabinet
        - sensor.zenos_dojo_cabinet
        - sensor.zenos_kata_cabinet
        - sensor.zenos_history_cabinet
        - sensor.zenos_scratchpad_cabinet
        - sensor.zenos_default_household_cabinet
        - sensor.zenos_default_household_history_cabinet
        - sensor.zenos_default_family_cabinet
        - sensor.zenos_default_family_history_cabinet
        - sensor.zenos_default_user_cabinet
        - sensor.zenos_default_user_history_cabinet
        - sensor.zenos_default_ai_user_cabinet
        - sensor.zenos_default_ai_user_history_cabinet
    - variables:
        op: '{{ mode }}'
        use_universe: >
          {{- target_cabinet|default('') in ['', None] -}}
        effective_targets: >
          {%- if use_universe -%}
            {{- canon_ring0_cabinets -}}
          {%- else -%}
            {{- [target_cabinet] -}}
          {%- endif -%}
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ op == ''hammer'' and not hammer_ok }}'
        sequence:
        - variables:
            result: 'Hammer mode requires hammer_ok: true'
        - variables:
            result: "{{ result | combine({'caller_token': caller_token | default('')}) if result is mapping else result }}"
        - stop: hammer blocked
          response_variable: result
    - repeat:
        for_each: '{{ effective_targets }}'
        sequence:
        - variables:
            cab: '{{ repeat.item }}'
            vars: '{{ state_attr(cab,''variables'') | default({}, true) }}'
            drawers: '{{ vars.keys() | list }}'
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ op == ''inspect'' }}'
            sequence:
            - variables:
                inspect_acc: '{{ inspect_acc | combine({cab: drawers}) }}'
          - conditions:
            - condition: template
              value_template: '{{ op == ''restore'' }}'
            sequence:
            - if:
              - condition: template
                value_template: '{{ vars == {} }}'
              then:
              - event: set_variable_legacy
                event_data:
                  volume_entity: '{{ cab }}'
                  key: _restored_marker
                  value:
                    value: restored
                    timestamp: '{{ now().isoformat() }}'
                  set_timestamp: true
          - conditions:
            - condition: template
              value_template: '{{ op == ''reset'' }}'
            sequence:
            - event: clear_variables_legacy
              event_data:
                volume_entity: '{{ cab }}'
                key: '*'
          - conditions:
            - condition: template
              value_template: '{{ op == ''hammer'' }}'
            sequence:
            - event: clear_variables_legacy
              event_data:
                volume_entity: '{{ cab }}'
                key: '*'
            - event: set_variable_legacy
              event_data:
                volume_entity: '{{ cab }}'
                key: _hammered
                value:
                  value: destroyed
                  timestamp: '{{ now().isoformat() }}'
                set_timestamp: true
          - conditions:
            - condition: template
              value_template: '{{ op == ''init'' }}'
            sequence:
            - if:
              - condition: template
                value_template: '{{ use_universe }}'
              then:
              - event: clear_variables_legacy
                event_data:
                  volume_entity: '{{ cab }}'
                  key: '*'
              - event: set_variable_legacy
                event_data:
                  volume_entity: '{{ cab }}'
                  key: AI_Cabinet_VolumeInfo
                  value:
                    value:
                      initialized: true
                      timestamp: '{{ now().isoformat() }}'
                  set_timestamp: true
    # ── inspect — emit accumulated result after loop ─────────────────────────
    - if:
      - condition: template
        value_template: '{{ op == ''inspect'' }}'
      then:
      - variables:
          inspect_acc: "{{ inspect_acc | combine({'caller_token': caller_token | default('')}) if inspect_acc is mapping else inspect_acc }}"
      - stop: inspect complete
        response_variable: inspect_acc
    # ── reset_all — nuclear cabinet wipe + reseed + Flynn bootstrap ──────────
    - if:
      - condition: template
        value_template: '{{ op == ''reset_all'' }}'
      then:
      - if:
        - condition: template
          value_template: '{{ not confirm }}'
        then:
        - variables:
            result: >-
              reset_all refused — confirm: true required. This wipes all ring-0
              canonical cabinets, reseeds schemas, and triggers Flynn bootstrap.
              No undo. Set confirm: true to proceed.
        - variables:
            result: "{{ result | combine({'caller_token': caller_token | default('')}) if result is mapping else result }}"
        - stop: confirm required
          response_variable: result
      # Step 1 — wipe all ring-0 cabinets
      - repeat:
          for_each: '{{ canon_ring0_cabinets }}'
          sequence:
          - event: clear_variables_legacy
            event_data:
              volume_entity: '{{ repeat.item }}'
              key: '*'
      # Step 2 — reseed kfc_template + zen_template
      - action: script.zen_admintools_reset_template
        data: {}
      # Step 3 — kick resolvers; Flynn sentinel fires from zen_cabinet_health change
      - event: zen_resolver_refresh
      - variables:
          result: >-
            reset_all complete. {{ canon_ring0_cabinets | length }} ring-0
            cabinet(s) wiped. Schemas reseeded via reset_template.
            zen_resolver_refresh fired. Flynn will bootstrap on next sentinel
            cycle. User cabinets were not touched.
      - variables:
          result: "{{ result | combine({'caller_token': caller_token | default('')}) if result is mapping else result }}"
      - stop: reset_all complete
        response_variable: result

    - variables:
        result: 'AdminTools completed ''{{ op }}'' on {{ effective_targets | length }} cabinet(s).'
    - variables:
        result: "{{ result | combine({'caller_token': caller_token | default('')}) if result is mapping else result }}"
    - stop: complete
      response_variable: result

  zen_dojotools_kungfu_writer:
    alias: Zen DojoTools KungFu Writer
    mode: parallel
    max: 5
    description: >-
      Zen AdminTools KungFu Writer (1.2.0). Creates or updates a Kung Fu component
      registration drawer in the Zen Dojo Cabinet.

      Each KFC drawer tells the Ninja Summarizer what a component does, what data
      it needs, and WHEN to run it (trigger_subscriptions + delay_seconds). The
      Scheduler reads these drawers to auto-dispatch — no manual scheduler edits
      needed after writing a component here.

      Fields kata_key and friendly_name are required for write. All others are
      recommended. Read kfc_template from the Dojo cabinet for the full schema.

      action=help returns the live kfc_template schema from the Dojo cabinet.
      action=write with confirm_action=true performs the upsert.
    icon: mdi:pencil-box-outline
    fields:
      action:
        name: Action
        description: "'write' to upsert a component, 'help' to return the kfc_template schema."
        default: help
        required: true
        selector:
          select:
            options:
            - write
            - help
      kata_key:
        name: Kata Key
        description: >-
          Unique component ID (will be slugified). Used as the Dojo drawer key and
          the Kata cabinet drawer key. Example: 'Alert Manager' → 'alert_manager'.
        required: false
        selector:
          text:
      friendly_name:
        name: Friendly Name
        description: "Human-readable component title. Example: 'Alert Manager'."
        required: false
        selector:
          text:
      component_summary:
        name: Component Summary
        description: One-sentence description of what this component monitors or manages.
        required: false
        selector:
          text:
      label:
        name: HyperIndex Label
        description: >-
          Label passed to zen_dojotools_index for entity discovery. Leave blank if
          this component does not use the HyperIndex.
        required: false
        selector:
          text:
      command:
        name: Library Command
        description: >-
          Library macro token (e.g. ~ALERTS~) passed to command_interpreter.
          Leave blank if not applicable.
        required: false
        selector:
          text:
      trigger_subscriptions:
        name: Trigger Subscriptions
        description: >-
          Comma-separated list of scheduler trigger IDs this component should
          run on. Valid IDs: ha_start, daily_midnight, daily_noon, hourly_trigger,
          quarter_hour, every_10_minutes, every_5_minutes, home_mode_updates,
          alarm_panel, door_opens_or_closes, lock_changes, window_opens_or_closes,
          garage_door, home_occupancy_change, nathan_bed_changes, kim_bed_changes,
          water_flow_stop, hot_tub_state, elec_panel_door_change, start_home_wake,
          start_home_evening, mb_wake, force_summary, force_gc, test_button.
        required: false
        selector:
          text:
      delay_seconds:
        name: Delay (seconds)
        description: >-
          Stagger delay before the Ninja runs this component after the trigger
          fires. Use to sequence components and avoid LLM overload. Default 0.
        required: false
        default: 0
        selector:
          number:
            min: 0
            max: 300
            step: 5
      enabled:
        name: Component Enabled
        description: >-
          Whether this component is active. Stored in meta.enabled.
          Default true. Replaces master_switch as the lifecycle control in 1.2.0.
          If a kung_fu_system_switch-labeled input_boolean exists for this
          component, its state overrides this setting at runtime.
        required: false
        default: true
        selector:
          boolean:
      requires_cert:
        name: Required Cert
        description: >-
          Capability certificate required to run this component (stub — not
          enforced until SP1). Example: zen_level_2.
        required: false
        selector:
          text:
      requires_level:
        name: Required Level
        description: >-
          Numeric capability level required (stub — not enforced until SP1).
          Default 0.
        required: false
        default: 0
        selector:
          number:
            min: 0
            max: 10
            step: 1
      master_switch:
        name: Master Switch Entity (deprecated)
        description: >-
          Deprecated in 1.2.0. Use enabled instead. If provided, the referenced
          entity will be tagged with the kung_fu_system_switch label so the
          SuperSummary can still use it as a runtime override. Will be removed
          in a future version.
        required: false
        selector:
          entity:
            filter:
              domain: input_boolean
      tool:
        name: Tool
        description: Associated tool name or breadcrumb (optional).
        required: false
        selector:
          text:
      version:
        name: Component Version
        description: "Semantic version string. Example: 1.0.0."
        required: false
        selector:
          text:
      component_instructions:
        name: Component Instructions
        description: Long-form operational notes for the monk (10–40 lines recommended).
        required: false
        selector:
          text:
            multiline: true
      more_info:
        name: More Info
        description: Extended rationale, context, or integration notes.
        required: false
        selector:
          text:
            multiline: true
      confirm_action:
        name: Confirm Write
        description: Must be true to perform the write. Prevents accidental overwrites.
        required: true
        default: false
        selector:
          boolean:
      caller_token:
        name: Caller Token
        description: Opaque token passed through by the caller for correlation. Not interpreted by this script.
        required: false
        selector:
          text:
    sequence:

    # --------------------------------------------------------------
    # Always normalize User/AI inputs so we don't have to react JIT
    # --------------------------------------------------------------
    - variables:
        caller_token: "{{- caller_token | default('') -}}"

    - variables:
        _act: "{{ action | default('help') }}"
        _dojo_cab: "{{ states('sensor.zen_dojo_cabinet_resolved') }}"

    - choose:

      # ── HELP ──────────────────────────────────────────────────────────────────
      - alias: Help — return live kfc_template from Dojo
        conditions:
        - condition: template
          value_template: "{{ _act == 'help' }}"
        sequence:
        - variables:
            _kfc_tmpl: >-
              {%- set _drawer = (state_attr(_dojo_cab, 'variables') | default({}, true))
                                .get('kfc_template', {}) if _dojo_cab != '' else {} -%}
              {%- set _val = _drawer.get('value', _drawer) if _drawer is mapping else {} -%}
              {%- set _parsed = (_val | from_json) if _val is string else _val -%}
              {{ _parsed if _parsed is mapping else {} }}
            result: >-
              {{
                {
                  "result": "help",
                  "kfc_template": _kfc_tmpl,
                  "usage": "Call with action=write, confirm_action=true, and the fields from kfc_template.structure filled in."
                }
              }}

      # ── VALIDATION ────────────────────────────────────────────────────────────
      - alias: Error — missing kata_key or friendly_name
        conditions:
        - condition: template
          value_template: >-
            {{
              _act == 'write'
              and (
                (kata_key | default('')) | trim == ''
                or (friendly_name | default('')) | trim == ''
              )
            }}
        sequence:
        - variables:
            result: >-
              {{
                {
                  "result": "error",
                  "reason": "kata_key and friendly_name are required for write.",
                  "usage": "Provide both fields and retry."
                }
              }}

      - alias: Error — confirm_action not set
        conditions:
        - condition: template
          value_template: "{{ _act == 'write' and not (confirm_action | default(false) | bool) }}"
        sequence:
        - variables:
            result: >-
              {{
                {
                  "result": "error",
                  "reason": "confirm_action must be true to write.",
                  "usage": "Set confirm_action=true and retry."
                }
              }}

      # ── WRITE ─────────────────────────────────────────────────────────────────
      - alias: Write — upsert Dojo drawer
        conditions:
        - condition: template
          value_template: "{{ _act == 'write' and (confirm_action | default(false) | bool) }}"
        sequence:
        - variables:
            _slug: "{{ kata_key | slugify | default('unknown') }}"
            _trigger_list: >-
              {%- set raw = (trigger_subscriptions | default('')) | string | trim -%}
              {%- if raw | length > 0 -%}
                {{ raw | regex_findall('[^,\\s]+') }}
              {%- else -%}
                []
              {%- endif -%}
            _payload: >-
              {{
                {
                  "version":               version | default(''),
                  "friendly_name":         friendly_name | default(''),
                  "master_switch":         master_switch | default(''),
                  "label":                 label | default(''),
                  "command":               command | default(''),
                  "component_summary":     component_summary | default(''),
                  "component_instructions": component_instructions | default(''),
                  "more_info":             more_info | default(''),
                  "tool":                  tool | default(''),
                  "trigger_subscriptions": _trigger_list,
                  "delay_seconds":         delay_seconds | default(0) | int(0),
                  "kata_key":              _slug,
                  "meta": {
                    "enabled":  enabled | default(true) | bool,
                    "requires": {
                      "cert":  requires_cert  | default(''),
                      "level": requires_level | default(0) | int(0)
                    }
                  }
                } | tojson
              }}
        - action: script.zen_dojotools_filecabinet
          data:
            action_type: update
            show_hidden_volumes: false
            force_action: true
            set_timestamp: true
            volume_entity_id:
              - "{{ _dojo_cab }}"
            key: "{{ _slug }}"
            value: "{{ _payload }}"
            label_input: "{{ 'kfc, dojo, zen, ' ~ (label | default('')) }}"
            meta:
              no_autoexpire: true
              no_autorecycle: true
              description: "KFC component definition — permanent, do not expire"
          response_variable: _write_response
        - alias: Tag master switch with kung_fu_system_switch label
          if:
            - condition: template
              value_template: "{{ (master_switch | default('')) | trim != '' }}"
          then:
            - action: homeassistant.add_label_to_entity
              data:
                entity_id: "{{ master_switch }}"
                label_id: kung_fu_system_switch
        - variables:
            result: >-
              {{
                {
                  "result":     "success",
                  "component":  _slug,
                  "drawer_key": _slug,
                  "dojo_cab":   _dojo_cab,
                  "triggers":   _trigger_list,
                  "write":      _write_response | default({})
                }
              }}

    - variables:
        result: "{{ result | combine({'caller_token': caller_token | default('')}) if result is mapping else result }}"
    - stop: Return Result
      response_variable: result

  zen_admintools_cabinetadmin_stamp:
    sequence:
    - variables:
        confirm_action: '{{ confirm_action | default(false) }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ not confirm_action }}'
        sequence:
        - variables:
            response:
              status: error
              message: 'Confirmation required — set confirm_action: true.'
              caller_token: '{{ caller_token }}'
        - stop: Confirmation required
          response_variable: response
    - variables:
        cabinet_entity: '{{ cabinet_entity | default('''') }}'
        cabinet_type: '{{ cabinet_type | default(''AI Data Storage Cabinet'') }}'
        cabinet_friendly: '{{ state_attr(cabinet_entity,''friendly_name'') | default(cabinet_entity)
          }}'
        now_iso: '{{ now().isoformat() }}'
        schema_version: 1
        cabinet_guid: "{% set generated = '%04x%04x-%04x-%04x-%04x-%04x%04x%04x' | format(\n
          \   range(0, 65536) | random,\n    range(0, 65536) | random,\n    range(0,
          65536) | random,\n    range(0, 65536) | random,\n    range(0, 65536) | random,\n
          \   range(0, 65536) | random,\n    range(0, 65536) | random,\n    range(0,
          65536) | random\n  ) %} {% if force_new_guid %}\n  {{ generated }}\n{%
          elif cabinet_guid not in ['', None] %}\n  {{ cabinet_guid }}\n{% else %}\n
          \ {{ generated }}\n{% endif %}"
        labels_from_manifest: '{{ state_attr(''sensor.zen_library_manifest'',''value'')
          | default({}, true) }}'
        flag_profile: "{% if not auto_profile %}\n  {{ explicit_flag_profile | default('standard')
          }}\n{% else %}\n  {% set lbls = labels_from_manifest | string | lower %}\n
          \ {% if 'household_cabinet' in lbls %}system\n  {% elif 'family_cabinet' in
          lbls %}secure\n  {% elif 'user_cabinet' in lbls or 'ai_user' in lbls %}public\n
          \ {% elif 'kata_cabinet' in lbls or 'kata_storage' in lbls %}system\n  {%
          elif 'chat_history' in lbls or cabinet_type | lower == 'chat history cabinet'
          %}secure\n  {% elif 'archive_cabinet' in lbls or cabinet_type | lower == 'archive
          cabinet' %}system\n  {% else %}standard{% endif %}\n{% endif %}"
        flags: "{% set fp = flag_profile %}\n{% set is_kata = 'kata' in (cabinet_type
          | lower) %}\n{% if fp == 'system' %}\n  {{ {'system': True, 'hidden': False,
          'read_only': True, 'secure_mode': True, 'gc_eligible': is_kata} }}\n{% elif
          fp == 'secure' %}\n  {{ {'system': False, 'hidden': True, 'read_only': True,
          'secure_mode': True, 'gc_eligible': false} }}\n{% elif fp == 'public' %}\n
          \ {{ {'system': False, 'hidden': False, 'read_only': False, 'secure_mode':
          False, 'gc_eligible': false} }}\n{% else %}\n  {{ {'system': False, 'hidden':
          False, 'read_only': False, 'secure_mode': False, 'gc_eligible': false} }}\n{%
          endif %}"
        acl_family: "{% set fam_guid = family_guid | default('default-guid') %} {% set
          manifest = state_attr('sensor.zen_library_manifest','value') | default({},
          true) %} {% set fam_name = 'My Family' %} {% if manifest is mapping %}\n  {%
          for ent, data in manifest.items() %}\n    {% if data.metadata.id == fam_guid
          %}\n      {% set fam_name = data.friendly_name | default('My Family') %}\n
          \   {% endif %}\n  {% endfor %}\n{% endif %} {{\n  [\n    {\n      \"family_guid\":
          fam_guid,\n      \"nickname\": fam_name\n    }\n  ]\n}}"
        mount_scan: '{{ mount_scan | default(true) }}'
        existing_drawers: '{{ state_attr(cabinet_entity,''variables'') | default({},
          true) }}'
        mounts_out: "{% if mount_scan and existing_drawers is mapping %}
    {%- set ns = namespace(mounts=[]) -%}
    {%- for k in existing_drawers.keys() if '[' in k and 'mount:' in k -%}
      {%- set rel = k.split('[')[0].strip() -%}
      {%- set tgt = k.split('mount:')[1].split(']')[0] -%}
      {%- set ns.mounts = ns.mounts + [{'relation': rel, 'target_volume_id': tgt}] -%}
    {%- endfor -%}
    {{ ns.mounts }}
  {% else %}[]{% endif %}"
        drawers_to_init:
          AI_Cabinet_VolumeInfo: "{{\n  {\n    \"id\": cabinet_guid,\n
            \     \"friendly_name\": cabinet_friendly,\n      \"type\": cabinet_type,\n
            \     \"schema_version\": schema_version,\n      \"created\": now_iso,\n
            \     \"updated\": now_iso,\n      \"flags\": flags,\n      \"acls\": {\n
            \       \"owner\": (\n          [{ \"entity_id\": owner_person,\n             \"sid\":
            state_attr(owner_person,\"user_id\") | default(\"no-sid\"),\n             \"role\":
            \"owner\" }]\n          if owner_person and owner_person.startswith(\"person.\")\n
            \         else []\n        ),\n        \"partner\": (\n          [{ \"entity_id\":
            partner_person,\n             \"sid\": state_attr(partner_person,\"user_id\")
            | default(\"no-sid\"),\n             \"role\": \"partner\" }]\n          if
            partner_person and partner_person.startswith(\"person.\")\n          else
            []\n        ),\n        \"family\": (\n          acl_family\n          if
            acl_family is iterable and not (acl_family is string)\n          else (acl_family
            | from_json)\n        )\n      },\n      \"entity_labels\":\n        ([\"chat\",\"history\",\"secure\",\"context\",\"transcript\",\"cabinet\"]\n
            \        if cabinet_type | lower == 'chat history cabinet'\n         else
            [\"system\",\"cabinet\",\"volumeinfo\"])\n  } | tojson\n}}"
          _label_index: '{{ {} | tojson }}'
          _zen_relationships: "{{\n  {\n    \"mounts_out\": mounts_out,\n
            \     \"mounts_in\": [],\n      \"mount_policy\": \"allow_all\" if flag_profile
            == 'system' else \"restricted\"\n  } | tojson\n}}"
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ cabinet_entity in ['''', None] }}'
        sequence:
        - variables:
            response:
              status: error
              message: No cabinet_entity provided.
              caller_token: '{{ caller_token }}'
        - stop: Missing entity
          response_variable: response
      - conditions:
        - condition: template
          value_template: '{{ state_attr(cabinet_entity,''variables'') is none }}'
        alias: Initialize New Cabinet
        sequence:
        - repeat:
            for_each: '{{ drawers_to_init | dictsort }}'
            sequence:
            - event: set_variable_legacy
              event_data:
                key: '{{ repeat.item[0] }}'
                value: '{{ repeat.item[1] | from_json | default({}) }}'
                set_timestamp: true
                volume_entity: '{{ cabinet_entity }}'
        - variables:
            response:
              status: success
              message: 'Cabinet ''{{ cabinet_entity }}'' initialized with GUID {{ cabinet_guid
                }}, profile ''{{ flag_profile }}'', and {{ mounts_out | length }} mounts.

                '
              caller_token: '{{ caller_token }}'
        - stop: Init complete
          response_variable: response
      - conditions:
        - condition: template
          value_template: '{{ state_attr(cabinet_entity,''variables'') is mapping }}'
        alias: Repair / Restamp
        sequence:
        - variables:
            existing: '{{ state_attr(cabinet_entity,''variables'') }}'
            existing_guid: "{% set info = existing.get('AI_Cabinet_VolumeInfo',{}) %}
              {% if info is mapping and info.get('value') is mapping %}\n  {{ info.value.get('id','')
              }}\n{% else %}''{% endif %}"
            guid_changed: '{{ force_new_guid or existing_guid != cabinet_guid }}'
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ guid_changed }}'
            sequence:
            - event: set_variable_legacy
              event_data:
                key: AI_Cabinet_VolumeInfo
                value: '{{ drawers_to_init[''AI_Cabinet_VolumeInfo''] | from_json |
                  default({}) }}'
                set_timestamp: true
                volume_entity: '{{ cabinet_entity }}'
        - variables:
            response:
              status: success
              message: 'Repaired ''{{ cabinet_entity }}'' (profile ''{{ flag_profile
                }}''). {% if guid_changed %}GUID restamped: {{ cabinet_guid }}.{% endif
                %}

                '
              caller_token: '{{ caller_token }}'
        - stop: Repair complete
          response_variable: response
      default:
      - variables:
          response:
            status: error
            message: Unknown cabinet state.
            caller_token: '{{ caller_token }}'
      - stop: Fallback
        response_variable: response
    - variables:
        response: "{{ response | combine({'caller_token': caller_token | default('')}) if response is mapping else response }}"
    - stop: complete
      response_variable: response
    alias: Zen AdminTools CabinetAdmin (BACKUP)
    description: 'Factory tool for stamping or repairing Cabinet sensors. Requires confirm_action:
      true to run. Auto-detects flag profiles from cabinet type or manifest labels.
      Parses mount:[GUID] drawers into _zen_relationships. Accepts person.* entities
      for ACLs (SID=user_id). Supports Chat History and Archive Cabinets.

      '
    fields:
      confirm_action:
        name: Confirm Destructive Action
        description: Must be TRUE or script exits safely.
        selector:
          boolean:
        default: false
      cabinet_entity:
        name: Cabinet Entity
        selector:
          entity:
            filter:
            - domain: sensor
      cabinet_type:
        name: Cabinet Type
        selector:
          select:
            options:
            - AI Data Storage Cabinet
            - Zen Dojo Cabinet
            - Zen Kata Cabinet
            - User Cabinet
            - AI User Cabinet
            - Family Cabinet
            - Household Cabinet
            - System Cabinet
            - Partner Cabinet
            - Chat History Cabinet
            - Archive Cabinet
            - Other
        default: AI Data Storage Cabinet
      cabinet_guid:
        name: Cabinet GUID (optional)
        selector:
          text:
      force_new_guid:
        name: Force New GUID
        selector:
          boolean:
        default: false
      auto_profile:
        name: Auto-Detect Flag Profile
        selector:
          boolean:
        default: true
      explicit_flag_profile:
        name: Manual Flag Profile (if auto disabled)
        selector:
          select:
            options:
            - system
            - secure
            - public
            - standard
        default: standard
      mount_scan:
        name: Scan Mounts for Links
        selector:
          boolean:
        default: true
      owner_person:
        name: Owner (person)
        selector:
          entity:
            filter:
            - domain: person
      partner_person:
        name: Partner (person)
        selector:
          entity:
            filter:
            - domain: person
      family_guid:
        name: Family GUID
        selector:
          text:
      caller_token:
        name: Caller Token
        description: Opaque token passed through by the caller for correlation. Not interpreted by this script.
        required: false
        selector:
          text:
    icon: mdi:database-cog
