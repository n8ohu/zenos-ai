###############################################################################
# ZenOS-AI DojoTools: Core Package
# Version: 4.5.5
#
# Scripts:
#   zen_dojotools_filecabinet_gc — Cabinet GC: hide/delete/recycle/unhide lifecycle (v4.5.x)
#
# SETUP:
#   No secrets or additional configuration required.
#   Kata cabinet resolves via sensor.zen_kata_cabinet_resolved (health stack).
#   Fallback: sensor.zen_kata_storage_cabinet.
#
# USED BY:
#   automation.zen_dojotools_scheduler → Kata GC branch (daily_midnight trigger)
#
# MCP EXPOSURE:
#   zen_dojotools_filecabinet_gc — expose to conversation agent (maintenance utility)
#
# PROTECTION RULES (zen_dojotools_filecabinet_gc):
#   1. Keys starting with _ or . — always protected (system convention)
#   2. Explicit named list — AI_Cabinet_VolumeInfo, zen_template, zen_summary,
#      kata_template, kata_structure (supersummary schema + prompt drawer)
#   3. All other drawers subject to TTL (max_age_hours, default 24h)
#
# === UAT PASS — 2026-03-03 ===
# Auditor: Claude (Anthropic, Sonnet 4.6)
# HALMark: 0.9.10-draft — PASS Level 3 (Steward Safe) — 13/14 PASS, 1 KNOWN BEHAVIOR
# UAT Cases: 7/7 PASS
#
# zen_dojotools_filecabinet_gc:
#   dry_run=true, stale present → would_evict populated, nothing deleted ✓
#   dry_run=true, clean cabinet → would_evict=[], kept=13, protected=5 ✓
#   dry_run=false, clean cabinet → status=complete, evicted=0, supersummary_triggered=false ✓
#   protected key audit → AI_Cabinet_VolumeInfo, zen_template, zen_summary,
#     kata_template, kata_structure all shielded; prefix rule (_/.) confirmed ✓
#   ghost shadow (zen_dojotools_filecabinet_gc.yaml) found + removed → correct script runs ✓
#   cabinet entity resolution → sensor.zen_kata_cabinet_resolved → correct entity ✓
#   config check → go; restart → clean ✓
#
# Live verified (session 2026-03-03):
#   dry_run=true → {would_evict_count: 0, kept_count: 13, protected_count: 5} ✓
#   dry_run=false → {status: complete, evicted_count: 0, supersummary_triggered: false} ✓
#
# KNOWN BEHAVIOR:
#   all_drawers references kata_entity as a sibling key in the same variables step.
#   Works correctly in all tested scenarios. Flag for review at migration time.
#
# PENDING LIVE VERIFICATION (no stale drawers available at UAT time):
#   - Actual eviction path (delete loop + filecabinet response)
#   - post_supersummary=true with evictions (supersummary chain fires)
#   - max_age_hours custom value
#   - volume_entity_id override
# ==============================
###############################################################################

script:

  zen_dojotools_filecabinet_gc:
    alias: Zen DojoTools FileCabinet GC
    description: >-
      Cabinet garbage collector (v4.5.x). Implements the hide/delete/recycle/unhide
      lifecycle for drawers using meta.expires_after, meta.no_autoexpire, and
      meta.no_autorecycle. Visible drawers past expiry are hidden (foo → .foo).
      Already-hidden drawers past expiry are hard-deleted. Recycle hides a drawer
      and sets expiry to now+24h. Unhide promotes a hidden drawer back to visible.
      Also supports legacy max_age_hours timestamp eviction on the kata cabinet.
      Protected system drawers (_prefix) are never touched. Supports dry_run.
    mode: single
    icon: mdi:delete-clock
    fields:
      action_type:
        name: Action
        description: >-
          gc (default) — auto-scan and process all drawers by expiry metadata.
          recycle — hide a specific drawer and set expiry to now+24h.
          hide — hide a specific drawer (no expiry change).
          unhide — promote a hidden .drawer back to visible.
        required: false
        default: gc
        selector:
          select:
            options:
              - gc
              - recycle
              - hide
              - unhide
      key:
        name: Drawer Key
        description: Required for recycle/hide/unhide actions. The visible drawer name (without leading dot).
        required: false
        selector:
          text:
      dry_run:
        name: Dry Run
        description: Report what would happen without making changes. gc mode only.
        required: false
        default: false
        selector:
          boolean:
      max_age_hours:
        name: Max Age (hours)
        description: Legacy timestamp-based eviction for kata drawers without expires_after. Default 24.
        required: false
        default: 24
        selector:
          number:
            min: 1
            max: 168
            mode: box
      post_supersummary:
        name: Post Supersummary
        description: Trigger supersummary after gc eviction. Default true.
        required: false
        default: true
        selector:
          boolean:
      volume_entity_id:
        name: Volume
        description: Target cabinet entity. Defaults to kata cabinet.
        required: false
        selector:
          entity:
            filter:
            - domain: sensor
      caller_token:
        name: Caller Token
        description: Opaque token passed through by the caller for correlation. Not interpreted by this script.
        required: false
        selector:
          text:

    sequence:

      # --------------------------------------------------------------
      # Always normalize User/AI inputs so we don't have to react JIT
      # --------------------------------------------------------------
      - variables:
          caller_token: "{{- caller_token | default('') -}}"

      # ── 1. Resolve inputs ──────────────────────────────────────────────────
      - alias: Resolve inputs
        variables:
          gc_action: "{{ action_type | default('gc') }}"
          dry_run: "{{ dry_run | default(false) | bool }}"
          post_supersummary: "{{ post_supersummary | default(true) | bool }}"
          max_age_hours: "{{ max_age_hours | default(24) | int }}"
          target_key: "{{ key | default('') | trim }}"
          kata_entity: >-
            {%- if volume_entity_id is defined and volume_entity_id not in ['', none] -%}
              {{ volume_entity_id }}
            {%- else -%}
              {%- set resolved = states('sensor.zen_kata_cabinet_resolved') -%}
              {%- if resolved not in ['', 'unknown', 'unavailable', none] -%}
                {{ resolved }}
              {%- else -%}
                sensor.zen_kata_storage_cabinet
              {%- endif -%}
            {%- endif -%}
          protected_explicit:
            - AI_Cabinet_VolumeInfo
            - zen_template
            - zen_summary
            - kata_template
            - kata_structure
          all_drawers: "{{ state_attr(kata_entity, 'variables') | default({}, true) }}"

      # ── 2. Single-drawer actions: recycle / hide / unhide ─────────────────
      - alias: Recycle — hide drawer and set expires_after to now+24h
        if:
          - condition: template
            value_template: >-
              {{
                gc_action == 'recycle'
                and target_key != ''
                and target_key[:1] != '_'
                and target_key | lower not in protected_explicit | map('lower') | list
              }}
        then:
          - variables:
              src_data: "{{ all_drawers.get(target_key, {}) if all_drawers is mapping else {} }}"
              expiry_ts: "{{ (now() + timedelta(hours=24)).isoformat() }}"
              recycled_meta: >-
                {%- set m = src_data.get('meta', {}) if src_data is mapping else {} -%}
                {{ m | combine({'expires_after': expiry_ts}) }}
              recycled_entry: "{{ src_data | combine({'meta': recycled_meta}) if src_data is mapping else src_data }}"
          - event: set_variable_legacy
            event_data:
              key: ".{{ target_key }}"
              value: "{{ recycled_entry }}"
              volume_entity: "{{ kata_entity }}"
          - event: remove_variable_legacy
            event_data:
              key: "{{ target_key }}"
              volume_entity: "{{ kata_entity }}"
          - variables:
              final:
                status: complete
                action: recycle
                drawer: "{{ target_key }}"
                hidden_as: ".{{ target_key }}"
                expires_after: "{{ expiry_ts }}"
                caller_token: '{{ caller_token }}'
          - stop: recycle_complete
            response_variable: final

      - alias: Hide — rename drawer to .drawer
        if:
          - condition: template
            value_template: >-
              {{
                gc_action == 'hide'
                and target_key != ''
                and target_key[:1] != '_'
                and target_key | lower not in protected_explicit | map('lower') | list
              }}
        then:
          - variables:
              src_data: "{{ all_drawers.get(target_key, {}) if all_drawers is mapping else {} }}"
          - event: set_variable_legacy
            event_data:
              key: ".{{ target_key }}"
              value: "{{ src_data }}"
              volume_entity: "{{ kata_entity }}"
          - event: remove_variable_legacy
            event_data:
              key: "{{ target_key }}"
              volume_entity: "{{ kata_entity }}"
          - variables:
              final:
                status: complete
                action: hide
                drawer: "{{ target_key }}"
                hidden_as: ".{{ target_key }}"
                caller_token: '{{ caller_token }}'
          - stop: hide_complete
            response_variable: final

      - alias: Unhide — promote .drawer back to visible
        if:
          - condition: template
            value_template: >-
              {{
                gc_action == 'unhide'
                and target_key != ''
                and target_key[:1] != '_'
                and target_key | lower not in protected_explicit | map('lower') | list
              }}
        then:
          - variables:
              hidden_key: ".{{ target_key }}"
              src_data: "{{ all_drawers.get(hidden_key, {}) if all_drawers is mapping else {} }}"
          - event: set_variable_legacy
            event_data:
              key: "{{ target_key }}"
              value: "{{ src_data }}"
              volume_entity: "{{ kata_entity }}"
          - event: remove_variable_legacy
            event_data:
              key: ".{{ target_key }}"
              volume_entity: "{{ kata_entity }}"
          - variables:
              final:
                status: complete
                action: unhide
                drawer: "{{ target_key }}"
                restored_from: ".{{ target_key }}"
                caller_token: '{{ caller_token }}'
          - stop: unhide_complete
            response_variable: final

      # ── 3. Resolve cabinet list for GC scan ───────────────────────────────
      - alias: Resolve cabinet list
        variables:
          gc_cabinet_entities: >-
            {%- if volume_entity_id is defined and volume_entity_id not in ['', none] -%}
              {{ [volume_entity_id] }}
            {%- else -%}
              {%- import 'zenos_ai/library_index.jinja' as library_index -%}
              {%- set cabs_json = library_index.parse_index_command('AI Data Storage Cabinet') -%}
              {%- set fixed = cabs_json
                    | replace("['", '["')
                    | replace("']", '"]')
                    | replace("', '", '", "')
                    | trim -%}
              {%- set cabs = fixed | from_json | default([]) -%}
              {%- set sensors = states['sensor'] | map(attribute='entity_id') | list -%}
              {{ intersect(sensors, cabs) | list }}
            {%- endif -%}

      # ── 4. GC scan + execute: iterate all cabinets in series ──────────────
      - alias: GC scan and process all cabinets in series
        if:
          - condition: template
            value_template: "{{ gc_action == 'gc' }}"
        then:
          - repeat:
              for_each: "{{ gc_cabinet_entities }}"
              sequence:
                - variables:
                    current_cab: "{{ repeat.item }}"
                    cab_drawers: >-
                      {{ state_attr(current_cab, 'variables') | default({}, true) }}
                    explicit_lc: "{{ protected_explicit | map('lower') | list }}"
                    to_hide: >-
                      {%- set ns = namespace(out=[]) -%}
                      {%- if cab_drawers is mapping -%}
                        {%- for key, val in cab_drawers.items() -%}
                          {%- set is_system = key[:1] == '_' -%}
                          {%- set is_hidden = key[:1] == '.' -%}
                          {%- set is_protected = is_system or key | lower in explicit_lc -%}
                          {%- if not is_protected and not is_hidden and val is mapping -%}
                            {%- set meta = val.get('meta', {}) -%}
                            {%- set no_autoexpire = meta.get('no_autoexpire', false) -%}
                            {%- set exp_raw = meta.get('expires_after', '') | string | trim -%}
                            {%- if not no_autoexpire and exp_raw != '' -%}
                              {%- set exp_dt = exp_raw | as_datetime -%}
                              {%- if exp_dt is not none and now() > exp_dt -%}
                                {%- set ns.out = ns.out + [key] -%}
                              {%- endif -%}
                            {%- endif -%}
                          {%- endif -%}
                        {%- endfor -%}
                      {%- endif -%}
                      {{ ns.out }}
                    to_delete: >-
                      {%- set ns = namespace(out=[]) -%}
                      {%- if cab_drawers is mapping -%}
                        {%- for key, val in cab_drawers.items() -%}
                          {%- set is_hidden = key[:1] == '.' -%}
                          {%- set base_key = key[1:] if is_hidden else key -%}
                          {%- set is_protected = base_key | lower in explicit_lc -%}
                          {%- if is_hidden and not is_protected and val is mapping -%}
                            {%- set meta = val.get('meta', {}) -%}
                            {%- set exp_raw = meta.get('expires_after', '') | string | trim -%}
                            {%- if exp_raw != '' -%}
                              {%- set exp_dt = exp_raw | as_datetime -%}
                              {%- if exp_dt is not none and now() > exp_dt -%}
                                {%- set ns.out = ns.out + [key] -%}
                              {%- endif -%}
                            {%- endif -%}
                          {%- endif -%}
                        {%- endfor -%}
                      {%- endif -%}
                      {{ ns.out }}
                    stale_drawers: >-
                      {%- set ns = namespace(stale=[]) -%}
                      {%- if cab_drawers is mapping -%}
                        {%- for key, val in cab_drawers.items() -%}
                          {%- set is_protected = key[:1] in ['_', '.'] or key | lower in explicit_lc -%}
                          {%- if not is_protected and val is mapping -%}
                            {%- set meta = val.get('meta', {}) -%}
                            {%- set exp_raw = meta.get('expires_after', '') | string | trim -%}
                            {%- set no_autoexpire = meta.get('no_autoexpire', false) -%}
                            {%- if exp_raw == '' and not no_autoexpire -%}
                              {%- set ts_raw = val.get('timestamp', '') -%}
                              {%- if ts_raw != '' -%}
                                {%- set age_h = (now() - ts_raw | as_datetime).total_seconds() / 3600 -%}
                                {%- if age_h > max_age_hours -%}
                                  {%- set ns.stale = ns.stale + [key] -%}
                                {%- endif -%}
                              {%- endif -%}
                            {%- endif -%}
                          {%- endif -%}
                        {%- endfor -%}
                      {%- endif -%}
                      {{ ns.stale }}
                    #_vol_info_raw: >-
                    #  {%- set _vi = cab_drawers.get('AI_Cabinet_VolumeInfo', {}) -%}
                    #  {%- set _v1 = _vi.get('value', _vi) if _vi is mapping else {} -%}
                    #  {{ _v1 if _v1 is mapping else (_v1 | from_json if _v1 is string else {}) }}
                    _vol_info_raw: >-
                      {%- import 'zenos_ai/zenos_cabinets.jinja' as CABS -%}
                      {%- set _val = CABS.cabinet_drawer_value(current_cab, 'AI_Cabinet_VolumeInfo', {}) | from_json() -%}
                    _cab_flags: >-
                      {{ _vol_info_raw.get('flags', {}) }}
                    gc_flag_present: >-
                      {{ 'gc_eligible' in _cab_flags }}
                    gc_eligible: >-
                      {{ _cab_flags.get('gc_eligible', false) | bool }}
                - alias: Hide expired visible drawers (foo → .foo)
                  if:
                    - condition: template
                      value_template: "{{ not dry_run and gc_eligible and to_hide | length > 0 }}"
                  then:
                    - repeat:
                        for_each: "{{ to_hide }}"
                        sequence:
                          - variables:
                              _key: "{{ repeat.item }}"
                              _data: "{{ cab_drawers.get(_key, {}) }}"
                          - event: set_variable_legacy
                            event_data:
                              key: ".{{ _key }}"
                              value: "{{ _data }}"
                              volume_entity: "{{ current_cab }}"
                          - event: remove_variable_legacy
                            event_data:
                              key: "{{ _key }}"
                              volume_entity: "{{ current_cab }}"
                - alias: Delete expired hidden drawers (.foo → gone)
                  if:
                    - condition: template
                      value_template: "{{ not dry_run and gc_eligible and to_delete | length > 0 }}"
                  then:
                    - repeat:
                        for_each: "{{ to_delete }}"
                        sequence:
                          - event: remove_variable_legacy
                            event_data:
                              key: "{{ repeat.item }}"
                              volume_entity: "{{ current_cab }}"
                - alias: Evict legacy stale drawers (no expires_after, old timestamp)
                  if:
                    - condition: template
                      value_template: "{{ not dry_run and gc_eligible and stale_drawers | length > 0 }}"
                  then:
                    - repeat:
                        for_each: "{{ stale_drawers }}"
                        sequence:
                          - event: remove_variable_legacy
                            event_data:
                              key: "{{ repeat.item }}"
                              volume_entity: "{{ current_cab }}"
                - alias: Self-heal — stamp gc_eligible default if absent from header
                  if:
                    - condition: template
                      value_template: "{{ not dry_run and not gc_flag_present }}"
                  then:
                    - variables:
                        _new_flags: >-
                          {{ _cab_flags | combine({'gc_eligible': false}) if _cab_flags is mapping else {'gc_eligible': false} }}
                        _new_vol_info: >-
                          {{ _vol_info_raw | combine({'flags': _new_flags}) if _vol_info_raw is mapping else {'flags': _new_flags} }}
                    - event: set_variable_legacy
                      event_data:
                        key: AI_Cabinet_VolumeInfo
                        value: "{{ _new_vol_info | tojson }}"
                        set_timestamp: false
                        volume_entity: "{{ current_cab }}"

      # ── 5. Post-prune supersummary ─────────────────────────────────────────
      - alias: Trigger supersummary after gc
        if:
          - condition: template
            value_template: "{{ gc_action == 'gc' and post_supersummary and not dry_run }}"
        then:
          - action: script.zen_dojotools_supersummary
            data:
              post_to_kata_cabinet: true
              caller_token: '{{ caller_token }}'
              supplemental_prompt: >-
                {{
                  {
                    'source': 'filecabinet_gc',
                    'cabinets_scanned': gc_cabinet_entities
                  }
                }}

      # ── 6. Report ──────────────────────────────────────────────────────────
      - alias: Build GC report
        variables:
          final:
            status: "{{ 'dry_run' if dry_run else 'complete' }}"
            action: "{{ gc_action }}"
            cabinets_scanned: "{{ gc_cabinet_entities | default([]) }}"
            max_age_hours: "{{ max_age_hours }}"
            dry_run: "{{ dry_run }}"
            supersummary_triggered: "{{ gc_action == 'gc' and post_supersummary and not dry_run }}"
            caller_token: '{{ caller_token }}'

      - stop: filecabinet_gc_complete
        response_variable: final
