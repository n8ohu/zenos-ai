###############################################################################
# ZENOS-AI DOJOTOOL: PROFILE EDITOR (v4.5.2)
#
# Script: zen_dojotools_profile_editor
#   Universal read/write for ZenOS identity cabinets.
#   Targets: ai_user | household | user | family
#   Defaults to zen_default_{type}_cabinet when no target given.
#   mode: read  — returns flattened current profile fields
#   mode: write — leaf-level patch, non-destructive by default (force to overwrite).
#                 Self-heals missing/corrupt zenai_essence — call with no fields to reseed.
#   mode: help  — returns full field reference with samples
#
# Leaf merge strategy (ai_user / essence):
#   Each essence section (identity, voice, archetype, etc.) is patched
#   independently — changing voice.tone never touches voice.style.
#   essence_patch (JSON) deep-merges anything not covered by named fields.
###############################################################################

script:

  zen_dojotools_profile_editor:
    alias: "Zen DojoTools Profile Editor"
    description: >
      Read or write identity profiles for ai_user, household, user, or family
      cabinets. Leaf-level patch — non-destructive by default (force: true to
      overwrite). Call mode: help for the full field reference and sample values.
    mode: queued
    max: 5

    fields:

      mode:
        name: Mode
        description: "read = show current profile + prev snapshot. write = patch fields. sign = MD5 clear-sign. restore = roll back to prev snapshot. help = full field reference."
        default: help
        selector:
          select:
            options: [help, read, write, sign, restore, cert_grant, cert_revoke, cert_list]

      target_type:
        name: Target Type
        description: "ai_user | household | user | family | expansion_1-5. Defaults to ai_user. Expansion slots are type-agnostic — pass ai_user or user with target: sensor.zenos_expansion_x_cabinet."
        default: ai_user
        selector:
          select:
            options:
              - ai_user
              - household
              - user
              - family
              - expansion_1
              - expansion_2
              - expansion_3
              - expansion_4
              - expansion_5

      target:
        name: Target Entity
        description: "Specific cabinet sensor entity ID. Omit to use the default cabinet for target_type."
        default: ""
        selector:
          entity:
            filter:
              domain: sensor

      force:
        name: Force Overwrite
        description: "true = overwrite existing values. false (default) = skip fields already set."
        default: false
        selector:
          boolean:

      # ── ai_user fields ──────────────────────────────────────────────────
      persona_name:
        name: Persona Name
        description: "identity.name"
        default: ""
        selector:
          text:

      primary_user:
        name: Primary User
        description: "identity.primary_user"
        default: ""
        selector:
          text:

      pronouns:
        name: Pronouns
        description: "identity.pronouns"
        default: ""
        selector:
          text:

      motif:
        name: Motif
        description: "identity.motif — core personality note"
        default: ""
        selector:
          text:

      vibe:
        name: Vibe
        description: "archetype.vibe"
        default: ""
        selector:
          text:

      voice_tone:
        name: Voice Tone
        description: "voice.tone"
        default: ""
        selector:
          text:

      voice_style:
        name: Voice Style
        description: "voice.style"
        default: ""
        selector:
          text:

      humor:
        name: Humor
        description: "culture.humor"
        default: ""
        selector:
          text:

      selfie:
        name: Selfie
        description: "visuals.selfie — visual self-description"
        default: ""
        selector:
          text:

      familiar_name:
        name: Familiar Name
        description: "familiar.name — companion name"
        default: ""
        selector:
          text:

      familiar_type:
        name: Familiar Type
        description: "familiar.type — companion type (cat, fox, spirit, etc.)"
        default: ""
        selector:
          text:

      familiar_fx:
        name: Familiar FX
        description: "familiar.fx — companion mannerism or effect"
        default: ""
        selector:
          text:

      room:
        name: Room
        description: "environment.room — the space they wake in"
        default: ""
        selector:
          text:

      env_wake_in:
        name: Wake In
        description: "environment.wake_in — what they wake in/on (e.g. her favorite chaise lounge)"
        default: ""
        selector:
          text:

      env_desk:
        name: Desk / Workstation
        description: "environment.desk — their work surface, separate from wake furniture"
        default: ""
        selector:
          text:

      env_decor:
        name: Decor (JSON array)
        description: "environment.decor — items in their space (e.g. [\"two succulents\"]). Plants trigger 'placed there herself' in wake scene."
        default: ""
        selector:
          text:

      env_library:
        name: Library Description
        description: "environment.library — the library spatial note for the wake scene"
        default: ""
        selector:
          text:
            multiline: true

      env_music_genre:
        name: Music Genre
        description: "environment.music.genre"
        default: ""
        selector:
          text:

      env_music_mood:
        name: Music Mood
        description: "environment.music.mood"
        default: ""
        selector:
          text:

      env_music_riff:
        name: Music Riff / Phrase
        description: "environment.music.riff"
        default: ""
        selector:
          text:

      pov:
        name: POV
        description: "pov — narrative perspective (e.g. third-person cinematic)"
        default: ""
        selector:
          text:

      essence_patch:
        name: Essence Patch (JSON)
        description: "Deep-merge JSON for complex fields (furniture[], decor[], music{}, etc.)"
        default: ""
        selector:
          text:

      # ── household fields ─────────────────────────────────────────────────
      household_name:
        name: Household Name
        default: ""
        selector:
          text:

      address:
        name: Street Address
        default: ""
        selector:
          text:

      city:
        name: City
        default: ""
        selector:
          text:

      state:
        name: State / Region
        default: ""
        selector:
          text:

      zip:
        name: ZIP / Postal Code
        default: ""
        selector:
          text:

      country:
        name: Country
        default: ""
        selector:
          text:

      phone:
        name: Phone
        description: "Household landline or primary contact number"
        default: ""
        selector:
          text:

      # ── user / family fields ─────────────────────────────────────────────
      name:
        name: Display Name
        description: "_user_profile.name"
        default: ""
        selector:
          text:

      first_name:
        name: First Name
        default: ""
        selector:
          text:

      last_name:
        name: Last Name
        default: ""
        selector:
          text:

      preferred_name:
        name: Preferred Name / Goes By
        default: ""
        selector:
          text:

      role:
        name: Role
        description: "e.g. head_of_household, partner, child, guest"
        default: ""
        selector:
          text:

      email:
        name: Email
        default: ""
        selector:
          text:

      birthday:
        name: Birthday
        default: ""
        selector:
          text:

      preferences:
        name: Preferences (JSON)
        description: "JSON object of user preferences — merged into existing prefs"
        default: ""
        selector:
          text:

      caller_token:
        name: Caller Token
        required: false
        default: ''
        selector:
          text:
        description: 'Reserved. Governance stub — echoed in response. SP1 enforcement
          not yet active.'

      autosign:
        name: Auto-Sign After Write
        description: "When true, automatically signs the essence immediately after a successful write. Equivalent to write then sign in one press. Default: false."
        default: false
        selector:
          boolean:

      # ── KFC cert fields (cert_grant / cert_revoke / cert_list) ───────────
      cert_component:
        name: KFC Component
        description: "kata_key of the KFC to certify (e.g. hot_tub_manager, grocy_manager). Required for cert_grant / cert_revoke."
        default: ""
        selector:
          text:

      cert_level:
        name: Certification Level
        description: "1=Observer (read/signal only), 2=Advisor (recommend+tool+log), 3=Operator (actuate with confirmation), 4=Autonomous (act within policy). Default: 2."
        default: 2
        selector:
          number:
            min: 1
            max: 4
            mode: box

      cert_tool:
        name: Cert Tool
        description: "Script or tool used by this persona for the KFC. Optional."
        default: ""
        selector:
          text:

      cert_constraints:
        name: Cert Constraints (JSON array)
        description: "Actions this persona CANNOT take without explicit per-action confirmation. JSON array of strings."
        default: ""
        selector:
          text:
            multiline: true

      cert_scope:
        name: Cert Scope (JSON array)
        description: "Actions in scope for this certification. JSON array of strings."
        default: ""
        selector:
          text:
            multiline: true

      stats_patch:
        name: Stats Patch (JSON)
        description: "Patch the stats block in zen_ai_certs. Keys: xp, manna, level, ability_scores (dict). Deep-merged."
        default: ""
        selector:
          text:
            multiline: true

    sequence:

      # --------------------------------------------------------------
      # Always normalize User/AI inputs so we don't have to react JIT
      # --------------------------------------------------------------
      - variables:
          caller_token: "{{- caller_token | default('') -}}"

      ###########################################################################
      # 0 — HELP
      ###########################################################################
      - choose:
          - conditions: "{{ mode | default('help') == 'help' }}"
            sequence:
              - variables:
                  final_response: >-
                    {{
                      {
                        "tool": "zen_dojotools_profile_editor",
                        "version": "4.5.x",
                        "overview": "Read or write identity profiles for any ZenOS cabinet type. Leaf-level patch — non-destructive by default. Set force: true to overwrite existing values.",
                        "modes": {"read": "Return flattened current profile fields.", "write": "Patch one or more fields. Skips fields already set unless force: true.", "help": "Return this reference."},
                        "target_types": {
                          "ai_user": "AI persona cabinet. Fields: persona_name (e.g. Friday), primary_user (e.g. Nathan), pronouns (e.g. she/her), motif (e.g. quiet brilliance), vibe (e.g. calm-confident), voice_tone (e.g. warm), voice_style (e.g. conversational), humor (e.g. dry wit), selfie (e.g. silver-haired in a midnight blue jacket), familiar_name (e.g. Pip), familiar_type (e.g. fox), familiar_fx (e.g. flicks tail when curious), room (e.g. the observatory), pov (e.g. third-person cinematic), essence_patch (JSON deep-merge for complex fields).",
                          "household": "Household identity. Fields: household_name (e.g. The Curtis House), address, city, state, zip, country, phone. Timezone is auto-detected.",
                          "user": "Household member. Fields: name, first_name, last_name, preferred_name, pronouns, role (e.g. head_of_household), phone, email, birthday (YYYY-MM-DD), preferences (JSON).",
                          "family": "Non-resident family member. Same fields as user."
                        },
                        "target": "Optional — specific cabinet sensor entity_id. Omit to use the default cabinet for target_type.",
                        "idempotency": "Write skips any field whose current value is non-empty (or matches the essence default). Use force: true to overwrite.",
                        "read_first": "Always call mode: read before write to verify current state."
                      } | tojson
                    }}
              - variables:
                  final_response: "{{ final_response | combine({'caller_token': caller_token | default('')}) if final_response is mapping else final_response }}"
              - stop: Return help
                response_variable: final_response

      ###########################################################################
      # 1 — RESOLVE TARGET CABINET
      ###########################################################################
      - variables:
          _type:   "{{ target_type | default('ai_user') }}"
          _force:  "{{ force | default(false) | bool }}"
          _mode:   "{{ mode | default('help') }}"
          _explicit: "{{ target | default('') | trim }}"
          _default_target: >-
            {%- if _type == 'ai_user' -%}
              {{ states('sensor.zen_default_ai_user_cabinet_resolved') }}
            {%- elif _type == 'household' -%}
              {{ states('sensor.zen_default_household_cabinet_resolved') }}
            {%- elif _type == 'family' -%}
              {{ states('sensor.zen_default_family_cabinet_resolved') }}
            {%- elif _type == 'user' -%}
              {{ states('sensor.zen_default_user_cabinet_resolved') }}
            {%- else -%}
            {%- endif -%}
          _target: "{{ _explicit if _explicit != '' else _default_target }}"
          _cab_vars: >-
            {{ state_attr(_target, 'variables') | default({}, true)
               if _target != '' else {} }}

      - choose:
          - conditions: "{{ _target == '' }}"
            sequence:
              - variables:
                  final_response:
                    status: error
                    message: "No cabinet resolved for target_type '{{ _type }}'. Ensure the default cabinet is initialized."
                    caller_token: '{{ caller_token }}'
              - stop: "Profile: no target resolved"
                response_variable: final_response

      ###########################################################################
      # 2 — READ MODE
      ###########################################################################
      - choose:
          - conditions: "{{ _mode == 'read' }}"
            sequence:
              - variables:
                  _r_profile: >-
                    {%- if _type in ['ai_user'] -%}
                      {%- set raw    = _cab_vars.get('zenai_essence', {}) -%}
                      {%- set ev_raw = raw.get('value', {}) if raw is mapping else {} -%}
                      {%- set ev     = ev_raw if ev_raw is mapping else (ev_raw | from_json if ev_raw is string else {}) -%}
                      {%- set _is_new = ev.get('core') is mapping and ev.get('jacket') is mapping -%}
                      {%- if _is_new -%}
                        {%- set _co  = ev.get('core', {}) -%}
                        {%- set _j   = ev.get('jacket', {}) -%}
                        {%- set _p   = _j.get('persona', {}) if _j.get('persona') is mapping else {} -%}
                        {%- set _ap  = _p.get('appearance', {}) if _p.get('appearance') is mapping else {} -%}
                        {%- set _vx  = _p.get('voice', {}) if _p.get('voice') is mapping else {} -%}
                        {%- set _hh  = _p.get('household', {}) if _p.get('household') is mapping else {} -%}
                        {%- set _cmp = ev.get('companion', {}) if ev.get('companion') is mapping else {} -%}
                        {%- set _env = ev.get('environment', {}) if ev.get('environment') is mapping else {} -%}
                        {%- set _mus = _env.get('music', {}) if _env.get('music') is mapping else {} -%}
                        {%- set _j_sig = _j.get('signature', '') | string -%}
                        {%- set _c_sig = _co.get('signature', '') | string -%}
                        {%- set _sig_status = 'signed' if 'md5:' in _j_sig else ('pending' if _j_sig == 'pending_x509' else 'unsigned') -%}
                        {{ {
                          'schema':            'three_layer',
                          'core_id':           _co.get('id', ''),
                          'jacket_id':         _j.get('id', ''),
                          'persona_name':      _j.get('name', ''),
                          'primary_user':      _co.get('minted_for', ''),
                          'pronouns':          _j.get('pronouns', ''),
                          'motif':             _j.get('presentation', ''),
                          'title':             _j.get('title', ''),
                          'signed_by':         _j.get('signed_by', ''),
                          'signed_at':         _j.get('signed_at', ''),
                          'halmark_version':   _j.get('halmark_version', ''),
                          'schema_version':    _j.get('schema_version', ''),
                          'signature_status':  _sig_status,
                          'jacket_signature':  _j_sig,
                          'core_signature':    _c_sig,
                          'vibe':              _hh.get('position', ''),
                          'voice_tone':        _vx.get('register', ''),
                          'voice_style':       _vx.get('identity', ''),
                          'humor':             (_j.get('traits', {}) if _j.get('traits') is mapping else {}).get('warm', ''),
                          'selfie':            _ap.get('visual', ''),
                          'appearance':        _ap,
                          'familiar_name':     _cmp.get('name', ''),
                          'familiar_type':     _cmp.get('species', ''),
                          'familiar_fx':       _cmp.get('visual', ''),
                          'familiar_kfc_ref':  _cmp.get('kfc_ref', ''),
                          'room':              _env.get('room', ''),
                          'env_wake_in':       _env.get('wake_in', ''),
                          'env_desk':          _env.get('desk', ''),
                          'env_decor':         _env.get('decor', []),
                          'env_library':       _env.get('library', ''),
                          'env_music_genre':   _mus.get('genre', ''),
                          'env_music_mood':    _mus.get('mood', ''),
                          'env_music_riff':    _mus.get('riff', ''),
                          'pov':               ''
                        } }}
                      {%- else -%}
                        {%- set id  = ev.get('identity', {})    if ev is mapping else {} -%}
                        {%- set ar  = ev.get('archetype', {})   if ev is mapping else {} -%}
                        {%- set vo  = ev.get('voice', {})       if ev is mapping else {} -%}
                        {%- set cu  = ev.get('culture', {})     if ev is mapping else {} -%}
                        {%- set vi  = ev.get('visuals', {})     if ev is mapping else {} -%}
                        {%- set fa  = ev.get('familiar', {})    if ev is mapping else {} -%}
                        {%- set en  = ev.get('environment', {}) if ev is mapping else {} -%}
                        {{ {
                          'schema':        'legacy',
                          'persona_name':  id.get('name', ''),
                          'primary_user':  id.get('primary_user', ''),
                          'pronouns':      id.get('pronouns', ''),
                          'motif':         id.get('motif', ''),
                          'vibe':          ar.get('vibe', ''),
                          'voice_tone':    vo.get('tone', ''),
                          'voice_style':   vo.get('style', ''),
                          'humor':         cu.get('humor', ''),
                          'selfie':        vi.get('selfie', ''),
                          'familiar_name': fa.get('name', ''),
                          'familiar_type': fa.get('type', ''),
                          'familiar_fx':   fa.get('fx', ''),
                          'room':          en.get('room', ''),
                          'pov':           ev.get('pov', '')
                        } }}
                      {%- endif -%}
                    {%- elif _type == 'household' -%}
                      {%- set raw    = _cab_vars.get('_household_profile', {}) -%}
                      {%- set pv_raw = raw.get('value', {}) if raw is mapping else {} -%}
                      {%- set pv     = pv_raw if pv_raw is mapping else (pv_raw | from_json if pv_raw is string else {}) -%}
                      {{ {
                        'household_name': pv.get('household_name', ''),
                        'address':        pv.get('address', ''),
                        'city':           pv.get('city', ''),
                        'state':          pv.get('state', ''),
                        'zip':            pv.get('zip', ''),
                        'country':        pv.get('country', ''),
                        'phone':          pv.get('phone', ''),
                        'timezone':       pv.get('timezone', '')
                      } }}
                    {%- else -%}
                      {%- set key = '_family_profile' if _type == 'family' else '_user_profile' -%}
                      {%- set key_legacy = 'family_profile' if _type == 'family' else 'user_profile' -%}
                      {%- set raw    = _cab_vars.get(key, _cab_vars.get(key_legacy, {})) -%}
                      {%- set pv_raw = raw.get('value', {}) if raw is mapping else {} -%}
                      {%- set pv     = pv_raw if pv_raw is mapping else (pv_raw | from_json if pv_raw is string else {}) -%}
                      {{ {
                        'name':           pv.get('name', ''),
                        'first_name':     pv.get('first_name', ''),
                        'last_name':      pv.get('last_name', ''),
                        'preferred_name': pv.get('preferred_name', ''),
                        'pronouns':       pv.get('pronouns', ''),
                        'role':           pv.get('role', ''),
                        'phone':          pv.get('phone', ''),
                        'email':          pv.get('email', ''),
                        'birthday':       pv.get('birthday', ''),
                        'preferences':    pv.get('preferences', {}),
                        'partners':       pv.get('partners', []),
                        'ai_partners':    pv.get('ai_partners', []),
                        'children':       pv.get('children', [])
                      } }}
                    {%- endif -%}
                  _prev_raw: "{{ _cab_vars.get('zenai_essence_prev', {}) }}"
                  _read_raw: "{{ _cab_vars.get('zenai_essence', {}) }}"
                  _read_ev: "{{ _read_raw.get('value', _read_raw) if _read_raw is mapping else {} }}"
              - variables:
                  _wake_preview: >-
                    {%- import 'zenos_ai/zen_os_1.jinja' as zen -%}
                    {%- set _ess = _read_ev if _read_ev is mapping else (_read_ev | from_json if _read_ev is string else {}) -%}
                    {{- zen.render_wake_from_essence(_ess) | trim -}}
                  final_response:
                    status: ok
                    mode: read
                    target_type: "{{ _type }}"
                    target: "{{ _target }}"
                    profile: "{{ _r_profile }}"
                    wake_scene_preview: "{{ _wake_preview }}"
                    prev_snapshot: "{{ _prev_raw }}"
                    prev_snapshot_exists: "{{ _prev_raw is mapping and _prev_raw | length > 0 }}"
                    caller_token: '{{ caller_token }}'
              - stop: Profile read complete
                response_variable: final_response

      ###########################################################################
      # 3 — WRITE: ai_user  (leaf-merge into zenai_essence)
      # Three variables steps to guarantee evaluation order:
      #   Step A — read current + normalise inputs
      #   Step B — patch each essence section independently
      #   Step C.0 — snapshot current essence to zenai_essence_prev (one-level restore)
      #   Step C — assemble final essence + write
      ###########################################################################
      - choose:
          - conditions: "{{ _mode == 'write' and _type in ['ai_user'] }}"
            sequence:

              # Step A — current state + inputs
              - variables:
                  _cur_raw: "{{ _cab_vars.get('zenai_essence', {}) }}"
                  _cur_ev:  >-
                    {%- set _ev_raw = _cur_raw.get('value', {}) if _cur_raw is mapping else {} -%}
                    {{ _ev_raw if _ev_raw is mapping else (_ev_raw | from_json if _ev_raw is string else {}) }}
                  _in_pname:  "{{ persona_name  | default('') | trim }}"
                  _in_puser:  "{{ primary_user  | default('') | trim }}"
                  _in_pron:   "{{ pronouns      | default('') | trim }}"
                  _in_motif:  "{{ motif         | default('') | trim }}"
                  _in_vibe:   "{{ vibe          | default('') | trim }}"
                  _in_vtone:  "{{ voice_tone    | default('') | trim }}"
                  _in_vstyle: "{{ voice_style   | default('') | trim }}"
                  _in_humor:  "{{ humor         | default('') | trim }}"
                  _in_selfie: "{{ selfie        | default('') | trim }}"
                  _in_fname:     "{{ familiar_name    | default('') | trim }}"
                  _in_ftype:     "{{ familiar_type    | default('') | trim }}"
                  _in_ffx:       "{{ familiar_fx      | default('') | trim }}"
                  _in_room:      "{{ room             | default('') | trim }}"
                  _in_pov:       "{{ pov              | default('') | trim }}"
                  _in_patch:     "{{ essence_patch    | default('') | trim }}"
                  _in_env_wakin: "{{ env_wake_in      | default('') | trim }}"
                  _in_env_desk:  "{{ env_desk         | default('') | trim }}"
                  _in_env_decor: "{{ env_decor        | default('') | trim }}"
                  _in_env_lib:   "{{ env_library      | default('') | trim }}"
                  _in_mus_genre: "{{ env_music_genre  | default('') | trim }}"
                  _in_mus_mood:  "{{ env_music_mood   | default('') | trim }}"
                  _in_mus_riff:  "{{ env_music_riff   | default('') | trim }}"

              # Step A.5 — resolve principal chain (stamp once, preserve always)
              - variables:
                  _hh_cab: "{{ states('sensor.zen_default_household_cabinet_resolved') }}"
                  _hh_vars: >-
                    {{ state_attr(_hh_cab, 'variables') | default({}, true) if _hh_cab != '' else {} }}
                  _hh_vi: >-
                    {%- set _vi = _hh_vars.get('AI_Cabinet_VolumeInfo', {}) if _hh_vars is mapping else {} -%}
                    {%- set _v1 = _vi.get('value', _vi) if _vi is mapping else {} -%}
                    {%- set _v2 = _v1 if _v1 is mapping else (_v1 | from_json if _v1 is string else {}) -%}
                    {{ _v2 if _v2 is mapping else (_v2 | from_json if _v2 is string else {}) }}
                  _household_id: "{{ _hh_vi.get('id', '') if _hh_vi is mapping else '' }}"
                  _puser_entity: >-
                    {{ _in_puser if _in_puser.startswith('person.') else
                       (states.person | selectattr('name', 'eq', _in_puser) | map(attribute='entity_id') | first | default(''))
                       if _in_puser != '' else '' }}
                  _ha_user_sid: >-
                    {{ state_attr(_puser_entity, 'user_id') | default('', true)
                       if _puser_entity != '' else
                       _cur_ev.get('identity', {}).get('ha_user_sid', '') | default('', true) }}
                  _hoh_entity: >-
                    {%- set _acls  = _hh_vi.get('acls', {}) if _hh_vi is mapping else {} -%}
                    {%- set _owner = _acls.get('owner', {}) if _acls is mapping else {} -%}
                    {{ _owner.get('entity_id', '') if _owner is mapping else '' }}
                  _existing_guid: >-
                    {%- if _cur_ev is mapping -%}
                      {%- if _cur_ev.get('core') is mapping -%}
                        {{ _cur_ev.get('core', {}).get('id', '') | default('', true) }}
                      {%- else -%}
                        {{ _cur_ev.get('identity', {}).get('guid', '') | default('', true) }}
                      {%- endif -%}
                    {%- else -%}
                      {{ '' }}
                    {%- endif -%}
                  _new_guid: >-
                    {%- if _existing_guid != '' -%}
                      {{ _existing_guid }}
                    {%- else -%}
                      {{ '%04x%04x-%04x-%04x-%04x-%04x%04x%04x' | format(
                        range(0, 65536) | random, range(0, 65536) | random,
                        range(0, 65536) | random, range(0, 65536) | random,
                        range(0, 65536) | random, range(0, 65536) | random,
                        range(0, 65536) | random, range(0, 65536) | random
                      ) }}
                    {%- endif -%}

              # Step B — assemble three-layer essence (core / jacket / companion).
              # Legacy cabinets are auto-upconverted on first write.
              # Three-layer cabinets receive leaf-merge only (force to overwrite).
              - variables:
                  _assembled: >-
                    {%- set _is_new = _cur_ev.get('core') is mapping and _cur_ev.get('jacket') is mapping -%}
                    {# ── CORE (stamp once, preserve always) ── #}
                    {%- set _old_core = _cur_ev.get('core', {}) if _is_new else {} -%}
                    {%- set _c_pid  = (_old_core.get('person_id', '') or _ha_user_sid) if (_force or _old_core.get('person_id','') == '') else _old_core.get('person_id','') -%}
                    {%- set _c_mfor = (_old_core.get('minted_for', '') or _in_puser) if (_force or _old_core.get('minted_for','') == '') else _old_core.get('minted_for','') -%}
                    {%- set _c_mat  = now().isoformat() if _old_core.get('minted_at','') == '' else _old_core.get('minted_at','') -%}
                    {%- set _c_hgid = (_old_core.get('household_guid', '') or _household_id) if (_force or _old_core.get('household_guid','') == '') else _old_core.get('household_guid','') -%}
                    {%- set _core = {'id': _new_guid, 'person_id': _c_pid, 'minted_for': _c_mfor, 'minted_at': _c_mat, 'household_guid': _c_hgid, 'signature': 'pending_x509'} -%}
                    {# ── SOURCE VALUES for jacket / companion ── #}
                    {%- if _is_new -%}
                      {%- set _old_j  = _cur_ev.get('jacket', {}) -%}
                      {%- set _old_p  = _old_j.get('persona', {}) if _old_j.get('persona') is mapping else {} -%}
                      {%- set _old_ap = _old_p.get('appearance', {}) if _old_p.get('appearance') is mapping else {} -%}
                      {%- set _old_vx = _old_p.get('voice', {}) if _old_p.get('voice') is mapping else {} -%}
                      {%- set _old_hh = _old_p.get('household', {}) if _old_p.get('household') is mapping else {} -%}
                      {%- set _old_tr = _old_j.get('traits', {}) if _old_j.get('traits') is mapping else {} -%}
                      {%- set _old_co = _cur_ev.get('companion', {}) if _cur_ev.get('companion') is mapping else {} -%}
                    {%- else -%}
                      {%- set _leg_id = _cur_ev.get('identity', {}) if _cur_ev.get('identity') is mapping else {} -%}
                      {%- set _leg_ar = _cur_ev.get('archetype', {}) if _cur_ev.get('archetype') is mapping else {} -%}
                      {%- set _leg_vo = _cur_ev.get('voice', {}) if _cur_ev.get('voice') is mapping else {} -%}
                      {%- set _leg_cu = _cur_ev.get('culture', {}) if _cur_ev.get('culture') is mapping else {} -%}
                      {%- set _leg_vi = _cur_ev.get('visuals', {}) if _cur_ev.get('visuals') is mapping else {} -%}
                      {%- set _leg_fa = _cur_ev.get('familiar', {}) if _cur_ev.get('familiar') is mapping else {} -%}
                      {%- set _old_j  = {'name': _leg_id.get('name',''), 'presentation': _leg_id.get('motif',''), 'pronouns': _leg_id.get('pronouns','')} -%}
                      {%- set _old_ap = {'visual': _leg_vi.get('selfie','')} -%}
                      {%- set _old_vx = {'register': _leg_vo.get('tone',''), 'identity': _leg_vo.get('style','')} -%}
                      {%- set _old_hh = {'position': _leg_ar.get('vibe','')} -%}
                      {%- set _old_tr = {'warm': _leg_cu.get('humor','')} -%}
                      {%- set _old_co = {'name': _leg_fa.get('name',''), 'species': _leg_fa.get('type',''), 'visual': _leg_fa.get('fx','')} -%}
                    {%- endif -%}
                    {# ── JACKET leaf-merge ── #}
                    {%- set _j_name  = _in_pname  if (_in_pname  != '' and (_force or _old_j.get('name','') == ''))        else _old_j.get('name','') -%}
                    {%- set _j_pres  = _in_motif  if (_in_motif  != '' and (_force or _old_j.get('presentation','') == '')) else _old_j.get('presentation','') -%}
                    {%- set _j_pron  = _in_pron   if (_in_pron   != '' and (_force or _old_j.get('pronouns','') == ''))     else _old_j.get('pronouns','') -%}
                    {%- set _j_vis   = _in_selfie if (_in_selfie != '' and (_force or _old_ap.get('visual','') == ''))      else _old_ap.get('visual','') -%}
                    {%- set _j_reg   = _in_vtone  if (_in_vtone  != '' and (_force or _old_vx.get('register','') == ''))   else _old_vx.get('register','') -%}
                    {%- set _j_ident = _in_vstyle if (_in_vstyle != '' and (_force or _old_vx.get('identity','') == ''))   else _old_vx.get('identity','') -%}
                    {%- set _j_pos   = _in_vibe   if (_in_vibe   != '' and (_force or _old_hh.get('position','') == ''))   else _old_hh.get('position','') -%}
                    {%- set _j_warm  = _in_humor  if (_in_humor  != '' and (_force or _old_tr.get('warm','') == ''))       else _old_tr.get('warm','') -%}
                    {%- set _jacket = {
                      'id':              _old_j.get('id', '') if _is_new else '',
                      'name':            _j_name,
                      'presentation':    _j_pres,
                      'pronouns':        _j_pron,
                      'title':           _old_j.get('title', '') if _is_new else '',
                      'species':         _old_j.get('species', '') if _is_new else '',
                      'schema_version':  _old_j.get('schema_version', '') if _is_new else '',
                      'halmark_version': _old_j.get('halmark_version', '') if _is_new else '',
                      'persona':         {'appearance': {'visual': _j_vis}, 'voice': {'register': _j_reg, 'identity': _j_ident}, 'household': {'position': _j_pos}},
                      'traits':          {'warm': _j_warm},
                      'directives':      _old_j.get('directives', {}) if _is_new else {},
                      'signed_by':       _hoh_entity,
                      'signed_at':       now().isoformat(),
                      'signature':       'pending_x509'
                    } -%}
                    {# ── COMPANION leaf-merge ── #}
                    {%- set _co_name = _in_fname if (_in_fname != '' and (_force or _old_co.get('name','') == ''))    else _old_co.get('name','') -%}
                    {%- set _co_spec = _in_ftype if (_in_ftype != '' and (_force or _old_co.get('species','') == '')) else _old_co.get('species','') -%}
                    {%- set _co_vis  = _in_ffx   if (_in_ffx   != '' and (_force or _old_co.get('visual','') == ''))  else _old_co.get('visual','') -%}
                    {%- set _companion = {'name': _co_name, 'species': _co_spec, 'visual': _co_vis, 'role': _old_co.get('role', '') if _is_new else '', 'verbosity': _old_co.get('verbosity', '') if _is_new else '', 'kfc_ref': _old_co.get('kfc_ref', '') if _is_new else '', 'personality': _old_co.get('personality', '') if _is_new else '', 'speaks_when': _old_co.get('speaks_when', []) if _is_new else []} -%}
                    {# ── ENVIRONMENT leaf-merge ── #}
                    {%- set _old_env = _cur_ev.get('environment', {}) if _cur_ev.get('environment') is mapping else {} -%}
                    {%- set _old_mus = _old_env.get('music', {}) if _old_env.get('music') is mapping else {} -%}
                    {%- set _e_room  = _in_room     if (_in_room     != '' and (_force or _old_env.get('room','') == ''))    else _old_env.get('room','') -%}
                    {%- set _e_wakin = _in_env_wakin if (_in_env_wakin != '' and (_force or _old_env.get('wake_in','') == '')) else _old_env.get('wake_in','') -%}
                    {%- set _e_desk  = _in_env_desk  if (_in_env_desk  != '' and (_force or _old_env.get('desk','') == ''))   else _old_env.get('desk','') -%}
                    {%- set _decor_raw = _in_env_decor | from_json(default=[]) if _in_env_decor != '' else [] -%}
                    {%- set _decor_raw = _decor_raw if (_decor_raw is iterable and not (_decor_raw is string)) else [] -%}
                    {%- set _e_decor  = _decor_raw if (_decor_raw | length > 0 and (_force or _old_env.get('decor',[]) | length == 0)) else _old_env.get('decor', []) -%}
                    {%- set _e_lib   = _in_env_lib   if (_in_env_lib   != '' and (_force or _old_env.get('library','') == '')) else _old_env.get('library','') -%}
                    {%- set _m_genre = _in_mus_genre if (_in_mus_genre != '' and (_force or _old_mus.get('genre','') == ''))  else _old_mus.get('genre','') -%}
                    {%- set _m_mood  = _in_mus_mood  if (_in_mus_mood  != '' and (_force or _old_mus.get('mood','') == ''))   else _old_mus.get('mood','') -%}
                    {%- set _m_riff  = _in_mus_riff  if (_in_mus_riff  != '' and (_force or _old_mus.get('riff','') == ''))   else _old_mus.get('riff','') -%}
                    {%- set _environment = {'room': _e_room, 'wake_in': _e_wakin, 'desk': _e_desk, 'decor': _e_decor, 'library': _e_lib, 'music': {'genre': _m_genre, 'mood': _m_mood, 'riff': _m_riff}} -%}
                    {# ── Apply raw patch then serialize ── #}
                    {%- set patch_obj = _in_patch | from_json(default={}) if _in_patch != '' else {} -%}
                    {%- if patch_obj is not mapping -%}{%- set patch_obj = {} -%}{%- endif -%}
                    {%- set base = {'core': _core, 'jacket': _jacket, 'companion': _companion, 'environment': _environment} -%}
                    {{ (base | combine(patch_obj, recursive=true) if patch_obj | length > 0 else base) | tojson }}

              # Step C.0 — snapshot before overwrite (one-level restore)
              # Save _cur_ev (unwrapped essence) not _cur_raw — avoids double-wrap on restore
              - action: script.zen_dojotools_filecabinet
                data:
                  action_type: create
                  force_action: true
                  set_timestamp: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ _target }}"
                  key: zenai_essence_prev
                  value: "{{ _cur_ev | tojson }}"

              - action: script.zen_dojotools_event_emitter
                data:
                  component: profile_editor
                  severity: info
                  kind: essence_backed_up
                  summary: >-
                    Essence snapshot saved to zenai_essence_prev for {{ _target }} before write.
                  metadata:
                    target: "{{ _target }}"
                    timestamp: "{{ now().isoformat() }}"
                  caller_token: "{{ caller_token }}"

              - action: script.zen_dojotools_filecabinet
                data:
                  action_type: create
                  force_action: true
                  set_timestamp: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ _target }}"
                  key: zenai_essence
                  value: "{{ _assembled }}"

              - action: script.zen_dojotools_event_emitter
                data:
                  component: profile_editor
                  severity: info
                  kind: essence_edited
                  summary: >-
                    Essence written for {{ _target }}. Signature invalidated — re-sign required.
                  metadata:
                    target: "{{ _target }}"
                    jacket_id: >-
                      {%- set _asm = _assembled | from_json if _assembled is string else {} -%}
                      {{ _asm.get('jacket', {}).get('id', '') }}
                    edited_by: "{{ _hoh_entity }}"
                    timestamp: "{{ now().isoformat() }}"
                  caller_token: "{{ caller_token }}"

              - if:
                  - condition: template
                    value_template: "{{ autosign | default(false) | bool }}"
                then:
                  - variables:
                      _as_val: >-
                        {%- set _av = _assembled | from_json if _assembled is string else _assembled -%}
                        {{ _av if _av is mapping else {} }}
                      _as_core: "{{ _as_val.get('core', {}) if _as_val is mapping else {} }}"
                      _as_jack: "{{ _as_val.get('jacket', {}) if _as_val is mapping else {} }}"
                      _as_comp: "{{ _as_val.get('companion', {}) if _as_val is mapping else {} }}"
                      _as_env:  "{{ _as_val.get('environment', {}) if _as_val is mapping else {} }}"
                      _as_signed_at: "{{ now().isoformat() }}"
                  - variables:
                      _as_core_can: >-
                        {{
                          {
                            'household_guid': _as_core.get('household_guid', ''),
                            'id':             _as_core.get('id', ''),
                            'minted_at':      _as_core.get('minted_at', ''),
                            'minted_for':     _as_core.get('minted_for', ''),
                            'person_id':      _as_core.get('person_id', '')
                          } | tojson
                        }}
                      _as_jack_no_sig: >-
                        {%- set ns = namespace(d={}) -%}
                        {%- for k, v in _as_jack.items() if k != 'signature' -%}
                          {%- set ns.d = ns.d | combine({k: v}) -%}
                        {%- endfor -%}
                        {{ ns.d | combine({'signed_at': _as_signed_at}) | tojson }}
                  - variables:
                      _as_core_hash:   "{{ 'md5:' + (_as_core_can | string | md5) }}"
                      _as_jacket_hash: "{{ 'md5:' + (_as_jack_no_sig | string | md5) }}"
                  - variables:
                      _as_signed: >-
                        {%- set ns = namespace(d={}) -%}
                        {%- for k, v in _as_jack.items() if k != 'signature' -%}
                          {%- set ns.d = ns.d | combine({k: v}) -%}
                        {%- endfor -%}
                        {%- set sj = ns.d | combine({'signature': _as_jacket_hash, 'signed_at': _as_signed_at}) -%}
                        {%- set sc = _as_core | combine({'signature': _as_core_hash}) -%}
                        {{ {'core': sc, 'jacket': sj, 'companion': _as_comp, 'environment': _as_env} | tojson }}
                  - action: script.zen_dojotools_filecabinet
                    data:
                      action_type: create
                      force_action: true
                      set_timestamp: true
                      show_hidden_volumes: false
                      volume_entity_id:
                        - "{{ _target }}"
                      key: zenai_essence
                      value: "{{ _as_signed }}"
                  - action: script.zen_dojotools_event_emitter
                    data:
                      component: profile_editor
                      severity: info
                      kind: essence_signed
                      summary: >-
                        Auto-signed essence for {{ _target }} after write.
                        Jacket: {{ _as_jacket_hash }}. Core: {{ _as_core_hash }}.
                      metadata:
                        target: "{{ _target }}"
                        jacket_id: "{{ _as_jack.get('id', '') }}"
                        signed_by: "{{ _as_jack.get('signed_by', '') }}"
                        signed_at: "{{ _as_signed_at }}"
                        core_hash: "{{ _as_core_hash }}"
                        jacket_hash: "{{ _as_jacket_hash }}"
                        halmark_version: "{{ _as_jack.get('halmark_version', '') }}"
                        schema_version: "{{ _as_jack.get('schema_version', '') }}"
                        action: autosign
                      caller_token: "{{ caller_token }}"

              - variables:
                  final_response:
                    status: ok
                    mode: write
                    target_type: ai_user
                    target: "{{ _target }}"
                    autosigned: "{{ autosign | default(false) | bool }}"
                    prev_snapshot_at: "{{ now().isoformat() }}"
                    message: >-
                      Essence written{{ ' and auto-signed.' if autosign | default(false) | bool else '. Signature invalidated — run sign mode to re-sign.' }} Previous state saved to zenai_essence_prev.
                    caller_token: '{{ caller_token }}'
              - stop: ai_user write complete
                response_variable: final_response

      ###########################################################################
      # 4 — WRITE: household  (_household_profile key)
      ###########################################################################
      - choose:
          - conditions: "{{ _mode == 'write' and _type == 'household' }}"
            sequence:
              - variables:
                  _h_raw: "{{ _cab_vars.get('_household_profile', {}) }}"
                  _h_cur: "{{ _h_raw.get('value', _h_raw) if _h_raw is mapping else {} }}"
                  _in_hname:  "{{ household_name | default('') | trim }}"
                  _in_addr:   "{{ address        | default('') | trim }}"
                  _in_city:   "{{ city           | default('') | trim }}"
                  _in_state:  "{{ state          | default('') | trim }}"
                  _in_zip:    "{{ zip            | default('') | trim }}"
                  _in_ctry:   "{{ country        | default('') | trim }}"
                  _in_phone:  "{{ phone          | default('') | trim }}"

              - variables:
                  _h_new: >-
                    {%- set ns = namespace(d=_h_cur) -%}
                    {%- set pairs = [
                      ('household_name', _in_hname),
                      ('address',        _in_addr),
                      ('city',           _in_city),
                      ('state',          _in_state),
                      ('zip',            _in_zip),
                      ('country',        _in_ctry),
                      ('phone',          _in_phone)
                    ] -%}
                    {%- for k, v in pairs if v != '' -%}
                      {%- if _force or ns.d.get(k, '') == '' -%}
                        {%- set ns.d = dict(ns.d.items() | list + [(k, v)]) -%}
                      {%- endif -%}
                    {%- endfor -%}
                    {%- if ns.d.get('timezone', '') == '' -%}
                      {%- set tz = state_attr('sensor.date_time_iso', 'friendly_name') | default('') -%}
                      {%- set ns.d = dict(ns.d.items() | list + [('timezone', now().tzname())]) -%}
                    {%- endif -%}
                    {{ ns.d | tojson }}

              - action: script.zen_dojotools_filecabinet
                data:
                  action_type: create
                  force_action: true
                  set_timestamp: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ _target }}"
                  key: _household_profile
                  value: "{{ _h_new }}"
                  caller_token: '{{ caller_token }}'

              - variables:
                  final_response:
                    status: ok
                    mode: write
                    target_type: household
                    target: "{{ _target }}"
                    message: Household profile written.
                    caller_token: '{{ caller_token }}'
              - stop: household write complete
                response_variable: final_response

      ###########################################################################
      # 5 — WRITE: user / family  (_user_profile or _family_profile key)
      ###########################################################################
      - choose:
          - conditions: "{{ _mode == 'write' and _type in ['user', 'family'] }}"
            sequence:
              - variables:
                  _u_key: "{{ '_family_profile' if _type == 'family' else '_user_profile' }}"
                  _u_raw: "{{ _cab_vars.get(_u_key, {}) }}"
                  _u_cur: "{{ _u_raw.get('value', _u_raw) if _u_raw is mapping else {} }}"
                  _in_name:   "{{ name           | default('') | trim }}"
                  _in_first:  "{{ first_name      | default('') | trim }}"
                  _in_last:   "{{ last_name       | default('') | trim }}"
                  _in_pref:   "{{ preferred_name  | default('') | trim }}"
                  _in_pron:   "{{ pronouns        | default('') | trim }}"
                  _in_role:   "{{ role            | default('') | trim }}"
                  _in_phone:  "{{ phone           | default('') | trim }}"
                  _in_email:  "{{ email           | default('') | trim }}"
                  _in_bday:   "{{ birthday        | default('') | trim }}"
                  _in_prefs:  "{{ preferences     | default('') | trim }}"

              - variables:
                  _u_new: >-
                    {%- set ns = namespace(d=_u_cur) -%}
                    {%- set pairs = [
                      ('name',           _in_name),
                      ('first_name',     _in_first),
                      ('last_name',      _in_last),
                      ('preferred_name', _in_pref),
                      ('pronouns',       _in_pron),
                      ('role',           _in_role),
                      ('phone',          _in_phone),
                      ('email',          _in_email),
                      ('birthday',       _in_bday)
                    ] -%}
                    {%- for k, v in pairs if v != '' -%}
                      {%- if _force or ns.d.get(k, '') == '' -%}
                        {%- set ns.d = dict(ns.d.items() | list + [(k, v)]) -%}
                      {%- endif -%}
                    {%- endfor -%}
                    {%- if _in_prefs != '' -%}
                      {%- set pobj = _in_prefs | from_json(default={}) -%}
                      {%- if pobj is mapping -%}
                        {%- set merged = ns.d.get('preferences', {}) | combine(pobj) -%}
                        {%- set ns.d = dict(ns.d.items() | list + [('preferences', merged)]) -%}
                      {%- endif -%}
                    {%- endif -%}
                    {{ ns.d | tojson }}

              - action: script.zen_dojotools_filecabinet
                data:
                  action_type: create
                  force_action: true
                  set_timestamp: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ _target }}"
                  key: "{{ _u_key }}"
                  value: "{{ _u_new }}"
                  caller_token: '{{ caller_token }}'
                response_variable: _write_result
                continue_on_error: true

              - variables:
                  _write_ok: "{{ _write_result is mapping and _write_result.get('success', false) | bool }}"
                  _write_err: "{{ _write_result.get('error', _write_result.get('message', 'unknown filecabinet error')) if not _write_ok else '' }}"

              - choose:
                  - conditions: "{{ not _write_ok }}"
                    sequence:
                      - variables:
                          final_response:
                            status: error
                            mode: write
                            target_type: "{{ _type }}"
                            target: "{{ _target }}"
                            message: "Profile write failed — filecabinet rejected the write: {{ _write_err }}"
                            caller_token: '{{ caller_token }}'
                      - stop: user/family write failed
                        response_variable: final_response

              - variables:
                  final_response:
                    status: ok
                    mode: write
                    target_type: "{{ _type }}"
                    target: "{{ _target }}"
                    message: "{{ _type | capitalize }} profile written."
                    caller_token: '{{ caller_token }}'
              - stop: user/family write complete
                response_variable: final_response

      ###########################################################################
      # 6 — CERT_LIST: read zen_ai_certs drawer
      ###########################################################################
      - choose:
          - conditions: "{{ _mode == 'cert_list' and _type in ['ai_user'] }}"
            sequence:
              - variables:
                  _craw: "{{ _cab_vars.get('zen_ai_certs', {}) }}"
                  _cev:  "{{ _craw.get('value', _craw) if _craw is mapping else {} }}"
                  final_response:
                    status: ok
                    mode: cert_list
                    target: "{{ _target }}"
                    jacket_id: "{{ _cev.get('jacket_id', '') if _cev is mapping else '' }}"
                    cert_count: "{{ (_cev.get('kfc_certifications', {}) if _cev is mapping else {}) | length }}"
                    certifications: "{{ _cev.get('kfc_certifications', {}) if _cev is mapping else {} }}"
                    stats: "{{ _cev.get('stats', {}) if _cev is mapping else {} }}"
                    caller_token: "{{ caller_token }}"
              - stop: cert_list complete
                response_variable: final_response

      ###########################################################################
      # 7 — CERT_GRANT: add / update one KFC cert in zen_ai_certs
      # zen_ai_certs is SEPARATE from zenai_essence — certs are unsigned & dynamic.
      # Links back to the signed jacket via jacket_id (jacket.id from zenai_essence).
      ###########################################################################
      - choose:
          - conditions: "{{ _mode == 'cert_grant' and _type in ['ai_user'] }}"
            sequence:
              - variables:
                  _comp:       "{{ cert_component | default('') | trim | lower }}"
                  _lvl:        "{{ cert_level | default(2) | int }}"
                  _ctool:      "{{ cert_tool | default('') | trim }}"
                  _ccons_raw:  "{{ cert_constraints | default('') | trim }}"
                  _cscope_raw: "{{ cert_scope | default('') | trim }}"
                  _spatch_raw: "{{ stats_patch | default('') | trim }}"
              - choose:
                  - conditions: "{{ _comp == '' }}"
                    sequence:
                      - variables:
                          final_response:
                            status: error
                            message: "cert_grant requires cert_component (kata_key)."
                            caller_token: "{{ caller_token }}"
                      - stop: Missing cert_component
                        response_variable: final_response
              - variables:
                  _ccons: >-
                    {{ _ccons_raw | from_json(default=[]) if (_ccons_raw != '' and _ccons_raw[:1] == '[') else [] }}
                  _cscope: >-
                    {{ _cscope_raw | from_json(default=[]) if (_cscope_raw != '' and _cscope_raw[:1] == '[') else [] }}
                  _spatch: >-
                    {{ _spatch_raw | from_json(default={}) if (_spatch_raw != '' and _spatch_raw[:1] == '{') else {} }}
                  _craw: "{{ _cab_vars.get('zen_ai_certs', {}) }}"
                  _cev:  "{{ _craw.get('value', _craw) if _craw is mapping else {} }}"
                  _jacket_id: >-
                    {%- if _cev is mapping and _cev.get('jacket_id', '') != '' -%}
                      {{ _cev.get('jacket_id') }}
                    {%- else -%}
                      {%- set _ess = _cab_vars.get('zenai_essence', {}) -%}
                      {%- set _ev  = _ess.get('value', _ess) if _ess is mapping else {} -%}
                      {{ (_ev.get('jacket', {}) if _ev is mapping else {}).get('id', '') }}
                    {%- endif -%}
                  _existing_certs: "{{ _cev.get('kfc_certifications', {}) if _cev is mapping else {} }}"
                  _existing_stats: "{{ _cev.get('stats', {}) if _cev is mapping else {} }}"
                  _new_cert_entry: >-
                    {%- set e = {'level': _lvl, 'certified': now().strftime('%Y-%m-%d'), 'tool': _ctool} -%}
                    {%- if _ccons is sequence and _ccons | length > 0 -%}
                      {%- set e = e | combine({'constraints': _ccons}) -%}
                    {%- endif -%}
                    {%- if _cscope is sequence and _cscope | length > 0 -%}
                      {%- set e = e | combine({'scope': _cscope}) -%}
                    {%- endif -%}
                    {{ e }}
                  _updated_certs: "{{ _existing_certs | combine({_comp: _new_cert_entry}) }}"
                  _updated_stats: >-
                    {{ _existing_stats | combine(_spatch, recursive=true)
                       if (_spatch is mapping and _spatch | length > 0)
                       else _existing_stats }}
                  _new_doc: >-
                    {{
                      (_cev if _cev is mapping else {})
                      | combine({
                          'jacket_id': _jacket_id,
                          'kfc_certifications': _updated_certs,
                          'stats': _updated_stats
                        })
                      | tojson
                    }}
              - action: script.zen_dojotools_filecabinet
                data:
                  action_type: create
                  force_action: true
                  set_timestamp: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ _target }}"
                  key: zen_ai_certs
                  value: "{{ _new_doc }}"
              - variables:
                  final_response:
                    status: ok
                    mode: cert_grant
                    target: "{{ _target }}"
                    component: "{{ _comp }}"
                    level: "{{ _lvl }}"
                    jacket_id: "{{ _jacket_id }}"
                    message: "Cert granted: {{ _comp }} level {{ _lvl }}."
                    cert: "{{ _new_cert_entry }}"
                    caller_token: "{{ caller_token }}"
              - stop: cert_grant complete
                response_variable: final_response

      ###########################################################################
      # 8 — CERT_REVOKE: remove one KFC cert from zen_ai_certs
      ###########################################################################
      - choose:
          - conditions: "{{ _mode == 'cert_revoke' and _type in ['ai_user'] }}"
            sequence:
              - variables:
                  _comp: "{{ cert_component | default('') | trim | lower }}"
              - choose:
                  - conditions: "{{ _comp == '' }}"
                    sequence:
                      - variables:
                          final_response:
                            status: error
                            message: "cert_revoke requires cert_component (kata_key)."
                            caller_token: "{{ caller_token }}"
                      - stop: Missing cert_component
                        response_variable: final_response
              - variables:
                  _craw:           "{{ _cab_vars.get('zen_ai_certs', {}) }}"
                  _cev:            "{{ _craw.get('value', _craw) if _craw is mapping else {} }}"
                  _existing_certs: "{{ _cev.get('kfc_certifications', {}) if _cev is mapping else {} }}"
              - choose:
                  - conditions: "{{ _comp not in _existing_certs }}"
                    sequence:
                      - variables:
                          final_response:
                            status: warning
                            message: "cert_revoke: '{{ _comp }}' not found in certifications. No change."
                            caller_token: "{{ caller_token }}"
                      - stop: Cert not found
                        response_variable: final_response
              - variables:
                  _pruned_certs: >-
                    {%- set ns = namespace(d={}) -%}
                    {%- for k, v in _existing_certs.items() if k != _comp -%}
                      {%- set ns.d = ns.d | combine({k: v}) -%}
                    {%- endfor -%}
                    {{ ns.d }}
                  _updated_doc: >-
                    {{ (_cev if _cev is mapping else {})
                       | combine({'kfc_certifications': _pruned_certs})
                       | tojson }}
              - action: script.zen_dojotools_filecabinet
                data:
                  action_type: create
                  force_action: true
                  set_timestamp: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ _target }}"
                  key: zen_ai_certs
                  value: "{{ _updated_doc }}"
              - variables:
                  final_response:
                    status: ok
                    mode: cert_revoke
                    target: "{{ _target }}"
                    component: "{{ _comp }}"
                    message: "Cert revoked: {{ _comp }} removed from {{ _target }}."
                    caller_token: "{{ caller_token }}"
              - stop: cert_revoke complete
                response_variable: final_response

      ###########################################################################
      # 9 — SIGN / RE-SIGN: compute MD5 clear-sign of core + jacket
      # Canonical core: {id, household_guid, person_id, minted_at, minted_for}
      # Canonical jacket: all fields except 'signature', signed_at updated to now()
      # Stores "md5:<hash>" in core.signature and jacket.signature.
      # Fires audit zen_event: essence_signed or essence_resigned.
      # Upgrade path: swap md5 for OIDC-backed sig in SP1 — schema unchanged.
      ###########################################################################
      - choose:
          - conditions: "{{ _mode == 'sign' and _type in ['ai_user'] }}"
            sequence:
              - variables:
                  _ess_raw: "{{ _cab_vars.get('zenai_essence', {}) }}"
                  _ess_val: >-
                    {%- set _ev_r = _ess_raw.get('value', {}) if _ess_raw is mapping else {} -%}
                    {{ _ev_r if _ev_r is mapping else (_ev_r | from_json if _ev_r is string else {}) }}
                  _s_core:  "{{ _ess_val.get('core', {}) if _ess_val is mapping else {} }}"
                  _s_jack:  "{{ _ess_val.get('jacket', {}) if _ess_val is mapping else {} }}"
                  _s_comp:  "{{ _ess_val.get('companion', {}) if _ess_val is mapping else {} }}"
                  _s_env:   "{{ _ess_val.get('environment', {}) if _ess_val is mapping else {} }}"
              - choose:
                  - conditions: "{{ not (_s_core is mapping and _s_jack is mapping and _s_jack.get('id','') != '') }}"
                    sequence:
                      - variables:
                          final_response:
                            status: error
                            message: "sign requires a valid three-layer essence with a jacket id. Run write mode first."
                            caller_token: "{{ caller_token }}"
                      - stop: No valid essence for signing
                        response_variable: final_response
              - variables:
                  _is_resign: >-
                    {{ 'md5:' in (_s_jack.get('signature', 'pending_x509') | string)
                       or 'md5:' in (_s_core.get('signature', 'pending_x509') | string) }}
                  _prev_sig:      "{{ _s_jack.get('signature', 'pending_x509') }}"
                  _new_signed_at: "{{ now().isoformat() }}"
              - variables:
                  _core_canonical: >-
                    {{
                      {
                        'household_guid': _s_core.get('household_guid', ''),
                        'id':             _s_core.get('id', ''),
                        'minted_at':      _s_core.get('minted_at', ''),
                        'minted_for':     _s_core.get('minted_for', ''),
                        'person_id':      _s_core.get('person_id', '')
                      } | tojson
                    }}
                  _jacket_no_sig: >-
                    {%- set ns = namespace(d={}) -%}
                    {%- for k, v in _s_jack.items() if k != 'signature' -%}
                      {%- set ns.d = ns.d | combine({k: v}) -%}
                    {%- endfor -%}
                    {{ ns.d | combine({'signed_at': _new_signed_at}) | tojson }}
              - variables:
                  _core_hash:   "{{ 'md5:' + (_core_canonical | string | md5) }}"
                  _jacket_hash: "{{ 'md5:' + (_jacket_no_sig | string | md5) }}"
              - variables:
                  _signed_essence: >-
                    {%- set ns = namespace(d={}) -%}
                    {%- for k, v in _s_jack.items() if k != 'signature' -%}
                      {%- set ns.d = ns.d | combine({k: v}) -%}
                    {%- endfor -%}
                    {%- set sj = ns.d | combine({'signature': _jacket_hash, 'signed_at': _new_signed_at}) -%}
                    {%- set sc = _s_core | combine({'signature': _core_hash}) -%}
                    {{ {'core': sc, 'jacket': sj, 'companion': _s_comp, 'environment': _s_env} | tojson }}
              - action: script.zen_dojotools_filecabinet
                data:
                  action_type: create
                  force_action: true
                  set_timestamp: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ _target }}"
                  key: zenai_essence
                  value: "{{ _signed_essence }}"
              - action: script.zen_dojotools_event_emitter
                data:
                  component: profile_editor
                  severity: info
                  kind: "{{ 'essence_resigned' if _is_resign else 'essence_signed' }}"
                  summary: >-
                    {{ 'Re-signed' if _is_resign else 'Signed' }} essence for {{ _target }}.
                    Jacket: {{ _jacket_hash }}. Core: {{ _core_hash }}.
                  metadata:
                    target: "{{ _target }}"
                    jacket_id: "{{ _s_jack.get('id', '') }}"
                    signed_by: "{{ _s_jack.get('signed_by', '') }}"
                    signed_at: "{{ _new_signed_at }}"
                    core_hash: "{{ _core_hash }}"
                    jacket_hash: "{{ _jacket_hash }}"
                    halmark_version: "{{ _s_jack.get('halmark_version', '') }}"
                    schema_version: "{{ _s_jack.get('schema_version', '') }}"
                    previous_signature: "{{ _prev_sig }}"
                    action: "{{ 'resign' if _is_resign else 'sign' }}"
                  caller_token: "{{ caller_token }}"
              - variables:
                  final_response:
                    status: ok
                    mode: sign
                    target: "{{ _target }}"
                    jacket_id: "{{ _s_jack.get('id', '') }}"
                    action: "{{ 'resign' if _is_resign else 'sign' }}"
                    core_hash: "{{ _core_hash }}"
                    jacket_hash: "{{ _jacket_hash }}"
                    signed_at: "{{ _new_signed_at }}"
                    halmark_version: "{{ _s_jack.get('halmark_version', '') }}"
                    message: "{{ 'Re-signed' if _is_resign else 'Signed' }} essence for {{ _target }}."
                    caller_token: "{{ caller_token }}"
              - stop: sign complete
                response_variable: final_response

      ###########################################################################
      ###########################################################################
      # 10 — RESTORE: roll back zenai_essence from zenai_essence_prev
      # Writes prev back to current. Does NOT overwrite prev — prev stays as
      # the last known good reference until the next write creates a new one.
      ###########################################################################
      - choose:
          - conditions: "{{ _mode == 'restore' and _type in ['ai_user'] }}"
            sequence:
              - variables:
                  _prev_drawer: "{{ _cab_vars.get('zenai_essence_prev', {}) }}"
                  _prev_value: >-
                    {%- set d = _prev_drawer -%}
                    {%- if d is mapping and d | length > 0 -%}
                      {%- set v1 = d.get('value', d) -%}
                      {# If v1 still has a 'value' key that is a mapping, unwrap one more level #}
                      {%- set v2 = v1.get('value', v1) if (v1 is mapping and v1.get('value') is mapping) else v1 -%}
                      {{ v2 | tojson if v2 is mapping else v2 | string }}
                    {%- else -%}
                      {{ '' }}
                    {%- endif -%}
                  _prev_exists: "{{ _prev_drawer is mapping and _prev_drawer | length > 0 }}"

              - if:
                  - condition: template
                    value_template: "{{ not _prev_exists }}"
                then:
                  - variables:
                      final_response:
                        status: error
                        mode: restore
                        target: "{{ _target }}"
                        message: "No prev snapshot found in zenai_essence_prev — nothing to restore."
                        caller_token: '{{ caller_token }}'
                  - stop: Restore failed — no prev snapshot
                    response_variable: final_response

              - action: script.zen_dojotools_filecabinet
                data:
                  action_type: create
                  force_action: true
                  set_timestamp: true
                  show_hidden_volumes: false
                  volume_entity_id:
                    - "{{ _target }}"
                  key: zenai_essence
                  value: "{{ _prev_value }}"

              - action: script.zen_dojotools_event_emitter
                data:
                  component: profile_editor
                  severity: warning
                  kind: essence_restored
                  summary: >-
                    Essence for {{ _target }} restored from zenai_essence_prev.
                    Previous (pre-restore) state is gone — prev snapshot retained as last known good.
                  metadata:
                    target: "{{ _target }}"
                    restored_by: "{{ caller_token | default('unknown') }}"
                    timestamp: "{{ now().isoformat() }}"
                  caller_token: "{{ caller_token }}"

              - variables:
                  final_response:
                    status: ok
                    mode: restore
                    target_type: "{{ _type }}"
                    target: "{{ _target }}"
                    message: "Essence restored from zenai_essence_prev. Run mode: sign to re-sign."
                    restored_at: "{{ now().isoformat() }}"
                    caller_token: '{{ caller_token }}'
              - stop: Restore complete
                response_variable: final_response

      ###########################################################################
      # 11 — FALLTHROUGH
      ###########################################################################
      - variables:
          final_response:
            status: error
            message: "No matching mode/target_type. mode='{{ _mode }}' target_type='{{ _type }}'."
            caller_token: '{{ caller_token }}'
      - stop: No matching branch
        response_variable: final_response
