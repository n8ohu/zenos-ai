                _ai_vi_raw: >-
                  {%- set _v = state_attr(ai_entity, 'variables') | default({}, true) -%}
                  {%- set _v = _v if _v is mapping else {} -%}
                  {%- set _vi = _v.get('AI_Cabinet_VolumeInfo', _v) -%}
                  {%- set _vi = _vi.get('value', _vi) if _vi is mapping else {} -%}
                  {{ _vi | tojson }}
            - variables:
                _user_guid: >-
                  {%- set _vi = _user_vi_raw | from_json if _user_vi_raw is string else {} -%}
                  {{ (_vi if _vi is mapping else {}).get('guid', '') }}
                _user_name: >-
                  {%- set _vi = _user_vi_raw | from_json if _user_vi_raw is string else {} -%}
                  {{ (_vi if _vi is mapping else {}).get('name', member_entity) }}
                _ai_guid: >-
                  {%- set _vi = _ai_vi_raw | from_json if _ai_vi_raw is string else {} -%}
                  {{ (_vi if _vi is mapping else {}).get('guid', '') }}
                _ai_name: >-
                  {%- set _vi = _ai_vi_raw | from_json if _ai_vi_raw is string else {} -%}
                  {{ (_vi if _vi is mapping else {}).get('name', ai_entity) }}
            # — patch user VolumeInfo: add ai_entity to partners list —
            - variables:
                _user_vi_updated: >-
                  {%- set _vi = _user_vi_raw | from_json if _user_vi_raw is string else {} -%}
                  {%- set _vi = _vi if _vi is mapping else {} -%}
                  {%- set _partners = _vi.get('partners', []) -%}
                  {%- set _partners = _partners if _partners is iterable and _partners is not string else [] -%}
                  {%- set _existing = _partners | selectattr('entity_id', 'equalto', ai_entity) | list | count > 0 -%}
                  {%- if not _existing -%}
                    {%- set _partners = _partners + [{'guid': _ai_guid, 'entity_id': ai_entity, 'role': 'ai_partner'}] -%}
                  {%- endif -%}
                  {{ dict(_vi, **{'partners': _partners}) | tojson }}
            - action: script.zen_dojotools_filecabinet
              data:
                action_type: create
                force_action: true
                set_timestamp: true
                show_hidden_volumes: false
                volume_entity_id:
                  - "{{ member_entity }}"
                key: AI_Cabinet_VolumeInfo
                value: "{{ _user_vi_updated }}"
            # — patch AI VolumeInfo: add user to acls.partner —
            - variables:
                _ai_vi_updated: >-
                  {%- set _vi = _ai_vi_raw | from_json if _ai_vi_raw is string else {} -%}
                  {%- set _vi = _vi if _vi is mapping else {} -%}
                  {%- set _acls = _vi.get('acls', {}) -%}
                  {%- set _acls = _acls if _acls is mapping else {} -%}
                  {%- set _partners = _acls.get('partner', []) -%}
                  {%- set _partners = _partners if _partners is iterable and _partners is not string else [] -%}
                  {%- set _existing = _partners | selectattr('entity_id', 'equalto', member_entity) | list | count > 0 -%}
                  {%- if not _existing -%}
                    {%- set _entry = {'guid': _user_guid, 'entity_id': member_entity, 'role': 'partner', 'sid': _user_guid} -%}
                    {%- set _partners = _partners + [_entry] -%}
                  {%- endif -%}
                  {%- set _acls = dict(_acls, **{'partner': _partners}) -%}
                  {{ dict(_vi, **{'acls': _acls}) | tojson }}
            - action: script.zen_dojotools_filecabinet
              data:
                action_type: create
                force_action: true
                set_timestamp: true
                show_hidden_volumes: false
                volume_entity_id:
                  - "{{ ai_entity }}"
                key: AI_Cabinet_VolumeInfo
                value: "{{ _ai_vi_updated }}"
            - variables:
                response: >-
                  {{
                    {
                      'mode':        'link_user_ai',
                      'status':      'ok',
                      'user_entity': member_entity,
                      'user_guid':   _user_guid,
                      'user_name':   _user_name,
                      'ai_entity':   ai_entity,
                      'ai_guid':     _ai_guid,
                      'ai_name':     _ai_name,
                      'timestamp':   now().isoformat(),
                      'caller_token': caller_token | default('')
                    } | tojson
                  }}
            - stop: User-AI link established
              response_variable: response

    # ── Step 3j: mode = set_default_family ───────────────────────────────────
    - choose:
        - conditions: "{{ _mode == 'set_default_family' }}"
          sequence:
            - if: "{{ member_entity == '' or family_entity == '' }}"
              then:
                - variables:
                    response: >-
                      {{
                        {
                          'mode':    'set_default_family',
                          'status':  'error',
                          'message': 'member_entity (user cabinet) and family_entity are both required.',
                          'timestamp': now().isoformat()
                        } | tojson
                      }}
                - stop: Missing required fields
                  response_variable: response
            - variables:
                _mem_vi_raw: >-
                  {%- set _v = state_attr(member_entity, 'variables') | default({}, true) -%}
                  {%- set _v = _v if _v is mapping else {} -%}
                  {%- set _vi = _v.get('AI_Cabinet_VolumeInfo', _v) -%}
                  {%- set _vi = _vi.get('value', _vi) if _vi is mapping else {} -%}
                  {{ _vi | tojson }}
                _fam_vi_raw: >-
                  {%- set _v = state_attr(family_entity, 'variables') | default({}, true) -%}
                  {%- set _v = _v if _v is mapping else {} -%}
                  {%- set _vi = _v.get('AI_Cabinet_VolumeInfo', _v) -%}
                  {%- set _vi = _vi.get('value', _vi) if _vi is mapping else {} -%}
                  {{ _vi | tojson }}
            - variables:
                _fam_guid: >-
                  {%- set _vi = _fam_vi_raw | from_json if _fam_vi_raw is string else {} -%}
                  {{ (_vi if _vi is mapping else {}).get('guid', '') }}
                _mem_vi_updated: >-
                  {%- set _vi = _mem_vi_raw | from_json if _mem_vi_raw is string else {} -%}
                  {%- set _vi = _vi if _vi is mapping else {} -%}
                  {%- set _fvi = _fam_vi_raw | from_json if _fam_vi_raw is string else {} -%}
                  {%- set _fguid = (_fvi if _fvi is mapping else {}).get('guid', '') -%}
                  {{ dict(_vi, **{'default_family_guid': _fguid}) | tojson }}
            - action: script.zen_dojotools_filecabinet
              data:
                action_type: create
                force_action: true
                set_timestamp: true
                show_hidden_volumes: false
                volume_entity_id:
                  - "{{ member_entity }}"
                key: AI_Cabinet_VolumeInfo
                value: "{{ _mem_vi_updated }}"
            - variables:
                response: >-
                  {{
                    {
                      'mode':           'set_default_family',
                      'status':         'ok',
                      'member_entity':  member_entity,
                      'family_entity':  family_entity,
                      'family_guid':    _fam_guid,
                      'timestamp':      now().isoformat(),
                      'caller_token':   caller_token | default('')
                    } | tojson
                  }}
            - stop: Default family set
              response_variable: response

    # ── Step 3b: mode = resolve (default) ──────────────────────────────────
    - variables:
        response: "{{
          {
            'result':           cab,
            'target_normalized': normalized,
            'timestamp':        now().isoformat(),
            'caller_token':     caller_token | default('')
          }
        }}\n"
    - stop: Return Variables
      response_variable: response
