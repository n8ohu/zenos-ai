                kind: family_member_left
                family_entity: "{{ family_entity }}"
                family_name: "{{ _fam_name }}"
                family_guid: "{{ _fam_guid }}"
                member_entity: "{{ member_entity }}"
                member_name: "{{ _mem_name }}"
                member_type: "{{ member_type }}"
                is_ai: "{{ member_type == 'ai_user' }}"
                was_default_family: "{{ _was_default | bool }}"
                principal_warning: "{{ _principal_warning }}"
                prompt_profile_update: true
            - variables:
                response: "{{
                  {
                    'mode':              'family_remove_member',
                    'status':            'ok',
                    'family_entity':     family_entity,
                    'family_guid':       _fam_guid,
                    'family_name':       _fam_name,
                    'member_entity':     member_entity,
                    'member_type':       member_type,
                    'member_guid':       _mem_guid,
                    'member_name':       _mem_name,
                    'was_default_family': _was_default | bool,
                    'principal_warning': _principal_warning,
                    'timestamp':         now().isoformat(),
                    'caller_token':      caller_token | default('')
                  }
                }}"
            - action: script.zen_dojotools_identity
              data:
                mode: build_identity_manifest
                household_entity: "{{ _hh_target }}"
              continue_on_error: true
            - stop: Family member removed
              response_variable: response

    # ── Step 3i: mode = link_partners ─────────────────────────────────────────
    # Works for any entity pair: user↔user, user↔ai_user, ai_user↔ai_user.
    # partner = delegation authority. acls.partner is written on BOTH sides.
    - choose:
        - conditions: "{{ _mode == 'link_partners' }}"
          sequence:
            - if: "{{ member_entity == '' or ai_entity == '' }}"
              then:
                - variables:
                    response: "{{
                      {
                        'mode':    'link_partners',
                        'status':  'error',
                        'message': 'member_entity and ai_entity (the two entities to link) are both required.',
                        'timestamp': now().isoformat()
                      }
                    }}"
                - stop: Missing required fields
                  response_variable: response
            - variables:
                _a_vi_raw: >-
                  {%- set _v = state_attr(member_entity, 'variables') | default({}, true) -%}
                  {%- set _v = _v if _v is mapping else {} -%}
                  {%- set _vi = _v.get('AI_Cabinet_VolumeInfo', _v) -%}
                  {%- set _vi = _vi.get('value', _vi) if _vi is mapping else {} -%}
                  {%- set _vi = _vi | from_json if _vi is string else _vi -%}
                  {{ _vi | tojson }}
                _b_vi_raw: >-
                  {%- set _v = state_attr(ai_entity, 'variables') | default({}, true) -%}
                  {%- set _v = _v if _v is mapping else {} -%}
                  {%- set _vi = _v.get('AI_Cabinet_VolumeInfo', _v) -%}
                  {%- set _vi = _vi.get('value', _vi) if _vi is mapping else {} -%}
                  {%- set _vi = _vi | from_json if _vi is string else _vi -%}
                  {{ _vi | tojson }}
            - variables:
                _a_guid: >-
                  {%- set _vi = _a_vi_raw | from_json if _a_vi_raw is string else _a_vi_raw -%}
                  {{ (_vi if _vi is mapping else {}).get('guid', '') }}
                _a_name: >-
                  {%- set _vi = _a_vi_raw | from_json if _a_vi_raw is string else _a_vi_raw -%}
                  {{ (_vi if _vi is mapping else {}).get('friendly_name', member_entity) }}
                _a_type: >-
                  {%- set _vi = _a_vi_raw | from_json if _a_vi_raw is string else _a_vi_raw -%}
                  {{ (_vi if _vi is mapping else {}).get('cab_type', 'user') }}
                _b_guid: >-
                  {%- set _vi = _b_vi_raw | from_json if _b_vi_raw is string else _b_vi_raw -%}
                  {{ (_vi if _vi is mapping else {}).get('guid', '') }}
                _b_name: >-
                  {%- set _vi = _b_vi_raw | from_json if _b_vi_raw is string else _b_vi_raw -%}
                  {{ (_vi if _vi is mapping else {}).get('friendly_name', ai_entity) }}
                _b_type: >-
                  {%- set _vi = _b_vi_raw | from_json if _b_vi_raw is string else _b_vi_raw -%}
                  {{ (_vi if _vi is mapping else {}).get('cab_type', 'user') }}
            # — write B into A's acls.partner (delegation: B is A's partner) —
            - variables:
                _a_vi_updated: >-
                  {%- set _vi = _a_vi_raw | from_json if _a_vi_raw is string else _a_vi_raw -%}
                  {%- set _vi = _vi if _vi is mapping else {} -%}
                  {%- set _acls = _vi.get('acls', {}) -%}
                  {%- set _acls = _acls if _acls is mapping else {} -%}
                  {%- set _pts = _acls.get('partner', []) -%}
                  {%- set _pts = _pts if _pts is iterable and _pts is not string else [] -%}
                  {%- set _already = _pts | selectattr('entity_id', 'equalto', ai_entity) | list | count > 0 -%}
                  {%- if not _already -%}
                    {%- set _pts = _pts + [{'guid': _b_guid, 'entity_id': ai_entity, 'cab_type': _b_type, 'role': 'partner', 'sid': _b_guid}] -%}
                  {%- endif -%}
                  {%- set _acls = dict(_acls, **{'partner': _pts}) -%}
                  {{ dict(_vi, **{'acls': _acls}) | tojson }}
                # — write A into B's acls.partner (delegation: A is B's partner) —
                _b_vi_updated: >-
                  {%- set _vi = _b_vi_raw | from_json if _b_vi_raw is string else _b_vi_raw -%}
                  {%- set _vi = _vi if _vi is mapping else {} -%}
                  {%- set _acls = _vi.get('acls', {}) -%}
                  {%- set _acls = _acls if _acls is mapping else {} -%}
                  {%- set _pts = _acls.get('partner', []) -%}
                  {%- set _pts = _pts if _pts is iterable and _pts is not string else [] -%}
                  {%- set _already = _pts | selectattr('entity_id', 'equalto', member_entity) | list | count > 0 -%}
                  {%- if not _already -%}
                    {%- set _pts = _pts + [{'guid': _a_guid, 'entity_id': member_entity, 'cab_type': _a_type, 'role': 'partner', 'sid': _a_guid}] -%}
                  {%- endif -%}
                  {%- set _acls = dict(_acls, **{'partner': _pts}) -%}
                  {{ dict(_vi, **{'acls': _acls}) | tojson }}
            - event: set_variable_legacy
              event_data:
                key: AI_Cabinet_VolumeInfo
                value: "{{ _a_vi_updated }}"
                volume_entity: "{{ member_entity }}"
                set_timestamp: true
            - event: set_variable_legacy
              event_data:
                key: AI_Cabinet_VolumeInfo
                value: "{{ _b_vi_updated }}"
                volume_entity: "{{ ai_entity }}"
                set_timestamp: true
            - variables:
                response: "{{
                  {
                    'mode':        'link_partners',
                    'status':      'ok',
                    'entity_a':    member_entity,
                    'guid_a':      _a_guid,
                    'name_a':      _a_name,
                    'type_a':      _a_type,
                    'entity_b':    ai_entity,
                    'guid_b':      _b_guid,
                    'name_b':      _b_name,
                    'type_b':      _b_type,
                    'timestamp':   now().isoformat(),
                    'caller_token': caller_token | default('')
                  }
                }}"
            - event: zen_event
              event_data:
                kind: partner_linked
                entity_a: "{{ member_entity }}"
                name_a: "{{ _a_name }}"
                type_a: "{{ _a_type }}"
                entity_b: "{{ ai_entity }}"
                name_b: "{{ _b_name }}"
                type_b: "{{ _b_type }}"
                prompt_profile_update: true
            - stop: User-AI link established
              response_variable: response

    # ── Step 3i-2: mode = unlink_partners ─────────────────────────────────────
    # Symmetric: removes each entity from the other's acls.partner list.
    - choose:
        - conditions: "{{ _mode == 'unlink_partners' }}"
          sequence:
            - if: "{{ member_entity == '' or ai_entity == '' }}"
              then:
                - variables:
                    response: "{{
                      {
                        'mode':    'unlink_partners',
                        'status':  'error',
                        'message': 'member_entity and ai_entity (the two entities to unlink) are both required.',
                        'timestamp': now().isoformat()
                      }
                    }}"
                - stop: Missing required fields
                  response_variable: response
            - variables:
                _a_vi_raw: >-
                  {%- set _v = state_attr(member_entity, 'variables') | default({}, true) -%}
                  {%- set _v = _v if _v is mapping else {} -%}
                  {%- set _vi = _v.get('AI_Cabinet_VolumeInfo', _v) -%}
                  {%- set _vi = _vi.get('value', _vi) if _vi is mapping else {} -%}
                  {%- set _vi = _vi | from_json if _vi is string else _vi -%}
                  {{ _vi | tojson }}
                _b_vi_raw: >-
                  {%- set _v = state_attr(ai_entity, 'variables') | default({}, true) -%}
                  {%- set _v = _v if _v is mapping else {} -%}
                  {%- set _vi = _v.get('AI_Cabinet_VolumeInfo', _v) -%}
                  {%- set _vi = _vi.get('value', _vi) if _vi is mapping else {} -%}
                  {%- set _vi = _vi | from_json if _vi is string else _vi -%}
                  {{ _vi | tojson }}
            - variables:
                _a_name: >-
                  {%- set _vi = _a_vi_raw | from_json if _a_vi_raw is string else _a_vi_raw -%}
                  {{ (_vi if _vi is mapping else {}).get('friendly_name', member_entity) }}
                _b_name: >-
                  {%- set _vi = _b_vi_raw | from_json if _b_vi_raw is string else _b_vi_raw -%}
                  {{ (_vi if _vi is mapping else {}).get('friendly_name', ai_entity) }}
                # — remove B from A's acls.partner —
                _a_vi_updated: >-
                  {%- set _vi = _a_vi_raw | from_json if _a_vi_raw is string else _a_vi_raw -%}
                  {%- set _vi = _vi if _vi is mapping else {} -%}
                  {%- set _acls = _vi.get('acls', {}) -%}
                  {%- set _acls = _acls if _acls is mapping else {} -%}
                  {%- set _pts = _acls.get('partner', []) -%}
                  {%- set _pts = _pts if _pts is iterable and _pts is not string else [] -%}
                  {%- set _filtered = _pts | rejectattr('entity_id', 'equalto', ai_entity) | list -%}
                  {%- set _acls = dict(_acls, **{'partner': _filtered}) -%}
                  {{ dict(_vi, **{'acls': _acls}) | tojson }}
                # — remove A from B's acls.partner —
                _b_vi_updated: >-
                  {%- set _vi = _b_vi_raw | from_json if _b_vi_raw is string else _b_vi_raw -%}
                  {%- set _vi = _vi if _vi is mapping else {} -%}
                  {%- set _acls = _vi.get('acls', {}) -%}
                  {%- set _acls = _acls if _acls is mapping else {} -%}
                  {%- set _pts = _acls.get('partner', []) -%}
                  {%- set _pts = _pts if _pts is iterable and _pts is not string else [] -%}
                  {%- set _filtered = _pts | rejectattr('entity_id', 'equalto', member_entity) | list -%}
                  {%- set _acls = dict(_acls, **{'partner': _filtered}) -%}
                  {{ dict(_vi, **{'acls': _acls}) | tojson }}
            - event: set_variable_legacy
              event_data:
                key: AI_Cabinet_VolumeInfo
                value: "{{ _user_vi_updated }}"
                volume_entity: "{{ member_entity }}"
                set_timestamp: true
            - event: set_variable_legacy
              event_data:
                key: AI_Cabinet_VolumeInfo
                value: "{{ _ai_vi_updated }}"
                volume_entity: "{{ ai_entity }}"
                set_timestamp: true
            - event: zen_event
              event_data:
                kind: partner_unlinked
                entity_a: "{{ member_entity }}"
                name_a: "{{ _a_name }}"
                entity_b: "{{ ai_entity }}"
                name_b: "{{ _b_name }}"
                prompt_profile_update: true
            - variables:
                response: "{{
                  {
                    'mode':      'unlink_partners',
                    'status':    'ok',
                    'entity_a':  member_entity,
                    'name_a':    _a_name,
                    'entity_b':  ai_entity,
                    'name_b':    _b_name,
                    'timestamp': now().isoformat(),
                    'caller_token': caller_token | default('')
                  }
                }}"
            - stop: Partners unlinked
              response_variable: response

    # ── Step 3j: mode = set_default_family ───────────────────────────────────
    - choose:
        - conditions: "{{ _mode == 'set_default_family' }}"
          sequence:
            - if: "{{ member_entity == '' or family_entity == '' }}"
              then:
                - variables:
                    response: "{{
                      {
                        'mode':    'set_default_family',
                        'status':  'error',
                        'message': 'member_entity (user cabinet) and family_entity are both required.',
                        'timestamp': now().isoformat()
                      }
                    }}"
                - stop: Missing required fields
                  response_variable: response
            - variables:
                _mem_vi_raw: >-
                  {%- set _v = state_attr(member_entity, 'variables') | default({}, true) -%}
                  {%- set _v = _v if _v is mapping else {} -%}
                  {%- set _vi = _v.get('AI_Cabinet_VolumeInfo', _v) -%}
                  {%- set _vi = _vi.get('value', _vi) if _vi is mapping else {} -%}
                  {%- set _vi = _vi | from_json if _vi is string else _vi -%}
                  {{ _vi | tojson }}
                _fam_vi_raw: >-
                  {%- set _v = state_attr(family_entity, 'variables') | default({}, true) -%}
                  {%- set _v = _v if _v is mapping else {} -%}
                  {%- set _vi = _v.get('AI_Cabinet_VolumeInfo', _v) -%}
                  {%- set _vi = _vi.get('value', _vi) if _vi is mapping else {} -%}
                  {%- set _vi = _vi | from_json if _vi is string else _vi -%}
                  {{ _vi | tojson }}
            - variables:
                _fam_guid: >-
                  {%- set _vi = _fam_vi_raw | from_json if _fam_vi_raw is string else _fam_vi_raw -%}
                  {{ (_vi if _vi is mapping else {}).get('guid', '') }}
                _mem_vi_updated: >-
                  {%- set _vi = _mem_vi_raw | from_json if _mem_vi_raw is string else _mem_vi_raw -%}
                  {%- set _vi = _vi if _vi is mapping else {} -%}
                  {%- set _fvi = _fam_vi_raw | from_json if _fam_vi_raw is string else _fam_vi_raw -%}
                  {%- set _fguid = (_fvi if _fvi is mapping else {}).get('guid', '') -%}
                  {{ dict(_vi, **{'default_family_guid': _fguid}) | tojson }}
            - event: set_variable_legacy
              event_data:
                key: AI_Cabinet_VolumeInfo
                value: "{{ _mem_vi_updated }}"
                volume_entity: "{{ member_entity }}"
                set_timestamp: true
            - variables:
                response: "{{
                  {
                    'mode':           'set_default_family',
                    'status':         'ok',
                    'member_entity':  member_entity,
                    'family_entity':  family_entity,
                    'family_guid':    _fam_guid,
                    'timestamp':      now().isoformat(),
                    'caller_token':   caller_token | default('')
                  }
                }}"
            - stop: Default family set
              response_variable: response

    # ── Step 3k: mode = membership ───────────────────────────────────────────
    # Tree view for containers; reverse lookup for members.
    # Reads VolumeInfo + members drawer from state_attr (template-time, no async).
    # Depth-2 tree: household → families (depth 1) → sub-families (depth 2).
    - choose:
        - conditions: "{{ _mode == 'membership' }}"
          sequence:
            - variables:
                # Determine root: family_entity > member_entity > default household
                _root_entity: >-
                  {%- if family_entity | trim != '' -%}
                    {{ family_entity | trim }}
                  {%- elif member_entity | trim != '' -%}
                    {{ member_entity | trim }}
                  {%- else -%}
                    {{ _hh_target }}
                  {%- endif -%}
                _hh_default: "{{ _hh_target }}"
            - variables:
                _root_vi_raw: >-
                  {%- set _v = state_attr(_root_entity, 'variables') | default({}, true) -%}
                  {%- set _v = _v if _v is mapping else {} -%}
                  {%- set _vi = _v.get('AI_Cabinet_VolumeInfo', _v) -%}
                  {%- set _vi = _vi.get('value', _vi) if _vi is mapping else {} -%}
                  {%- set _vi = _vi | from_json if _vi is string else _vi -%}
                  {{ _vi | tojson }}
                _root_members_raw: >-
                  {%- set _v = state_attr(_root_entity, 'variables') | default({}, true) -%}
                  {%- set _v = _v if _v is mapping else {} -%}
                  {%- set _m = _v.get('members', {}) -%}
                  {%- set _m = _m if _m is mapping else (_m | from_json if _m is string else {}) -%}
                  {%- set _m = _m.get('value', _m) if _m is mapping else {} -%}
                  {{ _m | tojson }}
            - variables:
                _root_vi: "{{ _root_vi_raw | from_json if _root_vi_raw is string else (_root_vi_raw if _root_vi_raw is mapping else {}) }}"
                _root_members: "{{ _root_members_raw | from_json if _root_members_raw is string else (_root_members_raw if _root_members_raw is mapping else {}) }}"
                _root_cab_type: >-
                  {%- set _vi = _root_vi_raw | from_json if _root_vi_raw is string else _root_vi_raw -%}
                  {%- set _vi = _vi if _vi is mapping else {} -%}
                  {{ _vi.get('cab_type', '') }}
                _root_is_container: >-
                  {%- set _vi = _root_vi_raw | from_json if _root_vi_raw is string else _root_vi_raw -%}
                  {%- set _vi = _vi if _vi is mapping else {} -%}
                  {%- set _ct = _vi.get('cab_type', '') -%}
                  {{ _ct in ['household', 'family'] or 'members' in (state_attr(_root_entity, 'variables') | default({}, true)) }}
            - choose:
                # ── container tree ────────────────────────────────────────────
                - conditions: "{{ _root_is_container | bool }}"
                  sequence:
                    - variables:
                        _tree: >-
                          {%- set _vi = _root_vi_raw | from_json if _root_vi_raw is string else _root_vi_raw -%}
                          {%- set _vi = _vi if _vi is mapping else {} -%}
                          {%- set _m = _root_members_raw | from_json if _root_members_raw is string else _root_members_raw -%}
                          {%- set _m = _m if _m is mapping else {} -%}
                          {%- set _acls = _vi.get('acls', {}) -%}
                          {%- set _acls = _acls if _acls is mapping else {} -%}
                          {%- set _owners = _acls.get('owner', []) -%}
                          {%- set _partners = _acls.get('partner', []) -%}
                          {%- set _prime = _partners | selectattr('role', 'defined') | selectattr('role', 'equalto', 'prime') | list -%}
                          {%- set _hoh = _owners[0] if _owners | count > 0 else none -%}
                          {%- set _prime_entry = _prime[0] if _prime | count > 0 else none -%}
                          {# depth-1 families with their members #}
                          {%- set _ns = namespace(fams=[]) -%}{# FG-25: namespace required for list mutation inside for-loop #}
                          {%- for fam in _m.get('families', []) -%}
                            {%- set _fv = state_attr(fam.get('entity_id', ''), 'variables') | default({}, true) -%}
                            {%- set _fv = _fv if _fv is mapping else {} -%}
                            {%- set _fvi_raw = _fv.get('AI_Cabinet_VolumeInfo', {}) if _fv is mapping else {} -%}
                            {%- set _fvi = _fvi_raw.get('value', {}) if _fvi_raw is mapping else {} -%}
                            {%- set _fvi = _fvi if _fvi is mapping else (_fvi | from_json if _fvi is string else {}) -%}
                            {%- set _fm = _fv.get('members', {}) -%}
                            {%- set _fm = _fm if _fm is mapping else (_fm | from_json if _fm is string else {}) -%}
                    {%- set _fm = _fm.get('value', _fm) if _fm is mapping else {} -%}
                            {%- set _facls = _fvi.get('acls', {}) | default({}, true) -%}
                            {%- set _facls = _facls if _facls is mapping else {} -%}
                            {%- set _fowners = _facls.get('owner', []) -%}
                            {%- set _fpartners = _facls.get('partner', []) -%}
                            {%- set _fprime = _fpartners | selectattr('role', 'defined') | selectattr('role', 'equalto', 'prime') | list -%}
                            {# depth-2 sub-families (members only, no further recursion) #}
                            {%- set _nsf = namespace(subfams=[]) -%}{# FG-25: namespace required for list mutation inside for-loop #}
                            {%- for sf in _fm.get('families', []) -%}
                              {%- set _sfv = state_attr(sf.get('entity_id', ''), 'variables') | default({}, true) -%}
                              {%- set _sfv = _sfv if _sfv is mapping else {} -%}
                              {%- set _sfvi_raw = _sfv.get('AI_Cabinet_VolumeInfo', {}) if _sfv is mapping else {} -%}
                              {%- set _sfvi = _sfvi_raw.get('value', {}) if _sfvi_raw is mapping else {} -%}
                              {%- set _sfvi = _sfvi if _sfvi is mapping else (_sfvi | from_json if _sfvi is string else {}) -%}
                              {%- set _sfm = _sfv.get('members', {}) -%}
                              {%- set _sfm = _sfm if _sfm is mapping else (_sfm | from_json if _sfm is string else {}) -%}
                      {%- set _sfm = _sfm.get('value', _sfm) if _sfm is mapping else {} -%}
                              {%- set _nsf.subfams = _nsf.subfams + [{
                                'entity_id': sf.get('entity_id', ''),
                                'guid': _sfvi.get('guid', ''),
                                'name': sf.get('name', _sfvi.get('friendly_name', sf.get('entity_id', ''))),
                                'depth': 2,
                                'members': {
                                  'users': _sfm.get('users', []),
                                  'ai_users': _sfm.get('ai_users', [])
                                }
                              }] -%}
                            {%- endfor -%}
                            {%- set _ns.fams = _ns.fams + [{
                              'entity_id': fam.get('entity_id', ''),
                              'guid': _fvi.get('guid', ''),
                              'name': fam.get('name', _fvi.get('friendly_name', fam.get('entity_id', ''))),
                              'depth': fam.get('depth', 1),
                              'principals': {
                                'hoh': _fowners[0] if _fowners | count > 0 else none,
                                'prime': _fprime[0] if _fprime | count > 0 else none
                              },
                              'members': {
                                'users': _fm.get('users', []),
                                'ai_users': _fm.get('ai_users', []),
                                'families': _nsf.subfams
                              }
                            }] -%}
                          {%- endfor -%}
                          {{
                            {
                              'entity_id': _root_entity,
                              'guid': _vi.get('guid', ''),
                              'name': _vi.get('friendly_name', _root_entity),
                              'cab_type': _vi.get('cab_type', ''),
                              'principals': {
                                'hoh': _hoh,
                                'prime': _prime_entry
                              },
                              'members': {
                                'users': _m.get('users', []),
                                'ai_users': _m.get('ai_users', []),
                                'families': _ns.fams
                              }
                            } | tojson
                          }}
                    - variables:
                        response: "{{
                          {
                            'mode':             'membership',
                            'view':             'tree',
                            'root_entity':      _root_entity,
                            'tree':             _tree,
                            'timestamp':        now().isoformat(),
                            'caller_token':     caller_token | default('')
                          }
                        }}"
                    - stop: Membership tree returned
                      response_variable: response

                # ── member reverse-lookup ─────────────────────────────────────
                - conditions: "{{ not _root_is_container | bool }}"
                  sequence:
                    - variables:
                        # Scan the default household and its families for this member
                        _lookup_root: "{{ _hh_default }}"
                        _target_eid: "{{ _root_entity }}"
                    - variables:
                        _hh_vi_raw: >-
                          {%- set _v = state_attr(_lookup_root, 'variables') | default({}, true) -%}
                          {%- set _v = _v if _v is mapping else {} -%}
                          {%- set _vi = _v.get('AI_Cabinet_VolumeInfo', _v) -%}
                          {%- set _vi = _vi.get('value', _vi) if _vi is mapping else {} -%}
                          {%- set _vi = _vi | from_json if _vi is string else _vi -%}
                          {{ _vi | tojson }}
                        _hh_m_raw: >-
                          {%- set _v = state_attr(_lookup_root, 'variables') | default({}, true) -%}
                          {%- set _v = _v if _v is mapping else {} -%}
                          {%- set _m = _v.get('members', {}) -%}
                          {%- set _m = _m if _m is mapping else (_m | from_json if _m is string else {}) -%}
                          {%- set _m = _m.get('value', _m) if _m is mapping else {} -%}
                          {{ _m | tojson }}
                    - variables:
                        _memberships: >-
                          {%- set _hvi = _hh_vi_raw | from_json if _hh_vi_raw is string else _hh_vi_raw -%}
                          {%- set _hvi = _hvi if _hvi is mapping else {} -%}
                          {%- set _hm = _hh_m_raw | from_json if _hh_m_raw is string else _hh_m_raw -%}
                          {%- set _hm = _hm if _hm is mapping else {} -%}
                          {%- set _eid = _target_eid -%}
                          {%- set _groups = [] -%}
                          {# household direct membership? #}
                          {%- set _hh_users = _hm.get('users', []) + _hm.get('ai_users', []) -%}
                          {%- set _in_hh = _hh_users | selectattr('entity_id', 'equalto', _eid) | list | count > 0 -%}
                          {%- if _in_hh -%}
                            {%- set _hacls = _hvi.get('acls', {}) | default({}, true) -%}
                            {%- set _hacls = _hacls if _hacls is mapping else {} -%}
                            {%- set _own = _hacls.get('owner', []) -%}
                            {%- set _prt = _hacls.get('partner', []) -%}
                            {%- set _is_hoh = _own | selectattr('entity_id', 'equalto', _eid) | list | count > 0 -%}
                            {%- set _is_prime = _prt | selectattr('entity_id', 'equalto', _eid) | selectattr('role', 'defined') | selectattr('role', 'equalto', 'prime') | list | count > 0 -%}
                            {%- set _role = 'hoh' if _is_hoh else ('prime' if _is_prime else 'member') -%}
                            {%- set _groups = _groups + [{'container': _lookup_root, 'container_type': 'household', 'guid': _hvi.get('guid', ''), 'name': _hvi.get('friendly_name', _lookup_root), 'depth': 0, 'role': _role}] -%}
                          {%- endif -%}
                          {# scan depth-1 families #}
                          {%- for fam in _hm.get('families', []) -%}
                            {%- set _fv = state_attr(fam.get('entity_id', ''), 'variables') | default({}, true) -%}
                            {%- set _fv = _fv if _fv is mapping else {} -%}
                            {%- set _fvi_raw = _fv.get('AI_Cabinet_VolumeInfo', {}) if _fv is mapping else {} -%}
                            {%- set _fvi = _fvi_raw.get('value', {}) if _fvi_raw is mapping else {} -%}
                            {%- set _fvi = _fvi if _fvi is mapping else (_fvi | from_json if _fvi is string else {}) -%}
                            {%- set _fm = _fv.get('members', {}) -%}
                            {%- set _fm = _fm if _fm is mapping else (_fm | from_json if _fm is string else {}) -%}
                    {%- set _fm = _fm.get('value', _fm) if _fm is mapping else {} -%}
                            {%- set _f_users = _fm.get('users', []) + _fm.get('ai_users', []) -%}
                            {%- set _in_fam = _f_users | selectattr('entity_id', 'equalto', _eid) | list | count > 0 -%}
                            {%- if _in_fam -%}
                              {%- set _facls = _fvi.get('acls', {}) | default({}, true) -%}
                              {%- set _facls = _facls if _facls is mapping else {} -%}
                              {%- set _fown = _facls.get('owner', []) -%}
                              {%- set _fprt = _facls.get('partner', []) -%}
                              {%- set _is_fhoh = _fown | selectattr('entity_id', 'equalto', _eid) | list | count > 0 -%}
                              {%- set _is_fprime = _fprt | selectattr('entity_id', 'equalto', _eid) | selectattr('role', 'defined') | selectattr('role', 'equalto', 'prime') | list | count > 0 -%}
                              {%- set _frole = 'hoh' if _is_fhoh else ('prime' if _is_fprime else 'member') -%}
                              {%- set _groups = _groups + [{'container': fam.get('entity_id', ''), 'container_type': 'family', 'guid': _fvi.get('guid', ''), 'name': fam.get('name', _fvi.get('friendly_name', fam.get('entity_id', ''))), 'depth': 1, 'role': _frole}] -%}
                            {%- endif -%}
                            {# scan depth-2 sub-families #}
                            {%- for sf in _fm.get('families', []) -%}
                              {%- set _sfv = state_attr(sf.get('entity_id', ''), 'variables') | default({}, true) -%}
                              {%- set _sfv = _sfv if _sfv is mapping else {} -%}
                              {%- set _sfvi_raw = _sfv.get('AI_Cabinet_VolumeInfo', {}) if _sfv is mapping else {} -%}
                              {%- set _sfvi = _sfvi_raw.get('value', {}) if _sfvi_raw is mapping else {} -%}
                              {%- set _sfvi = _sfvi if _sfvi is mapping else (_sfvi | from_json if _sfvi is string else {}) -%}
                              {%- set _sfm = _sfv.get('members', {}) -%}
                              {%- set _sfm = _sfm if _sfm is mapping else (_sfm | from_json if _sfm is string else {}) -%}
                      {%- set _sfm = _sfm.get('value', _sfm) if _sfm is mapping else {} -%}
                              {%- set _sf_users = _sfm.get('users', []) + _sfm.get('ai_users', []) -%}
                              {%- set _in_sf = _sf_users | selectattr('entity_id', 'equalto', _eid) | list | count > 0 -%}
                              {%- if _in_sf -%}
                                {%- set _groups = _groups + [{'container': sf.get('entity_id', ''), 'container_type': 'family', 'guid': _sfvi.get('guid', ''), 'name': sf.get('name', _sfvi.get('friendly_name', sf.get('entity_id', ''))), 'depth': 2, 'role': 'member'}] -%}
                              {%- endif -%}
                            {%- endfor -%}
                          {%- endfor -%}
                          {{ _groups | tojson }}
                    - variables:
                        response: "{{
                          {
                            'mode':          'membership',
                            'view':          'member_lookup',
                            'member_entity': _root_entity,
                            'memberships':   _memberships,
                            'timestamp':     now().isoformat(),
                            'caller_token':  caller_token | default('')
                          }
                        }}"
                    - stop: Member lookup returned
                      response_variable: response

    # ── Step 3l: mode = is_member ─────────────────────────────────────────────
    - choose:
        - conditions: "{{ _mode == 'is_member' }}"
          sequence:
            - if: "{{ member_entity == '' or family_entity == '' }}"
              then:
                - variables:
                    response: "{{
                      {
                        'mode':    'is_member',
                        'status':  'error',
                        'message': 'member_entity (subject) and family_entity (container) are both required.',
                        'timestamp': now().isoformat()
                      }
                    }}"
                - stop: Missing required fields
                  response_variable: response
            - variables:
                _container_m_raw: >-
                  {%- set _v = state_attr(family_entity, 'variables') | default({}, true) -%}
                  {%- set _v = _v if _v is mapping else {} -%}
                  {%- set _m = _v.get('members', {}) -%}
                  {%- set _m = _m if _m is mapping else (_m | from_json if _m is string else {}) -%}
                  {%- set _m = _m.get('value', _m) if _m is mapping else {} -%}
                  {{ _m | tojson }}
            - variables:
                _check: >-
                  {%- set _m = _container_m_raw | from_json if _container_m_raw is string else _container_m_raw -%}
                  {%- set _m = _m if _m is mapping else {} -%}
                  {%- set _eid = member_entity -%}
                  {%- set _all_direct = _m.get('users', []) + _m.get('ai_users', []) -%}
                  {%- set _d1 = _all_direct | selectattr('entity_id', 'equalto', _eid) | list | count > 0 -%}
                  {%- if _d1 -%}
                    {{ {'is_member': true, 'depth': 1} | tojson }}
                  {%- else -%}
                    {%- set _found_d2 = false -%}
                    {%- for fam in _m.get('families', []) -%}
                      {%- if not _found_d2 -%}
                        {%- set _fv = state_attr(fam.get('entity_id', ''), 'variables') | default({}, true) -%}
                        {%- set _fv = _fv if _fv is mapping else {} -%}
                        {%- set _fm = _fv.get('members', {}) -%}
                        {%- set _fm = _fm if _fm is mapping else (_fm | from_json if _fm is string else {}) -%}
                    {%- set _fm = _fm.get('value', _fm) if _fm is mapping else {} -%}
                        {%- set _d2_all = _fm.get('users', []) + _fm.get('ai_users', []) -%}
                        {%- set _in_d2 = _d2_all | selectattr('entity_id', 'equalto', _eid) | list | count > 0 -%}
                        {%- if _in_d2 -%}
                          {%- set _found_d2 = true -%}
                        {%- endif -%}
                      {%- endif -%}
                    {%- endfor -%}
                    {%- if _found_d2 -%}
                      {{ {'is_member': true, 'depth': 2} | tojson }}
                    {%- else -%}
                      {{ {'is_member': false, 'depth': none} | tojson }}
                    {%- endif -%}
                  {%- endif -%}
            - variables:
                _r: "{{ _check if _check is mapping else (_check | from_json if _check is string else {'is_member': false, 'depth': none}) }}"
            - variables:
                response: "{{
                  {
                    'mode':             'is_member',
                    'member_entity':    member_entity,
                    'container_entity': family_entity,
                    'is_member':        _r.get('is_member', false),
                    'depth':            _r.get('depth', none),
                    'timestamp':        now().isoformat(),
                    'caller_token':     caller_token | default('')
                  }
                }}"
            - stop: is_member check complete
              response_variable: response

    # ── Step 3b: mode = resolve (default) ──────────────────────────────────
    - variables:
        response: "{{
          {
            'result':           cab,
            'target_normalized': normalized,
            'timestamp':        now().isoformat(),
            'caller_token':     caller_token | default('')
          }
        }}\n"
    - stop: Return Variables
      response_variable: response
