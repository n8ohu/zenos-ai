###############################################################################
# ZenOS-AI: Image Generator
# Version: 4.7.0
#
# Components:
#   zen_dojotools_generate_image  — DojoTool: DALL-E via ai_task.generate_image
#   image.zen_image_canvas        — Trigger-based slot: main display
#   image.zen_image_portrait      — Trigger-based slot: AI portrait
#   image.zen_image_wallpaper     — Trigger-based slot: wallpaper/background
#   image.zen_image_id_pic        — Trigger-based slot: identity/selfie
#   image.zen_image_dashboard_snap — Trigger-based slot: dashboard snapshot
#   image.zen_image_home_state    — Trigger-based slot: home state visualization
#
# Slot architecture (v4.7.0):
#   - Trigger-based image entities (ha.io/integrations/ai_task canonical pattern)
#   - Script fires zen_event with url (auth sig valid for ~1hr)
#   - Entity fetches url once on event, HA caches via image proxy permanently
#   - Survives restarts — HA restores cached bytes, no re-fetch of expired url
#   - input_text.zenos_image_task selects which ai_task entity to use
#
# IMPORTANT: Only ai_task.openai_ai_task_3 (gpt-image-1.5) supports GENERATE_IMAGE.
# Set input_text.zenos_image_task to ai_task.openai_ai_task_3 after reload.
###############################################################################

input_text:
  zenos_image_task:
    name: ZenOS Image Task Entity
    max: 255
    icon: mdi:image-auto-adjust

script:
  zen_dojotools_generate_image:
    alias: Zen DojoTools Generate Image
    mode: parallel
    description: >-
      Generate an image using ai_task.generate_image and write it to a named
      display slot. Slots: canvas (default), portrait, wallpaper, id_pic,
      dashboard_snap, home_state. Each slot maps to a trigger-based image entity
      (image.zen_image_<slot>) — url fetched once on event, cached by HA proxy
      permanently. If no slot is given, image goes to canvas. Result includes
      slot and url. Fires zen_event (kind: image_generated). (v1.4.0)
    fields:
      image_prompt:
        name: Image Prompt
        description: >-
          Descriptive prompt for image generation. Be specific about subject,
          style, lighting, and composition.
        required: true
        selector:
          text:
            multiline: true
      slot:
        name: Display Slot
        description: "Named display slot to write the image to. Default: canvas"
        required: false
        selector:
          select:
            options:
              - canvas
              - portrait
              - wallpaper
              - id_pic
              - dashboard_snap
              - home_state
            custom_value: false
      entity_id:
        name: AI Task Entity
        description: >-
          Optional. Specific ai_task entity to use. Defaults to
          input_text.zenos_image_task, then HA preferred entity.
        required: false
        selector:
          entity:
            domain: ai_task
      caller_token:
        name: Caller Token
        description: Opaque token passed through by the caller for correlation. Not interpreted by this script.
        required: false
        selector:
          text:

    sequence:
      # --------------------------------------------------------------
      # Always normalize User/AI inputs so we don't have to react JIT
      # --------------------------------------------------------------
      - variables:
          caller_token: "{{- caller_token | default('') -}}"
      - variables:
          _prompt: "{{ image_prompt | trim }}"
          _slot: "{{ slot | default('canvas') | trim }}"
          _stored: >-
            {% set s = states('input_text.zenos_image_task') %}
            {{ s if s not in ['unknown', 'unavailable', 'none', ''] else '' }}
          _entity: >-
            {% set e = entity_id | default('') | trim %}
            {{ e if e not in ['unknown', 'unavailable', 'none', ''] else _stored }}

      # Only branch differs on entity_id — _response accessible after block
      - choose:
          - conditions: "{{ _entity != '' }}"
            sequence:
              - action: ai_task.generate_image
                data:
                  task_name: "{{ _slot }}"
                  instructions: "{{ _prompt }}"
                  entity_id: "{{ _entity }}"
                response_variable: _response
        default:
          - action: ai_task.generate_image
            data:
              task_name: "{{ _slot }}"
              instructions: "{{ _prompt }}"
            response_variable: _response

      - variables:
          _url: "{{ _response.url | default('') }}"

      # Fire zen_event — triggers matching slot image entity to fetch and cache url
      - event: zen_event
        event_data:
          event:
            kind: image_generated
            slot: "{{ _slot }}"
            url: "{{ _url }}"
            media_source_id: "{{ _response.media_source_id | default('') }}"
            revised_prompt: "{{ _response.revised_prompt | default('') }}"
            model: "{{ _response.model | default('') }}"
            width: "{{ _response.width | default(0) }}"
            height: "{{ _response.height | default(0) }}"
            prompt: "{{ _prompt }}"
            timestamp: "{{ now().isoformat() }}"

      - variables:
          final_response:
            status: "{{ 'success' if _url != '' else 'error' }}"
            message: >-
              {{ 'Image written to slot: ' ~ _slot ~ '.'
                 if _url != ''
                 else 'No url returned from ai_task.' }}
            result:
              slot: "{{ _slot }}"
              url: "{{ _url }}"
              media_source_id: "{{ _response.media_source_id | default('') }}"
              revised_prompt: "{{ _response.revised_prompt | default('') }}"
              model: "{{ _response.model | default('') }}"
              width: "{{ _response.width | default(0) }}"
              height: "{{ _response.height | default(0) }}"
              prompt: "{{ _prompt }}"
            caller_token: '{{ caller_token }}'

      - stop: Image generation complete
        response_variable: final_response

template:
  # Trigger-based image entities — canonical HA pattern (ha.io/integrations/ai_task).
  # Each entity listens for zen_event kind=image_generated filtered by slot.
  # URL fetched once on event (auth sig valid), cached by HA image proxy permanently.
  # Survives restarts — HA restores cached image, no re-fetch of expired URL needed.

  - trigger:
      - trigger: event
        event_type: zen_event
        event_data:
          event:
            kind: image_generated
            slot: canvas
    image:
      - name: "Zen Image Canvas"
        unique_id: zen_image_canvas
        url: "http://localhost:8123{{ trigger.event.data.event.url }}"

  - trigger:
      - trigger: event
        event_type: zen_event
        event_data:
          event:
            kind: image_generated
            slot: portrait
    image:
      - name: "Zen Image Portrait"
        unique_id: zen_image_portrait
        url: "http://localhost:8123{{ trigger.event.data.event.url }}"

  - trigger:
      - trigger: event
        event_type: zen_event
        event_data:
          event:
            kind: image_generated
            slot: wallpaper
    image:
      - name: "Zen Image Wallpaper"
        unique_id: zen_image_wallpaper
        url: "http://localhost:8123{{ trigger.event.data.event.url }}"

  - trigger:
      - trigger: event
        event_type: zen_event
        event_data:
          event:
            kind: image_generated
            slot: id_pic
    image:
      - name: "Zen Image ID Pic"
        unique_id: zen_image_id_pic
        url: "http://localhost:8123{{ trigger.event.data.event.url }}"

  - trigger:
      - trigger: event
        event_type: zen_event
        event_data:
          event:
            kind: image_generated
            slot: dashboard_snap
    image:
      - name: "Zen Image Dashboard Snap"
        unique_id: zen_image_dashboard_snap
        url: "http://localhost:8123{{ trigger.event.data.event.url }}"

  - trigger:
      - trigger: event
        event_type: zen_event
        event_data:
          event:
            kind: image_generated
            slot: home_state
    image:
      - name: "Zen Image Home State"
        unique_id: zen_image_home_state
        url: "http://localhost:8123{{ trigger.event.data.event.url }}"
