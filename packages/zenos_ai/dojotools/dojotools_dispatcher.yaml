#####################################################################
# zen_dojotool_dispatcher — Event-driven dojotool dispatch layer
# zen_dojotool_tool_router — Second-dimension generic dispatch
#
# v1.1.0 (ZenOS-AI 4.5.7)
#
# Listens for zen_event(kind: dojotool_call), routes to the registered
# script, fires correlated zen_event(kind: dojotool_return).
#
# WHY:
#   Direct script calls (action: script.foo) hard-fault if the script
#   doesn't exist — sequence dies, no recovery. Through the dispatcher,
#   unknown tools return a structured error on the event bus. Nothing
#   explodes. Caller handles it.
#
#   Additionally: callers reference tool names, not script entity IDs.
#   Version routing means tools can migrate without touching callers.
#   All inter-tool calls flow through one place — free observability.
#
# CALLER PATTERN:
#   1. Generate a correlation_id (UUID).
#   2. Arm wait_for_trigger on dojotool_return filtered by correlation_id.
#   3. Fire dojotool_call event.
#   4. Receive correlated return.
#
#   event: zen_event
#   event_data:
#     event:
#       kind: dojotool_call
#       tool: zen_dojotools_provisioner
#       version: "1"           # optional, defaults to "1"
#       correlation_id: <uuid>
#       payload:
#         mode: provision
#         target_cabinet: sensor.zenos_expansion_cabinet_1
#         cab_type: ai_user
#         caller_token: "{{ caller_token }}"
#
#   wait_for_trigger:
#     - trigger: event
#       event_type: zen_event
#       event_data:
#         event:
#           kind: dojotool_return
#           correlation_id: <same uuid>
#   timeout: '00:00:30'
#
# NON-BREAKING: existing direct action: script.* calls are unaffected.
#
# REGISTRY: add a choose arm per tool. That's the entire API surface.
# Tools do NOT need to change — dispatcher adapts to their contracts.
#####################################################################

automation:

  - id: zen_dojotool_dispatcher
    alias: Zen DojoTool Dispatcher
    description: >-
      Zen DojoTool Dispatcher 1.0.0. Event-driven dispatch layer for dojotool
      inter-tool communication. Listens for zen_event(kind: dojotool_call),
      routes to registered scripts, fires correlated dojotool_return events.

      Fault isolation: unknown tools return structured error — no hard fault.
      Version routing: tool + version resolves to specific script entity.
      Observability: all inter-tool calls visible on the event bus.
      Non-breaking: direct script calls unaffected. Migrate opportunistically.
    mode: parallel
    max: 20

    triggers:
      - trigger: event
        event_type: zen_event
        event_data:
          event:
            kind: dojotool_call

    actions:
      - variables:
          _ev:              "{{ trigger.event.data.event }}"
          _tool:            "{{ _ev.tool | default('') | trim }}"
          _ver:             "{{ _ev.version | default('1') | string | trim }}"
          _cid:             "{{ _ev.correlation_id | default('') | trim }}"
          _payload:         "{{ _ev.payload | default({}) }}"
          _route_externally: false
          _result:          {}

      # ── Gate: correlation_id required ──────────────────────────────────────
      - if:
        - condition: template
          value_template: "{{ _cid == '' }}"
        then:
        - event: zen_event
          event_data:
            event:
              kind: dojotool_dispatch_error
              tool: "{{ _tool }}"
              version: "{{ _ver }}"
              correlation_id: ''
              error: missing_correlation_id
              message: "dojotool_call missing correlation_id — cannot route return."
        - stop: missing correlation_id

      # ── Registry ───────────────────────────────────────────────────────────
      - choose:

          # ── zen_dojotools_provisioner v1 ─────────────────────────────────
          - conditions: "{{ _tool == 'zen_dojotools_provisioner' and _ver | string == '1' }}"
            sequence:
              - action: script.zen_dojotools_provisioner
                data:
                  mode:            "{{ _payload.get('mode', 'provision') }}"
                  cab_type:        "{{ _payload.get('cab_type', '') }}"
                  target_cabinet:  "{{ _payload.get('target_cabinet', '') }}"
                  replace_cabinet: "{{ _payload.get('replace_cabinet', '') }}"
                  person_entity:   "{{ _payload.get('person_entity', '') }}"
                  profile_payload: "{{ _payload.get('profile_payload', '') }}"
                  caller_token:    "{{ _payload.get('caller_token', '') }}"
                response_variable: _result

          # ── zen_admintools_cabinetadmin_factory v1 ─────────────────────────
          - conditions: "{{ _tool == 'zen_admintools_cabinetadmin_factory' and _ver | string == '1' }}"
            sequence:
              - action: script.zen_admintools_cabinetadmin_factory
                data:
                  cabinet_entity: "{{ _payload.get('cabinet_entity', '') }}"
                  cabinet_type:   "{{ _payload.get('cabinet_type', '') }}"
                  confirm_action: "{{ _payload.get('confirm_action', false) }}"
                  caller_token:   "{{ _payload.get('caller_token', '') }}"
                response_variable: _result

          # ── zen_admintools_cabinetadmin v1 ───────────────────────────────
          - conditions: "{{ _tool == 'zen_admintools_cabinetadmin' and _ver | string == '1' }}"
            sequence:
              - action: script.zen_admintools_cabinetadmin
                data:
                  mode:           "{{ _payload.get('mode', 'inspect') }}"
                  cabinet_entity: "{{ _payload.get('cabinet_entity', '') }}"
                  schema_version: "{{ _payload.get('schema_version', none) }}"
                  caller_token:   "{{ _payload.get('caller_token', '') }}"
                response_variable: _result

          # ── zen_dojotools_filecabinet v1 ─────────────────────────────────
          - conditions: "{{ _tool == 'zen_dojotools_filecabinet' and _ver | string == '1' }}"
            sequence:
              - action: script.zen_dojotools_filecabinet
                data:
                  action_type:         "{{ _payload.get('action_type', 'read') }}"
                  volume_entity_id:    "{{ _payload.get('volume_entity_id', '') }}"
                  key:                 "{{ _payload.get('key', '') }}"
                  value:               "{{ _payload.get('value', '') }}"
                  set_timestamp:       "{{ _payload.get('set_timestamp', false) }}"
                  label_input:         "{{ _payload.get('label_input', '') }}"
                  expires_after:       "{{ _payload.get('expires_after', '') }}"
                  no_autoexpire:       "{{ _payload.get('no_autoexpire', false) }}"
                  no_autorecycle:      "{{ _payload.get('no_autorecycle', false) }}"
                  acl:                 "{{ _payload.get('acl', '') }}"
                  description:         "{{ _payload.get('description', '') }}"
                  label_targets:       "{{ _payload.get('label_targets', '') }}"
                  show_hidden_volumes: "{{ _payload.get('show_hidden_volumes', false) }}"
                  show_stacks:         "{{ _payload.get('show_stacks', false) }}"
                  start:               "{{ _payload.get('start', '') }}"
                  end:                 "{{ _payload.get('end', '') }}"
                  filter_domain:       "{{ _payload.get('filter_domain', '') }}"
                  filter_state_operand: "{{ _payload.get('filter_state_operand', '') }}"
                  filter_op:           "{{ _payload.get('filter_op', '') }}"
                  force_action:        "{{ _payload.get('force_action', false) }}"
                  destination_cabinet: "{{ _payload.get('destination_cabinet', '') }}"
                  destination_drawer:  "{{ _payload.get('destination_drawer', '') }}"
                  transfer_guid:       "{{ _payload.get('transfer_guid', '') }}"
                  target_guid:         "{{ _payload.get('target_guid', '') }}"
                  caller_token:        "{{ _payload.get('caller_token', '') }}"
                response_variable: _result

          # ── zen_dojotools_inspect v1 ─────────────────────────────────────
          - conditions: "{{ _tool == 'zen_dojotools_inspect' and _ver | string == '1' }}"
            sequence:
              - action: script.zen_dojotools_inspect
                data:
                  entity_id:     "{{ _payload.get('entity_id', []) }}"
                  extended:      "{{ _payload.get('extended', false) }}"
                  output_fields: "{{ _payload.get('output_fields', []) }}"
                  label_targets: "{{ _payload.get('label_targets', []) }}"
                  infer:         "{{ _payload.get('infer', false) }}"
                  drawer_key:    "{{ _payload.get('drawer_key', '') }}"
                  timeout:       "{{ _payload.get('timeout', 60) }}"
                  caller_token:  "{{ _payload.get('caller_token', '') }}"
                response_variable: _result

          # ── zen_dojotools_query v1 ───────────────────────────────────────
          - conditions: "{{ _tool == 'zen_dojotools_query' and _ver | string == '1' }}"
            sequence:
              - action: script.zen_dojotools_query
                data:
                  mode:            "{{ _payload.get('mode', 'query') }}"
                  log_result:      "{{ _payload.get('log_result', false) }}"
                  emit_event:      "{{ _payload.get('emit_event', false) }}"
                  target_entities: "{{ _payload.get('target_entities', []) }}"
                  filter_json:     "{{ _payload.get('filter_json', '{}') }}"
                  output_fields:   "{{ _payload.get('output_fields', []) }}"
                  dry_run:         "{{ _payload.get('dry_run', false) }}"
                  caller_token:    "{{ _payload.get('caller_token', '') }}"
                response_variable: _result

          # ── zen_dojotools_index v1 ───────────────────────────────────────
          - conditions: "{{ _tool == 'zen_dojotools_index' and _ver | string == '1' }}"
            sequence:
              - action: script.zen_dojotools_index
                data:
                  mode:            "{{ _payload.get('mode', 'normal') }}"
                  index_command: >-
                    {%- set _v = _payload.get('index_command', {}) -%}
                    {{- _v | from_json if _v is string else (_v if _v is mapping else {}) -}}
                  entities_1:      "{{ _payload.get('entities_1', []) }}"
                  label_1:         "{{ _payload.get('label_1', '') }}"
                  entities_2:      "{{ _payload.get('entities_2', []) }}"
                  label_2:         "{{ _payload.get('label_2', '') }}"
                  operator:        "{{ _payload.get('operator', 'AND') }}"
                  timeout:         "{{ _payload.get('timeout', 2) }}"
                  filter_json: >-
                    {%- set _v = _payload.get('filter_json', {}) -%}
                    {{- _v | from_json if _v is string else (_v if _v is mapping else {}) -}}
                  strict:          "{{ _payload.get('strict', false) }}"
                  expand_entities: "{{ _payload.get('expand_entities', false) }}"
                  output_fields:   "{{ _payload.get('output_fields', []) }}"
                  dry_run:         "{{ _payload.get('dry_run', false) }}"
                  caller_token:    "{{ _payload.get('caller_token', '') }}"
                response_variable: _result

          # ── zen_dojotools_manifest v1 ────────────────────────────────────
          - conditions: "{{ _tool == 'zen_dojotools_manifest' and _ver | string == '1' }}"
            sequence:
              - action: script.zen_dojotools_manifest
                data:
                  show_hidden:  "{{ _payload.get('show_hidden', false) }}"
                  show_stacks:  "{{ _payload.get('show_stacks', false) }}"
                  extended:     "{{ _payload.get('extended', false) }}"
                  caller_token: "{{ _payload.get('caller_token', '') }}"
                response_variable: _result

          # ── zen_admintools_summarizer_act v1 ────────────────────────────────
          - conditions: "{{ _tool == 'zen_admintools_summarizer_act' and _ver | string == '1' }}"
            sequence:
              - action: script.zen_admintools_summarizer_act
                data:
                  action_type:  "{{ _payload.get('action_type', 'list') }}"
                  event:        "{{ _payload.get('event', '') }}"
                  caller_token: "{{ _payload.get('caller_token', '') }}"
                response_variable: _result

          # ── zen_dojotools_notification_router v1 ─────────────────────────────
          - conditions: "{{ _tool == 'zen_dojotools_notification_router' and _ver | string == '1' }}"
            sequence:
              - action: script.zen_dojotools_notification_router
                data:
                  title:                "{{ _payload.get('title', '') }}"
                  message:              "{{ _payload.get('message', '') }}"
                  kata_input:           "{{ _payload.get('kata_input', {}) }}"
                  notification_targets: "{{ _payload.get('notification_targets', 'Admin Devices') }}"
                  importance:           "{{ _payload.get('importance', 'default') }}"
                  breakthrough:         "{{ _payload.get('breakthrough', false) }}"
                  subject:              "{{ _payload.get('subject', '') }}"
                  tag:                  "{{ _payload.get('tag', '') }}"
                  group:                "{{ _payload.get('group', '') }}"
                  caller_token:         "{{ _payload.get('caller_token', '') }}"
                response_variable: _result

          # ── zen_dojotools_urgency_handler v1 — stub (no backing script yet) ─
          - conditions: "{{ _tool == 'zen_dojotools_urgency_handler' and _ver | string == '1' }}"
            sequence:
              - variables:
                  _result:
                    status: stub
                    message: zen_dojotools_urgency_handler v1 registered — handler not yet implemented. Payload received.
                    payload: "{{ _payload }}"
                    correlation_id: "{{ _cid }}"

          # ── Generic route — any zen_dojotools_* / zen_admintools_* tool ───────
          # HA does not support templated action: names — cannot call
          # "script.{{ _tool }}" directly. Push down one dimension:
          # fire dojotool_route sub-event with full routing info in
          # templated event_data. zen_dojotool_tool_router picks it up,
          # dispatches to the backing script, fires dojotool_return directly.
          # Add an explicit branch above ONLY when custom field-mapping is needed.
          #
          # AUDIT HOOK: dojotool_route is the natural seam for the event-bus
          # audit logger (not yet built). Every generic dispatch emits this event
          # with full routing info (tool, version, correlation_id, payload).
          # Future: zen_dojotool_audit_logger listens here; certain event classes
          # (urgency_handler, suggested_act_event) can force audit: true.
          - conditions: >-
              {{ _tool | regex_match('^zen_dojotools_|^zen_admintools_') }}
            sequence:
              - variables:
                  _route_externally: true
              - event: zen_event
                event_data:
                  event:
                    kind: dojotool_route
                    tool: "{{ _tool }}"
                    version: "{{ _ver }}"
                    correlation_id: "{{ _cid }}"
                    payload: "{{ _payload }}"

        # ── Unknown tool — structured fault, NOT a hard crash ─────────────
        default:
          - variables:
              _result:
                status: error
                error: unknown_tool
                message: "Dispatcher: unknown tool '{{ _tool }}' v{{ _ver }}. Not in registry."
                tool: "{{ _tool }}"
                version: "{{ _ver }}"
                correlation_id: "{{ _cid }}"
          - event: zen_event
            event_data:
              event:
                kind: dojotool_dispatch_error
                tool: "{{ _tool }}"
                version: "{{ _ver }}"
                correlation_id: "{{ _cid }}"
                error: unknown_tool
                message: "Dispatcher: unknown tool '{{ _tool }}' v{{ _ver }}. Not in registry."

      # ── Fire correlated return (skipped when routed externally) ──────────
      # Routed tools: zen_dojotool_tool_router fires dojotool_return directly.
      - if:
        - condition: template
          value_template: "{{ not _route_externally }}"
        then:
        - event: zen_event
          event_data:
            event:
              kind: dojotool_return
              correlation_id: "{{ _cid }}"
              tool: "{{ _tool }}"
              version: "{{ _ver }}"
              result: "{{ _result }}"


  #####################################################################
  # zen_identity_manifest_router — Manifest rebuild on cabinet change
  #
  # v1.0.0 (ZenOS-AI 4.5.8)
  #
  # Listens for zen_event(kind: identity_manifest_rebuild) fired by:
  #   - zen_dojotools_provisioner (provision + deprovision)
  #   - zen_admintools_cabinetadmin (repair_mount + repair_dismount)
  # Routes to zen_dojotools_manifest to rebuild zen_library_manifest in
  # the household cabinet.
  #
  # Fire-and-forget. Queued — provision → deprovision flows serialize.
  #####################################################################

  - id: zen_identity_manifest_router
    alias: Zen Identity Manifest Router
    description: >-
      Zen Identity Manifest Router 1.0.0. Listens for
      zen_event(kind: identity_manifest_rebuild) and calls
      zen_dojotools_manifest to rebuild zen_library_manifest.
      Queued — provision/deprovision sequences serialize cleanly.
    mode: queued
    max: 20

    triggers:
      - trigger: event
        event_type: zen_event
        event_data:
          event:
            kind: identity_manifest_rebuild

    actions:
      - action: script.zen_dojotools_manifest
        data:
          show_hidden: false
          show_stacks: false
          extended: false
          caller_token: identity_manifest_router
        response_variable: _result


  #####################################################################
  # zen_label_mutation_router — Compact index rebuild on label change
  #
  # v1.0.0 (ZenOS-AI 4.5.8)
  #
  # Listens for zen_event(kind: label_mutation) fired by zen_dojotools_labels
  # on any successful write (create/delete/tag/untag/update/reset/install).
  # Routes to zen_dojotools_index (mode: build_compact_index) to rebuild
  # _compact_index in the household cabinet.
  #
  # Fire-and-forget — no correlation_id or return event.
  # mode: queued so rapid multi-label ops serialize, not storm the cabinet.
  #####################################################################

  - id: zen_label_mutation_router
    alias: Zen Label Mutation — Compact Index Router
    description: >-
      Zen Label Mutation Router 1.0.0. Listens for zen_event(kind: label_mutation)
      and triggers zen_dojotools_index (mode: build_compact_index) to rebuild
      _compact_index. Fire-and-forget. Queued so burst label ops don't race each other.
    mode: queued
    max: 20

    triggers:
      - trigger: event
        event_type: zen_event
        event_data:
          event:
            kind: label_mutation
      - trigger: homeassistant
        event: start
        id: ha_start
      - trigger: time
        at: "06:00:00"
        id: scheduled_rebuild
      - trigger: time
        at: "12:00:00"
        id: scheduled_rebuild
      - trigger: time
        at: "18:00:00"
        id: scheduled_rebuild
      - trigger: time
        at: "00:00:00"
        id: scheduled_rebuild

    actions:
      - action: script.zen_dojotools_index
        data:
          mode: build_compact_index
          caller_token: label_mutation_router


  #####################################################################
  # zen_scheduler_drain_router — Trickle recovery for shed components
  #
  # v1.0.0 (ZenOS-AI 4.5.x)
  #
  # When scheduler queue depth stays below drain_below for s_min_minutes,
  # fires force_summary for the most stale shed-eligible component
  # (keeper before ambient, oldest kata timestamp first).
  #
  # Starvation guard (time_pattern /10): if any component's kata is older
  # than s_max_minutes, forces a recovery regardless of queue depth.
  #
  # mode: single — one drain recovery dispatch at a time; scheduler
  # handles execution. Config lives in zen_scheduler_config drawer
  # of the household root cabinet.
  #####################################################################

  - id: zen_scheduler_drain_router
    alias: Zen Scheduler — Drain Router
    description: >-
      Zen Scheduler Drain Router 1.0.0. When queue depth is sustained
      below drain_below for s_min_minutes, trickles shed components back
      into the pipeline — keeper tier first, oldest kata first.
      Starvation guard fires at s_max_minutes regardless of depth.
      Config in zen_scheduler_config drawer of household root cabinet.
    mode: single

    triggers:
      - trigger: numeric_state
        entity_id: sensor.zen_scheduler_queue_depth
        below: 4
        for:
          minutes: 3
        id: drain_quiet
      - trigger: time_pattern
        minutes: /10
        id: drain_starvation_check

    actions:
      # ── Resolve cabinets + read scheduler config ─────────────────────
      - variables:
          _household_cab: "{{ states('sensor.zen_default_household_cabinet_resolved') }}"
          _dojo_cab:      "{{ states('sensor.zen_dojo_cabinet_resolved') }}"
          _kata_cab:      "{{ states('sensor.zen_kata_cabinet_resolved') }}"
          _queue_depth:   "{{ states('sensor.zen_scheduler_queue_depth') | int(0) }}"
      - variables:
          _drain_below: >-
            {%- set _hv = state_attr(_household_cab, 'variables') | default({}, true) -%}
            {%- set _r  = _hv.get('zen_scheduler_config', {}) if _hv is mapping else {} -%}
            {%- set _v  = _r.get('value', _r) if _r is mapping else {} -%}
            {%- set _v  = (_v | from_json) if _v is string else _v -%}
            {{ (_v.get('drain_below', 3) if _v is mapping else 3) | int(3) }}
          _s_max_minutes: >-
            {%- set _hv = state_attr(_household_cab, 'variables') | default({}, true) -%}
            {%- set _r  = _hv.get('zen_scheduler_config', {}) if _hv is mapping else {} -%}
            {%- set _v  = _r.get('value', _r) if _r is mapping else {} -%}
            {%- set _v  = (_v | from_json) if _v is string else _v -%}
            {{ (_v.get('s_max_minutes', 60) if _v is mapping else 60) | int(60) }}

      # ── Gate: quiet trigger re-validates depth; starvation bypasses ──
      - if: >-
          {{ trigger.id == 'drain_starvation_check' or _queue_depth | int(0) < _drain_below | int(3) }}
        then:
          # ── Build candidate list from dojo drawers + kata timestamps ──
          - variables:
              _now_ts: "{{ now().timestamp() | int(0) }}"
              _candidates: >-
                {%- set protected = ['AI_Cabinet_VolumeInfo', 'kfc_template', 'zen_library_manifest', 'zen_identity_manifest', '_context'] -%}
                {%- set dojo_v = state_attr(_dojo_cab, 'variables') | default({}, true) -%}
                {%- set kata_v = state_attr(_kata_cab, 'variables') | default({}, true) -%}
                {%- set ns = namespace(cands=[]) -%}
                {%- if _dojo_cab not in ['unknown', 'unavailable'] and _kata_cab not in ['unknown', 'unavailable'] -%}
                  {%- for key, drawer in (dojo_v if dojo_v is mapping else {}).items() -%}
                    {%- if not key.startswith('_') and key not in protected -%}
                      {%- set val = drawer.get('value', drawer) if drawer is mapping else {} -%}
                      {%- if val is mapping -%}
                        {%- set tier = val.get('pipeline_tier', 'keeper') | lower -%}
                        {%- if tier in ['keeper', 'ambient', 'direct'] -%}
                          {%- set kata_raw = (kata_v if kata_v is mapping else {}).get(key, {}) -%}
                          {%- set kata_val = kata_raw.get('value', kata_raw) if kata_raw is mapping else {} -%}
                          {%- set kata_val = (kata_val | from_json) if kata_val is string else kata_val -%}
                          {%- set gen_str  = (kata_val.get('generated', '') if kata_val is mapping else '') | default('', true) | string -%}
                          {%- set gen_ts   = as_timestamp(gen_str, 0) | int(0) -%}
                          {%- set age_min  = ((_now_ts - gen_ts) / 60) | int(9999) if gen_ts > 0 else 9999 -%}
                          {%- set tier_sort = 0 if tier in ['keeper', 'direct'] else 1 -%}
                          {%- set staleness = val.get('staleness_minutes', 1440) | int(1440) -%}
                          {%- set ns.cands = ns.cands + [{'key': key, 'tier': tier, 'tier_sort': tier_sort, 'age_min': age_min, 'staleness_minutes': staleness}] -%}
                        {%- endif -%}
                      {%- endif -%}
                    {%- endif -%}
                  {%- endfor -%}
                {%- endif -%}
                {{ ns.cands | sort(attribute='age_min', reverse=true) | sort(attribute='tier_sort') }}

          # ── Select target: starvation = must exceed s_max; drain = most stale ──
          - variables:
              _target_component: >-
                {%- set cands = _candidates if _candidates is iterable and _candidates is not string else [] -%}
                {%- if trigger.id == 'drain_starvation_check' -%}
                  {%- set ns2 = namespace(target='') -%}
                  {%- for cand in cands -%}
                    {%- if ns2.target == '' and cand.age_min >= cand.staleness_minutes -%}
                      {%- set ns2.target = cand.key -%}
                    {%- endif -%}
                  {%- endfor -%}
                  {{ ns2.target }}
                {%- else -%}
                  {{ cands[0].key if cands | length > 0 else '' }}
                {%- endif -%}

          # ── Fire force_summary for target (if found) ────────────────
          - if: "{{ _target_component | trim != '' }}"
            then:
              - event: zen_event
                event_data:
                  event:
                    kind: summary_force
                    component: "{{ _target_component }}"


  #####################################################################
  # zen_flynn_health_resummarize — Resummarize zen_system on Flynn state change
  #
  # v1.0.0
  #
  # Flynn health state changes reflect real infrastructure shifts. The
  # supersummary cycle is too slow to capture a recovery — kata stays
  # stale and the agent sees a lie. This automation fires summary_force
  # for zen_system on any state change, debounced 30s against burst.
  #####################################################################

  - id: zen_flynn_health_resummarize
    alias: Zen Flynn Health — Resummarize zen_system on state change
    description: >-
      zen_flynn_health_resummarize 1.0.0. Fires summary_force for zen_system
      whenever sensor.zen_flynn_health changes state, debounced 30s.
      Ensures kata reflects recovery (or degradation) without waiting
      for the next scheduler cycle.
    mode: single

    triggers:
      - trigger: state
        entity_id: sensor.zen_flynn_health
        for: "00:00:30"

    actions:
      - event: zen_event
        event_data:
          event:
            kind: summary_force
            component: zen_system
            reason: flynn_health_state_change
            from_state: "{{ trigger.from_state.state }}"
            to_state: "{{ trigger.to_state.state }}"


  #####################################################################
  # zen_dojotool_tool_router — Second-dimension generic dispatch
  #
  # v1.0.0 (ZenOS-AI 4.5.7)
  #
  # Receives dojotool_route events fired by the dispatcher's generic arm
  # when the tool does not need custom field-mapping. Calls the backing
  # script, fires dojotool_return with the correlated result.
  #
  # WHY:
  #   HA does not support templated action: names ("script.{{ _tool }}").
  #   The dispatcher cannot generically dispatch without explicit branches.
  #   This automation IS the expandable surface: add a new branch here
  #   (not in the dispatcher) when a new generic tool needs routing.
  #   Dispatcher choose block stays stable.
  #
  # CONTRACT:
  #   Incoming event_data.event fields: tool, version, correlation_id, payload
  #   Outgoing: zen_event(kind: dojotool_return, correlation_id, tool, result)
  #
  # ADDING A NEW TOOL: add one choose arm. No dispatcher change required.
  #####################################################################

  - id: zen_dojotool_tool_router
    alias: Zen DojoTool Tool Router
    description: >-
      Zen DojoTool Tool Router 1.0.0. Second-dimension generic dispatch layer.
      Catches dojotool_route events from the dispatcher generic arm, calls
      backing scripts explicitly (HA cannot template action names), fires
      correlated dojotool_return. Add new arms here — dispatcher stays stable.
    mode: parallel
    max: 20

    triggers:
      - trigger: event
        event_type: zen_event
        event_data:
          event:
            kind: dojotool_route

    actions:
      - variables:
          _rev:     "{{ trigger.event.data.event }}"
          _tool:    "{{ _rev.tool | default('') | trim }}"
          _ver:     "{{ _rev.version | default('1') | string | trim }}"
          _cid:     "{{ _rev.correlation_id | default('') | trim }}"
          _payload: "{{ _rev.payload | default({}) }}"
          _result:  {}

      # ── Gate: correlation_id required ─────────────────────────────────────
      - if:
        - condition: template
          value_template: "{{ _cid == '' }}"
        then:
        - stop: missing correlation_id

      # ── Tool registry ──────────────────────────────────────────────────────
      - choose:

          # ── zen_dojotools_inspect v1 ───────────────────────────────────────
          - conditions: "{{ _tool == 'zen_dojotools_inspect' and _ver | string == '1' }}"
            sequence:
              - action: script.zen_dojotools_inspect
                data:
                  entity_id:     "{{ _payload.get('entity_id', []) }}"
                  extended:      "{{ _payload.get('extended', false) }}"
                  output_fields: "{{ _payload.get('output_fields', []) }}"
                  label_targets: "{{ _payload.get('label_targets', []) }}"
                  infer:         "{{ _payload.get('infer', false) }}"
                  drawer_key:    "{{ _payload.get('drawer_key', '') }}"
                  timeout:       "{{ _payload.get('timeout', 60) }}"
                  caller_token:  "{{ _payload.get('caller_token', '') }}"
                response_variable: _result

          # ── zen_dojotools_todo v1 ──────────────────────────────────────────
          - conditions: "{{ _tool == 'zen_dojotools_todo' and _ver | string == '1' }}"
            sequence:
              - action: script.zen_dojotools_todo
                data:
                  action_type:   "{{ _payload.get('action_type', 'read') }}"
                  list_name:     "{{ _payload.get('list_name', '') }}"
                  items:         "{{ _payload.get('items', []) }}"
                  status:        "{{ _payload.get('status', 'needs_action') }}"
                  due_date:      "{{ _payload.get('due_date', '') }}"
                  description:   "{{ _payload.get('description', '') }}"
                  label_targets: "{{ _payload.get('label_targets', []) }}"
                  caller_token:  "{{ _payload.get('caller_token', '') }}"
                response_variable: _result

          # ── zen_dojotools_calendar v1 ──────────────────────────────────────
          - conditions: "{{ _tool == 'zen_dojotools_calendar' and _ver | string == '1' }}"
            sequence:
              - action: script.zen_dojotools_calendar
                data:
                  action_type:   "{{ _payload.get('action_type', 'read') }}"
                  calendar_name: "{{ _payload.get('calendar_name', '') }}"
                  start:         "{{ _payload.get('start', '') }}"
                  end:           "{{ _payload.get('end', '') }}"
                  event_id:      "{{ _payload.get('event_id', '') }}"
                  label_targets: "{{ _payload.get('label_targets', []) }}"
                  caller_token:  "{{ _payload.get('caller_token', '') }}"
                response_variable: _result

          # ── zen_admintools_summarizer_act v1 ──────────────────────────────
          - conditions: "{{ _tool == 'zen_admintools_summarizer_act' and _ver | string == '1' }}"
            sequence:
              - action: script.zen_admintools_summarizer_act
                data:
                  action_type:  "{{ _payload.get('action_type', 'list') }}"
                  event:        "{{ _payload.get('event', '') }}"
                  caller_token: "{{ _payload.get('caller_token', '') }}"
                response_variable: _result

          # ── zen_dojotools_notification_router v1 ──────────────────────────
          - conditions: "{{ _tool == 'zen_dojotools_notification_router' and _ver | string == '1' }}"
            sequence:
              - action: script.zen_dojotools_notification_router
                data:
                  title:                "{{ _payload.get('title', '') }}"
                  message:              "{{ _payload.get('message', '') }}"
                  kata_input:           "{{ _payload.get('kata_input', {}) }}"
                  notification_targets: "{{ _payload.get('notification_targets', 'Admin Devices') }}"
                  importance:           "{{ _payload.get('importance', 'default') }}"
                  breakthrough:         "{{ _payload.get('breakthrough', false) }}"
                  subject:              "{{ _payload.get('subject', '') }}"
                  tag:                  "{{ _payload.get('tag', '') }}"
                  group:                "{{ _payload.get('group', '') }}"
                  caller_token:         "{{ _payload.get('caller_token', '') }}"
                response_variable: _result

          # ── zen_dojotools_alarm_panel v1 ──────────────────────────────────
          - conditions: "{{ _tool == 'zen_dojotools_alarm_panel' and _ver | string == '1' }}"
            sequence:
              - action: script.zen_dojotools_alarm_panel
                data:
                  action:       "{{ _payload.get('action', 'read_state') }}"
                  arm_mode:     "{{ _payload.get('arm_mode', '') }}"
                  panel:        "{{ _payload.get('panel', '') }}"
                  caller_token: "{{ _payload.get('caller_token', '') }}"
                response_variable: _result

        # ── Unknown tool — structured fault ─────────────────────────────────
        default:
          - variables:
              _result:
                status: error
                error: unknown_tool
                message: "Tool Router: unknown tool '{{ _tool }}' v{{ _ver }}. Not registered."
                tool: "{{ _tool }}"
                version: "{{ _ver }}"
                correlation_id: "{{ _cid }}"

      # ── Fire correlated return ─────────────────────────────────────────────
      - event: zen_event
        event_data:
          event:
            kind: dojotool_return
            correlation_id: "{{ _cid }}"
            tool: "{{ _tool }}"
            version: "{{ _ver }}"
            result: "{{ _result }}"

