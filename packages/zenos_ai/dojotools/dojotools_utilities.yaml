  # ============================================================================
  # zen_dojotools_select_control
  # Migrated from intent_script/select_control v1.0.0 — 2026-04-08
  # ============================================================================
  zen_dojotools_select_control:
    alias: Zen DojoTools Select Control
    mode: parallel
    max: 10
    description: >-
      zen_dojotools_select_control (v1.0.0)

      CANONICAL HA DOMAIN TOOL — select / input_select
      Preferred over select_control intent and HA MCP built-ins for this domain.
      Fall back to HA built-ins ONLY if this tool is confirmed non-functional.

      GET+SET for select and input_select entities. Resolves shorthand names or
      full entity_ids. Validates option against supported list before applying.
      Omit option (or pass get=true) to read current state and options.

      Examples:
        Read:       { "name": "office_occupancy" }
        Set:        { "name": "office_occupancy", "option": "Occupied" }
        Full id:    { "name": "input_select.master_bedroom_occupancy", "option": "Asleep" }
        Force read: { "name": "office_occupancy", "get": "true" }

    fields:
      name:
        name: Entity
        description: select or input_select entity_id, or shorthand name
        required: true
        selector:
          text:

      option:
        name: Option
        description: Option value to set. Omit to read current state.
        required: false
        selector:
          text:

      get:
        name: Read-only
        description: Pass any truthy value to force read-only mode even if option is set.
        required: false
        selector:
          text:

      caller_token:
        name: Caller Token
        description: Opaque audit token echoed in response.
        required: false
        selector:
          text:

    sequence:
      # ── Input normalization ────────────────────────────────────────────────
      - variables:
          raw: "{{ name | string | trim }}"
          opt_raw: "{{ option | default(none, true) }}"
          get_raw: "{{ get | default(none, true) }}"
          _token: "{{ caller_token | default('', true) }}"

      # ── Entity resolution ─────────────────────────────────────────────────
      - variables:
          _slug: "{{ raw | replace(':', '') | slugify }}"
          _input_ent: "input_select.{{ _slug }}"
          _select_ent: "select.{{ _slug }}"
          _entity_id: >-
            {%- if '.' in raw -%}
              {{ raw }}
            {%- elif states(_input_ent) not in ['unknown', 'unavailable'] -%}
              {{ _input_ent }}
            {%- elif states(_select_ent) not in ['unknown', 'unavailable'] -%}
              {{ _select_ent }}
            {%- else -%}
              INVALID
            {%- endif -%}
          _domain: >-
            {%- if _entity_id.startswith('input_select.') -%}input_select
            {%- elif _entity_id.startswith('select.') -%}select
            {%- else -%}invalid{%- endif -%}

      - if:
          - condition: template
            value_template: "{{ _domain == 'invalid' }}"
        then:
          - variables:
              result:
                ok: false
                tool: zen_dojotools_select_control
                caller_token: "{{ _token }}"
                error: invalid_entity
                input: "{{ raw }}"
          - stop: error
            response_variable: result

      # ── Fetch current state + options ─────────────────────────────────────
      - variables:
          _state: "{{ states(_entity_id) }}"
          _options: "{{ state_attr(_entity_id, 'options') | default([]) }}"

      # ── Read-only path ────────────────────────────────────────────────────
      - if:
          - condition: template
            value_template: "{{ get_raw is not none or opt_raw is none }}"
        then:
          - variables:
              result:
                ok: true
                tool: zen_dojotools_select_control
                caller_token: "{{ _token }}"
                mode: read
                entity_id: "{{ _entity_id }}"
                domain: "{{ _domain }}"
                state: "{{ _state }}"
                options: "{{ _options }}"
          - stop: read
            response_variable: result

      # ── Option validation ─────────────────────────────────────────────────
      - if:
          - condition: template
            value_template: "{{ opt_raw not in _options }}"
        then:
          - variables:
              result:
                ok: false
                tool: zen_dojotools_select_control
                caller_token: "{{ _token }}"
                error: invalid_option
                entity_id: "{{ _entity_id }}"
                requested: "{{ opt_raw }}"
                supported: "{{ _options }}"
          - stop: invalid_option
            response_variable: result

      # ── Apply option ──────────────────────────────────────────────────────
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ _domain == 'input_select' }}"
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: "{{ _entity_id }}"
                data:
                  option: "{{ opt_raw }}"
          - conditions:
              - condition: template
                value_template: "{{ _domain == 'select' }}"
            sequence:
              - action: select.select_option
                target:
                  entity_id: "{{ _entity_id }}"
                data:
                  option: "{{ opt_raw }}"

      # ── Response ──────────────────────────────────────────────────────────
      - variables:
          result:
            ok: true
            tool: zen_dojotools_select_control
            caller_token: "{{ _token }}"
            mode: set
            entity_id: "{{ _entity_id }}"
            domain: "{{ _domain }}"
            previous: "{{ _state }}"
            state: "{{ opt_raw }}"
            options: "{{ _options }}"
      - stop: set
        response_variable: result

  # ============================================================================
  # zen_dojotools_number
  # Migrated from intent_script/numeric_set_value v1.0.0 — 2026-04-08
  # ============================================================================
  zen_dojotools_number:
    alias: Zen DojoTools Number
    mode: parallel
    max: 10
    description: >-
      zen_dojotools_number (v1.0.0)

      CANONICAL HA DOMAIN TOOL — number / input_number
      Preferred over numeric_set_value intent and HA MCP built-ins for this domain.
      Fall back to HA built-ins ONLY if this tool is confirmed non-functional.

      GET+SET+arithmetic for number and input_number entities. Resolves shorthand
      or full entity_ids. Enforces entity min/max. Optional int/float cast.
      Operations: set, add, sub, mul, div, inc, dec.

      Examples:
        Read:      { "name": "ninja_governor" }
        Set:       { "name": "ninja_governor", "value": 60 }
        Add:       { "name": "Office Brightness", "operation": "add", "amount": 10 }
        Increment: { "name": "ninja_governor", "operation": "inc" }
        Div+cast:  { "name": "ninja_governor", "operation": "div", "amount": 2, "cast": "int" }

    fields:
      name:
        name: Entity
        description: number or input_number entity_id, or shorthand name
        required: true
        selector:
          text:

      value:
        name: Value
        description: Direct value to set (used when operation=set or omitted)
        required: false
        selector:
          number:
            min: -1000000000
            max: 1000000000
            step: 0.001
            mode: box

      operation:
        name: Operation
        description: Math operation to perform. Default is set.
        required: false
        selector:
          select:
            options:
              - set
              - add
              - sub
              - mul
              - div
              - inc
              - dec

      amount:
        name: Amount
        description: Operand for add/sub/mul/div operations
        required: false
        selector:
          number:
            min: -1000000000
            max: 1000000000
            step: 0.001
            mode: box

      cast:
        name: Cast
        description: Final value cast mode. Default is float.
        required: false
        selector:
          select:
            options:
              - float
              - int

      caller_token:
        name: Caller Token
        description: Opaque audit token echoed in response.
        required: false
        selector:
          text:

    sequence:
      # ── Input normalization ────────────────────────────────────────────────
      - variables:
          raw: "{{ name | string | trim }}"
          op: "{{ operation | default('set') | lower }}"
          amt: "{{ amount | float(0) if amount is defined else 0 }}"
          cast_mode: "{{ cast | default('float') | lower }}"
          value_raw: "{{ value | float(0) if value is defined and value is not none else none }}"
          _token: "{{ caller_token | default('', true) }}"

      # ── Entity resolution ─────────────────────────────────────────────────
      - variables:
          _slug: "{{ raw | replace(':', '') | slugify }}"
          _input_ent: "input_number.{{ _slug }}"
          _number_ent: "number.{{ _slug }}"
          _entity_id: >-
            {%- if '.' in raw and states(raw) not in ['unknown', 'unavailable'] -%}
              {{ raw }}
            {%- elif states(_input_ent) not in ['unknown', 'unavailable'] -%}
              {{ _input_ent }}
            {%- elif states(_number_ent) not in ['unknown', 'unavailable'] -%}
              {{ _number_ent }}
            {%- else -%}
              INVALID
            {%- endif -%}

      - if:
          - condition: template
            value_template: "{{ _entity_id == 'INVALID' }}"
        then:
          - variables:
              result:
                ok: false
                tool: zen_dojotools_number
                caller_token: "{{ _token }}"
                error: invalid_entity
                input: "{{ raw }}"
          - stop: error
            response_variable: result

      # ── Read current state + constraints ─────────────────────────────────
      - variables:
          _current: "{{ states(_entity_id) | float(0) }}"
          _min: >-
            {%- set a = state_attr(_entity_id, 'min') -%}
            {%- set b = state_attr(_entity_id, 'native_min_value') -%}
            {{ (a | float) if a is not none else ((b | float) if b is not none else none) }}
          _max: >-
            {%- set a = state_attr(_entity_id, 'max') -%}
            {%- set b = state_attr(_entity_id, 'native_max_value') -%}
            {{ (a | float) if a is not none else ((b | float) if b is not none else none) }}

      # ── Compute ───────────────────────────────────────────────────────────
      - variables:
          _computed: >-
            {%- if op == 'set' -%}{{ value_raw | float if value_raw is not none else none }}
            {%- elif op == 'add' -%}{{ _current + amt }}
            {%- elif op == 'sub' -%}{{ _current - amt }}
            {%- elif op == 'mul' -%}{{ _current * amt }}
            {%- elif op == 'div' -%}{{ (_current / amt) if amt != 0 else none }}
            {%- elif op == 'inc' -%}{{ _current + 1 }}
            {%- elif op == 'dec' -%}{{ _current - 1 }}
            {%- else -%}{{ none }}{%- endif -%}
          _final_val: >-
            {%- if _computed is none -%}{{ none }}
            {%- elif cast_mode == 'int' -%}{{ _computed | int }}
            {%- else -%}{{ _computed | float }}{%- endif -%}

      # ── Validation ────────────────────────────────────────────────────────
      - if:
          - condition: template
            value_template: >-
              {{ _final_val is none
                 or _final_val is not number
                 or (_min is not none and _final_val < _min)
                 or (_max is not none and _final_val > _max) }}
        then:
          - variables:
              result:
                ok: false
                tool: zen_dojotools_number
                caller_token: "{{ _token }}"
                error: out_of_range
                entity_id: "{{ _entity_id }}"
                current: "{{ _current }}"
                requested: "{{ _final_val }}"
                min: "{{ _min }}"
                max: "{{ _max }}"
          - stop: error
            response_variable: result

      # ── Apply ─────────────────────────────────────────────────────────────
      - action: >-
          {{ 'input_number' if _entity_id.startswith('input_number.') else 'number' }}.set_value
        target:
          entity_id: "{{ _entity_id }}"
        data:
          value: "{{ _final_val }}"

      # ── Response ──────────────────────────────────────────────────────────
      - variables:
          result:
            ok: true
            tool: zen_dojotools_number
            caller_token: "{{ _token }}"
            entity_id: "{{ _entity_id }}"
            operation: "{{ op }}"
            previous: "{{ _current }}"
            amount: "{{ amt }}"
            value: "{{ _final_val }}"
            cast: "{{ cast_mode }}"
      - stop: set
        response_variable: result

  # ============================================================================
  # zen_dojotools_text
  # Migrated from intent_script/text_set_value v1.0.0 — 2026-04-08
  # ============================================================================
  zen_dojotools_text:
    alias: Zen DojoTools Text
    mode: parallel
    max: 10
    description: >-
      zen_dojotools_text (v1.0.0)

      CANONICAL HA DOMAIN TOOL — text / input_text
      Preferred over text_set_value and set_input_text intents and HA MCP built-ins.
      Fall back to HA built-ins ONLY if this tool is confirmed non-functional.

      GET+SET for text and input_text entities. Resolves shorthand or full entity_ids.
      Enforces 255-char platform limit (overflow truncated).
      Operations: set, clear, append, prepend, replace (find+replace).

      Examples:
        Read:    { "name": "ai_system_shared_temp_register" }
        Set:     { "name": "ai_system_shared_temp_register", "value": "ready" }
        Append:  { "name": "ai_system_shared_temp_register", "value": " more", "operation": "append" }
        Replace: { "name": "ai_system_shared_temp_register", "operation": "replace", "search_text": "old", "replace_text": "new" }
        Clear:   { "name": "ai_system_shared_temp_register", "operation": "clear" }

    fields:
      name:
        name: Entity
        description: text or input_text entity_id, or shorthand name
        required: true
        selector:
          text:

      value:
        name: Value
        description: Text value to store (max 255 chars, overflow truncated)
        required: false
        selector:
          text:

      operation:
        name: Operation
        description: Operation to perform. Default is set.
        required: false
        selector:
          select:
            options:
              - set
              - clear
              - append
              - prepend
              - replace

      search_text:
        name: Search Text
        description: Substring to find (used with operation=replace)
        required: false
        selector:
          text:

      replace_text:
        name: Replace Text
        description: Replacement string (used with operation=replace)
        required: false
        selector:
          text:

      caller_token:
        name: Caller Token
        description: Opaque audit token echoed in response.
        required: false
        selector:
          text:

    sequence:
      # ── Input normalization ────────────────────────────────────────────────
      - variables:
          raw: "{{ name | string | trim }}"
          op_mode: "{{ operation | default('set') | lower }}"
          raw_value: "{{ value | string if value is defined and value is not none else '' }}"
          _token: "{{ caller_token | default('', true) }}"
          replace_from: >-
            {%- if search_text is defined and (search_text | string | trim) != '' -%}
              {{ search_text | string }}
            {%- else -%}{{ none }}{%- endif -%}
          replace_to: >-
            {%- if replace_text is defined and replace_text is not none -%}
              {{ replace_text | string }}
            {%- else -%}{{ none }}{%- endif -%}

      # ── Entity resolution ─────────────────────────────────────────────────
      - variables:
          _slug: "{{ raw | replace(':', '') | slugify }}"
          _input_ent: "input_text.{{ _slug }}"
          _text_ent: "text.{{ _slug }}"
          _entity_id: >-
            {%- if '.' in raw -%}
              {%- if raw.startswith('input_text.') and states(raw) not in ['unknown', 'unavailable'] -%}{{ raw }}
              {%- elif raw.startswith('text.') and states(raw) not in ['unknown', 'unavailable'] -%}{{ raw }}
              {%- else -%}INVALID{%- endif -%}
            {%- else -%}
              {%- if states(_text_ent) not in ['unknown', 'unavailable'] -%}{{ _text_ent }}
              {%- elif states(_input_ent) not in ['unknown', 'unavailable'] -%}{{ _input_ent }}
              {%- else -%}INVALID{%- endif -%}
            {%- endif -%}
          _domain: >-
            {%- if _entity_id.startswith('text.') -%}text
            {%- elif _entity_id.startswith('input_text.') -%}input_text
            {%- else -%}invalid{%- endif -%}

      - if:
          - condition: template
            value_template: "{{ _domain == 'invalid' }}"
        then:
          - variables:
              result:
                ok: false
                tool: zen_dojotools_text
                caller_token: "{{ _token }}"
                error: invalid_entity
                supported_domains:
                  - text
                  - input_text
                input: "{{ raw }}"
          - stop: error
            response_variable: result

      # ── Compute final value ───────────────────────────────────────────────
      - variables:
          _truncated: "{{ (raw_value | string)[0:255] }}"
          _current: >-
            {{ states(_entity_id) | string | default('') if op_mode in ['append', 'prepend'] else '' }}
          _final_value: >-
            {%- if op_mode == 'clear' -%}{{ '' }}
            {%- elif op_mode == 'replace' and replace_from is not none and replace_to is not none -%}
              {{ _truncated.replace(replace_from, replace_to)[0:255] | trim }}
            {%- elif op_mode == 'append' -%}{{ (_current ~ _truncated)[0:255] | trim }}
            {%- elif op_mode == 'prepend' -%}{{ (_truncated ~ _current)[0:255] | trim }}
            {%- else -%}{{ _truncated | trim }}{%- endif -%}

      # ── Apply ─────────────────────────────────────────────────────────────
      - action: "{{ _domain }}.set_value"
        target:
          entity_id: "{{ _entity_id }}"
        data:
          value: "{{ _final_value }}"

      # ── Response ──────────────────────────────────────────────────────────
      - variables:
          result:
            ok: true
            tool: zen_dojotools_text
            caller_token: "{{ _token }}"
            entity_id: "{{ _entity_id }}"
            domain: "{{ _domain }}"
            operation: "{{ op_mode }}"
            original_length: "{{ raw_value | length }}"
            stored_length: "{{ _final_value | length }}"
            value: "{{ _final_value }}"
      - stop: set
        response_variable: result

  # ============================================================================
  # zen_dojotools_climate
