          set ns.d = ns.d | combine({''urgency'': importance}) %} {% endif %} {%- if
          ( quiet_hours == ''on'' or work_hours == ''on'' ) and ( breakthrough_allowed
          == ''off'' ) %} {% set ns.d = ns.d | combine({''error'': ''send blocked, use
          high importance or better and request breakthrough if appropriate.''}) %}
          {% endif %} {%- if quiet_hours is defined and quiet_hours != ''off'' %} {%
          set ns.d = ns.d | combine({''quiet_hours'': quiet_hours}) %} {% endif %} {%-
          if work_hours is defined and work_hours != ''off'' %} {% set ns.d = ns.d |
          combine({''work_hours'': work_hours}) %} {% endif %} {%- if breakthrough_allowed
          is defined and breakthrough_allowed != ''off'' %} {% set ns.d = ns.d | combine({''breakthrough_allowed'':
          breakthrough_allowed}) %} {% endif %}   {%- if data is defined and data !=
          none %} {% set ns.d = ns.d | combine({''data'': data}) %} {% endif %} {{ ns.d
          }}'
    - variables:
        result: "{{ result | combine({'caller_token': caller_token}) if result is mapping else result }}"
