  zen_dojotools_help:
    alias: Zen DojoTools Help
    description: >-
      Zen DojoTools Help (2.0.0). Returns a live ZenOS-AI system overview:
      architecture, design principles, Pantheon roster, module list, escalation
      contacts, and a live inventory of zen-labelled scripts on this install.
    mode: single
    icon: mdi:robot
    fields:
      action:
        name: Action
        description: "'about' — returns system overview and live script inventory."
        selector:
          select:
            options:
              - about
        default: about
      caller_token:
        name: Caller Token
        description: Opaque token passed through by the caller for correlation. Not interpreted by this script.
        required: false
        selector:
          text:
    sequence:
    # --------------------------------------------------------------
    # Always normalize User/AI inputs so we don't have to react JIT
    # --------------------------------------------------------------
    - variables:
        caller_token: "{{- caller_token | default('') -}}"

    - variables:
        tool_version: "4.5.x"
        os_version: "4.5.x"
        action: about
        about_text: |-
          ZenOS-AI — modular, local-first AI home automation framework on Home
          Assistant. Combines local inference, structured memory (Cabinets), a
          multi-persona AI team (The Pantheon), and a deterministic Jinja prompt engine.

          Architecture
          Ring-0: Cabinet system (14 trigger-based template sensors for persistent
            K/V storage), label health validators, Flynn bootloader (gate validation,
            label provisioning, schema CRUD).
          Prompt Engine: zen_os_1.jinja — 11-stage Jinja compilation pipeline:
            identity → essence → system → manifest → index → dojo → capsule → wake.
          DojoTools: AI tool suite — utilities, comms, data, summarizer, AI, admin.
          Plugins: Mealie (recipes/meal planning), Grocy (inventory/chores),
            Kitchen Sync (Mealie↔Grocy bridge), Firefly III (finance), Wiki.js.
          Room Manager: label-intersection state machine — 7 states:
            override → asleep → occupied → active → wasp → idle_dark → inactive.
          Kung Fu Components (KF4): The atomic unit of contextual intelligence.
            Each KFC owns a domain of the home. The dojo drawer IS the component spec.
            The label IS the scope. The HyperIndex IS the data layer. Monks read the
            drawer brief, traverse the label graph, interpret entity semantics, and
            write kata. No hardcoded branches. No library commands. Self-describing
            and self-discovering. Read the canon key 'kung_fu' in the dojo for the
            full component contract. Register a component: press dojo drawer via
            KungFu Writer → apply label → tag entities → add trigger_subscriptions.
            Dry-run a component: force_summary (post=false) → review monk output.
          Summarizer pipeline: Scheduler reads dojo → dispatches Ninja Summarizer
            per subscribed KFC → monk reads drawer + HyperIndex → writes kata →
            SuperSummary synthesizes all kata → zen_summary → Friday.
            Staleness: 15-min warn, 30-min critical.
          Health stack: zen_label_health, zen_cabinet_health, zen_monastery_health,
            zen_agent_health (states: critical / error / warn / ok).

          Design Principles
          - Label exposure is transformational: labels are first-class in all prompts.
          - Absence is information: always return [] or 'none' for empty results.
          - Context over model power: rich context beats raw capability.
          - Voice-first: target ~150 tokens, no markdown in voice output.
          - Self-documenting tools: every tool includes parameters, description,
            output format, and next-step guidance.
          - Token conservation: inference is precious — minimize tool calls.

          Safety Notes
          Life-safety systems (smoke, CO, water shutoff): immediate human
          notification only. Never act autonomously. Override requires explicit
          owner authorization.
          Security events: notify owner immediately.
          Cabinet ACLs (owner / partner / family) enforced at the tool layer.

          Maintenance
          Flynn Stepgate Sentinel and health sensors run continuously.
          After any YAML edit: run 'ha core check' or check Settings → Repairs.

          Diagnostics
          Something wrong? Start with zen_dojotools_systemtools tool=zen_health_report.
          One call returns all 7 resolver states, all 5 health sensors, kill switches,
          schema status, timestamps, monk status, and a plain-English diagnosis.
          If reloads don't fix it — restart HA (ha_restart). She'll find her way around.
        contacts:
          maintainer: Nathan Curtis
          project: ZenOS-AI (Friday / Zen DojoTools)
          repository: https://github.com/nathan-curtis/zenos-ai
          community: https://community.home-assistant.io/t/fridays-party-creating-a-private-agentic-ai-using-voice-assistant-tools/855862
          license: MIT
          pantheon:
            Friday: Chief Enlightenment Officer — coordination and cognition
            Veronica: Snarky Supervisor — orchestration and clarity
            Kronk: Curator of the Monastery — context management and kata curation
            Rosie: Mistress of Cleanliness — state management and logging
            High Priestess: Divine Automation Overseer — deep reasoning and data validation
          modules:
            - Ring-0 core (cabinets, label health, Flynn bootloader)
            - Prompt Engine (zen_os_1.jinja, 11-stage Jinja compilation)
            - DojoTools suite (utilities, comms, data, summarizer, AI, admin)
            - Plugins (Mealie, Grocy, Kitchen Sync, Firefly III, Wiki.js)
            - Room Manager (label-intersection state machine)
            - Kung Fu Components KF4 (label=scope, drawer=spec, HyperIndex=data)
            - Summarizer pipeline (Scheduler → Ninja per KFC → SuperSummary → Kata → Friday)
            - Health sensors (label, cabinet, monastery, agent gates)
          escalation:
            security: Notify system owner immediately.
            life_safety: >-
              Notify system owner immediately. Never act autonomously on
              life-safety systems (smoke, CO, water main shutoff). Override
              requires explicit owner authorization.
            critical_issues: File an issue or PR at the repository URL above.
        zen_data: "{% set scripts = label_entities('zen') | select('match', 'script[.]') | list %}{% set ns = namespace(d={}) %}{% for s in scripts %}{% set ns.d = ns.d | combine({s: state_attr(s, 'friendly_name') | default(s)}) %}{% endfor %}{{ ns.d | tojson | from_json }}"
    - variables:
        about_response: >-
          {{
            {
              "action": action | default("about"),
              "tool_version": tool_version,
              "os_version": os_version,
              "zen_inventory": zen_data | default({}),
              "about_text": about_text | default(""),
              "contacts": contacts | default({})
            }
          }}
    - variables:
        about_response: "{{ about_response | combine({'caller_token': caller_token}) if about_response is mapping else about_response }}"
    - stop: Return About Response
      response_variable: about_response

  zen_dojotools_wait:
    sequence:
    # --------------------------------------------------------------
    # Always normalize User/AI inputs so we don't have to react JIT
    # --------------------------------------------------------------
    - variables:
        caller_token: "{{- caller_token | default('') -}}"

    - delay:
        hours: 0
        minutes: 0
        seconds: '{{ duration | default(15) }} '
        milliseconds: 0
    - variables:
        _wait_response:
          status: success
          message: '{{ duration }} second wait complete'
          caller_token: '{{ caller_token }}'
    - stop: done
      response_variable: _wait_response
    fields:
      duration:
        selector:
          number:
            min: 1
            max: 120
            step: 1
        name: Duration
        description: Duration to wait in seconds. Default, 15 seconds.
        default: 15
        required: true
      caller_token:
        name: Caller Token
        description: Opaque token passed through by the caller for correlation. Not interpreted by this script.
        required: false
        selector:
          text:
    alias: Zen DojoTools Wait
    description: 'Use this tool to insert a timed delay of 1–120 seconds (default: 15)
      between actions in a conversation or chained tool call. Useful for narrative pacing,
      suspense, or waiting on a timed task. After the delay, the conversation or sequence
      resumes automatically. Example: ''Wait 30 seconds, then speak'' or ''Pause 10
      seconds, then continue.'' Returns a short message: ''Waited X second(s).'' Use
      for dramatic effect or execution timing.'
    icon: mdi:home-clock

  dojotools_volume_auditor:
    alias: DojoTools Volume Auditor
    mode: parallel
    icon: mdi:clipboard-text-search-outline
    description: 'Scans known Cabinet Volumes, filters by labels, and reports which
      are inaccessible with reasons. Does NOT modify anything. Output is a JSON object:
      { scanned: n, accessible: [...], issues: {...} }

      '
    fields:
      required_labels:
        description: Comma- or space-separated labels to match (case-insensitive). Leave
          blank for any.
        selector:
          text:
            multiple: false
        required: true
        default: cabinet
      require_all:
        description: Require ALL labels to match (otherwise ANY).
        selector:
          boolean:
        default: false
      include_hidden:
        description: Include hidden/system volumes in scan.
        selector:
          boolean:
        default: false
      caller_token:
        name: Caller Token
        description: Opaque token passed through by the caller for correlation. Not interpreted by this script.
        required: false
        selector:
          text:
    sequence:
    # --------------------------------------------------------------
    # Always normalize User/AI inputs so we don't have to react JIT
    # --------------------------------------------------------------
    - variables:
        caller_token: "{{- caller_token | default('') -}}"

    - variables:
        _labels_in: >-
          {%- set raw = (required_labels | default('')) | replace(',', ' ') | trim -%}
          {%- set toks = raw | regex_findall('[^\s]+') -%}
          {{ toks | map('lower') | list | tojson }}
        _require_all: '{{ require_all | default(false) }}'
        _include_hidden: '{{ include_hidden | default(false) }}'
        _filtered: >-
          {%- set cabs = label_entities('zen_cabinet') | select('match', '^sensor\.') | list -%}
          {%- set ns = namespace(out=[]) -%}
          {%- for e in cabs -%}
            {%- set vars = state_attr(e, 'variables') -%}
            {%- if vars is mapping -%}
              {%- set vi_raw = vars.get('AI_Cabinet_VolumeInfo') -%}
              {%- set vi = vi_raw.get('value', vi_raw) if vi_raw is mapping else none -%}
              {%- if vi is mapping -%}
                {%- set hidden = vi.get('flags', {}).get('hidden', false) or e.startswith('sensor._') -%}
                {%- if (not hidden) or _include_hidden -%}
                  {%- set labels1 = vi.get('entity_labels', []) | map('lower') | list -%}
                  {%- set li_raw = vars.get('_label_index') -%}
                  {%- set li = li_raw.get('value', li_raw) if li_raw is mapping else {} -%}
                  {%- set labels2 = li.keys() | list | map('lower') | list if li is mapping else [] -%}
                  {%- set labset = (labels1 + labels2) | unique | list -%}
                  {%- if _labels_in | length == 0 -%}
                    {%- set ok = true -%}
                  {%- elif _require_all -%}
                    {%- set ok = (_labels_in | difference(labset) | length == 0) -%}
                  {%- else -%}
                    {%- set ok = (_labels_in | select('in', labset) | list | length > 0) -%}
                  {%- endif -%}
                  {%- if ok -%}{%- set ns.out = ns.out + [e] -%}{%- endif -%}
                {%- endif -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
          {{ ns.out | tojson }}
    - variables:
        _accessible: >-
          {%- set ns = namespace(acc=[]) -%}
          {%- for e in _filtered -%}
            {%- if states(e) not in ['unknown', 'unavailable'] -%}
              {%- set ns.acc = ns.acc + [e] -%}
            {%- endif -%}
          {%- endfor -%}
          {{ ns.acc | tojson }}
        _issues: >-
          {%- set ns = namespace(iss={}) -%}
          {%- for e in _filtered -%}
            {%- if states(e) in ['unknown', 'unavailable'] -%}
              {%- set ns.iss = ns.iss | combine({e: {'reason': states(e)}}) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ ns.iss | tojson }}
        _report:
          scanned: "{{ _filtered | length }}"
          accessible: "{{ _accessible | tojson }}"
          issues: "{{ _issues | tojson }}"
    - variables:
        final_response:
          status: success
          message: Volume audit complete
          result: '{{ _report }}'
          caller_token: '{{ caller_token }}'
    - stop: done
      response_variable: final_response

