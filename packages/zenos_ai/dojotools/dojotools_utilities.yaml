          fan_raw: "{{ fan_mode | default(none, true) }}"
          swing_raw: "{{ swing_mode | default(none, true) }}"
          preset_raw: "{{ preset | default(none, true) }}"
          humidity_raw: "{{ humidity | default(none, true) }}"
          aux_raw: "{{ aux_heat | default(none, true) }}"
          power_raw: "{{ power | default(none, true) }}"
          get_raw: "{{ get | default(none, true) }}"
          _token: "{{ caller_token | default('', true) }}"
          r_temp_status: null
          r_range_status: null
          r_hvac_status: null
          r_fan_status: null
          r_swing_status: null
          r_preset_status: null
          r_humidity_status: null
          r_aux_status: null
          r_power_status: null

      # ── Entity resolution ─────────────────────────────────────────────────
      - variables:
          _slug: "{{ raw | replace(':', '') | slugify }}"
          _entity_id: >-
            {%- if '.' in raw -%}{{ raw }}
            {%- elif states('climate.' ~ _slug) not in ['unknown', 'unavailable'] -%}climate.{{ _slug }}
            {%- else -%}{{ raw }}{%- endif -%}

      - if:
          - condition: template
            value_template: "{{ states(_entity_id) in ['unknown', 'unavailable'] }}"
        then:
          - variables:
              result:
                ok: false
                tool: zen_dojotools_climate
                caller_token: "{{ _token }}"
                error: not_found
                input: "{{ raw }}"
          - stop: error
            response_variable: result

      # ── Read capabilities ─────────────────────────────────────────────────
      - variables:
          cur_temp: "{{ state_attr(_entity_id, 'current_temperature') }}"
          cur_humidity: "{{ state_attr(_entity_id, 'current_humidity') }}"
          tgt_temp: "{{ state_attr(_entity_id, 'temperature') }}"
          tgt_humidity: "{{ state_attr(_entity_id, 'humidity') }}"
          low_temp: "{{ state_attr(_entity_id, 'target_temp_low') }}"
          high_temp: "{{ state_attr(_entity_id, 'target_temp_high') }}"
          min_temp: "{{ state_attr(_entity_id, 'min_temp') }}"
          max_temp: "{{ state_attr(_entity_id, 'max_temp') }}"
          min_humidity: "{{ state_attr(_entity_id, 'min_humidity') }}"
          max_humidity: "{{ state_attr(_entity_id, 'max_humidity') }}"
          hvac_cur: "{{ state_attr(_entity_id, 'hvac_mode') }}"
          hvac_action: "{{ state_attr(_entity_id, 'hvac_action') }}"
          hvac_modes: "{{ (state_attr(_entity_id, 'hvac_modes') or []) | map(attribute='value') | list }}"
          fan_cur: "{{ state_attr(_entity_id, 'fan_mode') }}"
          fan_modes: "{{ state_attr(_entity_id, 'fan_modes') or [] }}"
          swing_cur: "{{ state_attr(_entity_id, 'swing_mode') }}"
          swing_modes: "{{ state_attr(_entity_id, 'swing_modes') or [] }}"
          preset_cur: "{{ state_attr(_entity_id, 'preset_mode') }}"
          preset_modes: "{{ state_attr(_entity_id, 'preset_modes') or [] }}"
          aux_cur: "{{ state_attr(_entity_id, 'aux_heat') }}"
          can_temp: "{{ tgt_temp is not none }}"
          can_range: "{{ low_temp is not none and high_temp is not none }}"
          can_hvac: "{{ hvac_modes | length > 0 }}"
          can_fan: "{{ fan_modes | length > 0 }}"
          can_swing: "{{ swing_modes | length > 0 }}"
          can_preset: "{{ preset_modes | length > 0 }}"
          can_humidity: "{{ min_humidity is not none }}"
          can_aux_heat: "{{ aux_cur is not none }}"
          can_off: "{{ 'off' in hvac_modes }}"
          can_on: "{{ hvac_modes | reject('equalto', 'off') | list | length > 0 }}"

      # ── GET mode ──────────────────────────────────────────────────────────
      - if:
          - condition: template
            value_template: >-
              {{ get_raw is not none
                 or (temperature_raw is none and low_raw is none and high_raw is none
                     and hvac_raw is none and fan_raw is none and swing_raw is none
                     and preset_raw is none and humidity_raw is none
                     and aux_raw is none and power_raw is none) }}
        then:
          - variables:
              result:
                ok: true
                tool: zen_dojotools_climate
                caller_token: "{{ _token }}"
                mode: read
                entity_id: "{{ _entity_id }}"
                state:
                  hvac_mode: "{{ hvac_cur }}"
                  hvac_action: "{{ hvac_action }}"
                  current_temperature: "{{ cur_temp }}"
                  temperature: "{{ tgt_temp }}"
                  target_low: "{{ low_temp }}"
                  target_high: "{{ high_temp }}"
                  fan_mode: "{{ fan_cur }}"
                  swing_mode: "{{ swing_cur }}"
                  preset_mode: "{{ preset_cur }}"
                  current_humidity: "{{ cur_humidity }}"
                  target_humidity: "{{ tgt_humidity }}"
                  aux_heat: "{{ aux_cur }}"
                capabilities:
                  hvac_modes: "{{ hvac_modes }}"
                  fan_modes: "{{ fan_modes }}"
                  swing_modes: "{{ swing_modes }}"
                  preset_modes: "{{ preset_modes }}"
                  min_temp: "{{ min_temp }}"
                  max_temp: "{{ max_temp }}"
                  min_humidity: "{{ min_humidity }}"
                  max_humidity: "{{ max_humidity }}"
                  can_temp: "{{ can_temp }}"
                  can_range: "{{ can_range }}"
                  can_hvac: "{{ can_hvac }}"
                  can_fan: "{{ can_fan }}"
                  can_swing: "{{ can_swing }}"
                  can_preset: "{{ can_preset }}"
                  can_humidity: "{{ can_humidity }}"
                  can_aux_heat: "{{ can_aux_heat }}"
                  can_on: "{{ can_on }}"
                  can_off: "{{ can_off }}"
          - stop: read
            response_variable: result

      # ── Power ─────────────────────────────────────────────────────────────
      - if:
          - condition: template
            value_template: "{{ power_raw is not none }}"
        then:
          - if:
              - condition: template
                value_template: "{{ power_raw | lower == 'off' and not can_off }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_climate
                    caller_token: "{{ _token }}"
                    error: unsupported_feature
                    feature: power_off
              - stop: error
                response_variable: result
          - if:
              - condition: template
                value_template: "{{ power_raw | lower == 'on' and not can_on }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_climate
                    caller_token: "{{ _token }}"
                    error: unsupported_feature
                    feature: power_on
              - stop: error
                response_variable: result
          - action: climate.set_hvac_mode
            target:
              entity_id: "{{ _entity_id }}"
            data:
              hvac_mode: >-
                {{ 'off' if power_raw | lower == 'off'
                   else (hvac_modes | reject('equalto', 'off') | first) }}
          - variables:
              r_power_status: ok

      # ── HVAC mode ─────────────────────────────────────────────────────────
      - if:
          - condition: template
            value_template: "{{ hvac_raw is not none }}"
        then:
          - if:
              - condition: template
                value_template: "{{ hvac_raw not in hvac_modes }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_climate
                    caller_token: "{{ _token }}"
                    error: invalid_hvac_mode
                    requested: "{{ hvac_raw }}"
                    supported: "{{ hvac_modes }}"
              - stop: error
                response_variable: result
          - action: climate.set_hvac_mode
            target:
              entity_id: "{{ _entity_id }}"
            data:
              hvac_mode: "{{ hvac_raw }}"
          - variables:
              r_hvac_status: ok

      # ── Fan mode ──────────────────────────────────────────────────────────
      - if:
          - condition: template
            value_template: "{{ fan_raw is not none }}"
        then:
          - if:
              - condition: template
                value_template: "{{ not can_fan or fan_raw not in fan_modes }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_climate
                    caller_token: "{{ _token }}"
                    error: invalid_fan_mode
                    requested: "{{ fan_raw }}"
                    supported: "{{ fan_modes }}"
              - stop: error
                response_variable: result
          - action: climate.set_fan_mode
            target:
              entity_id: "{{ _entity_id }}"
            data:
              fan_mode: "{{ fan_raw }}"
          - variables:
              r_fan_status: ok

      # ── Swing mode ────────────────────────────────────────────────────────
      - if:
          - condition: template
            value_template: "{{ swing_raw is not none }}"
        then:
          - if:
              - condition: template
                value_template: "{{ not can_swing or swing_raw not in swing_modes }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_climate
                    caller_token: "{{ _token }}"
                    error: invalid_swing_mode
                    requested: "{{ swing_raw }}"
                    supported: "{{ swing_modes }}"
              - stop: error
                response_variable: result
          - action: climate.set_swing_mode
            target:
              entity_id: "{{ _entity_id }}"
            data:
              swing_mode: "{{ swing_raw }}"
          - variables:
              r_swing_status: ok

      # ── Preset ────────────────────────────────────────────────────────────
      - if:
          - condition: template
            value_template: "{{ preset_raw is not none }}"
        then:
          - if:
              - condition: template
                value_template: "{{ not can_preset or preset_raw not in preset_modes }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_climate
                    caller_token: "{{ _token }}"
                    error: invalid_preset
                    requested: "{{ preset_raw }}"
                    supported: "{{ preset_modes }}"
              - stop: error
                response_variable: result
          - action: climate.set_preset_mode
            target:
              entity_id: "{{ _entity_id }}"
            data:
              preset_mode: "{{ preset_raw }}"
          - variables:
              r_preset_status: ok

      # ── Temperature (single) ──────────────────────────────────────────────
      - if:
          - condition: template
            value_template: "{{ temperature_raw is not none }}"
        then:
          - if:
              - condition: template
                value_template: "{{ not can_temp }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_climate
                    caller_token: "{{ _token }}"
                    error: unsupported_feature
                    feature: temperature
              - stop: error
                response_variable: result
          - action: climate.set_temperature
            target:
              entity_id: "{{ _entity_id }}"
            data:
              temperature: "{{ temperature_raw | float }}"
          - variables:
              r_temp_status: ok

      # ── Temperature range ─────────────────────────────────────────────────
      - if:
          - condition: template
            value_template: "{{ low_raw is not none and high_raw is not none }}"
        then:
          - if:
              - condition: template
                value_template: "{{ not can_range }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_climate
                    caller_token: "{{ _token }}"
                    error: unsupported_feature
                    feature: temperature_range
              - stop: error
                response_variable: result
          - action: climate.set_temperature
            target:
              entity_id: "{{ _entity_id }}"
            data:
              target_temp_low: "{{ low_raw | float }}"
              target_temp_high: "{{ high_raw | float }}"
          - variables:
              r_range_status: ok

      # ── Humidity ──────────────────────────────────────────────────────────
      - if:
          - condition: template
            value_template: "{{ humidity_raw is not none }}"
        then:
          - if:
              - condition: template
                value_template: "{{ not can_humidity }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_climate
                    caller_token: "{{ _token }}"
                    error: unsupported_feature
                    feature: humidity
              - stop: error
                response_variable: result
          - action: climate.set_humidity
            target:
              entity_id: "{{ _entity_id }}"
            data:
              humidity: "{{ humidity_raw | int }}"
          - variables:
              r_humidity_status: ok

      # ── Aux heat ──────────────────────────────────────────────────────────
      - if:
          - condition: template
            value_template: "{{ aux_raw is not none }}"
        then:
          - if:
              - condition: template
                value_template: "{{ not can_aux_heat }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_climate
                    caller_token: "{{ _token }}"
                    error: unsupported_feature
                    feature: aux_heat
              - stop: error
                response_variable: result
          - action: climate.set_aux_heat
            target:
              entity_id: "{{ _entity_id }}"
            data:
              aux_heat: "{{ aux_raw | lower in ['on', 'true', '1', 'yes'] }}"
          - variables:
              r_aux_status: ok

      # ── Response ──────────────────────────────────────────────────────────
      - variables:
          result:
            ok: true
            tool: zen_dojotools_climate
            caller_token: "{{ _token }}"
            mode: set
            entity_id: "{{ _entity_id }}"
            applied:
              temperature: "{{ r_temp_status }}"
              range: "{{ r_range_status }}"
              hvac_mode: "{{ r_hvac_status }}"
              fan_mode: "{{ r_fan_status }}"
              swing_mode: "{{ r_swing_status }}"
              preset: "{{ r_preset_status }}"
              humidity: "{{ r_humidity_status }}"
              aux_heat: "{{ r_aux_status }}"
              power: "{{ r_power_status }}"
            capabilities:
              hvac_modes: "{{ hvac_modes }}"
              fan_modes: "{{ fan_modes }}"
              swing_modes: "{{ swing_modes }}"
              preset_modes: "{{ preset_modes }}"
      - stop: set
        response_variable: result

  # ============================================================================
  # zen_dojotools_water_heater
  # Migrated from intent_script/water_heater_set — 2026-04-08
  # Fixes: can_off bug (was bit 4, is ON_OFF bit 3), added current_temperature
  #        and state to GET response, unified response_variable, clean resolution
  # ============================================================================
  zen_dojotools_water_heater:
    alias: Zen DojoTools Water Heater
    mode: parallel
    max: 10
    description: >-
      zen_dojotools_water_heater (v1.0.0)

      CANONICAL HA DOMAIN TOOL — water_heater
      Preferred over water_heater_set intent and HA MCP built-ins for this domain.
      Fall back to HA built-ins ONLY if this tool is confirmed non-functional.

      GET+SET for water_heater entities. Inspects supported_features before applying —
      fails closed on unsupported feature. Supports: temperature (clamped to min/max),
      operation mode, away mode, power. Multiple setters may be sent in one call.
      Omit all setters to read state and capabilities.

      Examples:
        Read:  { "name": "water_heater.home" }
        Temp:  { "name": "water_heater.home", "temperature": 120 }
        Mode:  { "name": "water_heater.home", "mode": "eco" }
        Away:  { "name": "water_heater.home", "away": "on" }
        Off:   { "name": "water_heater.home", "power": "off" }

    fields:
      name:
        name: Entity
        description: water_heater entity_id or shorthand name
        required: true
        selector:
          entity:
            domain: water_heater

      temperature:
        name: Temperature
        description: Target temperature. Clamped to entity min/max.
        required: false
        selector:
          number:
            min: 1
            max: 200
            step: 1
            mode: box

      mode:
        name: Operation Mode
        description: Operation mode — use get first to see supported modes
        required: false
        selector:
          text:

      away:
        name: Away Mode
        description: Away mode state — on or off
        required: false
        selector:
          text:

      power:
        name: Power
        description: Power control — on or off
        required: false
        selector:
          text:

      get:
        name: Read Only
        description: Pass any truthy value to force read-only mode
        required: false
        selector:
          text:

      caller_token:
        name: Caller Token
        description: Opaque audit token echoed in response.
        required: false
        selector:
          text:

    sequence:
      # ── Input normalization ────────────────────────────────────────────────
      - variables:
          raw: "{{ name | string | trim }}"
          temperature_raw: "{{ temperature | default(none, true) }}"
          mode_raw: "{{ mode | default(none, true) }}"
          away_raw: "{{ away | default(none, true) }}"
          power_raw: "{{ power | default(none, true) }}"
          get_raw: "{{ get | default(none, true) }}"
          _token: "{{ caller_token | default('', true) }}"
          r_temp_req: null
          r_temp_applied: null
          r_temp_status: null
          r_mode_status: null
          r_away_status: null
          r_power_status: null

      # ── Entity resolution ─────────────────────────────────────────────────
      - variables:
          _slug: "{{ raw | replace(':', '') | slugify }}"
          _entity_id: >-
            {%- if '.' in raw -%}{{ raw }}
            {%- elif states('water_heater.' ~ _slug) not in ['unknown', 'unavailable'] -%}water_heater.{{ _slug }}
            {%- else -%}{{ raw }}{%- endif -%}

      - if:
          - condition: template
            value_template: >-
              {{ not _entity_id.startswith('water_heater.')
                 or states(_entity_id) in ['unknown', 'unavailable'] }}
        then:
          - variables:
              result:
                ok: false
                tool: zen_dojotools_water_heater
                caller_token: "{{ _token }}"
                error: not_found
                input: "{{ raw }}"
          - stop: error
            response_variable: result

      # ── Read capabilities ─────────────────────────────────────────────────
      - variables:
          wh_state: "{{ states(_entity_id) }}"
          wh_cur_temp: "{{ state_attr(_entity_id, 'current_temperature') }}"
          wh_temp: "{{ state_attr(_entity_id, 'temperature') }}"
          wh_min: "{{ state_attr(_entity_id, 'min_temp') }}"
          wh_max: "{{ state_attr(_entity_id, 'max_temp') }}"
          wh_mode: "{{ state_attr(_entity_id, 'operation_mode') }}"
          wh_ops: "{{ state_attr(_entity_id, 'operation_list') | default([]) }}"
          wh_away: "{{ state_attr(_entity_id, 'away_mode') }}"
          wh_sf: "{{ state_attr(_entity_id, 'supported_features') | int(0) }}"
          # WaterHeaterEntityFeature bitmask: TARGET_TEMPERATURE=1, OPERATION_MODE=2, AWAY_MODE=4, ON_OFF=8
          can_temp: "{{ (wh_sf // 1) % 2 == 1 }}"
          can_mode: "{{ (wh_sf // 2) % 2 == 1 }}"
          can_away: "{{ (wh_sf // 4) % 2 == 1 }}"
          can_power: "{{ (wh_sf // 8) % 2 == 1 }}"

      # ── GET mode ──────────────────────────────────────────────────────────
      - if:
          - condition: template
            value_template: >-
              {{ get_raw is not none
                 or (temperature_raw is none and mode_raw is none
                     and away_raw is none and power_raw is none) }}
        then:
          - variables:
              result:
                ok: true
                tool: zen_dojotools_water_heater
                caller_token: "{{ _token }}"
                mode: read
                entity_id: "{{ _entity_id }}"
                state:
                  state: "{{ wh_state }}"
                  current_temperature: "{{ wh_cur_temp }}"
                  temperature: "{{ wh_temp }}"
                  operation_mode: "{{ wh_mode }}"
                  away_mode: "{{ wh_away }}"
                capabilities:
                  operation_list: "{{ wh_ops }}"
                  min_temp: "{{ wh_min }}"
                  max_temp: "{{ wh_max }}"
                  supported_features: "{{ wh_sf }}"
                  can_temp: "{{ can_temp }}"
                  can_mode: "{{ can_mode }}"
                  can_away: "{{ can_away }}"
                  can_power: "{{ can_power }}"
          - stop: read
            response_variable: result

      # ── Power ─────────────────────────────────────────────────────────────
      - if:
          - condition: template
            value_template: "{{ power_raw is not none }}"
        then:
          - if:
              - condition: template
                value_template: "{{ not can_power }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_water_heater
                    caller_token: "{{ _token }}"
                    error: unsupported_feature
                    feature: power
              - stop: error
                response_variable: result
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ power_raw | lower in ['on', 'true', '1', 'yes'] }}"
                sequence:
                  - action: water_heater.turn_on
                    target:
                      entity_id: "{{ _entity_id }}"
              - conditions:
                  - condition: template
                    value_template: "{{ power_raw | lower in ['off', 'false', '0', 'no'] }}"
                sequence:
                  - action: water_heater.turn_off
                    target:
                      entity_id: "{{ _entity_id }}"
          - variables:
              r_power_status: ok

      # ── Temperature ───────────────────────────────────────────────────────
      - if:
          - condition: template
            value_template: "{{ temperature_raw is not none }}"
        then:
          - if:
              - condition: template
                value_template: "{{ not can_temp }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_water_heater
                    caller_token: "{{ _token }}"
                    error: unsupported_feature
                    feature: temperature
              - stop: error
                response_variable: result
          - variables:
              r_temp_req: "{{ temperature_raw | float }}"
              r_temp_applied: >-
                {%- set t = temperature_raw | float -%}
                {%- if wh_min is not none and t < (wh_min | float) -%}{{ wh_min | float }}
                {%- elif wh_max is not none and t > (wh_max | float) -%}{{ wh_max | float }}
                {%- else -%}{{ t }}{%- endif -%}
              r_temp_status: >-
                {%- set t = temperature_raw | float -%}
                {%- if wh_min is not none and t < (wh_min | float) -%}clamped_low
                {%- elif wh_max is not none and t > (wh_max | float) -%}clamped_high
                {%- else -%}ok{%- endif -%}
          - action: water_heater.set_temperature
            target:
              entity_id: "{{ _entity_id }}"
            data:
              temperature: "{{ r_temp_applied }}"

      # ── Operation mode ────────────────────────────────────────────────────
      - if:
          - condition: template
            value_template: "{{ mode_raw is not none }}"
        then:
          - if:
              - condition: template
                value_template: "{{ not can_mode }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_water_heater
                    caller_token: "{{ _token }}"
                    error: unsupported_feature
                    feature: operation_mode
              - stop: error
                response_variable: result
          - if:
              - condition: template
                value_template: "{{ mode_raw not in wh_ops }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_water_heater
                    caller_token: "{{ _token }}"
                    error: invalid_mode
                    requested: "{{ mode_raw }}"
                    supported: "{{ wh_ops }}"
              - stop: error
                response_variable: result
          - action: water_heater.set_operation_mode
            target:
              entity_id: "{{ _entity_id }}"
            data:
              operation_mode: "{{ mode_raw }}"
          - variables:
              r_mode_status: ok

      # ── Away mode ─────────────────────────────────────────────────────────
      - if:
          - condition: template
            value_template: "{{ away_raw is not none }}"
        then:
          - if:
              - condition: template
                value_template: "{{ not can_away }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_water_heater
                    caller_token: "{{ _token }}"
                    error: unsupported_feature
                    feature: away_mode
              - stop: error
                response_variable: result
          - action: water_heater.set_away_mode
            target:
              entity_id: "{{ _entity_id }}"
            data:
              away_mode: "{{ away_raw | lower in ['on', 'true', '1', 'yes'] }}"
          - variables:
              r_away_status: ok

      # ── Response ──────────────────────────────────────────────────────────
      - variables:
          result:
            ok: true
            tool: zen_dojotools_water_heater
            caller_token: "{{ _token }}"
            mode: set
            entity_id: "{{ _entity_id }}"
            applied:
              temperature:
                requested: "{{ r_temp_req }}"
                applied: "{{ r_temp_applied }}"
                status: "{{ r_temp_status }}"
              operation_mode: "{{ r_mode_status }}"
              away_mode: "{{ r_away_status }}"
              power: "{{ r_power_status }}"
            capabilities:
              operation_list: "{{ wh_ops }}"
              can_temp: "{{ can_temp }}"
              can_mode: "{{ can_mode }}"
              can_away: "{{ can_away }}"
              can_power: "{{ can_power }}"
      - stop: set
        response_variable: result

  # ============================================================================
  # zen_dojotools_datetime
  # Migrated from intent_script/input_datetime_set_datetime — 2026-04-08
  # Improvements: proper entity resolution, structured response, caller_token
  # ============================================================================
  zen_dojotools_datetime:
    alias: Zen DojoTools Datetime
    mode: parallel
    max: 10
    description: >-
      zen_dojotools_datetime (v1.0.0)

      CANONICAL HA DOMAIN TOOL — input_datetime
      Preferred over input_datetime_set_datetime intent and HA MCP built-ins.
      Fall back to HA built-ins ONLY if this tool is confirmed non-functional.

      GET+SET for input_datetime entities. Resolves shorthand or full entity_ids.
      Accepts any datetime string parseable by as_datetime() including ISO 8601
      with timezone offset. GET response includes has_date/has_time flags.
      Omit value (or pass get=true) to read current state.

      Examples:
        Read:      { "name": "daytime_start" }
        Set (ISO): { "name": "daytime_start", "value": "2026-04-08T07:00:00-06:00" }
        Set (date): { "name": "daytime_start", "value": "2026-04-08" }

    fields:
      name:
        name: Entity
        description: input_datetime entity_id or shorthand name
        required: true
        selector:
          text:

      value:
        name: Value
        description: Datetime string to set (ISO 8601 recommended). Omit to read.
        required: false
        selector:
          text:

      get:
        name: Read Only
        description: Pass any truthy value to force read-only mode
        required: false
        selector:
          text:

      caller_token:
        name: Caller Token
        description: Opaque audit token echoed in response.
        required: false
        selector:
          text:

    sequence:
      # ── Input normalization ────────────────────────────────────────────────
      - variables:
          raw: "{{ name | string | trim }}"
          val_raw: "{{ value | default(none, true) }}"
          get_raw: "{{ get | default(none, true) }}"
          _token: "{{ caller_token | default('', true) }}"

      # ── Entity resolution ─────────────────────────────────────────────────
      - variables:
          _slug: "{{ raw | replace(':', '') | slugify }}"
          _entity_id: >-
            {%- if raw.startswith('input_datetime.') -%}{{ raw }}
            {%- elif '.' not in raw and states('input_datetime.' ~ _slug) not in ['unknown', 'unavailable'] -%}
              input_datetime.{{ _slug }}
            {%- else -%}{{ raw }}{%- endif -%}

      - if:
          - condition: template
            value_template: >-
              {{ not _entity_id.startswith('input_datetime.')
                 or states(_entity_id) in ['unknown', 'unavailable'] }}
        then:
          - variables:
              result:
                ok: false
                tool: zen_dojotools_datetime
                caller_token: "{{ _token }}"
                error: invalid_entity
                input: "{{ raw }}"
          - stop: error
            response_variable: result

      # ── Read path ─────────────────────────────────────────────────────────
      - if:
          - condition: template
            value_template: "{{ get_raw is not none or val_raw is none }}"
        then:
          - variables:
              result:
                ok: true
                tool: zen_dojotools_datetime
                caller_token: "{{ _token }}"
                mode: read
                entity_id: "{{ _entity_id }}"
                state: "{{ states(_entity_id) }}"
                has_date: "{{ state_attr(_entity_id, 'has_date') }}"
                has_time: "{{ state_attr(_entity_id, 'has_time') }}"
          - stop: read
            response_variable: result

      # ── Set ───────────────────────────────────────────────────────────────
      - action: input_datetime.set_datetime
        target:
          entity_id: "{{ _entity_id }}"
        data:
          datetime: "{{ val_raw | as_datetime() }}"

      - variables:
          result:
            ok: true
            tool: zen_dojotools_datetime
            caller_token: "{{ _token }}"
            mode: set
            entity_id: "{{ _entity_id }}"
            value: "{{ val_raw }}"
            state: "{{ states(_entity_id) }}"
      - stop: set
        response_variable: result

  # ============================================================================
  # zen_dojotools_zones
  # Migrated from intent_script/get_zones + bearing_to_target — 2026-04-08
  # Full CRUD: read (list or single), create, update, delete, bearing
  # Note: zones defined in configuration.yaml are NOT editable/deletable —
  #       only zones created dynamically (via UI or this tool) support write ops.
  # ============================================================================
  zen_dojotools_zones:
    alias: Zen DojoTools Zones
    mode: parallel
    max: 10
    description: >-
      zen_dojotools_zones (v1.1.0)

      CANONICAL HA DOMAIN TOOL — zone
      Preferred over get_zones intent, bearing_to_target intent, and HA zone built-ins.
      Fall back to HA built-ins ONLY if this tool is confirmed non-functional.

      Full zone CRUD + bearing for Home Assistant. Config.yaml zones are read-only.
      Home zone cannot be deleted. Bearing computes haversine distance + compass
      direction; origin defaults to zone.home, supports zone-to-zone or coords.

      Modes: read (list or inspect), create, update, delete, bearing.

      Examples:
        List:    { "mode": "read" }
        Inspect: { "mode": "read", "entity_id": "zone.work" }
        Bearing: { "mode": "bearing", "entity_id": "zone.work" }
        A→B:     { "mode": "bearing", "origin_entity_id": "zone.airport", "entity_id": "zone.work" }
        Create:  { "mode": "create", "name": "School", "latitude": 29.52, "longitude": -98.47 }
        Update:  { "mode": "update", "entity_id": "zone.school", "radius": 200 }
        Delete:  { "mode": "delete", "entity_id": "zone.school" }

    fields:
      mode:
        name: Mode
        description: read / create / update / delete / bearing
        required: true
        selector:
          select:
            options:
              - read
              - create
              - update
              - delete
              - bearing

      entity_id:
        name: Entity ID
        description: Zone entity_id — required for update/delete, optional filter for read
        required: false
        selector:
          entity:
            domain: zone

      name:
        name: Name
        description: Zone name — required for create, optional for update
        required: false
        selector:
          text:

      latitude:
        name: Latitude
        description: Center latitude decimal degrees (e.g. 29.5221) — required for create, optional for update
        required: false
        selector:
          text:

      longitude:
        name: Longitude
        description: Center longitude decimal degrees (e.g. -98.4695) — required for create, optional for update
        required: false
        selector:
          text:

      radius:
        name: Radius (meters)
        description: Zone radius in meters. Default 100.
        required: false
        selector:
          number:
            min: 1
            max: 100000
            step: 1
            mode: box

      icon:
        name: Icon
        description: MDI icon slug (e.g. mdi:briefcase). Default mdi:map-marker.
        required: false
        selector:
          text:

      passive:
        name: Passive
        description: Hidden from frontend but usable in automations (true/false)
        required: false
        selector:
          boolean:

      origin_entity_id:
        name: Origin Entity ID
        description: >-
          Zone entity for bearing origin. Defaults to zone.home when omitted.
          Use with entity_id/latitude+longitude to compute A→B between any two points.
        required: false
        selector:
          entity:
            domain: zone

      origin_latitude:
        name: Origin Latitude
        description: Latitude decimal degrees for bearing origin (use instead of origin_entity_id for arbitrary coords)
        required: false
        selector:
          text:

      origin_longitude:
        name: Origin Longitude
        description: Longitude decimal degrees for bearing origin (use instead of origin_entity_id for arbitrary coords)
        required: false
        selector:
          text:

      caller_token:
        name: Caller Token
        description: Opaque audit token echoed in response.
        required: false
        selector:
          text:

    sequence:
      # ── Input normalization ────────────────────────────────────────────────
      - variables:
          _mode: "{{ mode | default('read') | lower }}"
          _entity_id: "{{ entity_id | default('', true) | string | trim }}"
          _name: "{{ name | default('', true) | string | trim }}"
          _lat: "{{ latitude | default(none, true) }}"
          _lon: "{{ longitude | default(none, true) }}"
          _radius: "{{ radius | default(none, true) }}"
          _icon: "{{ icon | default('', true) | string | trim }}"
          _passive: "{{ passive | default(none, true) }}"
          _origin_entity_id: "{{ origin_entity_id | default('', true) | string | trim }}"
          _origin_lat: "{{ origin_latitude | default(none, true) }}"
          _origin_lon: "{{ origin_longitude | default(none, true) }}"
          _token: "{{ caller_token | default('', true) }}"

      # ================================================================
      # READ
      # ================================================================
      - if:
          - condition: template
            value_template: "{{ _mode == 'read' }}"
        then:
          - if:
              - condition: template
                value_template: "{{ _entity_id != '' }}"
            then:
              # Single zone inspect
              - if:
                  - condition: template
                    value_template: "{{ states(_entity_id) in ['unknown', 'unavailable'] }}"
                then:
                  - variables:
                      result:
                        ok: false
                        tool: zen_dojotools_zones
                        caller_token: "{{ _token }}"
                        error: not_found
                        entity_id: "{{ _entity_id }}"
                  - stop: error
                    response_variable: result
              - variables:
                  result:
                    ok: true
                    tool: zen_dojotools_zones
                    caller_token: "{{ _token }}"
                    mode: read
                    zone:
                      entity_id: "{{ _entity_id }}"
                      name: "{{ state_attr(_entity_id, 'friendly_name') }}"
                      state: "{{ states(_entity_id) }}"
                      latitude: "{{ state_attr(_entity_id, 'latitude') }}"
                      longitude: "{{ state_attr(_entity_id, 'longitude') }}"
                      radius: "{{ state_attr(_entity_id, 'radius') }}"
                      passive: "{{ state_attr(_entity_id, 'passive') }}"
                      icon: "{{ state_attr(_entity_id, 'icon') }}"
                      editable: "{{ state_attr(_entity_id, 'editable') }}"
                      persons: "{{ state_attr(_entity_id, 'persons') | default([]) }}"
              - stop: read
                response_variable: result
            else:
              # List all zones
              - variables:
                  _all_zones: >-
                    {%- set ns = namespace(zones=[]) -%}
                    {%- for z in states.zone -%}
                      {%- set ns.zones = ns.zones + [{
                        'entity_id': z.entity_id,
                        'name': state_attr(z.entity_id, 'friendly_name'),
                        'state': z.state,
                        'latitude': state_attr(z.entity_id, 'latitude'),
                        'longitude': state_attr(z.entity_id, 'longitude'),
                        'radius': state_attr(z.entity_id, 'radius'),
                        'passive': state_attr(z.entity_id, 'passive'),
                        'icon': state_attr(z.entity_id, 'icon'),
                        'editable': state_attr(z.entity_id, 'editable'),
                        'persons': state_attr(z.entity_id, 'persons') | default([])
                      }] -%}
                    {%- endfor -%}
                    {{ ns.zones }}
                  result:
                    ok: true
                    tool: zen_dojotools_zones
                    caller_token: "{{ _token }}"
                    mode: read
                    count: "{{ states.zone | list | length }}"
                    zones: "{{ _all_zones }}"
              - stop: read
                response_variable: result

      # ================================================================
      # CREATE
      # ================================================================
      - if:
          - condition: template
            value_template: "{{ _mode == 'create' }}"
        then:
          - if:
              - condition: template
                value_template: "{{ _name == '' or _lat is none or _lon is none }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_zones
                    caller_token: "{{ _token }}"
                    error: missing_required
                    message: create requires name, latitude, and longitude
              - stop: error
                response_variable: result
          - variables:
              _create_data: >-
                {%- set d = {
                  'name': _name,
                  'latitude': _lat | float,
                  'longitude': _lon | float,
                  'radius': _radius | int(100) if _radius is not none else 100
                } -%}
                {%- if _icon != '' -%}{%- set d = d | combine({'icon': _icon}) -%}{%- endif -%}
                {%- if _passive is not none -%}
                  {%- set d = d | combine({'passive': _passive | bool}) -%}
                {%- endif -%}
                {{ d }}
          - action: zone.create
            data: "{{ _create_data }}"
          - variables:
              result:
                ok: true
                tool: zen_dojotools_zones
                caller_token: "{{ _token }}"
                mode: create
                name: "{{ _name }}"
                latitude: "{{ _lat }}"
                longitude: "{{ _lon }}"
                radius: "{{ _radius | int(100) if _radius is not none else 100 }}"
          - stop: create
            response_variable: result

      # ================================================================
      # UPDATE
      # ================================================================
      - if:
          - condition: template
            value_template: "{{ _mode == 'update' }}"
        then:
          - if:
              - condition: template
                value_template: "{{ _entity_id == '' }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_zones
                    caller_token: "{{ _token }}"
                    error: missing_required
                    message: update requires entity_id
              - stop: error
                response_variable: result
          - if:
              - condition: template
                value_template: "{{ not state_attr(_entity_id, 'editable') | default(false) | bool }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_zones
                    caller_token: "{{ _token }}"
                    error: not_editable
                    entity_id: "{{ _entity_id }}"
                    message: This zone is defined in configuration.yaml and cannot be updated at runtime.
              - stop: error
                response_variable: result
          - variables:
              _update_data: >-
                {%- set d = {'entity_id': _entity_id} -%}
                {%- if _name != '' -%}{%- set d = d | combine({'name': _name}) -%}{%- endif -%}
                {%- if _lat is not none -%}{%- set d = d | combine({'latitude': _lat | float}) -%}{%- endif -%}
                {%- if _lon is not none -%}{%- set d = d | combine({'longitude': _lon | float}) -%}{%- endif -%}
                {%- if _radius is not none -%}{%- set d = d | combine({'radius': _radius | int}) -%}{%- endif -%}
                {%- if _icon != '' -%}{%- set d = d | combine({'icon': _icon}) -%}{%- endif -%}
                {{ d }}
          - action: zone.edit
            data: "{{ _update_data }}"
          - variables:
              result:
                ok: true
                tool: zen_dojotools_zones
                caller_token: "{{ _token }}"
                mode: update
                entity_id: "{{ _entity_id }}"
                updated: "{{ _update_data }}"
          - stop: update
            response_variable: result

      # ================================================================
      # DELETE
      # ================================================================
      - if:
          - condition: template
            value_template: "{{ _mode == 'delete' }}"
        then:
          - if:
              - condition: template
                value_template: "{{ _entity_id == '' }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_zones
                    caller_token: "{{ _token }}"
                    error: missing_required
                    message: delete requires entity_id
              - stop: error
                response_variable: result
          - if:
              - condition: template
                value_template: "{{ _entity_id == 'zone.home' }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_zones
                    caller_token: "{{ _token }}"
                    error: protected_zone
                    entity_id: zone.home
                    message: The home zone cannot be deleted.
              - stop: error
                response_variable: result
          - if:
              - condition: template
                value_template: "{{ not state_attr(_entity_id, 'editable') | default(false) | bool }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_zones
                    caller_token: "{{ _token }}"
                    error: not_editable
                    entity_id: "{{ _entity_id }}"
                    message: This zone is defined in configuration.yaml and cannot be deleted at runtime.
              - stop: error
                response_variable: result
          - action: zone.delete
            data:
              entity_id: "{{ _entity_id }}"
          - variables:
              result:
                ok: true
                tool: zen_dojotools_zones
                caller_token: "{{ _token }}"
                mode: delete
                entity_id: "{{ _entity_id }}"
          - stop: delete
            response_variable: result

      # ================================================================
      # BEARING — haversine distance + compass bearing from home
      # ================================================================
      - if:
          - condition: template
            value_template: "{{ _mode == 'bearing' }}"
        then:
          # Validate: need entity_id OR lat+lon
          - if:
              - condition: template
                value_template: "{{ _entity_id == '' and (_lat is none or _lon is none) }}"
            then:
              - variables:
                  result:
                    ok: false
                    tool: zen_dojotools_zones
                    caller_token: "{{ _token }}"
                    error: missing_required
                    message: bearing mode requires entity_id (zone) or latitude + longitude
              - stop: error
                response_variable: result

          # Resolve target coordinates
          - variables:
              _b_via: >-
                {{ 'zone' if _entity_id != '' else 'coords' }}
              _b_target_lat: >-
                {{ state_attr(_entity_id, 'latitude') | float(0) if _entity_id != ''
                   else _lat | float(0) }}
              _b_target_lon: >-
                {{ state_attr(_entity_id, 'longitude') | float(0) if _entity_id != ''
                   else _lon | float(0) }}
              _b_target_name: >-
                {{ state_attr(_entity_id, 'friendly_name') | default(_entity_id)
                   if _entity_id != '' else '' }}

          # Resolve origin coordinates (defaults to zone.home)
          - variables:
              _b_origin_via: >-
                {%- if _origin_entity_id != '' -%}zone
                {%- elif _origin_lat is not none and _origin_lon is not none -%}coords
                {%- else -%}home{%- endif -%}
              _b_home_lat: "{{ state_attr('zone.home', 'latitude') | float }}"
              _b_home_lon: "{{ state_attr('zone.home', 'longitude') | float }}"
          - variables:
              _b_origin_lat: >-
                {%- if _b_origin_via == 'zone' -%}
                  {{ state_attr(_origin_entity_id, 'latitude') | float(0) }}
                {%- elif _b_origin_via == 'coords' -%}
                  {{ _origin_lat | float(0) }}
                {%- else -%}
                  {{ _b_home_lat }}
                {%- endif -%}
              _b_origin_lon: >-
                {%- if _b_origin_via == 'zone' -%}
                  {{ state_attr(_origin_entity_id, 'longitude') | float(0) }}
                {%- elif _b_origin_via == 'coords' -%}
                  {{ _origin_lon | float(0) }}
                {%- else -%}
                  {{ _b_home_lon }}
                {%- endif -%}
              _b_origin_name: >-
                {%- if _b_origin_via == 'zone' -%}
                  {{ state_attr(_origin_entity_id, 'friendly_name') | default(_origin_entity_id) }}
                {%- elif _b_origin_via == 'home' -%}
                  Home
                {%- else -%}{{ '' }}{%- endif -%}

          # Convert to radians
          - variables:
              _b_rad: "{{ 0.017453292519943295 }}"
              _b_earth_r: "{{ 6371000.0 }}"
          - variables:
              _b_ol_r: "{{ _b_origin_lat * _b_rad }}"
              _b_oln_r: "{{ _b_origin_lon * _b_rad }}"
              _b_tl_r: "{{ _b_target_lat * _b_rad }}"
              _b_tln_r: "{{ _b_target_lon * _b_rad }}"

          # Haversine
          - variables:
              _b_dlat: "{{ _b_tl_r - _b_ol_r }}"
              _b_dlon: "{{ _b_tln_r - _b_oln_r }}"
          - variables:
              _b_a: >-
                {{ (sin(_b_dlat / 2) ** 2) +
                   cos(_b_ol_r) * cos(_b_tl_r) * (sin(_b_dlon / 2) ** 2) }}
          - variables:
              _b_dist_m: "{{ _b_earth_r * 2 * atan2(sqrt(_b_a), sqrt(1 - _b_a)) }}"
              _b_y: "{{ sin(_b_dlon) * cos(_b_tl_r) }}"
              _b_x: >-
                {{ cos(_b_ol_r) * sin(_b_tl_r) -
                   sin(_b_ol_r) * cos(_b_tl_r) * cos(_b_dlon) }}
          - variables:
              _b_bearing: "{{ ((atan2(_b_y, _b_x) * 57.2957795) + 360) % 360 }}"
              _b_dist_mi: "{{ (_b_dist_m / 1609.344) | round(1) }}"
          - variables:
              _b_cardinal: >-
                {%- set dirs = ['north','north-east','east','south-east',
                                'south','south-west','west','north-west'] -%}
                {{ dirs[((_b_bearing + 22.5) / 45) | int % 8] }}
          - variables:
              result:
                ok: true
                tool: zen_dojotools_zones
                caller_token: "{{ _token }}"
                mode: bearing
                origin:
                  via: "{{ _b_origin_via }}"
                  entity_id: "{{ _origin_entity_id if _origin_entity_id != '' else none }}"
                  name: "{{ _b_origin_name if _b_origin_name != '' else none }}"
                  latitude: "{{ _b_origin_lat }}"
                  longitude: "{{ _b_origin_lon }}"
                target:
                  via: "{{ _b_via }}"
                  entity_id: "{{ _entity_id if _entity_id != '' else none }}"
                  name: "{{ _b_target_name if _b_target_name != '' else none }}"
                  latitude: "{{ _b_target_lat }}"
                  longitude: "{{ _b_target_lon }}"
                distance_miles: "{{ _b_dist_mi }}"
                bearing_degrees: "{{ _b_bearing | round(1) }}"
                cardinal: "{{ _b_cardinal }}"
          - stop: bearing
            response_variable: result

      # ── Unknown mode fallback ──────────────────────────────────────────────
      - variables:
          result:
            ok: false
            tool: zen_dojotools_zones
            caller_token: "{{ _token }}"
            error: invalid_mode
            mode: "{{ _mode }}"
            supported:
              - read
              - create
              - update
              - delete
              - bearing
      - stop: error
        response_variable: result
