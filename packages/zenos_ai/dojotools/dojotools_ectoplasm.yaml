###############################################################################
# ZenOS-AI DojoTools: Ectoplasm
# Version: 4.6.0
#
# Scripts:
#   zen_dojotools_ectoplasm — Spook/HA extended surface wrapper
#
# Requires: Spook integration (https://spook.boo) — listed ZenOS prerequisite.
#
# Covers (v1.0.0):
#   Repairs:      repair_list, ghost_list, repair_create, repair_remove,
#                 repair_ignore_all, repair_unignore_all
#   Areas:        area_create, area_delete, area_assign_device,
#                 area_unassign_device, area_assign_entity, area_unassign_entity
#   Floors:       floor_create, floor_delete, floor_assign_area, floor_unassign_area
#   Entities:     entity_hide, entity_unhide, entity_disable, entity_enable,
#                 entity_rename
#   Devices:      device_disable, device_enable
#   Labels:       label_assign_area, label_unassign_area,
#                 label_assign_device, label_unassign_device
#   Integrations: integration_disable, integration_enable
#   Housekeeping: orphan_cleanup
#
# NOTE: label_create/delete and label_assign_entity/unassign_entity are in
#       zen_dojotools_labels — Ectoplasm adds area and device surfaces only.
#
# Confirm-gated actions return status: start preview without executing.
# Set confirm_action: true to execute. Read actions never require confirm.
###############################################################################

script:
  zen_dojotools_ectoplasm:
    alias: Zen DojoTools Ectoplasm
    mode: single
    icon: mdi:ghost
    description: >-
      Spook/HA extended surface wrapper. Manages repairs, areas, floors,
      entity and device lifecycle, label assignment to areas/devices,
      integration config entries, and orphan entity cleanup. All
      destructive/functional writes are confirm-gated (confirm_action: true
      required — omit or false returns status: start preview). Read actions
      (repair_list, ghost_list) execute immediately without confirm.
      Fires zen_event on all writes. Requires Spook. (v1.0.0)

    fields:
      action_type:
        name: Action Type
        description: >-
          Operation to perform.
          Reads: repair_list, ghost_list.
          Repairs: repair_create, repair_remove, repair_ignore_all, repair_unignore_all.
          Areas: area_create, area_delete, area_assign_device, area_unassign_device,
          area_assign_entity, area_unassign_entity.
          Floors: floor_create, floor_delete, floor_assign_area, floor_unassign_area.
          Entities: entity_hide, entity_unhide, entity_disable, entity_enable, entity_rename.
          Devices: device_disable, device_enable.
          Labels: label_assign_area, label_unassign_area, label_assign_device, label_unassign_device.
          Integrations: integration_disable, integration_enable.
          Housekeeping: orphan_cleanup.
        required: true
        selector:
          select:
            options:
              - repair_list
              - ghost_list
              - repair_create
              - repair_remove
              - repair_ignore_all
              - repair_unignore_all
              - area_create
              - area_delete
              - area_assign_device
              - area_unassign_device
              - area_assign_entity
              - area_unassign_entity
              - floor_create
              - floor_delete
              - floor_assign_area
              - floor_unassign_area
              - entity_hide
              - entity_unhide
              - entity_disable
              - entity_enable
              - entity_rename
              - device_disable
              - device_enable
              - label_assign_area
              - label_unassign_area
              - label_assign_device
              - label_unassign_device
              - integration_disable
              - integration_enable
              - orphan_cleanup
            custom_value: false
      issue_id:
        name: Issue ID
        description: >-
          Repair issue ID. Auto-prefixed with zenos_ unless already prefixed.
          Required for repair_create, repair_remove.
        required: false
        selector:
          text:
      title:
        name: Title
        description: Human-readable repair issue title. Required for repair_create.
        required: false
        selector:
          text:
      issue_description:
        name: Issue Description
        description: >-
          Repair issue body text. Required for repair_create.
          Named issue_description to avoid YAML key collision.
        required: false
        selector:
          text:
            multiline: true
      severity:
        name: Severity
        description: "Repair issue severity. Default: warning. (info maps to information for Spook)"
        required: false
        default: warning
        selector:
          select:
            options:
              - error
              - warning
              - info
            custom_value: false
      domain:
        name: Domain
        description: >-
          HA integration domain. Defaults to zenos for repair_create.
          Optional domain filter for repair_list.
        required: false
        selector:
          text:
      area_id:
        name: Area ID
        description: >-
          HA area ID (slug). Required for area_delete, area_assign_device,
          area_unassign_device, area_assign_entity, area_unassign_entity,
          floor_assign_area, floor_unassign_area, label_assign_area, label_unassign_area.
        required: false
        selector:
          area:
      area_name:
        name: Area Name
        description: Human-readable area name. Required for area_create.
        required: false
        selector:
          text:
      floor_id:
        name: Floor ID
        description: >-
          HA floor ID (slug). Required for floor_delete, floor_assign_area,
          floor_unassign_area. Optional for area_create (assigns to floor).
        required: false
        selector:
          text:
      floor_name:
        name: Floor Name
        description: Human-readable floor name. Required for floor_create.
        required: false
        selector:
          text:
      floor_level:
        name: Floor Level
        description: >-
          Floor level integer. Optional for floor_create.
          Convention: 0 = ground, 1 = first, -1 = basement.
        required: false
        selector:
          number:
            min: -10
            max: 50
            step: 1
      entity_id:
        name: Entity ID
        description: >-
          Entity ID. Required for entity_hide, entity_unhide, entity_disable,
          entity_enable, entity_rename, area_assign_entity, area_unassign_entity.
        required: false
        selector:
          entity:
      device_id:
        name: Device ID
        description: >-
          Device ID. Required for device_disable, device_enable,
          area_assign_device, area_unassign_device, label_assign_device,
          label_unassign_device.
        required: false
        selector:
          device:
      label_id:
        name: Label ID
        description: HA label ID (slug). Required for label_assign_*/unassign_* actions.
        required: false
        selector:
          text:
      new_name:
        name: New Name
        description: Replacement friendly name. Required for entity_rename.
        required: false
        selector:
          text:
      config_entry_id:
        name: Config Entry ID
        description: Integration config entry ID. Required for integration_disable/enable.
        required: false
        selector:
          text:
      confirm_action:
        name: Confirm Action
        description: >-
          Required for all writes. Omit or false returns status: start preview
          describing what would happen without executing. Set true to execute.
          Read actions (repair_list, ghost_list) do not require confirm.
        required: false
        default: false
        selector:
          boolean:
      caller_token:
        name: Caller Token
        description: Opaque token echoed in response for caller correlation. Not interpreted.
        required: false
        selector:
          text:

    sequence:
      # ── Normalize ──────────────────────────────────────────────────────────
      - variables:
          caller_token: "{{- caller_token | default('') -}}"
      - variables:
          _action: "{{ action_type | default('') | lower | trim }}"
          _confirm: "{{ confirm_action | default(false) | bool }}"
          _raw_issue_id: "{{ issue_id | default('') | trim }}"
          _title: "{{ title | default('') | trim }}"
          _desc: "{{ issue_description | default('') | trim }}"
          _raw_severity: "{{ severity | default('warning') | lower | trim }}"
          _domain: "{{ domain | default('') | trim }}"
          _cfg_entry: "{{ config_entry_id | default('') | trim }}"
          _area_id: "{{ area_id | default('') | trim }}"
          _area_name: "{{ area_name | default('') | trim }}"
          _floor_id: "{{ floor_id | default('') | trim }}"
          _floor_name: "{{ floor_name | default('') | trim }}"
          _floor_level: "{{ floor_level | default(none) }}"
          _entity_id: "{{ entity_id | default('') | trim }}"
          _device_id: "{{ device_id | default('') | trim }}"
          _label_id: "{{ label_id | default('') | trim }}"
          _new_name: "{{ new_name | default('') | trim }}"
      - variables:
          # Auto-prefix issue_id with zenos_ unless already prefixed
          _issue_id: >-
            {%- set _s = _raw_issue_id | slugify(separator='_') | default('', true) -%}
            {{ _s if _s.startswith('zenos_') else ('zenos_' ~ _s) if _s != '' else '' }}
          # Spook requires 'information' not 'info'
          _severity: >-
            {%- if _raw_severity == 'info' -%}information
            {%- elif _raw_severity in ['error', 'warning', 'information'] -%}{{ _raw_severity }}
            {%- else -%}warning{%- endif -%}
          _issue_domain: "{{ _domain if _domain != '' else 'zenos' }}"
          _list_domain: "{{ _domain }}"

      # ── Validation: unknown action ─────────────────────────────────────────
      - if: >-
          {{ _action not in [
            'repair_list', 'ghost_list',
            'repair_create', 'repair_remove', 'repair_ignore_all', 'repair_unignore_all',
            'area_create', 'area_delete',
            'area_assign_device', 'area_unassign_device',
            'area_assign_entity', 'area_unassign_entity',
            'floor_create', 'floor_delete',
            'floor_assign_area', 'floor_unassign_area',
            'entity_hide', 'entity_unhide', 'entity_disable', 'entity_enable', 'entity_rename',
            'device_disable', 'device_enable',
            'label_assign_area', 'label_unassign_area',
            'label_assign_device', 'label_unassign_device',
            'integration_disable', 'integration_enable',
            'orphan_cleanup'
          ] }}
        then:
          - variables:
              _final:
                status: error
                action_type: "{{ _action }}"
                message: >-
                  Unknown action_type '{{ _action }}'. See script description
                  for valid values.
                caller_token: "{{ caller_token }}"
          - stop: Unknown action
            response_variable: _final

      # ── Dispatch ───────────────────────────────────────────────────────────
      - choose:

          # ── REPAIR_LIST ────────────────────────────────────────────────────
          - conditions: "{{ _action == 'repair_list' }}"
            sequence:
              - variables:
                  _issues: >-
                    {%- set ns = namespace(issues=[]) -%}
                    {%- for eid in integration_entities('repairs') | list -%}
                      {%- set _d = state_attr(eid, 'domain') | default('', true) -%}
                      {%- if _list_domain == '' or _d == _list_domain -%}
                        {%- set ns.issues = ns.issues + [{
                          'entity_id': eid,
                          'domain':    _d,
                          'issue_id':  state_attr(eid, 'issue_id')  | default('', true),
                          'title':     state_attr(eid, 'title')      | default(state_attr(eid, 'translation_key') | default('', true), true),
                          'severity':  state_attr(eid, 'severity')   | default('', true),
                          'state':     states(eid),
                          'ignored':   state_attr(eid, 'ignored')    | default(false, true)
                        }] -%}
                      {%- endif -%}
                    {%- endfor -%}
                    {{ ns.issues }}
              - variables:
                  _final:
                    status: success
                    action_type: repair_list
                    count: "{{ _issues | length }}"
                    domain_filter: "{{ _list_domain if _list_domain != '' else 'all' }}"
                    issues: "{{ _issues }}"
                    caller_token: "{{ caller_token }}"

          # ── GHOST_LIST ─────────────────────────────────────────────────────
          - conditions: "{{ _action == 'ghost_list' }}"
            sequence:
              - variables:
                  _ghosts: >-
                    {%- set ns = namespace(issues=[]) -%}
                    {%- for eid in integration_entities('repairs') | list -%}
                      {%- if state_attr(eid, 'domain') | default('', true) == 'spook' -%}
                        {%- set _ttl = state_attr(eid, 'title') | default(state_attr(eid, 'translation_key') | default('', true), true) -%}
                        {# Spook ghost title: "Entity 'sensor.foo' does not exist" — split on single quotes #}
                        {%- set _parts = _ttl.split("'") -%}
                        {%- set _aff = _parts[1] if _parts | length >= 2 else '' -%}
                        {%- set ns.issues = ns.issues + [{
                          'entity_id':       eid,
                          'issue_id':        state_attr(eid, 'issue_id') | default('', true),
                          'title':           _ttl,
                          'severity':        state_attr(eid, 'severity') | default('', true),
                          'state':           states(eid),
                          'affected_entity': _aff if '.' in _aff else ''
                        }] -%}
                      {%- endif -%}
                    {%- endfor -%}
                    {{ ns.issues }}
              - variables:
                  _final:
                    status: success
                    action_type: ghost_list
                    ghost_count: "{{ _ghosts | length }}"
                    ghosts: "{{ _ghosts }}"
                    caller_token: "{{ caller_token }}"

          # ── REPAIR_CREATE ──────────────────────────────────────────────────
          - conditions: "{{ _action == 'repair_create' }}"
            sequence:
              - if: "{{ _issue_id == '' or _title == '' or _desc == '' }}"
                then:
                  - variables:
                      _final:
                        status: error
                        action_type: repair_create
                        message: "repair_create requires issue_id, title, and issue_description."
                        caller_token: "{{ caller_token }}"
                  - stop: Validation failed
                    response_variable: _final
              - if: "{{ not _confirm }}"
                then:
                  - variables:
                      _final:
                        status: start
                        action_type: repair_create
                        preview:
                          issue_id: "{{ _issue_id }}"
                          domain: "{{ _issue_domain }}"
                          title: "{{ _title }}"
                          severity: "{{ _severity }}"
                        message: >-
                          Would create repair issue '{{ _issue_id }}' (domain: {{ _issue_domain }},
                          severity: {{ _severity }}). Set confirm_action: true to execute.
                        caller_token: "{{ caller_token }}"
                  - stop: Preview only
                    response_variable: _final
              - action: repairs.create
                data:
                  domain: "{{ _issue_domain }}"
                  issue_id: "{{ _issue_id }}"
                  title: "{{ _title }}"
                  description: "{{ _desc }}"
                  severity: "{{ _severity }}"
              - event: zen_event
                event_data:
                  event:
                    kind: ectoplasm_repair_create
                    issue_id: "{{ _issue_id }}"
                    domain: "{{ _issue_domain }}"
                    severity: info
                    summary: "Repair issue created: {{ _title }}"
              - variables:
                  _final:
                    status: success
                    action_type: repair_create
                    issue_id: "{{ _issue_id }}"
                    domain: "{{ _issue_domain }}"
                    title: "{{ _title }}"
                    severity: "{{ _severity }}"
                    message: "Repair issue '{{ _issue_id }}' created."
                    caller_token: "{{ caller_token }}"

          # ── REPAIR_REMOVE ──────────────────────────────────────────────────
          - conditions: "{{ _action == 'repair_remove' }}"
            sequence:
              - if: "{{ _issue_id == '' }}"
                then:
                  - variables:
                      _final:
                        status: error
                        action_type: repair_remove
                        message: "repair_remove requires issue_id."
                        caller_token: "{{ caller_token }}"
                  - stop: Validation failed
                    response_variable: _final
              - if: "{{ not _confirm }}"
                then:
                  - variables:
                      _final:
                        status: start
                        action_type: repair_remove
                        preview:
                          issue_id: "{{ _issue_id }}"
                          domain: "{{ _issue_domain }}"
                        message: >-
                          Would remove repair issue '{{ _issue_id }}' (domain: {{ _issue_domain }}).
                          Set confirm_action: true to execute.
                        caller_token: "{{ caller_token }}"
                  - stop: Preview only
                    response_variable: _final
              - action: repairs.remove
                data:
                  domain: "{{ _issue_domain }}"
                  issue_id: "{{ _issue_id }}"
              - event: zen_event
                event_data:
                  event:
                    kind: ectoplasm_repair_remove
                    issue_id: "{{ _issue_id }}"
                    domain: "{{ _issue_domain }}"
                    severity: info
                    summary: "Repair issue removed: {{ _issue_id }}"
              - variables:
                  _final:
                    status: success
                    action_type: repair_remove
                    issue_id: "{{ _issue_id }}"
                    domain: "{{ _issue_domain }}"
                    message: "Repair issue '{{ _issue_id }}' removed."
                    caller_token: "{{ caller_token }}"

          # ── REPAIR_IGNORE_ALL ──────────────────────────────────────────────
          - conditions: "{{ _action == 'repair_ignore_all' }}"
            sequence:
              - if: "{{ not _confirm }}"
                then:
                  - variables:
                      _final:
                        status: start
                        action_type: repair_ignore_all
                        message: >-
                          Would ignore all current repair issues in the HA Repairs panel.
                          Set confirm_action: true to execute.
                        caller_token: "{{ caller_token }}"
                  - stop: Preview only
                    response_variable: _final
              - action: repairs.ignore_all
              - event: zen_event
                event_data:
                  event:
                    kind: ectoplasm_repair_ignore_all
                    severity: warning
                    summary: All repair issues ignored.
              - variables:
                  _final:
                    status: success
                    action_type: repair_ignore_all
                    message: All repair issues ignored.
                    caller_token: "{{ caller_token }}"

          # ── REPAIR_UNIGNORE_ALL ────────────────────────────────────────────
          - conditions: "{{ _action == 'repair_unignore_all' }}"
            sequence:
              - if: "{{ not _confirm }}"
                then:
                  - variables:
                      _final:
                        status: start
                        action_type: repair_unignore_all
                        message: >-
                          Would unignore all repair issues.
                          Set confirm_action: true to execute.
                        caller_token: "{{ caller_token }}"
                  - stop: Preview only
                    response_variable: _final
              - action: repairs.unignore_all
              - event: zen_event
                event_data:
                  event:
                    kind: ectoplasm_repair_unignore_all
                    severity: info
                    summary: All repair issues unignored.
              - variables:
                  _final:
                    status: success
                    action_type: repair_unignore_all
                    message: All repair issues unignored.
                    caller_token: "{{ caller_token }}"

          # ── AREA_CREATE ────────────────────────────────────────────────────
          - conditions: "{{ _action == 'area_create' }}"
            sequence:
              - if: "{{ _area_name == '' }}"
                then:
                  - variables:
                      _final:
                        status: error
                        action_type: area_create
                        message: "area_create requires area_name."
                        caller_token: "{{ caller_token }}"
                  - stop: Validation failed
                    response_variable: _final
              - choose:
                  - conditions: "{{ _floor_id != '' }}"
                    sequence:
                      - action: homeassistant.create_area
                        data:
                          name: "{{ _area_name }}"
                          floor_id: "{{ _floor_id }}"
                default:
                  - action: homeassistant.create_area
                    data:
                      name: "{{ _area_name }}"
              - event: zen_event
                event_data:
                  event:
                    kind: ectoplasm_area_create
                    area_name: "{{ _area_name }}"
                    floor_id: "{{ _floor_id }}"
                    severity: info
                    summary: "Area created: {{ _area_name }}"
              - variables:
                  _final:
                    status: success
                    action_type: area_create
                    area_name: "{{ _area_name }}"
                    floor_id: "{{ _floor_id }}"
                    message: "Area '{{ _area_name }}' created."
                    caller_token: "{{ caller_token }}"

          # ── AREA_DELETE ────────────────────────────────────────────────────
          - conditions: "{{ _action == 'area_delete' }}"
            sequence:
              - if: "{{ _area_id == '' }}"
                then:
                  - variables:
                      _final:
                        status: error
                        action_type: area_delete
                        message: "area_delete requires area_id."
                        caller_token: "{{ caller_token }}"
                  - stop: Validation failed
                    response_variable: _final
              - if: "{{ not _confirm }}"
                then:
                  - variables:
                      _final:
                        status: start
                        action_type: area_delete
                        preview:
                          area_id: "{{ _area_id }}"
                        message: >-
                          Would delete area '{{ _area_id }}'. This unassigns all devices
                          and entities from the area. Set confirm_action: true to execute.
                        caller_token: "{{ caller_token }}"
                  - stop: Preview only
                    response_variable: _final
              - action: homeassistant.delete_area
                data:
                  area_id: "{{ _area_id }}"
              - event: zen_event
                event_data:
                  event:
                    kind: ectoplasm_area_delete
                    area_id: "{{ _area_id }}"
                    severity: warning
                    summary: "Area deleted: {{ _area_id }}"
              - variables:
                  _final:
                    status: success
                    action_type: area_delete
                    area_id: "{{ _area_id }}"
                    message: "Area '{{ _area_id }}' deleted."
                    caller_token: "{{ caller_token }}"

          # ── AREA_ASSIGN_DEVICE ─────────────────────────────────────────────
          - conditions: "{{ _action == 'area_assign_device' }}"
            sequence:
              - if: "{{ _device_id == '' or _area_id == '' }}"
                then:
                  - variables:
                      _final:
                        status: error
                        action_type: area_assign_device
                        message: "area_assign_device requires device_id and area_id."
                        caller_token: "{{ caller_token }}"
                  - stop: Validation failed
                    response_variable: _final
              - action: homeassistant.add_device_to_area
                data:
                  device_id: "{{ _device_id }}"
                  area_id: "{{ _area_id }}"
              - event: zen_event
                event_data:
                  event:
                    kind: ectoplasm_area_assign_device
                    device_id: "{{ _device_id }}"
                    area_id: "{{ _area_id }}"
                    severity: info
                    summary: "Device {{ _device_id }} assigned to area {{ _area_id }}"
              - variables:
                  _final:
                    status: success
                    action_type: area_assign_device
                    device_id: "{{ _device_id }}"
                    area_id: "{{ _area_id }}"
                    message: "Device assigned to area."
                    caller_token: "{{ caller_token }}"

          # ── AREA_UNASSIGN_DEVICE ───────────────────────────────────────────
          - conditions: "{{ _action == 'area_unassign_device' }}"
            sequence:
              - if: "{{ _device_id == '' }}"
                then:
                  - variables:
                      _final:
                        status: error
                        action_type: area_unassign_device
                        message: "area_unassign_device requires device_id."
                        caller_token: "{{ caller_token }}"
                  - stop: Validation failed
                    response_variable: _final
              - action: homeassistant.remove_device_from_area
                data:
                  device_id: "{{ _device_id }}"
              - event: zen_event
                event_data:
                  event:
                    kind: ectoplasm_area_unassign_device
                    device_id: "{{ _device_id }}"
                    severity: info
                    summary: "Device {{ _device_id }} unassigned from area"
              - variables:
                  _final:
                    status: success
                    action_type: area_unassign_device
                    device_id: "{{ _device_id }}"
                    message: "Device unassigned from area."
                    caller_token: "{{ caller_token }}"

          # ── AREA_ASSIGN_ENTITY ─────────────────────────────────────────────
          - conditions: "{{ _action == 'area_assign_entity' }}"
            sequence:
              - if: "{{ _entity_id == '' or _area_id == '' }}"
                then:
                  - variables:
                      _final:
                        status: error
                        action_type: area_assign_entity
                        message: "area_assign_entity requires entity_id and area_id."
                        caller_token: "{{ caller_token }}"
                  - stop: Validation failed
                    response_variable: _final
              - action: homeassistant.add_entity_to_area
                data:
                  entity_id: "{{ _entity_id }}"
                  area_id: "{{ _area_id }}"
              - event: zen_event
                event_data:
                  event:
                    kind: ectoplasm_area_assign_entity
                    entity_id: "{{ _entity_id }}"
                    area_id: "{{ _area_id }}"
                    severity: info
                    summary: "Entity {{ _entity_id }} assigned to area {{ _area_id }}"
              - variables:
                  _final:
                    status: success
                    action_type: area_assign_entity
                    entity_id: "{{ _entity_id }}"
                    area_id: "{{ _area_id }}"
                    message: "Entity assigned to area."
                    caller_token: "{{ caller_token }}"

          # ── AREA_UNASSIGN_ENTITY ───────────────────────────────────────────
          - conditions: "{{ _action == 'area_unassign_entity' }}"
            sequence:
              - if: "{{ _entity_id == '' }}"
                then:
                  - variables:
                      _final:
                        status: error
                        action_type: area_unassign_entity
                        message: "area_unassign_entity requires entity_id."
                        caller_token: "{{ caller_token }}"
                  - stop: Validation failed
                    response_variable: _final
              - action: homeassistant.remove_entity_from_area
                data:
                  entity_id: "{{ _entity_id }}"
              - event: zen_event
