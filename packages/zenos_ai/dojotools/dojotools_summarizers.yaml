###############################################################################
# ZenOS-AI DojoTools: Summarizers Package
# Version: 4.5.5
#
# Migrated from scripts.yaml. Fixes applied (v1.0.0):
#   - supersummary: active_components namespace() fix (Jinja2 scoping — was always {})
#   - supersummary: ZEN_SUMMARY → zen_summary key case in prompt_context
#   - supersummary: event: → action: for event emitter
#   - ninja summarizer: library_console → library_command_result
#   - ninja summarizer: kata_template reads kata_cabinet var (not hardcoded entity)
#   - ninja summarizer: label_input tuple syntax → clean comma string
#   - ninja summarizer: event: → action: for event emitter
#   - both: selector {} deprecation
#
# Fixes applied (v1.1.0):
#   - supersummary: hardcoded cabinet entities → label_entities() (consistent w/ ninja)
#   - supersummary: post_to_kata_cabinet == true → | bool (type-safe gate)
#   - supersummary: last_summary removed from review_data (duplicate of prompt_context)
#   - supersummary: event emitter kata/monk paths → monk.data.* (was monk.* — always {})
#   - ninja summarizer: post_to_kata_cabinet == true → | bool
#   - ninja summarizer: label_input guard for empty index_command (no leading comma)
#   - ninja summarizer: event emitter kata/monk paths → monk.data.*
#
# Scripts:
#   zen_dojotools_supersummary     — Whole-home synthesizer (v4.5.x)
#   zen_dojotools_ninja_summarizer — Per-component kata writer (v4.5.x)
#
# PIPELINE:
#   Ninja Summarizer → kata cabinet (per component) → SuperSummary → zen_summary → Friday
#
# USED BY:
#   automation.zen_dojotools_scheduler
#     every_10_minutes   → supersummary
#     quarter_hour       → ninja_summarizer (per component, per scheduler branch)
#     force_summary      → both
#
# MCP EXPOSURE:
#   zen_dojotools_supersummary     — expose (on-demand whole-home summary)
#   zen_dojotools_ninja_summarizer — expose (on-demand per-component kata)
#
# === UAT PASS — 2026-03-03 ===
# Auditor: Claude (Anthropic, Sonnet 4.6)
# HALMark: 0.9.10-draft — PASS Level 3 (Steward Safe) — Full pipeline verified
#
# zen_dojotools_supersummary (v4.5.x → v1.1.0):
#   namespace() fix — active_component_ids now populates (was always []) ✓
#   zen_summary key — prompt_context last_summary now loads (was always {}) ✓
#   active components gate — KF System Switch ON + kata drawer required ✓
#   live test — active_component_ids returned 10 components ✓
#     [hot_tub_manager, taskmaster, security_manager, alert_manager, energy_manager,
#      trash_trakker, water_manager, autovac, media_manager, room_manager]
#   rich per-component zen_summary produced; confidence: 0.95 ✓
#   post=false path (no cabinet write) → correct behavior ✓
#   post=true path — zen_summary written to kata cabinet, verification confirmed ✓
#   resolver sensor cabinet resolution — 10 components flowing ✓
#   post_to_kata_cabinet | bool gate — type-safe, passes correctly ✓
#   config check → go; restart → clean ✓
#
# zen_dojotools_ninja_summarizer (v4.5.x → v1.1.0):
#   library_command_result fix — monk receives library output (~MEDIA~ exercised) ✓
#   kata_cabinet var — kata_template reads dynamic entity (not hardcoded) ✓
#   label_input CSV — "Media Manager, Ninja Summary" — no leading comma ✓
#   post_to_kata_cabinet | bool gate — type-safe, passes correctly ✓
#   full kata write — media_manager drawer created, verification confirmed ✓
#   monk output: clean (no stale Plex data), urgency: 1, confidence: 0.9 ✓
#   config check → go; restart → clean ✓
#
# KNOWN BEHAVIOR:
#   event_emitter kata/monk excerpt fields depend on LLM returning kata_excerpt /
#   event_excerpt keys — paths are now correct (monk.data.*), field presence is
#   LLM-dependent. Not blocking.
###############################################################################

###############################################################################
# Summarizer kill switches — global on/off controls for the summary pipeline.
# Master (zen_summarizers_enabled) gates both. Individual switches gate each.
# All three default ON. Turning master off stops the full pipeline immediately
# without touching schedules, automations, or anything else.
###############################################################################

input_boolean:

  zen_summarizers_enabled:
    name: Zen Summarizers (Master)
    icon: mdi:pipe-valve

  zen_supersummarizer_enabled:
    name: Zen SuperSummarizer
    icon: mdi:home-circle

  zen_ninja_summarizer_enabled:
    name: Zen Ninja Summarizer
    icon: mdi:karate

  zen_action_emission_enabled:
    name: Zen Action Emission
    icon: mdi:lightning-bolt
    # Off by default. Operator turns this on to allow the ninja summarizer
    # to emit suggested_act_event kinds onto the event bus. The whitelist
    # (zen_summarizer_act_whitelist) is a separate per-kind gate.
    # AI cannot write to this boolean. Operator-only.

script:

  # ============================================================================
  zen_dojotools_supersummary:
    alias: Zen DojoTools SuperSummary
    description: >-
      SuperSummary (4.5.x). Whole-home synthesizer. Reads active component kata
      drawers gated by Kung Fu System Switch state. Builds zen_summary — the
      canonical home state that loads Friday's prompt context. (v4.5.x)
      Respects zen_summarizers_enabled (master) and zen_supersummarizer_enabled
      kill switches — early-outs immediately if either is off.
    icon: mdi:home-circle
    mode: single
    fields:
      query:
        name: Override Query
        description: Override the default summarization query.
        selector:
          text:
      post_to_kata_cabinet:
        name: Post to Kata Cabinet
        description: Post to the Kata Cabinet after summarization? (default false).
        selector:
          boolean:
      supplemental_prompt:
        name: Supplemental Prompt
        description: Extra instructions appended at the end of the summarization prompt.
        selector:
          text:
      caller_token:
        name: Caller Token
        description: Opaque token passed through by the caller for correlation. Not interpreted by this script.
        required: false
        selector:
          text:
      force:
        name: Force Run
        description: >-
          Bypass the cooldown governor. Use for admin overrides or emergency
          on-demand runs. Default false.
        default: false
        selector:
          boolean:

    sequence:

      # --------------------------------------------------------------
      # Always normalize User/AI inputs so we don't have to react JIT
      # --------------------------------------------------------------
      - variables:
          caller_token: "{{- caller_token | default('') -}}"

      # ── 0a. Kill switch — master + supersummarizer ─────────────────────────
      - alias: SuperSummary kill switch
        if:
          - condition: template
            value_template: >-
              {{ is_state('input_boolean.zen_summarizers_enabled', 'off')
                 or is_state('input_boolean.zen_supersummarizer_enabled', 'off') }}
        then:
          - stop: >-
              SuperSummary skipped — zen_summarizers_enabled or
              zen_supersummarizer_enabled is off.

      # ── 0. Guard — fail fast if ai_task entity unset ─────────────────────
      - alias: Validate ai_task entity
        if:
          - condition: template
            value_template: >-
              {{ states('input_text.zenos_ai_task_entity') | trim
                 in ['unknown','unavailable','none',''] }}
        then:
          - stop: "ai_task entity unset — aborting supersummary"
            error: true

      # ── 0b. Cooldown governor ─────────────────────────────────────────────
      # Reads super_burnout_seconds from zen_ninja_config in household cabinet.
      # Default 600s (10 min). Bypassed by force: true.
      - alias: SuperSummary cooldown governor
        variables:
          _super_gov_cfg: >-
            {%- set _household = states('sensor.zen_default_household_cabinet_resolved') -%}
            {%- set _cfg_raw = (state_attr(_household, 'variables') or {}).get('zen_ninja_config', {}) -%}
            {%- set _v1 = _cfg_raw.get('value', _cfg_raw) if _cfg_raw is mapping else {} -%}
            {{ (_v1 | from_json) if _v1 is string else _v1 }}
          _super_burnout: "{{ (_super_gov_cfg.get('super_burnout_seconds', 600) | int(600)) if _super_gov_cfg is mapping else 600 }}"
          _super_last_ts: >-
            {%- set _kc = states('sensor.zen_kata_cabinet_resolved') -%}
            {%- set _ts_str = (state_attr(_kc, 'variables') or {}).get('zen_summary', {}).get('timestamp', '') -%}
            {{ (_ts_str | as_datetime).timestamp() | float(0) if _ts_str | trim != '' else 0 }}
          _super_elapsed: "{{ (now().timestamp() - _super_last_ts) | round(0) | int }}"
          _super_blocked: "{{ _super_elapsed < _super_burnout | int and not (force | default(false) | bool) }}"
      - if:
          - condition: template
            value_template: "{{ _super_blocked }}"
        then:
          - event: zen_event
            event_data:
              event:
                kind: supersummary_run_blocked
                reason: cooldown_window
                elapsed_secs: "{{ _super_elapsed }}"
                burnout_secs: "{{ _super_burnout }}"
                severity: info
          - stop: >-
              SuperSummary governor — last run {{ _super_elapsed }}s ago
              (< {{ _super_burnout }}s cooldown). Skipping.

      # ── 0c. Start timer + emit summarizer_start ──────────────────────────
      - alias: Capture start time and emit summarizer_start
        variables:
          started_at: "{{ now().isoformat() }}"
      - event: zen_event
        event_data:
          kind: summarizer_start
          component: super_summary
          severity: info
          summary: SuperSummary run started
          metadata:
            started_at: "{{ started_at }}"

      # ── 1. Resolve cabinets ───────────────────────────────────────────────
      - alias: Resolve cabinets
        variables:
          dojo_cabinet: "{{ states('sensor.zen_dojo_cabinet_resolved') }}"
          kata_cabinet: "{{ states('sensor.zen_kata_cabinet_resolved') }}"
          monk_response: {}
          filecabinet_response: {}

      # ── 2. Load schema ────────────────────────────────────────────────────
      - alias: Load zen_template schema
        variables:
          zen_template: >-
            {{
              (
                (state_attr(kata_cabinet, 'variables') or {})
                .get('zen_template', {})
                .get('value', {})
                .get('structure', {})
              )
              | to_json
            }}

      # ── 3. Build prompt context ───────────────────────────────────────────
      - alias: Build prompt context
        variables:
          prompt_context: >-
            {%- import 'zenos_ai/zen_os_1.jinja' as zen -%}
            {%- set _persona = states('input_text.zenos_persona_name') | trim -%}
            {%- set cab_result = zen.zen_cabinets(_persona) -%}
            {%- set idcard_raw = zen.identity_cab_to_id_card(cab_result) | from_json -%}
            {%- set manifest   = zen.manifest_loader() | from_json -%}
            {%- set capsule    = zen.ai_capsule(idcard_raw) | from_json -%}
            {%- set overview   = states['sensor.home_overview'].attributes | default({}) -%}
            {%- set kata_vars  = state_attr(kata_cabinet, 'variables') or {} -%}
            {%- set last_sum   = kata_vars.get('zen_summary', {}) -%}
            {{
              {
                "identity":     idcard_raw,
                "manifest":     manifest,
                "capsule":      capsule,
                "overview":     overview,
                "last_summary": last_sum
              }
              | to_json
            }}

      # ── 4. Load last summary ──────────────────────────────────────────────
      - alias: Load last summary
        variables:
          last_summary: >-
            {%- set _raw = (state_attr(kata_cabinet, 'variables') or {}).get('zen_summary', {}) -%}
            {%- set _v1 = _raw if _raw is mapping else (_raw | from_json if _raw is string else {}) -%}
            {%- set _v2 = _v1 if _v1 is mapping else (_v1 | from_json if _v1 is string else {}) -%}
            {{ _v2 | tojson }}

      # ── 5. Collect active components — direct tier only ──────────────────
      # FIX: was {% set active = {} %} inside for loop — Jinja2 scoping bug,
      #      always returned {}. Fixed with namespace().
      # v1.2.0: pipeline_tier split. ambient + system tier components excluded
      #   from direct component_data. Ambient context flows via Trapper Keeper
      #   kata (step 5b). Drawers with no pipeline_tier default to 'direct'
      #   for backwards compatibility.
      - alias: Collect active components — direct tier only
        variables:
          active_components: >-
            {%- set dojo = state_attr(dojo_cabinet, 'variables') | default({}, true) -%}
            {%- set kata = state_attr(kata_cabinet, 'variables') | default({}, true) -%}
            {%- set ns = namespace(active={}) -%}
            {%- for key, drawer in dojo.items() if key not in ['AI_Cabinet_VolumeInfo', 'kfc_template'] -%}
              {%- if drawer is mapping -%}
                {%- set _v1 = drawer.get('value', drawer) -%}
                {%- set _v2 = _v1 if _v1 is mapping else (_v1 | from_json if _v1 is string else {}) -%}
                {%- set val = _v2 if _v2 is mapping else (_v2 | from_json if _v2 is string else {}) -%}
                {%- if val is mapping and val.get('kata_key', '') != '' -%}
                  {%- set comp_key = val.get('kata_key', key) -%}
                  {%- set _meta = val.get('meta', {}) -%}
                  {%- set _meta = _meta if _meta is mapping else {} -%}
                  {%- set resolved = _meta.get('enabled', true) | bool -%}
                  {%- set tier = val.get('pipeline_tier', 'direct') | lower -%}
                  {%- if resolved and comp_key in kata and tier not in ['ambient', 'system'] -%}
                    {%- set kd = kata[comp_key] -%}
                    {%- set kv = kd.get('value', {}) if kd is mapping else {} -%}
                    {%- set ns.active = ns.active | combine({comp_key: kv}) -%}
                  {%- endif -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.active }}

      - alias: Extract active component IDs
        variables:
          active_component_ids: "{{ active_components.keys() | list }}"

      # ── 5b. Load ambient context from Trapper Keeper kata ────────────────
      # Trapper Keeper pre-digests all ambient-tier components into a compact
      # breadcrumb + navigation index. SuperSummary reads the Keeper output
      # instead of loading 9 raw ambient katas directly.
      - alias: Load ambient context from Trapper Keeper
        variables:
          ambient_context: >-
            {%- set kata = state_attr(kata_cabinet, 'variables') | default({}, true) -%}
            {%- set _raw = kata.get('trapper_keeper', {}) -%}
            {%- set _v1 = _raw if _raw is mapping else (_raw | from_json if _raw is string else {}) -%}
            {%- set _v2 = _v1.get('value', _v1) if _v1 is mapping else {} -%}
            {%- set _v3 = _v2 if _v2 is mapping else (_v2 | from_json if _v2 is string else {}) -%}
            {{ _v3 | tojson }}

      # ── 6. Collect component kata values ─────────────────────────────────
      - alias: Init component data
        variables:
          component_data: {}

      - repeat:
          for_each: "{{ active_component_ids }}"
          sequence:
            - variables:
                comp_raw: >-
                  {{
                    (state_attr(kata_cabinet, 'variables') or {}).get(repeat.item, {})
                  }}
            - variables:
                comp_drawer: >-
                  {%- if comp_raw is string -%}
                    {{ comp_raw | from_json }}
                  {%- else -%}
                    {{ comp_raw }}
                  {%- endif -%}
            - variables:
                component_data: >-
                  {{
                    dict(
                      component_data,
                      **{ repeat.item: comp_drawer.get('value', {}) }
                    )
                  }}

      # ── 7. Build prompt ───────────────────────────────────────────────────
      - alias: Build summarization prompt
        variables:
          default_query: >-
            Given the attached context, fill out the ZEN_SUMMARY schema.
            Return ONLY valid JSON matching the schema in zen_template. No markdown.
            No extra prose. Normalize all fields. If missing, return null or {}.
            Include ONLY active components. Provide Cliff's Notes for important
            events, anomalies, and near-term focus.
            review_data.ambient_context contains the Trapper Keeper pre-digest —
            a compact breadcrumb + navigation index for all ambient-tier components
            (weather, rooms, laundry, dishes, media, autovac, trash, water heater,
            groceries). Use it for ambient awareness. Do NOT enumerate ambient
            component details inline — the Keeper has already pre-chewed them.
            AMBIENT URGENCY PROMOTION RULE (apply exactly — not vibes-based):
              Use review_data.ambient_context.urgency (the number the Keeper set) as the
              promotion score. Do NOT re-evaluate or re-score the ambient data yourself.
              The Trapper Keeper is the authoritative source. Trust the number.
              urgency 0-3  → ambient_nav only. No mention elsewhere.
              urgency 4-5  → add one line to zen_summary.attention. Do NOT add to active_components.
              urgency 6-10 → add to zen_summary.attention AND add an entry to active_components
                             (treat as direct tier for this run only).
            Populate ambient_nav by copying review_data.ambient_context directly.
            Set ambient_nav.kata_cabinet to review_data.kata_cabinet.
            ambient_nav is the agent's live-conversation navigation index — it lets the
            agent cold-read any ambient component kata on demand with one FileCabinet call.
            Do NOT summarize or compress ambient_nav — pass it through verbatim.
            Do NOT copy errors from last_summary into the errors[] field.
            The errors[] array is for errors encountered during THIS run only.
            Return errors: [] if no new errors occurred.
          query: "{{ query | default(default_query) }}"
          review_data: >-
            {{
              {
                "kata_cabinet":    kata_cabinet,
                "prompt_context":  prompt_context | default({}),
                "components":      component_data | default({}),
                "ambient_context": ambient_context | default({})
              }
            }}
          example_data: >-
            {{
              (state_attr(kata_cabinet, 'variables') or {})
              .get('zen_template', {})
              .get('value', {})
              .get('example', {})
            }}
          prompt: >-
            {{
              {
                "query":                     query,
                "structure":                 zen_template,
                "example_data":              example_data,
                "review_data":               review_data,
                "supplemental_instructions": supplemental_prompt | default({})
              }
              | to_json
            }}

      # ── 8. Run monk ───────────────────────────────────────────────────────
      - alias: Monk Runner
        action: ai_task.generate_data
        data:
          task_name: SuperSummary Monk
          instructions: "{{ prompt }}"
          entity_id: "{{ states('input_text.zenos_ai_task_entity') }}"
        response_variable: monk_response

      - alias: Extract zen summary from monk response
        variables:
          zen_summary: >-
            {%- set ns = namespace(raw=monk_response.data | default('') | string | trim) -%}
            {%- set ns.raw = ns.raw | regex_replace('(?s)^```[a-zA-Z]*\n?(.+?)\n?```\s*$', '\\1') | trim -%}
            {{ ns.raw }}

      # ── 8a. Compute run duration ──────────────────────────────────────────
      - alias: Compute run duration
        variables:
          duration_seconds: "{{ ((now() - (started_at | as_datetime)).total_seconds()) | round(1) }}"

      # ── 8b. Write supersummary status drawer ─────────────────────────────
      - alias: Write supersummary status drawer
        action: script.zen_dojotools_filecabinet
        data:
          action_type: update
          set_timestamp: true
          force_action: true
          show_hidden_volumes: false
          volume_entity_id:
            - "{{ kata_cabinet }}"
          key: zen_supersummary_status
          value: >-
            {{
              {
                "status": "ok" if (zen_summary and zen_summary != {}) else "error",
                "components": active_component_ids | default([]) | length,
                "component_ids": active_component_ids | default([]),
                "duration_seconds": duration_seconds | default(0),
                "run_started_at": started_at | default('')
              } | tojson
            }}
          label_input: zen_summary

      # ── 9. Post to kata cabinet ───────────────────────────────────────────
      - alias: Post zen_summary to kata cabinet
        if:
          - condition: template
            value_template: "{{ zen_summary and (post_to_kata_cabinet | default(false) | bool) }}"
        then:
          - delay:
              milliseconds: 250
          - action: script.zen_dojotools_filecabinet
            data:
              action_type: update
              set_timestamp: true
              show_hidden_volumes: false
              force_action: true
              volume_entity_id:
                - "{{ kata_cabinet }}"
              key: ZEN_SUMMARY
              value: "{{ zen_summary }}"
              label_input: Zen Summary
            response_variable: filecabinet_response

      # ── 10. Build response + emit ─────────────────────────────────────────
      - alias: Build final response
        variables:
          component: super_summary
          final_response: >-
            {{
              {
                "active_component_ids": active_component_ids | default([]),
                "monk":                 monk_response | default({}),
                "post":                 post_to_kata_cabinet | default(false),
                "filecabinet_write":    filecabinet_response | default({}),
                "caller_token":         caller_token,
                "duration_seconds":     duration_seconds | default(0),
                "run_started_at":       started_at | default('')
              }
            }}

      - alias: Emit event
        action: script.zen_dojotools_event_emitter
        data:
          component: "{{ component }}"
          severity: >-
            {%- if final_response.filecabinet_write
                and final_response.filecabinet_write.status == 'error' -%}
              error
            {%- else -%}
              info
            {%- endif -%}
          kind: kata_emit
          summary: >-
            Script '{{ component }}' completed.
            Post-to-kata={{ final_response.post }},
            filecabinet={{ final_response.filecabinet_write.status | default('unknown') }}.
          metadata:
            active_components: "{{ final_response.active_component_ids }}"
            post_to_kata: "{{ final_response.post }}"
            filecabinet_status: "{{ final_response.filecabinet_write.status | default('unknown') }}"
            filecabinet_message: "{{ final_response.filecabinet_write.message | default('') }}"
            duration_seconds: "{{ final_response.duration_seconds | default(0) }}"
            run_started_at: "{{ final_response.run_started_at | default('') }}"
          kata: >-
            {{
              final_response.monk.data.kata_excerpt
              if final_response.monk is defined
              and final_response.monk.data is defined
              and final_response.monk.data.kata_excerpt is defined
              else {}
            }}
          monk: >-
            {{
              final_response.monk.data.event_excerpt
              if final_response.monk is defined
              and final_response.monk.data is defined
              and final_response.monk.data.event_excerpt is defined
              else {}
            }}

      - stop: Return Response
        response_variable: final_response


  # ============================================================================
  zen_dojotools_ninja_summarizer:
    alias: Zen DojoTools Ninja Summarizer
    description: >-
      Ninja Summarizer (4.5.x). Hyper(graph)-aware per-component kata writer.
      Collects context defined by a Kung Fu component in the Dojo cabinet and
      submits it to a trusted LLM monk. Writes result to kata cabinet drawer.
      Queues up to 2 concurrent runs. ~15s warm, ~60s cold. (v4.5.x)
    icon: mdi:karate
    mode: queued
    max: 2
    fields:
      kung_fu_component_id:
        name: Kung Fu Component ID
        description: Valid Kung Fu Component ID to summarize to Kata Cabinet (will be slugified).
        default: kung_fu
        selector:
          text:
      query:
        name: Override Query
        description: OVERRIDES default query if provided. Use with caution.
        selector:
          text:
      post_to_kata_cabinet:
        name: Post to Kata Cabinet
        description: Post to the kata cabinet after successful summarization? (Default false)
        selector:
          boolean:
      supplemental_prompt:
        name: Supplemental Prompt
        description: Additional data or instructions appended to the prompt.
        selector:
          text:
      caller_token:
        name: Caller Token
        description: Opaque token passed through by the caller for correlation. Not interpreted by this script.
        required: false
        selector:
          text:
      force:
        name: Force Run
        description: >-
          Bypass the run governor (dedup burnout window). Use for admin overrides
          or emergency on-demand runs. Default false.
        default: false
        required: false
        selector:
          boolean:
      index_call_override:
        name: Index Call Override
        description: >-
          Optional JSON string. When set, replaces the dojo drawer's index_call
          for this run. Used by the scheduler for per-schedule sub-runs where
          each schedule has its own HyperIndex query (e.g. room_manager schedules).
        required: false
        selector:
          text:
      parent_component_id:
        name: Parent Component ID
        description: >-
          Optional. When running as a sub-schedule, the parent KFC slug whose
          dojo drawer provides component_instructions and metadata. When set,
          dojo drawer loads from parent_component_id instead of component_slug.
        required: false
        selector:
          text:

    sequence:
      # --------------------------------------------------------------
      # Always normalize User/AI inputs so we don't have to react JIT
      # --------------------------------------------------------------
      - variables:
          caller_token: "{{- caller_token | default('') -}}"

      # ── 0a. Kill switch — master + ninja summarizer ────────────────────────
      - alias: Ninja Summarizer kill switch
        if:
          - condition: template
            value_template: >-
              {{ is_state('input_boolean.zen_summarizers_enabled', 'off')
                 or is_state('input_boolean.zen_ninja_summarizer_enabled', 'off') }}
        then:
          - stop: >-
              Ninja Summarizer skipped — zen_summarizers_enabled or
              zen_ninja_summarizer_enabled is off.

      # ── 0. Guard — fail fast if ai_task entity unset ─────────────────────
      - alias: Validate ai_task entity
        if:
          - condition: template
            value_template: >-
              {{ states('input_text.zenos_ai_task_entity') | trim
                 in ['unknown','unavailable','none',''] }}
        then:
          - stop: "ai_task entity unset — aborting ninja summarizer"
            error: true

      # ── 0b. Start timer + emit summarizer_start ──────────────────────────
      - alias: Capture start time and emit summarizer_start
        variables:
          started_at: "{{ now().isoformat() }}"
      - event: zen_event
        event_data:
          kind: summarizer_start
          component: ninja_summary
          severity: info
          summary: "Ninja Summarizer run started for {{ kung_fu_component_id | slugify }}"
          metadata:
            started_at: "{{ started_at }}"
            component: "{{ kung_fu_component_id | slugify }}"

      # ── 1. Resolve cabinets + slug ────────────────────────────────────────
      - alias: Resolve cabinets and component slug
        variables:
          dojo_cabinet: "{{ states('sensor.zen_dojo_cabinet_resolved') }}"
          kata_cabinet: "{{ states('sensor.zen_kata_cabinet_resolved') }}"
          household_cabinet: "{{ states('sensor.zen_default_household_cabinet_resolved') }}"
          monk_response: {}
          filecabinet_response: {}
          component_slug: "{{ kung_fu_component_id | slugify | default('kung_fu') }}"
          _parent_slug: "{{ parent_component_id | default('', true) | slugify }}"
          _index_override_raw: "{{ index_call_override | default('', true) }}"

      # ── 2. Read dojo + household drawers ──────────────────────────────────
      - alias: Read dojo drawer
        variables:
          dojo_drawer: >-
            {%- set _key = _parent_slug if _parent_slug | trim != '' else component_slug -%}
            {{ (state_attr(dojo_cabinet, 'variables') or {}).get(_key, {}) }}
          household_drawer: >-
            {{ (state_attr(household_cabinet, 'variables') or {}).get(component_slug, {}) }}

      - alias: Unpack drawer values
        variables:
          dojo_drawer_value: "{{ dojo_drawer.value | default({}) }}"
          household_drawer_value: "{{ household_drawer.value | default({}) }}"

      # ── 2b. FG-38-safe household drawer unwind ────────────────────────────
      - alias: Unwind household drawer — extract interpretation and policy_overlays
        variables:
          _hh_v1: >-
            {%- set _r = household_drawer -%}
            {%- set _v1 = _r.get('value', _r) if _r is mapping else {} -%}
            {{ (_v1 | from_json) if _v1 is string else _v1 }}
          _hh: >-
            {%- set _v = _hh_v1 -%}
            {{ _v if _v is mapping else ((_v | from_json) if _v is string else {}) }}
          hh_interpretation: >-
            {%- set i = _hh.get('interpretation', {}) if _hh is mapping else {} -%}
            {{ i if i is mapping else {} }}
          hh_policy_overlays: >-
            {%- set p = _hh.get('policy_overlays', {}) if _hh is mapping else {} -%}
            {{ p if p is mapping else {} }}

      # ── 3. Extract component metadata ─────────────────────────────────────
      - alias: Extract component metadata from dojo drawer
        variables:
          version: "{{ (dojo_drawer.version | default('')) or (dojo_drawer_value.version | default('')) }}"
          friendly_name: "{{ (dojo_drawer.friendly_name | default('')) or (dojo_drawer_value.friendly_name | default('')) }}"
          index_command: "{{ (dojo_drawer.label | default('')) or (dojo_drawer_value.label | default('')) }}"
          component_summary: "{{ (dojo_drawer.component_summary | default('')) or (dojo_drawer_value.component_summary | default('')) }}"
          tool: "{{ (dojo_drawer.tool | default('')) or (dojo_drawer_value.tool | default('')) }}"
          kata_key: >-
            {%- set _k = (dojo_drawer.kata_key | default('')) or (dojo_drawer_value.kata_key | default('')) -%}
            {{ _k if _k | trim != '' else component_slug }}
          component_instructions: "{{ (dojo_drawer.component_instructions | default('')) or (dojo_drawer_value.component_instructions | default('')) }}"
          trigger_subscriptions: >-
            {%- set _ts = (dojo_drawer.trigger_subscriptions | default(none)) -%}
            {%- set _ts = _ts if _ts is not none else (dojo_drawer_value.trigger_subscriptions | default(none)) -%}
            {{ _ts if _ts is not none else [] }}
          drift_threshold: >-
            {%- set _dt = (dojo_drawer.drift_threshold | default(none)) -%}
            {%- set _dt = _dt if _dt is not none else (dojo_drawer_value.drift_threshold | default(none)) -%}
            {{ _dt | int if _dt is not none else 7 }}
          emission_cooldown_minutes: >-
            {%- set _ecm = (dojo_drawer.emission_cooldown_minutes | default(none)) -%}
            {%- set _ecm = _ecm if _ecm is not none else (dojo_drawer_value.emission_cooldown_minutes | default(none)) -%}
            {{ _ecm | int if _ecm is not none else 60 }}
          staleness_minutes: >-
            {%- set _sm = (dojo_drawer.staleness_minutes | default(none)) -%}
            {%- set _sm = _sm if _sm is not none else (dojo_drawer_value.staleness_minutes | default(none)) -%}
            {{ _sm | int if _sm is not none else 1440 }}
          index_call: >-
            {%- set _ior = _index_override_raw | default('', true) | trim -%}
            {%- if _ior != '' -%}
              {%- set _parsed = (_ior | from_json) if _ior is string else _ior -%}
              {{ _parsed if _parsed is mapping else {} }}
            {%- else -%}
              {%- set _ic = (dojo_drawer.index_call | default(none)) -%}
              {%- set _ic = _ic if _ic is not none else (dojo_drawer_value.index_call | default(none)) -%}
              {{ _ic if _ic is mapping else {} }}
            {%- endif -%}
          meta_enabled: >-
            {%- set _meta = (dojo_drawer.meta | default(none)) -%}
            {%- set _meta = _meta if _meta is not none else (dojo_drawer_value.meta | default(none)) -%}
            {%- set _meta = _meta if _meta is mapping else {} -%}
            {{ _meta.get('enabled', true) | bool }}

      # ── 3a. Gate on meta.enabled ──────────────────────────────────────────
      - alias: Gate on meta.enabled — skip disabled components
        if:
          - condition: template
            value_template: "{{ not meta_enabled }}"
        then:
          - event: zen_event
            event_data:
              kind: summarizer_skip
              component: "{{ component_slug }}"
              reason: meta_disabled
              severity: info
          - stop: "Ninja summarizer skipped — meta.enabled is false for {{ component_slug }}"

      # ── 3b. Run governor — dedup burnout window ───────────────────────────
      # Reads burnout_seconds from zen_ninja_config drawer in household cabinet.
      # Default 300s (5 min). Bypassed by force: true (admin/emergency only).
      - alias: Run governor — block duplicate runs within burnout window
        variables:
          _gov_cfg: >-
            {%- set _cfg_raw = (state_attr(household_cabinet, 'variables') or {}).get('zen_ninja_config', {}) -%}
            {%- set _v1 = _cfg_raw.get('value', _cfg_raw) if _cfg_raw is mapping else {} -%}
            {{ (_v1 | from_json) if _v1 is string else _v1 }}
          _gov_burnout: "{{ (_gov_cfg.get('burnout_seconds', 300) | int(300)) if _gov_cfg is mapping else 300 }}"
          _gov_last_raw: >-
            {%- set _kv = (state_attr(kata_cabinet, 'variables') or {}).get('zen_ninja_last_run_' ~ component_slug, {}) -%}
            {%- set _v1 = _kv.get('value', _kv) if _kv is mapping else {} -%}
            {{ (_v1 | from_json) if _v1 is string else _v1 }}
          _gov_last_ts: >-
            {%- set _d = _gov_last_raw if _gov_last_raw is mapping else {} -%}
            {%- set _ts_str = _d.get('run_started_at', '') -%}
            {{ (_ts_str | as_datetime).timestamp() | float(0) if _ts_str | trim != '' else 0 }}
          _gov_elapsed: "{{ (now().timestamp() - _gov_last_ts) | round(0) | int }}"
          _gov_blocked: "{{ _gov_elapsed < _gov_burnout | int and not (force | default(false) | bool) }}"
      - if:
          - condition: template
            value_template: "{{ _gov_blocked }}"
        then:
          - event: zen_event
            event_data:
              event:
                kind: summarizer_run_blocked
                component: "{{ component_slug }}"
                reason: dedup_window
                elapsed_secs: "{{ _gov_elapsed }}"
                burnout_secs: "{{ _gov_burnout }}"
                severity: info
          - stop: >-
              Ninja summarizer governor — {{ component_slug }} ran {{ _gov_elapsed }}s ago
              (< {{ _gov_burnout }}s burnout window). Absorbing duplicate run.

      # ── 4. Run HyperIndex ─────────────────────────────────────────────────
      - alias: Run HyperIndex using full index_call from KFC drawer
        if:
          - alias: If index_call or fallback label exists
            condition: template
            value_template: >-
              {{ (index_call is mapping and index_call.keys() | list | length > 0)
                 or index_command | trim != '' }}
        then:
          - choose:
            - conditions: "{{ index_call is mapping and index_call.get('index_command', '') not in ['', none, {}] }}"
              sequence:
                - action: script.zen_dojotools_index
                  data:
                    index_command: >-
                      {%- set _ic = index_call.get('index_command') -%}
                      {{ _ic | tojson if _ic is mapping else _ic | string }}
                    expand_entities: "{{ index_call.get('expand_entities', true) }}"
                    output_fields:   "{{ index_call.get('output_fields', []) }}"
                    mode: hypergraph
                    timeout: 5
                  response_variable: zen_index_result
            default:
              - action: script.zen_dojotools_index
                data:
                  label_1:         "{{ index_call.get('label_1', index_command) if index_call is mapping and index_call else index_command }}"
                  label_2:         "{{ index_call.get('label_2', none) if index_call is mapping and index_call else none }}"
                  operator:        "{{ index_call.get('operator', 'AND') if index_call is mapping and index_call else 'AND' }}"
                  expand_entities: "{{ index_call.get('expand_entities', true) if index_call is mapping and index_call else true }}"
                  output_fields:   "{{ index_call.get('output_fields', []) if index_call is mapping and index_call else [] }}"
                  filter_json:     "{{ index_call.get('filter_json', {}) if index_call is mapping and index_call else {} }}"
                  timeout: 2
                  mode: hypergraph
                response_variable: zen_index_result

      - alias: Capture index result
        variables:
          index_result: >-
            {{
              {
                "command": index_command | default(''),
                "result":  zen_index_result | default({})
              }
            }}

      # ── 4b. Domain tool supplement — todo/calendar via event bus ─────────
      - alias: Supplement with Inspect — full entity detail via event bus
        if:
          - condition: template
            value_template: >-
              {{ zen_index_result is defined
                 and zen_index_result is mapping
                 and zen_index_result.get('result', {}).get('simple', []) | length > 0 }}
        then:
          - variables:
              _inspect_cid: >-
                {%- import 'zenos_ai/zenos_cabinets.jinja' as CABS -%}
                {{- CABS.cabinet_guid_new() -}}
          - event: zen_event
            event_data:
              event:
                kind: dojotool_call
                tool: zen_dojotools_inspect
                version: "1"
                correlation_id: "{{ _inspect_cid }}"
                payload:
                  entity_id: >-
                    {%- set _all = zen_index_result.get('result', {}).get('simple', []) -%}
                    {%- set _limit = index_call.get('domain_inspect_limit', 25) | int(25) -%}
                    {%- set _domains = index_call.get('domain_inspect_domains', []) -%}
                    {%- if _domains | length > 0 -%}
                      {%- set _ns = namespace(filtered=[]) -%}
                      {%- for _eid in _all -%}
                        {%- if _eid.split('.')[0] in _domains -%}
                          {%- set _ns.filtered = _ns.filtered + [_eid] -%}
                        {%- endif -%}
                      {%- endfor -%}
                      {{ _ns.filtered[:_limit] }}
                    {%- else -%}
                      {{ _all[:_limit] }}
                    {%- endif -%}
                  output_fields: "+attributes"
                  caller_token: "{{ caller_token }}"
          - wait_for_trigger:
              - trigger: event
                event_type: zen_event
                event_data:
                  event:
                    kind: dojotool_return
                    correlation_id: "{{ _inspect_cid }}"
            timeout: "00:00:10"
            continue_on_timeout: true
          - variables:
              domain_context: >-
                {%- if wait.trigger is not none -%}
                  {{ wait.trigger.event.data.event.get('result', {}) }}
                {%- else -%}
                  {}
                {%- endif -%}

      # ── 5b. Size guard — abort before review_data overflows ─────────────────
      - alias: Size guard — abort if review_data would exceed template limit
        variables:
          _domain_ctx_size: "{{ domain_context | tojson | length if domain_context is mapping else 0 }}"
          _index_size: "{{ index_result | tojson | length if index_result is mapping else 0 }}"
          _review_size_estimate: "{{ _domain_ctx_size + _index_size }}"
      - if:
          - condition: template
            value_template: "{{ _review_size_estimate | int > 200000 }}"
        then:
          - event: zen_event
            event_data:
              event:
                kind: summarizer_size_exceeded
                component: "{{ component_slug }}"
                domain_context_bytes: "{{ _domain_ctx_size }}"
                index_bytes: "{{ _index_size }}"
                estimated_total: "{{ _review_size_estimate }}"
                limit: 262144
                hint: >-
                  Add domain_inspect_domains or reduce domain_inspect_limit
                  in this KFC's index_call to limit domain context size.
                severity: warn
          - stop: >-
              review_data size estimate {{ _review_size_estimate }} exceeds safe
              limit (262144). Aborting {{ component_slug }} ninja summarizer run.
              Set index_call.domain_inspect_domains to filter entity domains.
            error: true

      # ── 6. Build monk prompt ──────────────────────────────────────────────
      - alias: Build monk prompt
        variables:
          default_query: >-
            Given attached context, complete the fields defined in the structure.
            Return ONLY a valid JSON object with exactly those fields, no extra
            text, no markdown. If no data is available return null or none for
            that element. Your output must strictly match the structure. Do not
            report on Kung Fu internal operations (master switches etc) — those
            are monitored by external watchdog. (Who watches the watchmen?)
            Your data includes the component purpose, an index of the component's
            entities, household context, and interpretation guidance including
            urgency_rules. Use all available data to infer current status,
            near-term events, anomalies, and suggested actions. Author
            "Cliff's Notes" for the component: what's important, what to look
            at, where to dig deeper. Stretch a little if needed — adjust
            confidence accordingly. The frontline AI will have all Zen Kata
            summaries super-summarized within ~15 minutes. If missing info,
            use the error field to request it for future runs.
          query: >-
            {%- set _base = query | default(default_query) -%}
            {{ (_base ~ '\n\n' ~ component_instructions) if component_instructions | trim != '' else _base }}
          # FG-38-safe kata_template unwind
          kata_template: >-
            {%- set _kt_raw = (state_attr(kata_cabinet, 'variables') or {}).get('kata_template', {}) -%}
            {%- set _kt_v1 = _kt_raw.get('value', _kt_raw) if _kt_raw is mapping else {} -%}
            {%- set _kt_v2 = (_kt_v1 | from_json) if _kt_v1 is string else _kt_v1 -%}
            {{- _kt_v2.get('structure', {}) if _kt_v2 is mapping else {} -}}
          review_data: >-
            {{
              {
                "kung_fu_component_id": component_slug | default(''),
                "run_context": {
                  "started_at":       started_at | default(''),
                  "utc_now":          utcnow().isoformat(),
                  "today_utc_date":   utcnow().strftime('%Y-%m-%d'),
                  "local_now":        now().isoformat(),
                  "today_local_date": now().strftime('%Y-%m-%d')
                },
                "library_data": {
                  "dojo_cabinet":          dojo_cabinet | default(''),
                  "kata_cabinet":          kata_cabinet | default(''),
                  "drawer":                dojo_drawer | default({}),
                  "household_prefs":       _hh | default({}),
                  "interpretation":        hh_interpretation | default({}),
                  "policy_overlays":       hh_policy_overlays | default({}),
                  "trigger_subscriptions": trigger_subscriptions | default([]),
                  "index":                 index_result | default({}),
                  "domain_context":        domain_context | default({})
                },
                "tool": tool | default('')
              }
            }}
          example_data: >-
            {"subjective":null,"general_inference":"Kung Fu component v3.0.0
            manages dojo and kata cabinet status, prioritizes production
            components, and updates the Kata Wall.","attention":"Monitor dojo
            and kata cabinets and the Kung Fu master switch for status
            changes within the next hour.","objective":"Reports on/off state
            of dojo and kata cabinets via sensors, ensuring production
            components are prioritized over beta modules, and triggers Kata
            Wall updates on status changes.","events":[{"trigger":
            "is_everyone_kung_fu_fighting","timestamp":
            "2025-09-19T12:51:20+00:00"}],"watchlist":["sensor.zen_dojo_cabinet",
            "sensor.zen_kata_storage_cabinet"
            ],"error":null,"post":true,
            "urgency":2,"confidence":0.9,
            "action_required":false,"suggested_act_event":null}
          supplemental_instructions: "{{ supplemental_prompt | default('') }}"
          prompt: >-
            {{
              {
                "query":                     query | default({}),
                "structure":                 kata_template | default({}),
                "example_data":              example_data | default({}),
                "review_data":               review_data | default({}),
                "supplemental_instructions": supplemental_instructions | default({})
              }
              | to_json
            }}

      # ── 7. Run monk ───────────────────────────────────────────────────────
      - alias: Monk Runner — Perform ai_task
        action: ai_task.generate_data
        data:
          task_name: "{{ kung_fu_component_id | title }} Monk"
          instructions: "{{ prompt }}"
          entity_id: "{{ states('input_text.zenos_ai_task_entity') }}"
        response_variable: monk_response

      - alias: Extract kata summary from monk response
        variables:
          kata_summary: >-
            {%- set ns = namespace(raw=monk_response.data | default('') | string | trim) -%}
            {%- if ns.raw[:7] == '```json' -%}{%- set ns.raw = ns.raw[7:] | trim -%}{%- endif -%}
            {%- if ns.raw[:3] == '```' -%}{%- set ns.raw = ns.raw[3:] | trim -%}{%- endif -%}
            {%- if ns.raw[-3:] == '```' -%}{%- set ns.raw = ns.raw[:-3] | trim -%}{%- endif -%}
            {{ ns.raw }}

      # ── 7b. Parse urgency signal + emit pipeline ─────────────────────────
      - alias: Parse urgency fields from Monk response
        variables:
          _kata_parsed: >-
            {%- set _s = kata_summary -%}
            {{ (_s | from_json) if _s is string else (_s if _s is mapping else {}) }}
          _urgency: "{{ _kata_parsed.get('urgency', 0) | int if _kata_parsed is mapping else 0 }}"
          _confidence: "{{ _kata_parsed.get('confidence', 0.0) | float if _kata_parsed is mapping else 0.0 }}"
          _action_required: "{{ _kata_parsed.get('action_required', false) | bool if _kata_parsed is mapping else false }}"
          _suggested_act_event: "{{ _kata_parsed.get('suggested_act_event', '') | default('', true) if _kata_parsed is mapping else '' }}"
          _current_period: "{{ states('input_select.zen_home_mode') | default('', true) }}"
          _ninja_cfg: >-
            {%- set _hh = states('sensor.zenos_default_household_cabinet') -%}
            {%- set _cfg_raw = (state_attr(_hh, 'variables') or {}).get('zen_ninja_config', {}) if _hh != '' else {} -%}
            {%- set _cfg = _cfg_raw.get('value', _cfg_raw) if _cfg_raw is mapping else {} -%}
            {{ _cfg if _cfg is mapping else {} }}
          _push_floor: "{{ (_ninja_cfg.get('push_gate_urgency_floor', 4)) | int }}"
          _push_life_safety: "{{ (_ninja_cfg.get('push_gate_life_safety_bypass', 8)) | int }}"

      - alias: Read last_emission_at from existing kata drawer for cooldown check
        variables:
          _existing_kata_raw: >-
            {%- set _r = (state_attr(kata_cabinet, 'variables') or {}).get(component_slug, {}) -%}
            {%- set _v1 = _r.get('value', _r) if _r is mapping else {} -%}
            {{ (_v1 | from_json) if _v1 is string else _v1 }}
          _emission_stamp_raw: >-
            {%- set _kv = (state_attr(kata_cabinet, 'variables') or {}).get('zen_last_emission_' ~ kata_key, {}) -%}
            {%- set _v1 = _kv.get('value', _kv) if _kv is mapping else {} -%}
            {{ (_v1 | from_json) if _v1 is string else _v1 }}
          _last_emission_at: >-
            {%- set _e = _existing_kata_raw if _existing_kata_raw is mapping else {} -%}
            {%- set _s = _emission_stamp_raw if _emission_stamp_raw is mapping else {} -%}
            {%- set _from_kata = _e.get('last_emission_at', none) -%}
            {%- set _from_stamp = _s.get('last_emission_at', none) -%}
            {%- if _from_stamp is not none and _from_stamp | trim not in ['', 'None'] -%}
              {{ _from_stamp }}
            {%- else -%}
              {{ _from_kata }}
            {%- endif -%}
          _minutes_since_last: >-
            {%- if _last_emission_at is not none and _last_emission_at | trim != '' and _last_emission_at != 'None' -%}
              {%- set _parsed = _last_emission_at | as_datetime | default(none, true) -%}
              {%- if _parsed is not none -%}
                {{ ((now().timestamp() - (_parsed | as_timestamp)) / 60) | round(1) }}
              {%- else -%}
                {{ emission_cooldown_minutes + 1 }}
              {%- endif -%}
            {%- else -%}
              {{ emission_cooldown_minutes + 1 }}
            {%- endif -%}
          _cooldown_active: "{{ (_minutes_since_last | float) < (emission_cooldown_minutes | int) }}"

      - alias: Emit emission_suppressed if cooldown active
        if:
          - condition: template
            value_template: "{{ _cooldown_active and post_to_kata_cabinet | default(false) | bool }}"
        then:
          - event: zen_event
            event_data:
              kind: emission_suppressed
              component: "{{ kata_key }}"
              reason: cooldown
              minutes_remaining: "{{ (emission_cooldown_minutes | int - _minutes_since_last | float) | round(1) }}"
              severity: info

      - alias: Emit summary_force if urgency at or above drift_threshold
        if:
          - condition: template
            value_template: >-
              {{ not _cooldown_active
                 and post_to_kata_cabinet | default(false) | bool
                 and (_urgency | int) >= (drift_threshold | int) }}
        then:
          - event: zen_event
            event_data:
              event:
                kind: summary_force
                component: "{{ kata_key }}"
                urgency: "{{ _urgency }}"
                severity: warning

      - alias: Emit dojotool_call for urgency handler if action_required
        if:
          - condition: template
            value_template: >-
              {{ not _cooldown_active
                 and post_to_kata_cabinet | default(false) | bool
                 and _action_required }}
        then:
          - variables:
              _urgency_correlation_id: >-
                {%- import 'zenos_ai/zenos_cabinets.jinja' as CABS -%}
                {{- CABS.cabinet_guid_new() -}}
          - event: zen_event
            event_data:
              event:
                kind: dojotool_call
                tool: zen_dojotools_urgency_handler
                version: "1"
                correlation_id: "{{ _urgency_correlation_id }}"
                payload:
                  component_slug: "{{ component_slug }}"
                  kata_key: "{{ kata_key }}"
                  urgency: "{{ _urgency }}"
                  action_required: "{{ _action_required }}"
                  suggested_act_event: "{{ _suggested_act_event }}"

      - alias: Emit suggested_act_event through three-layer gate
        if:
          - condition: template
            value_template: >-
              {{ not _cooldown_active
                 and post_to_kata_cabinet | default(false) | bool
                 and _action_required
                 and _suggested_act_event | trim != ''
                 and ((_urgency | int) >= (_push_floor | int)
                      or (_urgency | int) >= (_push_life_safety | int)) }}
        then:
          - alias: Layer 1 — master kill switch
            if:
              - condition: template
                value_template: "{{ not is_state('input_boolean.zen_action_emission_enabled', 'on') }}"
            then:
              - event: zen_event
                event_data:
                  event:
                    kind: action_emission_blocked
                    component: "{{ kata_key }}"
                    reason: circuit_breaker
                    tool: "{{ _suggested_act_event }}"
                    severity: warn
            else:
              - alias: Layer 2 — whitelist check
                variables:
                  _wl_raw: >-
                    {%- set _sys = states('sensor.zen_system_cabinet_resolved') -%}
                    {%- set _wr = (state_attr(_sys, 'variables') or {}).get('zen_summarizer_act_whitelist', {}) if _sys != '' else {} -%}
                    {%- set _wv1 = _wr.get('value', _wr) if _wr is mapping else {} -%}
                    {{ (_wv1 | from_json) if _wv1 is string else _wv1 }}
                  _allowed_events: >-
                    {%- set _w = _wl_raw if _wl_raw is mapping else {} -%}
                    {{ _w.get('allowed_events', []) }}
                  _event_whitelisted: "{{ _suggested_act_event in _allowed_events }}"
              - if:
                  - condition: template
                    value_template: "{{ not _event_whitelisted }}"
                then:
                  - event: zen_event
                    event_data:
                      event:
                        kind: action_emission_blocked
                        component: "{{ kata_key }}"
                        reason: not_whitelisted
                        tool: "{{ _suggested_act_event }}"
                        severity: warn
                else:
                  # SP1: ACL check goes here — verify component has permission to emit suggested_act_event kind
                  # SP1: check meta.requires.cert / meta.requires.level against caller context
                  - variables:
                      _act_cid: >-
                        {%- set _a = range(0, 65535) | random -%}
                        {%- set _b = range(0, 65535) | random -%}
                        {%- set _c = range(0, 65535) | random -%}
                        {%- set _d = range(0, 65535) | random -%}
                        {{ '%04x%04x-%04x-%04x' | format(_a, _b, _c, _d) }}
                  - event: zen_event
                    event_data:
                      event:
                        kind: action_emission_fired
                        component: "{{ kata_key }}"
                        tool: "{{ _suggested_act_event }}"
                        correlation_id: "{{ _act_cid }}"
                        urgency: "{{ _urgency }}"
                        severity: info
                  - event: zen_event
                    event_data:
                      event:
                        kind: dojotool_call
                        tool: "{{ _suggested_act_event }}"
                        version: "1"
                        correlation_id: "{{ _act_cid }}"
                        payload:
                          kata_input:
                            component: "{{ kata_key }}"
                            attention: "{{ _kata_parsed.get('attention', '') if _kata_parsed is mapping else '' }}"
                            suggested_act_desc: "{{ _kata_parsed.get('suggested_act_desc', '') if _kata_parsed is mapping else '' }}"
                            urgency: "{{ _urgency }}"
                            period: "{{ _current_period }}"
                          caller_token: "{{ kata_key }}_act"
                  - wait_for_trigger:
                      - trigger: event
                        event_type: zen_event
                        event_data:
                          event:
                            kind: dojotool_return
                            correlation_id: "{{ _act_cid }}"
                    timeout: "00:00:30"
                    continue_on_timeout: true
                  - alias: Log emission result — timeout or dispatcher error
                    if:
                      - condition: template
                        value_template: "{{ wait.trigger is none }}"
                    then:
                      - event: zen_event
                        event_data:
                          event:
                            kind: action_emission_timeout
                            component: "{{ kata_key }}"
                            tool: "{{ _suggested_act_event }}"
                            correlation_id: "{{ _act_cid }}"
                            severity: warn
                    else:
                      - variables:
                          _ret_ev: >-
                            {{ wait.trigger.event.data.event | default({}) }}
                      - if:
                          - condition: template
                            value_template: >-
                              {{ _ret_ev is mapping and _ret_ev.get('status', 'success') not in ['success', 'ok', ''] }}
                        then:
                          - event: zen_event
                            event_data:
                              event:
                                kind: action_emission_failed
                                component: "{{ kata_key }}"
                                tool: "{{ _suggested_act_event }}"
                                correlation_id: "{{ _act_cid }}"
                                error: "{{ _ret_ev.get('status', 'unknown') if _ret_ev is mapping else 'unknown' }}"
                                severity: warn
                        else:
                          - event: zen_event
                            event_data:
                              event:
                                kind: action_emission_success
                                component: "{{ kata_key }}"
                                tool: "{{ _suggested_act_event }}"
                                correlation_id: "{{ _act_cid }}"
                                severity: info
                          # Independent cooldown stamp — written on every successful emission
                          # regardless of post_to_kata_cabinet. Read back by cooldown check
                          # as zen_last_emission_<kata_key> (preferred over kata payload).
                          - event: set_variable_legacy
                            event_data:
                              key: "zen_last_emission_{{ kata_key }}"
                              value: >-
                                {{ {'last_emission_at': now().timestamp() | string,
                                    'tool': _suggested_act_event,
                                    'component': kata_key} | tojson }}
                              volume_entity: "{{ kata_cabinet }}"
                              set_timestamp: true

      # Determine whether to stamp last_emission_at (only if emission fired)
      - alias: Prepare kata write payload with period and emission metadata
        variables:
          _emission_fired: >-
            {{ not _cooldown_active
               and post_to_kata_cabinet | default(false) | bool
               and ((_urgency | int) >= (drift_threshold | int) or _action_required) }}
          _kata_write_value: >-
            {%- set _base = _kata_parsed if _kata_parsed is mapping else {} -%}
            {%- set _with_period = _base | combine({'period': _current_period}) -%}
            {%- if _emission_fired -%}
              {{ _with_period | combine({'last_emission_at': now().timestamp() | string}) | tojson }}
            {%- else -%}
              {{ _with_period | tojson }}
            {%- endif -%}

      # ── 8. Post to kata cabinet ───────────────────────────────────────────
      - alias: Post kata summary to cabinet
        if:
          - alias: If post set to true with valid data
            condition: template
            value_template: "{{ monk_response.data and (post_to_kata_cabinet | default(false) | bool) }}"
        then:
          - delay:
              milliseconds: 250
          - action: script.zen_dojotools_filecabinet
            data:
              action_type: update
              set_timestamp: true
              show_hidden_volumes: false
              force_action: true
              expires_after: >-
                {{ (now() + timedelta(minutes=(staleness_minutes | int(1440)) * 2)).isoformat() }}
              volume_entity_id:
                - "{{ kata_cabinet }}"
              key: "{{ component_slug }}"
              value: "{{ _kata_write_value }}"
              # Guard: if index_command empty, omit leading comma
              label_input: "{{ (index_command + ', ') if index_command else '' }}Ninja Summary"
            response_variable: filecabinet_response

      # ── 8b. Compute run duration ──────────────────────────────────────────
      - alias: Compute run duration
        variables:
          duration_seconds: "{{ ((now() - (started_at | as_datetime)).total_seconds()) | round(1) }}"

      # ── 8c. Write per-component timing record to kata cabinet ─────────────
      # zen_ninja_last_run_<slug> → read by zen_summarizer_health component_timings
      - event: set_variable_legacy
        event_data:
          key: "zen_ninja_last_run_{{ component_slug }}"
          value: "{{ {'duration_seconds': duration_seconds, 'run_started_at': started_at | default(''), 'component': component_slug} | tojson }}"
          volume_entity: "{{ kata_cabinet }}"
          set_timestamp: true

      # ── 9. Build response + emit ──────────────────────────────────────────
      - alias: Build final response
        variables:
          component: ninja_summary
          final_response: >-
            {{
              {
                "status":            "success",
                "monk":              monk_response | default({}),
                "post":              post_to_kata_cabinet | default(false),
                "dojo_drawer":       dojo_drawer | default(''),
                "filecabinet_write": filecabinet_response | default({}),
                "caller_token":      caller_token,
                "duration_seconds":  duration_seconds | default(0),
                "run_started_at":    started_at | default('')
              }
            }}

      - alias: Emit event
        action: script.zen_dojotools_event_emitter
        data:
          component: "{{ component | default('unknown_component') }}"
          severity: "{{ 'error' if final_response.status != 'success' else 'info' }}"
          kind: kata_emit
          summary: "Script '{{ component | default('unknown_component') }}' completed with status '{{ final_response.status }}'."
          metadata:
            status: "{{ final_response.status }}"
            post_to_kata: "{{ final_response.post }}"
            dojo_drawer: "{{ final_response.dojo_drawer }}"
            filecabinet_write: "{{ final_response.filecabinet_write }}"
            duration_seconds: "{{ final_response.duration_seconds | default(0) }}"
            run_started_at: "{{ final_response.run_started_at | default('') }}"
            component_slug: "{{ component_slug | default('') }}"
          kata: "{{ final_response.monk.data.kata_excerpt | default({}) }}"
          monk: "{{ final_response.monk.data.event_excerpt | default({}) }}"

      - stop: Return Response to Caller
        response_variable: final_response
