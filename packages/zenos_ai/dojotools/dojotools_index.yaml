###############################################################################
# ZenOS-AI DojoTools: Index Cluster
# Version: 4.5.5
#
# Scripts:
#   zen_dojotools_query   — ZQ-1 entity filter/query engine
#   zen_dojotools_inspect — Entity expansion and drawer resolution
#   zen_dojotools_index   — Universal HyperGraph set-logic engine (with
#                           label_index drawer merge patch)
#
# Automations:
#   DojoTools Zen Index Event Handler — async index_command event loop
#
# MIGRATED FROM: scripts.yaml + automations.yaml (2026-03-05)
#
# REPLACES:
#   zen_dojotools_hyperindex (experimental branch, retired)
#   dojotools_zen_index / dojotools_zen_index_backup (pre-RC1 legacy)
#
# NOTE: zen_dojotools_inspect is also called by dojotools_scheduler.yaml
###############################################################################

script:

  zen_dojotools_query:
    alias: Zen DojoTools Query
    description: "Zen DojoTools Query “ZQ-1” (4.2.1)\nQuery is a deterministic entity
      selector. It takes a starting list of entity_ids (or an empty/null list) and runs
      them through a series of filters—domain, labels, areas, device_id, device_class,
      states, numeric ranges, regex, and semantic shortcuts. Each filter narrows the
      set; results are always a clean JSON array of entity_ids.\nCore behavior: - If
      you supply target_entities, Query filters ONLY that list. - If target_entities
      is empty/null AND the filter includes a domain,\n  Query auto-builds the starter
      set from states[domain].\n- If target_entities is empty/null AND no domain is
      provided, the\n  result will be an empty set.\n\nTherefore you must provide a
      target_entities list or include a domain in the filter and leave target_entities
      empty.\n"
    icon: mdi:filter-cog
    mode: single
    fields:
      mode:
        name: Mode
        description: help = JSON spec, query = run filter
        selector:
          select:
            options:
            - help
            - query
        default: help
      log_result:
        name: Log Result
        description: Write filter + baselist + result to logbook
        selector:
          boolean:
        default: false
      emit_event:
        name: Emit Zen Event
        description: Emit structured zen_event via DojoTools Event Emitter
        selector:
          boolean:
        default: false
      target_entities:
        name: Target Entities
        selector:
          entity:
            multiple: true
        description: Optional starter list of entities to be filtered. If omitted starts
          from all entities of domain in filter.
      filter_json:
        selector:
          text:
            multiline: true
        default: '{} '
        description: 'Optional filter_json json dict containing a valid ZenQuery filter
          dictionary - MUST see help for schema and use. Default {} '
      output_fields:
        name: Output Fields
        required: false
        default: []
        selector:
          text:
        description: 'Reserved. No-op in current version — Query returns entity IDs
          only.'
      dry_run:
        name: Dry Run
        description: >-
          If true, returns count and char estimate after filtering without
          returning the full entity list. Use before committing to a large call.
        required: false
        default: false
        selector:
          boolean:
      caller_token:
        name: Caller Token
        required: false
        default: ''
        selector:
          text:
        description: 'Reserved. Governance stub — echoed in response. SP1 enforcement
          not yet active.'
    sequence:

    # --------------------------------------------------------------
    # Always normalize User/AI inputs so we don't have to react JIT
    # --------------------------------------------------------------
    - variables:
        caller_token: "{{- caller_token | default('') -}}"

    - alias: Show Help
      choose:
      - conditions:
        - condition: template
          value_template: "{{- mode == 'help' -}}"
        sequence:
        - variables:
            help_json: "{{\n  {\n    \"tool\": \"Zen DojoTools Query (ZQ-1)\",\n    \"version\":
              \"4.2.1\",\n    \"overview\":\n      \"ZQ-1 is a deterministic, multi-stage
              entity filtering engine designed for Home Assistant. It consumes flexible
              JSON filter definitions and produces a fully evaluated list of entity_ids.
              Every filter acts conjunctively (logical AND), meaning each stage narrows
              the working set. All logic is safe, non-throwing, and predictable.\",\n\n
              \   \"philosophy\":\n      \"The goal of ZQ-1 is to give Friday and the
              Monastery a *primitive* that behaves like a database WHERE clause: consistent,
              strict, explicit, and composable. ZQ-1 never guesses. It never expands
              implicitly except for the domain auto-build rule. Every transformation
              of the entity set is transparent, repeatable, and explainable.\",\n\n
              \   \"input_behavior\": {\n      \"accepted_inputs\":\n        \"• null\\n•
              a single entity_id string\\n• a list of entity_ids\\n• any iterables (converted
              to list)\\n• a JSON object describing filter parameters\",\n      \"normalization_rules\":\n
              \       \"• null → []\\n• string → [string]\\n• iterable → list(iterable)\\n•
              non-iterable scalar → []\",\n      \"initialization_pipeline\":\n        \"1.
              Normalize entity_list\\n2. If empty AND domain is provided → auto-expand
              from states[domain]\\n3. Begin sequential filtering through each configured
              step\"\n    },\n\n    \"fields\": {\n      \"domain\":\n        \"Restrict
              or auto-build the set. If entity_list is empty, ZQ-1 takes all entities
              from states[domain]. If entity_list is non-empty, ZQ-1 filters them to
              retain only those whose entity_id starts with domain+'.'\",\n\n      \"label\":\n
              \       \"Intersect the working set with label_entities(label). Input
              is slugified for safety. Label filtering is PURE intersection.\",\n\n
              \     \"area\":\n        \"Intersect the working set with all entity_ids
              located in the given area. ZQ-1 slugifies name, resolves area_id(), then
              calls area_entities().\",\n\n      \"device_id\":\n        \"Intersect
              the working set with all entities attached to the specified device. Slugify
              → resolve device_id() → device_entities().\",\n\n      \"device_class\":\n
              \       \"Keep entities whose 'device_class' attribute matches the provided
              string.\",\n\n      \"state_equals\":\n        \"Keep only entities whose
              state value exactly matches this string.\",\n\n      \"include_states\":\n
              \       \"Allow only entities whose state is in this list.\",\n\n      \"exclude_states\":\n
              \       \"Reject entities whose state is in this list.\",\n\n      \"numeric_above\":\n
              \       \"Keep only entities whose state cleanly converts to float() AND
              whose value is strictly > this threshold.\",\n\n      \"numeric_below\":\n
              \       \"Keep only entities whose numeric state is strictly < this threshold.\",\n\n
              \     \"regex\":\n        \"Apply Home Assistant’s `is regex()` test to
              the STATE STRING. Matching entities survive. Non-string or non-matching
              entities are dropped.\",\n\n      \"shortcuts\": {\n        \"numeric\":\n
              \         \"Quick include-only-numeric. Equivalent to: float(state) is
              valid.\",\n        \"stats\":\n          \"Keep only entities that publish
              'state_class'. Useful for energy, utility, trend, Riemann sensors.\",\n
              \       \"temp\":\n          \"Keep device_class=='temperature'.\",\n
              \       \"humidity\":\n          \"Keep device_class=='humidity'.\",\n
              \       \"power\":\n          \"Keep device_class=='power'.\",\n        \"energy\":\n
              \         \"Keep device_class=='energy'.\",\n        \"water\":\n          \"Keep
              device_class=='moisture'.\",\n        \"binary\":\n          \"Retain
              only entity_ids beginning with 'binary_sensor.'.\",\n        \"stats_eligible\":\n
              \         \"Keep only entities that are:\\n\"\n          \"  • numeric\\n\"\n
              \         \"  • have state_class\\n\"\n          \"  • have unit_of_measurement\\n\"\n
              \         \"  • are NOT disabled (disabled_by == none)\\n\"\n          \"This
              approximates HA’s long-term statistics eligibility.\"\n      },\n\n      \"sort\":
              {\n        \"by\": \n          \"Sort key — 'entity_id', 'state', or 'name'.\\n\"\n
              \         \"'name' refers to friendly_name.\",\n        \"order\":\n          \"'asc'
              or 'desc'. Defaults to ascending.\"\n      }\n    },\n\n    \"filter_execution_model\":\n
              \     \"Each block is executed in order. Each block rewrites pipe.ids.
              No block expands or adds new items except domain auto-build. Shortcuts
              are applied AFTER all explicit filters, meaning shortcuts enforce late-stage
              narrowing logic. If multiple shortcuts are enabled, all must match (logical
              AND).\",\n\n    \"error_handling\":\n      \"• Invalid float() conversion
              → skip\\n• Missing attributes → skip\\n• regex against non-string → skip\\n•
              Unknown area/device/label → silently drop all matches (intersection with
              empty)\\n• Everything is safe and deterministic\\nZQ-1 never throws template
              exceptions.\",\n\n    \"return_value\":\n      \"Always returns a JSON
              array (string) of final entity_ids.\",\n\n    \"examples\": {\n      \"find_all_lights_on\":\n
              \       \"{'domain':'light', 'state_equals':'on'}\",\n\n      \"living_room_motion_binary_sensors\":\n
              \       \"{'area':'living room', 'shortcuts':{'binary': true}}\",\n\n
              \     \"high_temperature\":\n        \"{'shortcuts':{'temp': true}, 'numeric_above':
              78}\",\n\n      \"washing_machine_power_spike\":\n        \"{'label':'laundry',
              'shortcuts':{'power': true}, 'numeric_above': 500}\",\n\n      \"all_stats_eligible_in_kitchen\":\n
              \       \"{'area':'kitchen', 'shortcuts':{'stats_eligible': true}}\",\n\n
              \     \"regex_match_for_heating_modes\":\n        \"{'domain':'climate',
              'regex':'heat|on|aux'}\"\n    },\n\n    \"usage_instructions\":\n      \"1.
              Create a JSON object describing desired filters.\\n\"\n      \"2. Call
              ZQ-1 with:\\n\"\n      \"     zen_filter(<filter_json>, <entity_list>)\\n\"\n
              \     \"3. Provide null for <entity_list> to auto-build from domain or
              start empty.\\n\"\n      \"4. Use shortcuts to reduce complexity — they
              are optimized primitives.\\n\"\n      \"5. After receiving output, treat
              it as an authoritative filtered list.\\n\"\n      \"6. ZQ-1 is stable
              and idempotent — running it twice with the same input produces the same
              output.\\n\"\n      \"7. ZQ-1 does not read historical state. All decisions
              are based on CURRENT states and attributes.\"\n  }\n  | tojson\n}}\n"
        - stop: Return help JSON
          response_variable: help_json
    - variables:
        _raw_filter: "{{- filter_json | default('{}') -}}"
        parsed_filter: >
          {%- if _raw_filter is mapping -%}
            {{- _raw_filter -}}
          {%- else -%}
            {%- set text = _raw_filter | trim -%}
            {%- if text | length == 0 -%}
              {}
            {%- else -%}
              {{- text | from_json(default={}) -}}
            {%- endif -%}
          {%- endif -%}
        filter_domain: "{{- parsed_filter.get('domain') -}}"
    - variables:
        auto_base_list: >
          {%- if (target_entities | count == 0) and filter_domain -%}
            {{- states[filter_domain] | map(attribute='entity_id') | list -}}
          {%- else -%}
            {{- target_entities | list -}}
          {%- endif -%}
    - variables:
        result: >
          {%- import 'zenos_ai/zen_query.jinja' as zen -%}
          {{- zen.zen_filter(filter_json,  auto_base_list) -}}
    - if:
      - condition: template
        value_template: "{{- dry_run | default(false) -}}"
      then:
      - variables:
          _dr_list: "{{- result | from_json if result is string else result | default([]) -}}"
          final:
            status: dry_run
            count: "{{- _dr_list | count -}}"
            result_chars: "{{- _dr_list | tojson | length -}}"
            sample: "{{- _dr_list[:5] -}}"
            caller_token: "{{- caller_token -}}"
      - stop: dry_run
        response_variable: final
    - choose:
      - conditions:
        - condition: template
          value_template: "{{- log_result -}}"
        sequence:
        - data:
            name: ZQ-1 FILTER
            message: "{{- filter_json -}}"
          action: logbook.log
        - data:
            name: ZQ-1 BASESET
            message: > 
              {%- if target_entities | count == 0 and filter_domain -%}
                Auto-built base list from domain "{{- filter_domain -}}":
                {{ auto_base_list -}}
              {%- else -%}
                Provided target entities:
                {{ auto_base_list -}}
              {%- endif -%}
          action: logbook.log
        - data:
            name: ZQ-1 RESULT
            message: "{{- result -}}"
          action: logbook.log
    - choose:
      - conditions:
        - condition: template
          value_template: "{{- emit_event if emit_event is defined else false -}}"
        sequence:
        - data:
            component: dojo_query
            severity: info
            kind: query
            summary: ZQ-1 filter applied
            metadata:
              filter: "{{- parsed_filter -}}"
              baselist_count: "{{- auto_base_list | count -}}"
              result_count: "{{- result | from_json | count -}}"
              domain: "{{- filter_domain -}}"
          action: script.zen_dojotools_event_emitter
    - variables:
        final:
          status: ok
          domain: "{{- filter_domain -}}"
          baselist: "{{- auto_base_list -}}"
          result: "{{- result -}}"
          caller_token: "{{- caller_token -}}"
    - stop: Return query result
      response_variable: final

  zen_dojotools_inspect:
    sequence:
    - variables:
        caller_token: "{{- caller_token | default('') -}}"

    - alias: Show Help
      choose:
      - conditions:
        - condition: template
          value_template: "{{- mode | default('') == 'help' -}}"
        sequence:
        - variables:
            help_json: |-
              {{-
                {
                  "tool": "Zen DojoTools Inspect",
                  "version": "4.7.0",
                  "intent": "Deep entity inspection + area/floor/device read modes. Returns state, labels, device metadata (incl. floor_id, device_labels, area_labels), cabinet volume info, and optional recorder statistics. Called directly or via Index when expand_entities=true. Camera entities: camera_cache merged inline into each result entry — {analysis, cached_at, cache_age_minutes, snapshot_path, found}.",
                  "inputs": {
                    "entity_id": "Required for mode=inspect. Single entity_id or list. Not required for help/area_info/floor_info/device_info.",
                    "output_fields": "Field selector. Comma-separated string or list. Controls which blocks appear per entity. See output_fields_reference.",
                    "extended": "Boolean (default false). Adds device_tree: via_device_id, parent_name, siblings, config_entries.",
                    "label_targets": "Label names — resolves drawer blurbs from Dojo cabinet. Injected by Index; usable in direct calls.",
                    "drawer_key": "Cabinet sensors only. Inspects a specific drawer key — value truncated to 64 chars.",
                    "area_id": "Required for mode=area_info.",
                    "floor_id": "Required for mode=floor_info.",
                    "device_id": "Required for mode=device_info.",
                    "timeout": "Seconds (default 60, max 300).",
                    "caller_token": "Governance stub. Echoed in response.",
                    "mode": "inspect (default) — entity loop. help — schema. area_info — area details. floor_info — floor details. device_info — device details."
                  },
                  "output_fields_reference": {
                    "_note": "Prefix - to suppress a default. Prefix + to opt in. Comma-separated string or list.",
                    "defaults_on": {
                      "timestamps": "last_changed, last_updated. Suppress: -timestamps.",
                      "device": "device_id, name, manufacturer, model, area_id, floor_id, device_labels, area_labels, integration. Suppress: -device.",
                      "volume": "Cabinet header (cabinet sensors only): id, version, friendly_name, flags. Suppress: -volume."
                    },
                    "opt_in": {
                      "+attributes": "Full sanitized attribute dict. Key-scanned for safety. Suppressed for cabinet sensors.",
                      "+statistics": "Eligibility gate only: {eligible, reason}. Does not fetch recorder data.",
                      "+history": "24h hourly recorder stats. Fires only for stats_eligible entities. See history_result_schema."
                    },
                    "example": "+history,-device,-volume,-timestamps"
                  },
                  "history_result_schema": {
                    "eligible_with_data": {"eligible": true, "state_class": "measurement", "unit": "W", "last_24h": [{"start": "<ISO UTC>", "end": "<ISO UTC>", "mean": 0.0, "min": 0.0, "max": 0.0}]},
                    "eligible_no_data": {"eligible": true, "state_class": "measurement", "unit": "W", "reason": "No recorder data — check state_class and recorder config"},
                    "ineligible": {"eligible": false, "state_class": "", "reason": "<missing state_class or unit_of_measurement>"},
                    "traps": [
                      "last_24h is an array of hourly buckets — NOT flat mean/min/max at history root.",
                      "eligible=true with no last_24h key means entity has no recorder data yet.",
                      "Run stats_eligible filter via Index BEFORE +history to avoid fetching ineligible entities."
                    ]
                  },
                  "per_entity_output_structure": {
                    "always": ["entity_id", "friendly_name", "domain", "state", "labels"],
                    "default_on": ["last_changed", "last_updated", "device (incl. floor_id, device_labels, area_labels)", "volume (cabinet only)"],
                    "opt_in": ["+attributes", "+statistics", "+history"],
                    "extended_only": ["device_tree"],
                    "drawer_key_only": ["drawer"]
                  },
                  "non_entity_modes": {
                    "area_info": "Single area. Input: area_id. Returns: area_id, name, floor_id, labels, entity_ids, entity_count, device_ids, device_count.",
                    "floor_info": "Single floor. Input: floor_id. Returns: floor_id, name, area_ids, area_count.",
                    "device_info": "Single device. Input: device_id. Returns: device_id, name, manufacturer, model, area_id, floor_id, labels, area_labels, config_entries, entity_ids, entity_count.",
                    "area_list": "All areas. No input required. Returns: count, areas[]{area_id, name, floor_id, labels}.",
                    "floor_list": "All floors. No input required. Returns: count, floors[]{floor_id, name, area_ids, area_count}.",
                    "label_list": "All labels. No input required. Returns: count, labels[]{label_id, entity_count, area_count}.",
                    "zone_list": "All zones. No input required. Returns: count, zones[]{entity_id, name, lat, lon, radius, passive, icon}.",
                    "person_list": "All persons. No input required. Returns: count, persons[]{entity_id, name, state, user_id, device_trackers, source, lat, lon}.",
                    "device_list": "TOOLING PRIMITIVE — iterates all states to find unique device IDs. Large installs return very large responses. Not for direct AI calls. AI workflow: floor_list → area_info → device_info. Returns: count, devices[]{device_id, name, manufacturer, model, area_id, floor_id, labels}.",
                    "integration_entities": "Entities by integration. Input: integration (domain slug). Returns: integration, entity_ids, entity_count.",
                    "_note": "aliases and level dropped — no HA Jinja read path. config_entry_list blocked — config entries not in Jinja, needs REST. Use /api/config/config_entries/entry via REST API."
                  },
                  "top_level_output": {
                    "results": "Array of per-entity result objects. Camera entities include camera_cache: {analysis, cached_at, cache_age_minutes, snapshot_path, found} merged inline.",
                    "drawers": "Drawer blurbs from Dojo cabinet keyed by label. Empty dict if no label_targets.",
                    "domain_context": "Auto-enriched domain data: todo (list), calendar (read), camera (cache map keyed by entity_id — {analysis, cached_at, cache_age_minutes, snapshot_path, found}).",
                    "inputs": "Echo of entity_id, extended, infer, timeout.",
                    "error": "null on success."
                  },
                  "usage_examples": {
                    "Example 1 — Basic inspect": {"entity_id": "sensor.kitchen_temperature"},
                    "Example 2 — Attributes and device tree": {"entity_id": "sensor.kitchen_temperature", "output_fields": "+attributes", "extended": true},
                    "Example 3 — 24h stats lean": {"entity_id": ["sensor.span_total_power", "sensor.dryer_power"], "output_fields": "+history,-device,-volume,-timestamps"},
                    "Example 4 — Eligibility check only": {"entity_id": "sensor.span_total_power", "output_fields": "+statistics,-device,-volume,-timestamps"},
                    "Example 5 — Cabinet drawer peek": {"entity_id": "sensor.zenos_dojo_cabinet", "drawer_key": "zen_summary"},
                    "Example 6 — Area drill-down": {"mode": "area_info", "area_id": "living_room"},
                    "Example 7 — Floor drill-down": {"mode": "floor_info", "floor_id": "ground_floor"},
                    "Example 8 — Device drill-down": {"mode": "device_info", "device_id": "<device_id from label pull or inspect result>"}
                  },
                  "ai_user_guidance": [
                    "Use mode: help to retrieve this schema.",
                    "+history fires only for stats_eligible entities (state_class + unit_of_measurement set). Run stats_eligible filter first.",
                    "History data is at results[N].history.last_24h — hourly array. There is NO history.mean at the root.",
                    "+statistics is a cheap eligibility check. +history fetches actual recorder data. They are independent.",
                    "Inspect is called automatically by Index when expand_entities=true — output_fields passes through.",
                    "Cabinet sensors suppress attributes. Use FileCabinet tools for drawer data.",
                    "Camera entities: camera_cache is merged inline into each result entry — {analysis, cached_at, cache_age_minutes, snapshot_path, found}. Check found=true before using analysis. cache_age_minutes tells you how fresh the cached analysis is."
                  ]
                }
              -}}
        - stop: Return help JSON
          response_variable: help_json

    # ── Area / Floor / Device read modes ──────────────────────────────────
    # Short-circuit before the entity loop — these don't iterate entities.
    - alias: Area / Floor / Device info modes
      choose:

      - conditions:
        - condition: template
          value_template: "{{ mode | default('inspect') == 'area_info' }}"
        sequence:
        - variables:
            _target_area: "{{ area_id | default('') | trim }}"
        - if: "{{ _target_area == '' }}"
          then:
          - variables:
              _mode_result:
                status: error
                mode: area_info
                message: "area_info requires area_id."
                caller_token: "{{ caller_token }}"
          - stop: Missing area_id
            response_variable: _mode_result
        - variables:
            _mode_result: >-
              {%- set _ents = area_entities(_target_area) | list -%}
              {%- set _devs = area_devices(_target_area) | list -%}
              {{ {
                'mode': 'area_info',
                'area_id': _target_area,
                'name': area_name(_target_area) | default('', true),
                'floor_id': floor_id(area_name(_target_area)) | default(none, true),
                'labels': (labels(_target_area) or []) | list,
                'entity_ids': _ents,
                'entity_count': _ents | length,
                'device_ids': _devs,
                'device_count': _devs | length,
                'caller_token': caller_token
              } }}
        - stop: area_info complete
          response_variable: _mode_result

      - conditions:
        - condition: template
          value_template: "{{ mode | default('inspect') == 'floor_info' }}"
        sequence:
        - variables:
            _target_floor: "{{ floor_id | default('') | trim }}"
        - if: "{{ _target_floor == '' }}"
          then:
          - variables:
              _mode_result:
                status: error
                mode: floor_info
                message: "floor_info requires floor_id."
                caller_token: "{{ caller_token }}"
          - stop: Missing floor_id
            response_variable: _mode_result
        - variables:
            _mode_result: >-
              {%- set _areas = floor_areas(_target_floor) | list -%}
              {{ {
                'mode': 'floor_info',
                'floor_id': _target_floor,
                'name': floor_name(_target_floor) | default('', true),
                'area_ids': _areas,
                'area_count': _areas | length,
                'caller_token': caller_token
              } }}
        - stop: floor_info complete
          response_variable: _mode_result

      - conditions:
        - condition: template
          value_template: "{{ mode | default('inspect') == 'device_info' }}"
        sequence:
        - variables:
            _target_dev: "{{ device_id | default('') | trim }}"
        - if: "{{ _target_dev == '' }}"
          then:
          - variables:
              _mode_result:
                status: error
                mode: device_info
                message: "device_info requires device_id."
                caller_token: "{{ caller_token }}"
          - stop: Missing device_id
            response_variable: _mode_result
        - variables:
            _mode_result: >-
              {%- set _ents = device_entities(_target_dev) | list -%}
              {%- set _cfg = (device_attr(_target_dev, 'config_entries') or []) | list -%}
              {%- set _area = device_attr(_target_dev, 'area_id') -%}
              {%- set _floor = floor_id(area_name(_area)) if _area is not none else none -%}
              {{ {
                'mode': 'device_info',
                'device_id': _target_dev,
                'name': device_attr(_target_dev, 'name') | default('', true),
                'manufacturer': device_attr(_target_dev, 'manufacturer') | default('', true),
                'model': device_attr(_target_dev, 'model') | default('', true),
                'area_id': _area,
                'floor_id': _floor,
                'labels': (labels(_target_dev) or []) | list,
                'area_labels': (labels(_area) or []) | list if _area is not none else [],
                'config_entries': _cfg,
                'entity_ids': _ents,
                'entity_count': _ents | length,
                'caller_token': caller_token
              } }}
        - stop: device_info complete
          response_variable: _mode_result

      # ── AREA_LIST ────────────────────────────────────────────────────────
      - conditions:
        - condition: template
          value_template: "{{ mode | default('inspect') == 'area_list' }}"
        sequence:
        - variables:
            _mode_result: >-
              {%- set ns = namespace(list=[]) -%}
              {%- for a in areas() | list -%}
                {%- set ns.list = ns.list + [{
                  'area_id': a,
                  'name': area_name(a) | default('', true),
                  'floor_id': floor_id(area_name(a)) | default(none, true),
                  'labels': (labels(a) or []) | list
                }] -%}
              {%- endfor -%}
              {{ {
                'mode': 'area_list',
                'count': ns.list | length,
                'areas': ns.list,
                'caller_token': caller_token
              } }}
        - stop: area_list complete
          response_variable: _mode_result

      # ── FLOOR_LIST ───────────────────────────────────────────────────────
      - conditions:
        - condition: template
          value_template: "{{ mode | default('inspect') == 'floor_list' }}"
        sequence:
        - variables:
            _mode_result: >-
              {%- set ns = namespace(list=[]) -%}
              {%- for f in floors() | list -%}
                {%- set _areas = floor_areas(f) | list -%}
                {%- set ns.list = ns.list + [{
                  'floor_id': f,
                  'name': floor_name(f) | default('', true),
                  'area_ids': _areas,
                  'area_count': _areas | length
                }] -%}
              {%- endfor -%}
              {{ {
                'mode': 'floor_list',
                'count': ns.list | length,
                'floors': ns.list,
                'caller_token': caller_token
              } }}
        - stop: floor_list complete
          response_variable: _mode_result

      # ── LABEL_LIST ───────────────────────────────────────────────────────
      - conditions:
        - condition: template
          value_template: "{{ mode | default('inspect') == 'label_list' }}"
        sequence:
        - variables:
            _mode_result: >-
              {%- set ns = namespace(list=[]) -%}
              {%- for lbl in labels() | list -%}
                {%- set _ents = label_entities(lbl) | list -%}
                {%- set _area_ns = namespace(count=0) -%}
                {%- for a in areas() | list -%}
                  {%- if lbl in (labels(a) or []) -%}
                    {%- set _area_ns.count = _area_ns.count + 1 -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- set ns.list = ns.list + [{
                  'label_id': lbl,
                  'entity_count': _ents | length,
                  'area_count': _area_ns.count
                }] -%}
              {%- endfor -%}
              {{ {
                'mode': 'label_list',
                'count': ns.list | length,
                'labels': ns.list,
                'caller_token': caller_token
              } }}
        - stop: label_list complete
          response_variable: _mode_result

      # ── ZONE_LIST ────────────────────────────────────────────────────────
      - conditions:
        - condition: template
          value_template: "{{ mode | default('inspect') == 'zone_list' }}"
        sequence:
        - variables:
            _mode_result: >-
              {%- set ns = namespace(list=[]) -%}
              {%- for s in states.zone | list -%}
                {%- set eid = s.entity_id -%}
                {%- set ns.list = ns.list + [{
                  'entity_id': eid,
                  'name': state_attr(eid, 'friendly_name') | default('', true),
                  'lat': state_attr(eid, 'latitude') | default(none, true),
                  'lon': state_attr(eid, 'longitude') | default(none, true),
                  'radius': state_attr(eid, 'radius') | default(none, true),
                  'passive': state_attr(eid, 'passive') | default(false, true),
                  'icon': state_attr(eid, 'icon') | default('', true)
                }] -%}
              {%- endfor -%}
              {{ {
                'mode': 'zone_list',
                'count': ns.list | length,
                'zones': ns.list,
                'caller_token': caller_token
              } }}
        - stop: zone_list complete
          response_variable: _mode_result

      # ── PERSON_LIST ──────────────────────────────────────────────────────
      - conditions:
        - condition: template
          value_template: "{{ mode | default('inspect') == 'person_list' }}"
        sequence:
        - variables:
            _mode_result: >-
              {%- set ns = namespace(list=[]) -%}
              {%- for s in states.person | list -%}
                {%- set eid = s.entity_id -%}
                {%- set ns.list = ns.list + [{
                  'entity_id': eid,
                  'name': state_attr(eid, 'friendly_name') | default('', true),
                  'state': states(eid),
                  'user_id': state_attr(eid, 'user_id') | default(none, true),
                  'device_trackers': (state_attr(eid, 'device_trackers') or []) | list,
                  'source': state_attr(eid, 'source') | default('', true),
                  'lat': state_attr(eid, 'latitude') | default(none, true),
                  'lon': state_attr(eid, 'longitude') | default(none, true)
                }] -%}
              {%- endfor -%}
              {{ {
                'mode': 'person_list',
                'count': ns.list | length,
                'persons': ns.list,
                'caller_token': caller_token
              } }}
        - stop: person_list complete
          response_variable: _mode_result

      # ── DEVICE_LIST ──────────────────────────────────────────────────────
      # WARNING: No native devices() in HA Jinja — iterates all states to
      # collect unique device IDs. Large installs return very large responses.
      # TOOLING PRIMITIVE ONLY. AI workflow: floor_list → area_info → device_info.
      - conditions:
        - condition: template
          value_template: "{{ mode | default('inspect') == 'device_list' }}"
        sequence:
        - variables:
            _mode_result: >-
              {%- set ns = namespace(seen=[], list=[]) -%}
              {%- for s in states | list -%}
                {%- set _dev = device_id(s.entity_id) -%}
                {%- if _dev is not none and _dev not in ns.seen -%}
                  {%- set ns.seen = ns.seen + [_dev] -%}
                  {%- set _area = device_attr(_dev, 'area_id') -%}
                  {%- set ns.list = ns.list + [{
                    'device_id': _dev,
                    'name': device_attr(_dev, 'name') | default('', true),
                    'manufacturer': device_attr(_dev, 'manufacturer') | default('', true),
                    'model': device_attr(_dev, 'model') | default('', true),
                    'area_id': _area,
                    'floor_id': floor_id(area_name(_area)) if _area is not none else none,
                    'labels': (labels(_dev) or []) | list
                  }] -%}
                {%- endif -%}
              {%- endfor -%}
              {{ {
                'mode': 'device_list',
                'count': ns.list | length,
                'devices': ns.list,
                '_warning': 'Large response — tooling primitive only. Use floor_list → area_info → device_info for AI drill-down.',
                'caller_token': caller_token
              } }}
        - stop: device_list complete
          response_variable: _mode_result

      # ── INTEGRATION_ENTITIES ─────────────────────────────────────────────
      - conditions:
        - condition: template
          value_template: "{{ mode | default('inspect') == 'integration_entities' }}"
        sequence:
        - variables:
            _target_integration: "{{ integration | default('') | trim }}"
        - if: "{{ _target_integration == '' }}"
          then:
          - variables:
              _mode_result:
                status: error
                mode: integration_entities
                message: "integration_entities requires integration field (domain slug or config entry title)."
                caller_token: "{{ caller_token }}"
          - stop: Missing integration
            response_variable: _mode_result
        - variables:
            _mode_result: >-
              {%- set _ents = integration_entities(_target_integration) | list -%}
              {{ {
                'mode': 'integration_entities',
                'integration': _target_integration,
                'entity_ids': _ents,
                'entity_count': _ents | length,
                'caller_token': caller_token
              } }}
        - stop: integration_entities complete
          response_variable: _mode_result

    # --------------------------------------------------------------
    # Always normalize User/AI inputs so we don't have to react JIT
    # --------------------------------------------------------------
    - variables:
        entity_list: >
          {%- if entity_id is iterable and (entity_id is not string) -%}
            {{- entity_id -}}
          {%- else -%}
            [{{- entity_id -}}]
          {%- endif -%}
        extended_mode: "{{- extended | default(false) -}}"
        infer_mode: "{{- infer | default(false) -}}"
        timeout_s: "{{- timeout | default(60) -}}"
        results: []
        label_targets_input: >
          {%- set _lt = label_targets if label_targets is defined else [] -%}
          {%- if _lt is iterable and _lt is not string -%}
            {{- _lt | map('trim') | map('lower') | reject('equalto', '') | list -}}
          {%- elif _lt is string and _lt | trim | length > 0 -%}
            {{- _lt | trim | lower | replace(' ', '') | regex_findall('[^,]+') -}}
          {%- else -%}
            []
          {%- endif -%}
        drawer_key_input: >
          {%- set _dk = drawer_key | default('') -%}
          {%- if _dk is iterable and _dk is not string -%}
            {{- _dk | map('trim') | map('lower') | reject('equalto', '') | list -}}
          {%- elif _dk is string and _dk | trim | length > 0 -%}
            {{- [_dk | trim | lower] -}}
          {%- else -%}  
            []
          {%- endif -%}
        # @todo check this replace statement - as a single string there was a line replace in the "' '" subject - I expect it is replacing a space but cannot be sure
        output_fields_input: >
          {%- set _of = output_fields | default([]) -%}
          {%- if _of is string and _of | trim | length > 0 -%}
            {{- _of | trim | lower | replace(' ', '') | regex_findall('[^,]+') -}}
          {%- elif _of is iterable and _of is not string -%}
            {{- _of | map('lower') | map('trim') | list -}}
          {%- else -%}
            {{- [] -}}
          {%- endif -%}"
        _show_timestamps: "{{- '-timestamps' not in output_fields_input -}}"
        _show_device: "{{- '-device' not in output_fields_input -}}"
        _show_volume: "{{- '-volume' not in output_fields_input -}}"
        _show_attributes: "{{- '+attributes' in output_fields_input -}}"
        _show_statistics: "{{- '+statistics' in output_fields_input -}}"
        _show_history: "{{- '+history' in output_fields_input -}}"
    - repeat:
        for_each: "{{- entity_list -}}"
        sequence:
        - variables:
            current_entity: "{{- repeat.item | string -}}"
            domain: >
              {%- set dot = current_entity.find('.') -%}
              {%- if dot > 0 -%}
                {{- current_entity[:dot] -}}
              {%- else -%}
                unknown
              {%- endif -%}
            friendly_name: "{{- state_attr(current_entity, 'friendly_name') | default(current_entity) -}}"
            # @todo - not solid using friendly_name to check for attributes
            has_attrs: "{{- state_attr(current_entity, 'friendly_name') is not none -}}"
            state_str: "{{- states(current_entity) if has_attrs else 'unknown' -}}"
            last_changed: >
              {%- if has_attrs -%}
                {%- set _ts = states[current_entity] -%}
                {%- if _ts is not none and _ts is not string -%}
                  {{- as_timestamp(_ts.last_changed, default=0) | timestamp_local -}}
                {%- else -%} 
                  {{- '' -}} 
                {%- endif -%}
              {%- else -%}
                {{- '' -}}
              {%- endif -%}
            last_updated: >
              {%- if has_attrs -%}
                {%- set _ts = states[current_entity] -%}
                {%- if _ts is not none and _ts is not string -%}
                  {{- as_timestamp(_ts.last_updated, default=0) | timestamp_local -}}
                {%- else -%}
                  {{- '' -}}
                {%- endif -%}
              {%- else -%}
                {{- '' -}}
              {%- endif -%}
            labels_raw: "{{- labels(current_entity) | default([]) -}}"
            safe_labels: >
              {%- if labels_raw is iterable and (labels_raw is not string) -%}
                {{- labels_raw | list -}}
              {%- else -%}
                {{- [] -}}
              {%- endif -%}
            label_details: >
              {%- set ns = namespace(d={}) -%}
              {%- for lbl in safe_labels -%}
                {%- set ns.d = ns.d | combine({lbl: label_description(lbl) | default('', true)}) -%}
              {%- endfor -%}
              {{- ns.d -}}
            attrs_raw: >
              {%- set s = states[current_entity] -%} 
              {%- if s is not none and s.attributes is mapping -%}
                {{- s.attributes -}}
              {%- else -%}
                {{- {} -}}
              {%- endif -%}
            attrs_is_stringified: "{{- attrs_raw is string -}}"
            cabinet_header: >
              {%- set raw = attrs_raw -%}
              {%- if raw is mapping -%}
                {%- set vars = raw.get('variables') -%}
                {%- if vars is mapping -%}
                  {%- set cab = vars.get('AI_Cabinet_VolumeInfo') -%}
                  {%- if cab is mapping and cab.get('value') is mapping -%}
                    {{- cab.get('value') -}}
                  {%- else -%} 
                    {{- {} -}}
                  {%- endif -%}
                {%- else -%} 
                  {{- {} -}}
                {%- endif -%}
              {%- else -%} 
                {{- {} -}}
              {%- endif -%}

            # @todo - don't like this "''" return value
            cabinet_signature: >
              {%- if cabinet_header is mapping -%}
                {{- cabinet_header.get('validation','') | string -}}
              {%- else -%}
                {{- '' -}}
              {%- endif -%}
            is_cabinet_sensor: "{{- domain == 'sensor' and cabinet_header is mapping and cabinet_signature == 'ALLYOURBASEAREBELONGTOUS' -}}"
            # @todo - don't like this "''" return value
            cabinet_guid: >
              {%- if is_cabinet_sensor and cabinet_header.get('id') -%}
                {{- cabinet_header.get('id') -}}
              {%- else -%} 
                {{- '' -}}
              {%- endif -%}
            cabinet_uninitialized: "{{- is_cabinet_sensor and not cabinet_header.get('id') -}}"
            volume_result: >
              {%- if is_cabinet_sensor -%}
                {{- 
                  {
                    "is_cabinet": true,
                    "id": cabinet_header.get("id"),
                    "version": cabinet_header.get("version"),
                    "friendly_name": cabinet_header.get("friendly_name"),
                    "name": cabinet_header.get("name"),
                    "description": cabinet_header.get("description"),
                    "validation": cabinet_signature,
                    "flags": ( cabinet_header.get("flags") if cabinet_header.get("flags") is mapping  else {} ),
                    "uninitialized": cabinet_uninitialized
                  }
                -}}
              {%- else -%}
                {{-
                  { "is_cabinet": false} 
                -}}
              {%- endif -%}
            stat_class: "{{- state_attr(current_entity,'state_class') | default('', true) | string -}}"
            stat_uom: "{{- state_attr(current_entity,'unit_of_measurement') | default('', true) | string -}}"
            stats_eligible: "{{- stat_class in ['measurement','total','total_increasing'] and stat_uom != '' -}}"
            stats_reason: >
              {%- if not has_attrs -%}
                Entity not found.
              {%- elif stats_eligible -%}
                Eligible based on state_class and unit_of_measurement.
              {%- elif stat_class == '' and stat_uom == '' -%}
                Missing state_class and unit_of_measurement.
              {%- elif stat_class == '' -%}
                Missing state_class.
              {%- elif stat_uom == '' -%}
                Missing unit_of_measurement.
              {%- else -%}
                Unsupported state_class for statistics.
              {%- endif -%}
            statistics_result: "{{- { 'eligible': stats_eligible, 'reason':  stats_reason } -}}"
            #@todo - why return the word 'none'
            device_block: >
              {%- set dev_id = device_id(current_entity) -%}
              {%- if dev_id is not none -%}
                {%- set idents = (device_attr(dev_id, 'identifiers') or []) | list -%}
                {%- set first = idents | first | default([]) | list -%}
                {%- set integ = first[0] if first | length > 0 else none -%}
                {%- set _dev_area = area_id(dev_id) -%}
                {{-
                  {
                    'device_id': dev_id,
                    'name': device_attr(dev_id, 'name'),
                    'manufacturer': device_attr(dev_id, 'manufacturer'),
                    'model': device_attr(dev_id, 'model'),
                    'area_id': _dev_area,
                    'floor_id': floor_id(area_name(_dev_area)) if _dev_area is not none else none,
                    'device_labels': (labels(dev_id) or []) | list,
                    'area_labels': (labels(_dev_area) or []) | list if _dev_area is not none else [],
                    'integration': integ
                    }
                -}}
              {%- else -%}
                {{- none -}}
              {%- endif -%}
            #@todo - why return the word 'none'
            device_tree: >
              {%- if extended_mode -%}
                {%- set dev_id = device_id(current_entity) -%}
                {%- if dev_id is not none -%}
                  {%- set via = device_attr(dev_id, 'via_device_id') -%}
                  {%- set siblings = device_entities(dev_id) | reject('equalto', current_entity) | list -%}
                  {%- set config_entries = (device_attr(dev_id, 'config_entries') or []) | list -%}
                  {{- 
                    {
                      'via_device_id': via,
                      'parent_name': device_attr(via, 'name') if via is not none else none,
                      'siblings': siblings,
                      'config_entries': config_entries
                    } 
                  -}}
                {%- else -%}
                  {{- none -}}
                {%- endif -%}
              {%- else -%}
                none
              {%- endif -%}

            #@todo - why return the word '{ ... }'
            safe_attributes: >
              {%- if is_cabinet_sensor -%}
                { "notice": "Attributes suppressed for cabinet sensor. Use FileCabinet tools for full volume access."  }
              
              {%- else -%}

                {# --- ORIGINAL SANITIZER BLOCK (UNCHANGED) --- #}
                {%- if attrs_is_stringified -%}
                  {# --- FALLBACK MODE: Home Assistant stringified the dict --- #}
                  {%- set s = states[current_entity] -%}
                  {%- set ns = namespace(out={}) -%}

                  {%- if s is not none -%}
                    {%- for k in s.attributes.keys() -%}
                      {%- set v = state_attr(current_entity, k) -%}
                      {%- if v is string or v is number or v is boolean -%}
                        {%- set ns.out = ns.out | combine({k: v}, recursive=true) -%}
                      {%- elif v is mapping -%}
                        {%- set ns.out = ns.out | combine({k: v}, recursive=true) -%}
                      {%- elif v is sequence and (v is not string) -%}
                        {%- set ns.out = ns.out | combine({k: v}, recursive=true) -%}
                      {%- else -%}
                        {%- set ns.out = ns.out | combine({k: v|string}, recursive=true) -%}
                      {%- endif -%}
                    {%- endfor -%}
                  {%- endif -%}
                  {{- ns.out -}}
                {%- else -%}
                  {# --- NORMAL MODE --- #}
                  {%- set raw = attrs_raw -%}
                  {%- set ns = namespace(out={}) -%}
              
                  {%- if raw is mapping -%}
                    {%- for k, v in raw.items() -%}
                      {%- if v is string or v is number or v is boolean -%}
                        {%- set ns.out = ns.out | combine({k: v}, recursive=true) -%}
                      {%- elif v is mapping -%}
                        {%- set ns.out = ns.out | combine({k: v}, recursive=true) -%}
                      {%- elif v is sequence and (v is not string) -%}
                        {%- set ns.out = ns.out | combine({k: v}, recursive=true) -%}
                      {%- else -%}
                        {%- set ns.out = ns.out | combine({k: v|string}, recursive=true) -%}
                      {%- endif -%}
                    {%- endfor -%}
                  {%- endif -%}
              
                  {{-  ns.out -}}

                {%- endif -%}
              {%- endif -%}
            drawer_result: >
              {%- if is_cabinet_sensor and drawer_key_input | length > 0 -%}
                {%- set _vars = state_attr(current_entity, 'variables') or {} -%}
                {%- set ns = namespace(out={}) -%}
                {%- for dk in drawer_key_input -%}
                  {%- set _d = _vars.get(dk) -%}
                  {%- if _d is not mapping -%}
                    {%- set ns.out = ns.out 
                        | combine( { 
                          dk: { "error": "Drawer not found." } 
                        } ) 
                    -%}
                  {%- else -%}
                    {%- set _desc = _d.get('meta', {}).get('description', '') | trim -%}
                    {%- set _exp = _d.get('meta', {}).get('expires_after', '') | trim -%}
                    {%- set _val = (_d.get('value', '') if _d is mapping else _d) | string -%}
                    {%- set _trunc = _val[:64] ~ ('...' if _val | length > 64 else '') -%}
                    {%- set _td = _d | combine({'value': _trunc}) if _d is mapping else _trunc -%}
                    {%- set _exp_note = ' [exp:' ~ _exp ~ ']' if _exp | length > 0 else '' -%}
                    {%- if _desc | length > 0 -%}
                      {%- set ns.out = ns.out 
                          | combine( { 
                            dk: {
                              'value': _td, 
                              '_hint': (_exp_note ~ ' -- use FileCabinet for full data') | trim
                            }
                          }) 
                      -%}
                    {%- else -%}
                      {%- set ns.out = ns.out 
                          | combine( { 
                            dk: {
                              'value': _td, 
                              '_hint': '(no description -- truncated to 64 chars)' ~ _exp_note ~ ' -- use FileCabinet for full data'
                            }
                          }) 
                      -%}
                    {%- endif -%}
                  {%- endif -%}
                {%- endfor -%}
                {{- ns.out -}}
              {%- else -%}
                none
              {%- endif -%}
            entity_result: >
              {%- set ns = namespace(
                              out={
                                'entity_id': current_entity,
                                'friendly_name': friendly_name,
                                'domain': domain,
                                'state': state_str,
                                'labels': label_details
                              }
                            ) 
              -%}
              {%- if _show_timestamps -%}
                {%- set ns.out = ns.out | combine({'last_changed': last_changed, 'last_updated': last_updated}) -%}
              {%- endif -%}
              {%- if _show_device and device_block is not none and device_block is mapping -%}
                {%- set ns.out = ns.out | combine({'device': device_block}) -%}
              {%- endif -%}
              {%- if _show_volume and is_cabinet_sensor -%}
                {%- set ns.out = ns.out | combine({'volume': volume_result}) -%}
              {%- endif -%}
              {%- if _show_attributes -%}
                {%- set ns.out = ns.out | combine({'attributes': safe_attributes}) -%}
              {%- endif -%}
              {%- if _show_statistics -%}
                {%- set ns.out = ns.out | combine({'statistics': statistics_result}) -%}
              {%- endif -%}
              {%- if extended_mode and device_tree is not none and device_tree is mapping -%}
                {%- set ns.out = ns.out | combine({'device_tree': device_tree}) -%}
              {%- endif -%}
              {%- if drawer_result is not none and drawer_result != 'none' -%}
                {%- set ns.out = ns.out | combine({'drawer': drawer_result}) -%}
              {%- endif -%}
              {{- ns.out -}}
        - if:
          - condition: template
            value_template: "{{- _show_history and stats_eligible -}}"
          then:
          - action: recorder.get_statistics
            data:
              statistic_ids:
                - "{{- current_entity -}}"
              period: hour
              types:
                - mean
                - min
                - max
              start_time: "{{- (now() - timedelta(hours=24)).isoformat() -}}"
            response_variable: _entity_stats
          - variables:
              _hs_raw: "{{- _entity_stats.get('statistics', _entity_stats) if _entity_stats is mapping else {} -}}"
              _hs_buckets: "{{- _hs_raw.get(current_entity, []) -}}"
              history_result: >-
                {%- if _hs_buckets | count > 0 -%}
                  {{- {'eligible': true, 'state_class': stat_class, 'unit': stat_uom, 'last_24h': _hs_buckets} -}}
                {%- else -%}
                  {{- {'eligible': true, 'state_class': stat_class, 'unit': stat_uom, 'reason': 'No recorder data — check state_class and recorder config'} -}}
                {%- endif -%}
          else:
          - variables:
              history_result:
                eligible: "{{- stats_eligible -}}"
                state_class: "{{- stat_class -}}"
                reason: "{{- stats_reason -}}"
        - variables:
            entity_result: >
              {%- set ns = namespace(
                out = {
                  'entity_id': current_entity,
                  'friendly_name': friendly_name,
                  'domain': domain,
                  'state': state_str,
                  'labels': label_details
                }
              ) -%}
              {%- if _show_timestamps -%}
                {%- set ns.out = ns.out | combine({'last_changed': last_changed, 'last_updated': last_updated}) -%}
              {%- endif -%}
              {%- if _show_device and device_block is not none and device_block is mapping -%}
                {%- set ns.out = ns.out | combine({'device': device_block}) -%}
              {%- endif -%}
              {%- if _show_volume and is_cabinet_sensor -%}
                {%- set ns.out = ns.out | combine({'volume': volume_result}) -%}
              {%- endif -%}
              {%- if _show_attributes -%}
                {%- set ns.out = ns.out | combine({'attributes': safe_attributes}) -%}
              {%- endif -%}
              {%- if _show_statistics -%}
                {%- set ns.out = ns.out | combine({'statistics': statistics_result}) -%}
              {%- endif -%}
              {%- if _show_history -%}
                {%- set ns.out = ns.out | combine({'history': history_result}) -%}
              {%- endif -%}
              {%- if extended_mode and device_tree is not none and device_tree is mapping -%}
                {%- set ns.out = ns.out | combine({'device_tree': device_tree}) -%}
              {%- endif -%}
              {%- if drawer_result is not none and drawer_result != 'none' -%}
                {%- set ns.out = ns.out | combine({'drawer': drawer_result}) -%}
              {%- endif -%}
              {{- ns.out -}}
            results: "{{- (results + [entity_result]) | list -}}"
    - alias: Read drawer blurbs by label_targets
      choose:
      - conditions:
        - condition: template
          value_template: "{{- label_targets_input | length > 0 -}}"
        sequence:
        - action: script.zen_dojotools_filecabinet
          data:
            action_type: read
            volume_entity_id: "{{- states('sensor.zen_dojo_cabinet_resolved') -}}"
            label_targets: "{{- label_targets_input | join(',') -}}"
            caller_token: "{{- caller_token -}}"
          response_variable: _fc_label_response
        - variables:
            _fc_raw: "{{- _fc_label_response.result | default('{}') -}}"
            drawer_blurbs: "{{- ((_fc_raw | from_json) if _fc_raw is string else _fc_raw
              | default({})).get('drawers', {}) | tojson -}}"
      default:
      - variables:
          drawer_blurbs: '{{- {} | tojson -}}'
    # ── Domain context supplement — todo and calendar ─────────────────────
    # If any results contain todo.* or calendar.* entities, fire one bus
    # call per domain and attach enriched context to the inspect result.
    # Callers get domain enrichment for free — no per-caller plumbing needed.
    # Timeout 5s each; degraded gracefully (empty dict) on timeout or error.
    - variables:
        _dc_todo_ids: >-
          {{ results | selectattr('domain', 'defined')
             | selectattr('domain', 'equalto', 'todo')
             | map(attribute='entity_id') | list }}
        _dc_cal_ids: >-
          {{ results | selectattr('domain', 'defined')
             | selectattr('domain', 'equalto', 'calendar')
             | map(attribute='entity_id') | list }}
        _domain_context: {}

    - if:
      - condition: template
        value_template: "{{ _dc_todo_ids | length > 0 }}"
      then:
      - variables:
          _cid_todo: >-
            {%- import 'zenos_ai/zenos_cabinets.jinja' as CABS -%}
            {{- CABS.cabinet_guid_new() -}}
      - event: zen_event
        event_data:
          event:
            kind: dojotool_call
            tool: zen_dojotools_todo
            version: "1"
            correlation_id: "{{ _cid_todo }}"
            payload:
              action_type: list
              caller_token: "{{ caller_token }}"
      - wait_for_trigger:
          - trigger: event
            event_type: zen_event
            event_data:
              event:
                kind: dojotool_return
                correlation_id: "{{ _cid_todo }}"
        timeout: "00:00:05"
        continue_on_timeout: true
      - variables:
          _domain_context: >-
            {{ _domain_context | combine({'todo':
               wait.trigger.event.data.event.get('result', {})
               if wait.trigger is not none else {}}) }}

    - if:
      - condition: template
        value_template: "{{ _dc_cal_ids | length > 0 }}"
      then:
      - variables:
          _cid_cal: >-
            {%- import 'zenos_ai/zenos_cabinets.jinja' as CABS -%}
            {{- CABS.cabinet_guid_new() -}}
      - event: zen_event
        event_data:
          event:
            kind: dojotool_call
            tool: zen_dojotools_calendar
            version: "1"
            correlation_id: "{{ _cid_cal }}"
            payload:
              action_type: read
              caller_token: "{{ caller_token }}"
      - wait_for_trigger:
          - trigger: event
            event_type: zen_event
            event_data:
              event:
                kind: dojotool_return
                correlation_id: "{{ _cid_cal }}"
        timeout: "00:00:05"
        continue_on_timeout: true
      - variables:
          _domain_context: >-
            {{ _domain_context | combine({'calendar':
               wait.trigger.event.data.event.get('result', {})
               if wait.trigger is not none else {}}) }}

    # ── Domain context supplement — camera cache ──────────────────────────
    # Reads household cabinet cache for any camera.* entities in results.
    # No event bus — cabinet variables are live in the template engine.
    # Attaches to domain_context.camera keyed by entity_id.
    - variables:
        _dc_cam_ids: >-
          {{ results | selectattr('domain', 'defined')
             | selectattr('domain', 'equalto', 'camera')
             | map(attribute='entity_id') | list }}

    - if:
      - condition: template
        value_template: "{{ _dc_cam_ids | length > 0 }}"
      then:
      - variables:
          _household_cab_ent: "{{ states('sensor.zen_default_household_cabinet_resolved') }}"
          _cam_cache_map: >-
            {%- set _hvars = (state_attr(_household_cab_ent, 'variables') or {}) -%}
            {%- set ns = namespace(out={}) -%}
            {%- for eid in _dc_cam_ids -%}
              {%- set _ck = eid | replace('.', '_') | replace('-', '_') -%}
              {%- set _raw = _hvars.get(_ck, {}) -%}
              {%- set _v = _raw.get('value', _raw) if _raw is mapping else {} -%}
              {%- set _v1 = _v if _v is mapping else {} -%}
              {%- set _cat = _v1.get('cached_at', '') -%}
              {%- set _age_ns = namespace(v=none) -%}
              {%- if _cat != '' -%}
                {%- set _age_ns.v = ((now() - as_datetime(_cat)).total_seconds() / 60) | round(1) -%}
              {%- endif -%}
              {%- set ns.out = ns.out | combine({eid: {
                'analysis': _v1.get('analysis', ''),
                'cached_at': _cat,
                'cache_age_minutes': _age_ns.v,
                'snapshot_path': _v1.get('snapshot_path', ''),
                'found': _v1 != {}
              }}) -%}
            {%- endfor -%}
            {{ ns.out }}
          _domain_context: >-
            {{ _domain_context | combine({'camera': _cam_cache_map}) }}
      - variables:
          results: >-
            {%- set ns = namespace(out=[]) -%}
            {%- for item in results -%}
              {%- set eid = item.get('entity_id', '') if item is mapping else '' -%}
              {%- if eid in _cam_cache_map -%}
                {%- set ns.out = ns.out + [item | combine({'camera_cache': _cam_cache_map[eid]})] -%}
              {%- else -%}
                {%- set ns.out = ns.out + [item] -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.out }}

    - variables:
        inspect_result:
          results: "{{- results -}}"
          drawers: "{{- drawer_blurbs -}}"
          domain_context: "{{- _domain_context -}}"
          inputs:
            entity_id: "{{- entity_list -}}"
            extended: "{{- extended_mode -}}"
            infer: "{{- infer_mode -}}"
            timeout: "{{- timeout_s -}}"
          caller_token: "{{- caller_token -}}"
          error:
    - stop: Inspect complete
      response_variable: inspect_result
    alias: Zen DojoTOOLS Inspect
    mode: parallel
    description: >-
      Inspect (4.7.0). Entity deep-dive + area/floor/device read modes.
      inspect (default) — entity deep-dive. area_info/floor_info/device_info —
      single-object drill-down (id required). area_list/floor_list/label_list/
      zone_list/person_list — full registry enum (no input). device_list —
      tooling primitive only, large response. integration_entities — by domain.
      Camera entities: camera_cache merged inline into each result
      (analysis, cached_at, cache_age_minutes, snapshot_path, found).
      help — schema. (v4.7.0)
    fields:
      entity_id:
        required: true
        selector:
          entity:
            multiple: true
      extended:
        required: false
        default: false
        selector:
          boolean:
        description: Adds device_tree (via_device_id, parent, siblings, config_entries).
      output_fields:
        required: false
        default: []
        selector:
          text:
        description: "Field selection. Defaults on: timestamps, device, volume. Opt-in:
          +attributes, +statistics, +history (24h recorder stats per entity — use
          ZQ-1 stats_eligible filter first). Suppress defaults: -timestamps, -device,
          -volume. Comma-separated string or list."
      label_targets:
        required: false
        default: []
        selector:
          text:
        description: Labels to resolve drawer blurbs from the Dojo cabinet. Passed
          by Index; may also be used in direct calls. Comma-separated or list.
      infer:
        required: false
        selector:
          boolean:
        description: Reserved for future local inference.
      drawer_key:
        required: false
        default: ''
        selector:
          text:
        description: 'Optional. When the entity is a cabinet sensor, inspect this specific
          drawer — shows description as hint if set, or truncates value to 64 chars.'
      timeout:
        selector:
          number:
            min: 30
            max: 300
            step: 0.25
        name: Timeout
        default: 60
        required: false
      area_id:
        required: false
        default: ''
        selector:
          area:
        description: "Target area ID. Required for mode: area_info."
      floor_id:
        required: false
        default: ''
        selector:
          text:
        description: "Target floor ID (slug). Required for mode: floor_info."
      device_id:
        required: false
        default: ''
        selector:
          device:
        description: "Target device ID. Required for mode: device_info."
      integration:
        required: false
        default: ''
        selector:
          text:
        description: "Integration domain slug or config entry title. Required for mode: integration_entities."
      mode:
        required: false
        default: inspect
        selector:
          select:
            options:
            - inspect
            - help
            - area_info
            - floor_info
            - device_info
            - area_list
            - floor_list
            - label_list
            - zone_list
            - person_list
            - device_list
            - integration_entities
        description: >-
          inspect (default) — entity inspection loop. help — schema.
          area_info/floor_info/device_info — single-object drill-down (id required).
          area_list/floor_list/label_list/zone_list/person_list — full registry enumeration, no input required.
          device_list — all devices (TOOLING PRIMITIVE — large response, not for direct AI calls; use floor_list → area_info → device_info).
          integration_entities — entity list by integration domain (integration field required).
      caller_token:
        name: Caller Token
        required: false
        default: ''
        selector:
          text:
        description: 'Reserved. Governance stub — echoed in response. SP1 enforcement
          not yet active.'
    icon: mdi:magnify

  zen_dojotools_index:
    mode: parallel
    max: 10
    sequence:

    # --------------------------------------------------------------
    # Always normalize User/AI inputs so we don't have to react JIT
    # --------------------------------------------------------------
    - variables:
        caller_token: "{{- caller_token | default('') -}}"

    - alias: Show Help
      choose:
      - conditions:
        - condition: template
          value_template: "{{- mode == 'help' -}}"
        sequence:
        - action: script.zen_dojotools_query
          metadata: {}
          data:
            mode: help
            filter_json: '{} '
            caller_token: "{{- caller_token -}}"
          response_variable: zen_query_help
        - action: script.zen_dojotools_inspect
          data:
            mode: help
            caller_token: "{{- caller_token -}}"
          response_variable: zen_inspect_help
        - variables:
            query_help: '{{- zen_query_help | default({}) | tojson -}}'
            inspect_contract: '{{- zen_inspect_help | default({}) -}}'
            help_json: "{{\n  {\n    \"tool\": \"Zen DojoTools Index\",\n    \"version\":
              \"4.5.1\",\n    \"intent\": \"High-resolution reasoning. Convert
              arbitrary entity + label sets into a unified hypergraph suitable for fusion,
              summarization, planning, and contextual inference.\",\n    \"you_should_use_this_tool_when\":
              [\n      \"You need to combine labels, entities, or both into a logical
              result set.\",\n      \"You need a graph view (nodes/edges/adjacency)
              rather than a flat list.\",\n      \"You are preparing input for a summarizer,
              fusion model, or kata update.\",\n      \"You need deterministic state
              discovery that respects Home Assistant labels, drawers, areas, and metadata.\",\n
              \     \"You want to invert, intersect, union, or difference two sets safely.\",\n
              \     \"You need to pre-filter results via a ZenQuery filter_json block.\"\n
              \   ],\n    \"core_behavior\": {\n      \"pipeline_order\": \"Collect
              and Join >> ZQ1 Filter >> Hypergraph Generation >> Expansion with Inspect.\",\n
              \     \"join_logic\": \"Computes op1 (entities_1 or label_1) and op2 (entities_2
              or label_2), evaluates them with operator AND/OR/NOT/XOR/*.\",\n      \"zq1_filtering\":
              \"If filter_json is provided, results are passed through ZenQuery before
              expansion.\",\n      \"graph_mode\": \"If mode='hypergraph', the final
              result emits nodes, edges, and adjacency groups instead of or in addition
              to simple lists.\",\n      \"expansion\": \"If expand_entities=true, details
              are populated via Zen Inspect.\"\n    },\n    \"modes\": {\n      \"normal\":
              \"Outputs lists suitable for standard Dojo operations.\",\n      \"hypergraph\":
              \"Outputs {nodes, edges, expanded}. Use this for fusion, summarizers,
              drift detection, intent resolution, and reasoning.\"\n    },\n    \"inputs\":
              {\n      \"entities_1\": \"List of entity_ids.\",\n      \"label_1\":
              \"Single label or text token resolved by label_entities().\",\n      \"entities_2\":
              \"Second entity list.\",\n      \"label_2\": \"Second label or token.\",\n
              \     \"operator\": \"AND | OR | NOT | XOR | * (full label graph).\",\n
              \     \"expand_entities\": \"true/false — expands metadata, drawers, attributes. MUST be true for output_fields to have any effect.\",\n
              \     \"output_fields\": \"Passed to Inspect when expand_entities=true. Defaults on: timestamps, device, volume. Opt-in: +history (24h recorder stats per entity). Suppress: -timestamps, -device, -volume. Example: '+history,-device,-volume,-timestamps'. Has no effect if expand_entities=false.\",\n
              \     \"filter_json\": \"Optional dict following ZenQuery schema.\",\n
              \     \"mode\": \"normal | hypergraph\",\n      \"timeout\": \"Indexer
              callback timeout in seconds.\",\n      \"index_command\": \"JSON DSL — overrides all discrete fields. SIMPLE: flat dict with label/domain/operator/entity_ids keys. COMPOUND (recursive): {operator: OR, index_1: {child_spec}, index_2: {child_spec}} — resolves children async via event bus, merged with operator. Child keys: label, domain, entity_ids, filter_json. Nesting supported. Child key is 'label' not 'label_1'. Top-level filter_json post-filters the merged result.\"\n    },\n    \"filter_json\": {\n      \"overview\":
              \"ZenQuery-style dict applied after primary set resolution. Ideal for
              trimming results before fusion.\",\n      \"query_help\": query_help,\n
              \     \"simple_examples\": {\n        \"domain\": {\"domain\": \"light\"},\n
              \       \"state\": {\"state\": \"on\"},\n        \"label\": {\"label\":
              \"kitchen\"}\n      },\n      \"compound_examples\": {\n        \"domain_and_label\":
              {\"domain\": \"sensor\", \"label\": \"environment\"},\n        \"state_exclusion\":
              {\"state_not\": [\"unknown\", \"unavailable\"]},\n        \"threshold\":
              {\"state_op\": \">\", \"state_value\": 50}\n      },\n      \"advanced_examples\":
              {\n        \"graph_edge_focus\": {\"edge_label\": \"hvac\"},\n        \"multi_filter\":
              {\"domain\": \"switch\", \"label\": \"office\", \"state\": \"on\"}\n      }\n
              \   },\n    \"hypergraph_output\": {\n      \"nodes\": \"The entity_ids
              that survived set logic and filtering.\",\n      \"edges\": \"All labels
              associated across all surviving entities.\",\n      \"adjacency\": \"Cross-product
              of entities and labels.\",\n      \"expanded\": \"Optional deep detail
              block (attributes, drawers, related labels).\"\n    },\n    \"full_output_structure\":
              {\n      \"result.simple\": \"Flat entity list.\",\n      \"result.expanded\":
              \"If requested, detailed entity metadata.\",\n      \"result.adjacent_labels\":
              \"Labels connected to the result set.\",\n      \"result.index\": \"Structured
              mapping of entity → labels.\",\n      \"result.drawers\": \"Drawer matches
              tied to entities.\",\n      \"result.drawer_adjacent_labels\": \"Labels
              found inside drawers.\",\n      \"result.hypergraph\": \"Graph object
              when mode='hypergraph'.\",\n      \"inputs\": \"Echo of inputs for audit
              & reasoning.\",\n      \"operator\": \"Operator used.\",\n      \"error\":
              \"Timeout or other error info.\"\n    },\n    \"usage_examples\": {\n
              \     \"Example 1 — All lights in the office\": {\n        \"label_1\":
              \"office\",\n        \"filter_json\": {\"domain\": \"light\"}\n      },\n
              \     \"Example 2 — HVAC related sensors, hypergraph mode\": {\n        \"label_1\":
              \"hvac\",\n        \"mode\": \"hypergraph\",\n        \"expand_entities\":
              true\n      },\n      \"Example 3 — Lights AND Switches in two rooms\":
              {\n        \"label_1\": \"kitchen\",\n        \"label_2\": \"living_room\",\n
              \       \"operator\": \"OR\",\n        \"filter_json\": {\"domain\": [\"light\",\"switch\"]}\n
              \     },\n      \"Example 4 — All entities with environmental data > 60\":
              {\n        \"label_1\": \"environment\",\n        \"filter_json\": {\"state_op\":
              \">\", \"state_value\": 60}\n      },\n      \"Example 5 — Build a root
              graph for Summarizer or Fusion\": {\n        \"label_1\": \"climate\",\n
              \       \"expand_entities\": true,\n        \"mode\": \"hypergraph\"\n
              \     },\n      \"Example 6 — 24h recorder stats for energy entities\": {\n        \"label_1\": \"energy_manager\",\n        \"expand_entities\": true,\n        \"filter_json\": {\"shortcuts\": {\"stats_eligible\": true}},\n        \"output_fields\": \"+history,-device,-volume,-timestamps\",\n        \"_note\": \"History data at result.expanded[N].history.last_24h — array of hourly buckets {start,end,min,max,mean}. Run stats_eligible filter first to skip ineligible entities.\"\n      },\n      \"Example 7 — Compound OR: two label sets merged\": {\n        \"index_command\": \"{\\\"operator\\\": \\\"OR\\\", \\\"index_1\\\": {\\\"label\\\": \\\"security_camera\\\"}, \\\"index_2\\\": {\\\"label\\\": \\\"motion_sensor\\\"}}\",\n        \"_note\": \"Child key is 'label' (not 'label_1'). Each child resolved async via event bus, merged with OR.\"\n      },\n      \"Example 8 — Compound AND: intersection of two label sets\": {\n        \"index_command\": \"{\\\"operator\\\": \\\"AND\\\", \\\"index_1\\\": {\\\"label\\\": \\\"climate\\\"}, \\\"index_2\\\": {\\\"label\\\": \\\"priority\\\"}}\",\n        \"_note\": \"Both children must resolve non-empty for AND to return results. Use dry_run: true to preview entity_count.\"\n      },\n      \"Example 9 — Compound with domain filter scoped to child\": {\n        \"index_command\": \"{\\\"operator\\\": \\\"OR\\\", \\\"index_1\\\": {\\\"label\\\": \\\"office\\\", \\\"domain\\\": \\\"light\\\"}, \\\"index_2\\\": {\\\"label\\\": \\\"office\\\", \\\"domain\\\": \\\"switch\\\"}}\",\n        \"_note\": \"Domain filter inside child spec narrows that child only. Top-level filter_json applies after merge.\"\n      }\n    },\n    \"quick_recipes\": {\n      \"history_stats\": {\n        \"label_1\": \"<your_label>\",\n        \"expand_entities\": true,\n        \"filter_json\": {\"shortcuts\": {\"stats_eligible\": true}},\n        \"output_fields\": \"+history,-device,-volume,-timestamps\",\n        \"_NOTE\": \"expand_entities MUST be true or output_fields is ignored.\",\n        \"_result_path\": \"result.expanded[N].history.last_24h → [{start, end, min, max, mean}]\",\n        \"_trap\": \"stats_eligible filter BEFORE +history — avoids fetching stats for sensors with no recorder data.\"\n      }\n    },\n    \"compound_index_dsl\": {\n      \"overview\": \"index_command accepts a recursive compound DSL. Top-level operator merges two child specs, each resolved async via zen_indexer_request event bus before merge.\",\n      \"syntax\": {\n        \"operator\": \"OR|AND|XOR|NOT\",\n        \"index_1\": {\"label\": \"...\", \"domain\": \"...\", \"entity_ids\": []},\n        \"index_2\": {\"label\": \"...\"}\n      },\n      \"child_keys\": [\"label\", \"domain\", \"entity_ids\", \"filter_json\", \"operator\"],\n      \"nesting\": \"Supported — index_1 or index_2 can themselves be compound specs. Depth bounded by script max: 10 parallel instances.\",\n      \"critical\": \"Child spec key is 'label' (not 'label_1'). label_1/label_2 are top-level discrete fields only.\",\n      \"filter_note\": \"filter_json field post-filters the final merged result. filter_json inside a child spec filters that child's result before merge.\",\n      \"dry_run\": \"Pass dry_run: true to preview entity_count without full expansion.\"\n    },\n    \"best_practices\": [\n      \"Use (Hyper)Index before
              any fusion or summarization to avoid bloated context.\",\n      \"Prefer
              labels as the primary driver, entities only when needed.\",\n      \"Use
              expand_entities sparingly — hypergraph mode is already powerful.\",\n
              \     \"Use filter_json to reduce post-processing load.\",\n      \"Use
              operator '*' with no labels to get a system-wide label graph.\"\n    ],\n
              \   \"warnings\": [\n      \"Expanded entity blocks can get large; avoid
              unless required.\",\n      \"Hypergraph mode produces more data — summarizers
              should prune aggressively.\",\n      \"If filter_json is malformed, it
              defaults to an empty filter.\"\n    ],\n    \"ai_user_guidance\": [\n
              \     \"Use 'mode': 'help' at any time to retrieve the full JSON schema.\",\n
              \     \"Use (Hyper)Index as your first step when reasoning about groups
              of devices.\",\n      \"Use hypergraph mode to understand relationships,
              not just lists.\",\n      \"Use filter_json to stay efficient and avoid
              overwhelming context.\",\n      \"Before writing a kata or fusion output,
              get a fresh HyperIndex snapshot.\",\n      \"If a result is empty unexpectedly,
              re-run in normal mode to debug.\",\n      \"Use filter_json stats_eligible:true BEFORE +history to avoid fetching stats for ineligible entities — it is a pre-flight filter, not optional.\",\n      \"History data lives at result.expanded[N].history.last_24h — array of hourly buckets, NOT flat mean/min/max fields. Ineligible entities return {eligible: false, reason: ...}.\"\n    ],\n    \"inspect_passthrough_contract\": inspect_contract\n  }\n}}\n"
        - stop: Return help JSON
          response_variable: help_json
    - variables:
        zen_household_cab: "{{- states('sensor.zen_default_household_cabinet_resolved') -}}"
        _ci_vars: "{{- state_attr(zen_household_cab, 'variables') or {} -}}"
        _ci_entry: >
          {%- set e = _ci_vars.get('_compact_index') if _ci_vars is mapping else none -%} 
          {{- e if e is mapping else {} -}}
        _ci_val: >-
          {%- set v = _ci_entry.get('value') if _ci_entry is mapping else none -%}
          {%- set v = v | from_json({}) if v is string else v -%}
          {{- v if v is mapping else {} -}}
        _ci_generated: "{{- _ci_val.get('generated', '') if _ci_val is mapping else '' -}}"
        compact_index_stale: >
          {%- if _ci_generated | length > 0 -%} 
            {{- (now() - as_datetime(_ci_generated)).total_seconds() > 600 -}} 
          {%- else -%} 
            true 
          {%- endif -%}
    - alias: Build Compact Index
      choose:
      - conditions:
        - condition: template
          value_template: "{{- mode == 'build_compact_index' -}}"
          alias: Build compact index mode
        sequence:
        - variables:
            compact_index_value: >-
              {%- set all_labels = labels() | sort -%}
              {%- set ns = namespace(out=[]) -%}
              {%- for lbl in all_labels -%}
                {%- set cnt = label_entities(lbl) | list | length -%}
                {%- set ns.out = ns.out + [{
                  'slug':  lbl,
                  'name':  lbl | replace('_', ' ') | title,
                  'count': cnt,
                  'score': cnt
                }] -%}
              {%- endfor -%}
              {{- {'generated': now().isoformat(), 'labels': ns.out} | tojson -}}
        - action: script.zen_dojotools_filecabinet
          data:
            action_type: write
            volume_entity_id:
              - "{{- zen_household_cab -}}"
            key: _compact_index
            value: "{{- compact_index_value -}}"
            set_timestamp: true
          response_variable: _ci_write
        - variables:
            final_response:
              status: "{{- _ci_write.get('status', 'error') if _ci_write is mapping else 'error' -}}"
              message: Compact label index built.
              generated: "{{- now().isoformat() -}}"
              labels: >-
                {%- set _v = compact_index_value -%}
                {%- set _v = (_v | from_json) if _v is string else _v -%}
                {{- _v.get('labels', []) if _v is mapping else [] -}}
        - stop: Compact index built
          response_variable: final_response
    - alias: Compact Index Staleness Trap
      if:
      - condition: template
        value_template: "{{- mode not in ['help', 'build_compact_index'] and compact_index_stale -}}"
        alias: Index stale — rebuild before executing
      then:
      - action: script.zen_dojotools_index
        data:
          mode: build_compact_index
        response_variable: _compact_refresh_result
    - variables:
        operator: "{{- operator | default('AND') -}}"
        _raw_filter: "{{- filter_json | default('{}') -}}"
        parsed_filter: >
          {%- set txt = (_raw_filter | string | trim) -%}
          {%- if _raw_filter is mapping -%}
            {{- _raw_filter -}}
          {%- elif txt == '' -%}
            {}
          {%- else -%}
            {%- set parsed = txt | from_json -%}
            {{- parsed if parsed is mapping else {} -}}
          {%- endif -%}
        has_filter: >
          {%- if parsed_filter is mapping and parsed_filter | length > 0 -%}
            true
          {%- else -%}
            false
          {%- endif -%}
    - variables:
        mode: "{{- mode | default('normal') -}}"
        is_index_command: "{{- index_command is defined and index_command | length > 0 -}}"
        # @todo - not sure if that awkward default response "''" is handled properly
        correlation_id: >
          {%- if is_index_command -%}
            {{- now().isoformat() ~ '-' ~ (range(1000) | random) -}}
          {%- else -%} 
            {{- '' -}} 
          {%- endif -%}
        timeout_seconds: "{{- timeout | default(2) -}}"
    - choose:
      - conditions:
        - condition: template
          value_template: "{{- is_index_command -}}"
        sequence:
        - event: zen_indexer_request
          event_data:
            index_command: "{{- index_command -}}"
            correlation_id: "{{- correlation_id -}}"
        - wait_for_trigger:
          - trigger: event
            event_type: zen_index_response
            event_data:
              correlation_id: "{{- correlation_id -}}"
          timeout:
            seconds: >-
              {%- set _is_recursive = 'index_1' in index_command or 'index_2' in index_command -%}
              {{ [timeout_seconds | int * 3, 15] | min if _is_recursive else timeout_seconds }}
        - choose:
          - conditions:
            - condition: template
              value_template: "{{- wait.trigger is defined and wait.trigger is not none -}}"
            sequence:
            - variables:
                simple: "{{- wait.trigger.event.data.response.result.simple | default([]) -}}"
                index_timeout: false
          - conditions: []
            sequence:
            - variables:
                simple: []
                index_timeout: true
                timeout_error_msg: Indexer call timeout {{ timeout_seconds -}}s
    - variables:
        index_command: ''
        op1: >
          {%- set _ents = simple if (simple is defined and simple) else [] -%}
          {%- if _ents | length == 0 -%}{%- set _ents = entities_1 | default([]) | list -%}{%- endif -%}
          {%- if _ents | length == 0 and label_1 | default('') | trim -%}{%- set _ents = label_entities(label_1 | slugify) | list -%}{%- endif -%}
          {%- if _ents | length == 0 and device_1 | default('') | trim -%}
            {%- set _devs = [device_1] if device_1 is string else (device_1 | list) -%}
            {%- set _ns = namespace(e=[]) -%}
            {%- for d in _devs -%}{%- set _ns.e = _ns.e + (device_entities(d | trim) | list) -%}{%- endfor -%}
            {%- set _ents = _ns.e | unique | list -%}
          {%- endif -%}
          {%- if _ents | length == 0 and integration_1 | default('') | trim -%}{%- set _ents = integration_entities(integration_1 | trim) | list -%}{%- endif -%}
          {%- if _ents | length == 0 and area_1 | default('') | trim -%}{%- set _ents = area_entities(area_1 | trim) | list -%}{%- endif -%}
          {%- if _ents | length == 0 and floor_1 | default('') | trim -%}
            {%- set _areas = floor_areas(floor_1 | trim) | list -%}
            {%- set _ns = namespace(e=[]) -%}
            {%- for a in _areas -%}{%- set _ns.e = _ns.e + (area_entities(a) | list) -%}{%- endfor -%}
            {%- set _ents = _ns.e | unique | list -%}
          {%- endif -%}
          {{ _ents }}
        op2: |-
          {%- set _ents = entities_2 | default([]) | list -%}
          {%- if _ents | length == 0 and label_2 | default('') | trim -%}{%- set _ents = label_entities(label_2 | slugify) | list -%}{%- endif -%}
          {%- if _ents | length == 0 and device_2 | default('') | trim -%}
            {%- set _devs = [device_2] if device_2 is string else (device_2 | list) -%}
            {%- set _ns = namespace(e=[]) -%}
            {%- for d in _devs -%}{%- set _ns.e = _ns.e + (device_entities(d | trim) | list) -%}{%- endfor -%}
            {%- set _ents = _ns.e | unique | list -%}
          {%- endif -%}
          {%- if _ents | length == 0 and integration_2 | default('') | trim -%}{%- set _ents = integration_entities(integration_2 | trim) | list -%}{%- endif -%}
          {%- if _ents | length == 0 and area_2 | default('') | trim -%}{%- set _ents = area_entities(area_2 | trim) | list -%}{%- endif -%}
          {%- if _ents | length == 0 and floor_2 | default('') | trim -%}
            {%- set _areas = floor_areas(floor_2 | trim) | list -%}
            {%- set _ns = namespace(e=[]) -%}
            {%- for a in _areas -%}{%- set _ns.e = _ns.e + (area_entities(a) | list) -%}{%- endfor -%}
            {%- set _ents = _ns.e | unique | list -%}
          {%- endif -%}
          {{ _ents }}
        op1_empty: "{{- op1 | length == 0 -}}"
        op2_empty: "{{- op2 | length == 0 -}}"
        setop: "{{- operator | default('AND') | upper -}}"
    - variables:
        entities_base: >
          {%- if not op1_empty and op2_empty -%}
            {{- op1 -}}
          {%- elif not op2_empty and op1_empty -%}
            {{- op2 -}}
          {%- elif not op1_empty and not op2_empty -%}
            {%- if setop == 'AND' -%}
              {{- op1 | intersect(op2) -}}
            {%- elif setop == 'OR' -%}
              {{- (op1 + op2) | unique | list -}}
            {%- elif setop == 'NOT' -%}
              {{- op1 | difference(op2) -}}
            {%- elif setop == 'XOR' -%}
              {{- op1 | symmetric_difference(op2) -}}
            {%- else -%}
              {{- (op1 + op2) | unique | list -}}
            {%- endif -%}
          {%- else -%}
            []
          {%- endif -%}
    - alias: 'Zen Query: Filter entities_base if filter passed'
      if:
      - condition: template
        value_template: "{{- has_filter -}}"
        alias: 'Has Filter: filter_json exists and is mapping'
      then:
      - action: script.zen_dojotools_query
        metadata: {}
        data:
          mode: query
          filter_json: "{{- filter_json | default('{}') -}}"
          target_entities: "{{- entities_base -}}"
          caller_token: "{{- caller_token -}}"
        response_variable: response_zen_query
      - variables:
          response_entities: "{{- (response_zen_query.result | from_json) if response_zen_query.result is string else response_zen_query.result | default([]) -}}"
          fallback_entities_base: "{{- entities_base | default([]) -}}"
          strict_mode: >-
            {{- strict | default(false) or (
              parsed_filter is mapping and (
                parsed_filter.get('exclude_entity_ids') or
                parsed_filter.get('exclude_domain') or
                parsed_filter.get('exclude_label') or
                parsed_filter.get('exclude_integration') or
                parsed_filter.get('exclude_device')
              )
            ) -}}
          entities_base: >
            {%- if strict_mode -%}
              {{- response_entities -}}
            {%- else -%}
              {{- response_entities if response_entities else fallback_entities_base -}}
            {%- endif -%}
    - variables:
        _offset: '{{ [offset | default(0) | int, 0] | max }}'
        _limit: '{{ limit | default(0) | int }}'
        _total_before_page: '{{ entities_base | count }}'
        entities_base: "{% set _sliced = entities_base[(_offset | int):] %}\n{% if\
          \ (_limit | int) > 0 %}\n  {{ _sliced[:(_limit | int)] }}\n{% else %}\n\
          \  {{ _sliced }}\n{% endif %}"
    - variables:
        _uses_topology_seed: >-
          {{ device_1 | default('') | trim != '' or integration_1 | default('') | trim != ''
          or area_1 | default('') | trim != '' or floor_1 | default('') | trim != ''
          or device_2 | default('') | trim != '' or integration_2 | default('') | trim != ''
          or area_2 | default('') | trim != '' or floor_2 | default('') | trim != '' }}
        _wildcard_op: '{{ setop == "*" }}'
        _has_history: '{{ ''+history'' in (output_fields | default([])) }}'
        _needs_cap: >-
          {{ expand_entities | default(false) and _limit == 0
          and (_uses_topology_seed or _wildcard_op) }}
    - if:
      - condition: template
        value_template: '{{ expand_entities | default(false) and _has_history and _limit == 0 }}'
        alias: '+history without limit — hard error'
      then:
      - variables:
          final_response:
            status: error
            message: '+history requires an explicit limit — recorder fetch per entity is
              expensive. Set limit before requesting history expansion.'
            caller_token: '{{ caller_token }}'
      - stop: history_requires_limit
        response_variable: final_response
    - if:
      - condition: template
        value_template: '{{ _needs_cap }}'
        alias: Auto-cap topology/wildcard expand without limit
      then:
      - variables:
          entities_base: '{{ entities_base[:50] }}'
          _cap_warning: >-
            Auto-capped at 50 — topology/wildcard seed with expand_entities=true and
            no limit set. Set limit explicitly to override.
    - if:
      - condition: template
        value_template: "{{- dry_run | default(false) -}}"
      then:
      - variables:
          final_response:
            status: dry_run
            entity_count: "{{- entities_base | count -}}"
            total_count: "{{ _total_before_page }}"
            offset: "{{ _offset }}"
            limit: "{{ _limit }}"
            will_expand: "{{- expand_entities | default(false) -}}"
            sample: "{{- entities_base[:5] -}}"
            caller_token: "{{- caller_token -}}"
      - stop: dry_run
        response_variable: final_response
    - choose:
      - conditions:
        - condition: template
          value_template: "{{- expand_entities -}}"
          alias: Expand = true
        sequence:
        - action: script.zen_dojotools_inspect
          data:
            entity_id: "{{- entities_base | list -}}"
            output_fields: "{{- output_fields | default([]) -}}"
            label_targets: >
              {%- set _l1 = label_1 | default('') | trim -%}
              {%- set _l2 = label_2 | default('') | trim -%}
              {{- ([_l1] if _l1 else []) + ([_l2] if _l2 else []) -}}
            caller_token: "{{- caller_token -}}"
          response_variable: response
        - variables:
            expanded_entities: "{{- response.results | default([]) -}}"
      - conditions: []
        sequence:
        - variables:
            expanded_entities: "{{- entities_base -}}"
            response: '{}'
        alias: Expand = false
      alias: 'Prepare [ Expand ] Result Set '
    - variables:
        matched_drawers: "{{- {} if (entities_base | default([]) | list | length == 0) else ((response.drawers | from_json) if response.drawers is string else response.drawers | default({})) -}}"
    - variables:
        adjacent_labels: >
          {%- set ns = namespace(labels=[]) -%}
          {%- for e in entities_base -%}
            {%- set ns.labels = ns.labels + (labels(e) | list) -%}
          {%- endfor -%} 
          {{- ns.labels | unique | list | sort -}}
        result_index: >
          {%- if op1_empty and op2_empty -%}
            {{- labels() | list | sort  -}}
          {%- else -%}
            {%- set ns = namespace(idx=[]) -%}
            {%- for e in entities_base -%}
              {%- set ns.idx = ns.idx + [[ e, (labels(e) | list) ]] -%}
            {%- endfor -%}
            {{- ns.idx -}}
          {%- endif -%}
    - variables:
        hypergraph: >
          {%- if mode == 'hypergraph' -%}
            {
              "nodes": {{- entities_base | tojson -}},
              "edges": {{- adjacent_labels | tojson -}},
              "expanded": {{- expanded_entities | tojson -}}
            }
          {%- else -%}
            {}
          {%- endif -%}
    - variables:
        label_entity_logic_result_raw: >
          {{-
            {
              "result": {
                "simple": entities_base | default([]) | list,
                "expanded": expanded_entities | default({}),
                "adjacent_labels": adjacent_labels | default([]) | list,
                "index": result_index | default([]),
                "drawers": matched_drawers | default({}),
                "hypergraph": hypergraph | default({})
              },
              "inputs": {
                "mode": mode | default('normal'),
                "entities_1": entities_1 | default([]) | list,
                "label_1": label_1 | default(''),
                "device_1": device_1 | default(''),
                "integration_1": integration_1 | default(''),
                "area_1": area_1 | default(''),
                "floor_1": floor_1 | default(''),
                "entities_2": entities_2 | default([]) | list,
                "label_2": label_2 | default(''),
                "device_2": device_2 | default(''),
                "integration_2": integration_2 | default(''),
                "area_2": area_2 | default(''),
                "floor_2": floor_2 | default(''),
                "limit": _limit | default(0),
                "offset": _offset | default(0),
                "strict": strict | default(false),
                "expand_entities": expand_entities | default(false)
              },
              "operator": "*" if (op1_empty and op2_empty) else setop,
              "error": timeout_error_msg | default(None),
              "warning": _cap_warning | default(None),
              "caller_token": caller_token | default('')
            } | tojson
          -}}
        label_entity_logic_result: '{{- label_entity_logic_result_raw | from_json | default({})  -}}'
    - stop: Zen DojoTools Index Complete
      response_variable: label_entity_logic_result
    alias: Zen DojoTools Index
    description: >-
      Zen DojoTools (Hyper)Index (4.6.3). Universal HyperGraph Index for entity
      and label reasoning.

      Merges labels, entities, drawers, and metadata into a unified, deterministic
      result set. Resolves two input sets via precedence chain (entities > label >
      device > integration > area > floor), applies logical operators
      (AND/OR/NOT/XOR/*), and filters via ZQ-1 before optional expansion.

      IMPORTANT — topology seeds (floor, area, integration, device) can return large
      entity sets. Always dry_run: true first to check total_count before
      expand_entities: true. Auto-cap of 50 applies when expand_entities=true with a
      topology/wildcard seed and no limit set. +history requires explicit limit —
      never expand history on a topology seed without limit.

      Hypergraph mode outputs a structured graph (nodes, edges, adjacency, expanded)
      ideal for fusion, summarizers, drift checks, and reasoning tasks. Run with
      mode: help to view the full ZQ-1 schema.

      Compound index_command: pass {"operator": "OR|AND|XOR|NOT", "index_1":
      {child_spec}, "index_2": {child_spec}} to resolve two independent entity/label
      sets async via the event bus and merge them with operator in a single call.
      Child specs support label, domain, entity_ids, filter_json. Each child can
      itself be compound (recursive). Depth bounded by script max: 10 parallel
      instances. Child key is "label" (not "label_1").
    fields:
      mode:
        selector:
          select:
            options:
            - normal
            - hypergraph
            - build_compact_index
            - help
        default: normal
        description: 'Index mode. normal (default) — lightweight index. hypergraph
          — nodes, edges, adjacency. build_compact_index — rebuild the compact label
          navigation index in the household cabinet (auto-triggered when stale). help
          — full ZQ-1 schema.'
      index_command:
        name: Zen Index Command
        description: >-
          JSON DSL — overrides all discrete fields. Two forms:
          SIMPLE (flat dict: {"label": "...", "operator": "OR", "domain": "..."}) or
          COMPOUND (recursive multi-set: {"operator": "OR|AND|XOR|NOT",
          "index_1": {child_spec}, "index_2": {child_spec}}).
          Compound resolves each child async via the zen_indexer_request event bus and
          merges results with the top-level operator. Child spec keys: label, domain,
          entity_ids, filter_json. Nesting supported (each child can itself be compound).
          Top-level ZQ-1 post-filtering: use the filter_json field, not inside index_command.
        required: false
        selector:
          text:
      entities_1:
        name: Entities 1
        description: one of Entities 1 or Label 1 must be passed.
        required: false
        selector:
          entity:
            multiple: true
      label_1:
        description: one of Label 1 or Entities 1 must be passed.
        name: Label 1
        required: false
        selector:
          text:
      entities_2:
        name: Entities 2
        required: false
        selector:
          entity:
            multiple: true
      label_2:
        name: Label 2
        required: false
        selector:
          text:
      device_1:
        name: Device 1
        description: >-
          Seed op1 from a device — expands to all entities belonging to this
          device_id. Precedence: entities_1 > label_1 > device_1.
        required: false
        default: ''
        selector:
          text:
      integration_1:
        name: Integration 1
        description: >-
          Seed op1 from an integration (domain slug or config entry title).
          Precedence: entities_1 > label_1 > device_1 > integration_1.
        required: false
        default: ''
        selector:
          text:
      area_1:
        name: Area 1
        description: >-
          Seed op1 from an area — expands to all entities in this area_id.
          Precedence: ...> integration_1 > area_1.
        required: false
        default: ''
        selector:
          text:
      floor_1:
        name: Floor 1
        description: >-
          Seed op1 from a floor — expands via floor_areas() then area_entities().
          Lowest-precedence op1 seed.
        required: false
        default: ''
        selector:
          text:
      device_2:
        name: Device 2
        description: Seed op2 from a device_id. Same precedence chain as Device 1 but for op2.
        required: false
        default: ''
        selector:
          text:
      integration_2:
        name: Integration 2
        description: Seed op2 from an integration. Same precedence chain as Integration 1 but for op2.
        required: false
        default: ''
        selector:
          text:
      area_2:
        name: Area 2
        description: Seed op2 from an area_id. Same precedence chain as Area 1 but for op2.
        required: false
        default: ''
        selector:
          text:
      floor_2:
        name: Floor 2
        description: Seed op2 from a floor_id. Same precedence chain as Floor 1 but for op2.
        required: false
        default: ''
        selector:
          text:
      limit:
        name: Limit
        description: >-
          Maximum entities to return after set resolution and ZQ-1 filter.
          Use with offset for pagination. 0 = no limit (default).
        required: false
        default: 0
        selector:
          number:
            min: 0
            max: 10000
            step: 1
      offset:
        name: Offset
        description: >-
          Skip first N entities after set resolution. Use with limit for pagination.
          dry_run returns total_count so you can page: dry_run → loop offset.
        required: false
        default: 0
        selector:
          number:
            min: 0
            max: 100000
            step: 1
      operator:
        name: Set Operator
        description: Boolean set operator - Default AND if not provided. Use * for full label graph (no label_1 required).
        required: false
        default: AND
        selector:
          select:
            options:
            - AND
            - OR
            - NOT
            - XOR
            - '*'
      timeout:
        name: Timeout
        required: false
        default: 2
        selector:
          number:
            min: 0
            max: 5
            step: 0.25
      filter_json:
        selector:
          text:
            multiline: true
        default: '{} '
        description: Optional filter_json json dict containing a valid ZenQuery filter
          dictionary - MUST see zen_query help for ZQ1 schema and use. Default {}
      strict:
        selector:
          boolean:
        description: ‘If true, ZQ1’s output is taken as authoritative even when empty.
          No fallback to the original entity set. Use this for reasoning tasks where
          an empty set is semantically meaningful.

          ‘
        required: false
        default: false
      expand_entities:
        name: Expand Results
        required: false
        default: false
        selector:
          boolean:
      output_fields:
        name: Output Fields
        required: false
        default: []
        selector:
          text:
        description: "Passed to Inspect when expand_entities=true. Defaults on: timestamps,
          device, volume. Opt-in: +attributes, +statistics, +history. Suppress: -timestamps,
          -device, -volume."
      dry_run:
        name: Dry Run
        description: >-
          If true, returns entity_count and expand flag after set resolution without
          calling Inspect. Use to gauge scope before a full expand_entities=true call.
        required: false
        default: false
        selector:
          boolean:
      caller_token:
        name: Caller Token
        required: false
        default: ''
        selector:
          text:
        description: 'Reserved. Governance stub — passed through to Query and Inspect.
          SP1 enforcement not yet active.'
    icon: mdi:graphql


automation:

  - id: '1749771199185'
    alias: DojoTools Zen Index Event Handler
    description: 'Event Listener (4.2.1) to recurse index calls.  REQUIRES DojoTOOLS
      Zen Index (2.0.0 or greater)
  
      '
    triggers:
    - event_type: zen_indexer_request
      trigger: event
    actions:
    - variables:
        max_depth: 3
        index_command: "{{- trigger.event.data.index_command | default('{}', true)  -}}"
        correlation_id: "{{- trigger.event.data.correlation_id -}}"
        depth: "{{- trigger.event.data.depth if 'depth' in trigger.event.data else 1 -}}"
        is_mapping: >
          {%- set cmd = index_command | trim -%}
          {%- if cmd.startswith('{') -%}
            {{- (cmd | from_json) is mapping -}}
          {%- else -%}
            false
          {%- endif -%}
        # @todo - verify the return value on this is meant to be a dict and not a JSON string of that dict
        parsed_cmd: >
          {%- set reserved = ['AND','OR','XOR','NOT'] -%} 
          {%- set true_tokens = ['true','t','y','yes','on','1'] -%} 
          {%- set false_tokens = ['false','f','n','no','off','0'] -%} 
          {%- set raw = index_command | string | trim -%} 
          {%- set is_json = raw.lstrip().startswith('{') -%}
          {%- if is_json -%}
            {{- raw -}}
          {%- elif raw == "" or raw == "*" -%}
            { 
              "label_1": "*", 
              "operator": "AND", 
              "expand_entities": false
            }
          {%- else -%}
            {%- set tokens = raw.split() -%}
            {%- set exp = false -%}
            {%- if tokens[-1] | lower in true_tokens -%}
              {%- set exp = true -%}
              {%-  set tokens = tokens[:-1] -%}
            {%- elif tokens[-1] | lower in false_tokens -%}
              {%- set tokens = tokens[:-1] -%}
            {%- endif -%}
          
            {%- set op_index = namespace(idx = none) -%}
            {%- for i in range(tokens | length) -%}
              {%- if tokens[i] | upper in reserved -%}
                {%- set op_index.idx = i -%}
                {%- break -%}
              {%- endif -%}
            {%- endfor -%}
          
            {%- if op_index.idx is not none -%}
              {%- set label_1 = tokens[:op_index.idx] | join(" ") | trim("'\"") -%}
              {%- set op = tokens[op_index.idx] | upper -%}
              {%- set label_2 = tokens[op_index.idx+1:] | join(" ") | trim("'\"") -%}
            {%- else -%}
              {%- set label_1 = tokens | join(" ") | trim("'\"") -%}
              {%- set op = "AND" -%}
              {%- set label_2 = "" -%}
            {%- endif -%}
          
            {
              "label_1": "{{- label_1 -}}",
              "label_2": "{{- label_2 -}}",
              "operator": "{{- op -}}",
              "expand_entities": {{- exp -}}
            }
          {%- endif -%}
        _cmd_valid: '{{ parsed_cmd is mapping }}'
        needs_recursion: >
          {{- _cmd_valid and ( parsed_cmd.index_1 is defined or parsed_cmd.index_2 is defined) -}}
        # @todo - how would it ever contain keys 'index_1' or
        child_commands: >
          {%- set out = [] -%}
          {%- if _cmd_valid and parsed_cmd.index_1 is defined -%}
            {%- set out = out + [ parsed_cmd.index_1 ] -%}
            {%- endif -%}
          {%- if _cmd_valid and parsed_cmd.index_2 is defined -%}
            {%- set out = out + [ parsed_cmd.index_2 ] -%}
          {%- endif -%}
          {{- out -}}
    - if:
      - condition: template
        value_template: '{{ not _cmd_valid }}'
        alias: parsed_cmd is not a mapping — parser returned string
      then:
      - event: zen_index_response
        event_data:
          correlation_id: '{{ correlation_id }}'
          response:
            status: error
            message: index_command parse failed — parser returned string not mapping
            raw_cmd: '{{ parsed_cmd }}'
      - stop: cmd_parse_failed
    - choose:
      - conditions:
        - condition: template
          value_template: "{{- needs_recursion and depth < max_depth -}}"
        sequence:
        - variables:
            resolved_children: []
        - repeat:
            for_each: "{{- child_commands -}}"
            sequence:
            - event: zen_indexer_request
              event_data:
                index_command: "{{- repeat.item | tojson -}}"
                depth: "{{- depth + 1 -}}"
                correlation_id: "{{- correlation_id ~ '_c' ~ repeat.index -}}"
            - wait_for_trigger:
              - trigger: event
                event_type: zen_index_response
                event_data:
                  correlation_id: "{{- correlation_id ~ '_c' ~ repeat.index -}}"
              timeout: 3
            - variables:
                resolved_children: "{{- resolved_children + [ wait.trigger.event.data.response ] -}}"
        - variables:
            parsed_cmd: >
              {{-
              parsed_cmd
                | combine({
                    "index_1": resolved_children[0].result.simple
                                if parsed_cmd.index_1 is defined 
                                else none
                })
                | combine({
                  "index_2": resolved_children[1].result.simple
                    if parsed_cmd.index_2 is defined
                    else none 
                })
              -}}
    - alias: Dispatch Zen Index Command
      data:
        entities_1: >-
          {%- if parsed_cmd.index_1 is defined and parsed_cmd.index_1 is iterable and parsed_cmd.index_1 is not string -%}
            {{- parsed_cmd.index_1 | default([]) -}}
          {%- elif parsed_cmd.entities_1 is defined and parsed_cmd.entities_1 is iterable -%}
            {{- parsed_cmd.entities_1 | default([]) -}}
          {%- else -%}
            {{- entities_1 if entities_1 is defined else [] -}}
          {%- endif -%}
        label_1: >-
          {%- if not (parsed_cmd.index_1 is defined and parsed_cmd.index_1 is iterable and parsed_cmd.index_1 is not string) -%}
            {{- parsed_cmd.label_1 | default(parsed_cmd.label | default('')) -}}
          {%- else -%}{{- '' -}}{%- endif -%}
        entities_2: >-
          {%- if parsed_cmd.index_2 is defined and parsed_cmd.index_2 is iterable and parsed_cmd.index_2 is not string -%}
            {{- parsed_cmd.index_2 | default([]) -}}
          {%- elif parsed_cmd.entities_2 is defined and parsed_cmd.entities_2 is iterable -%}
            {{- parsed_cmd.entities_2 | default([]) -}}
          {%- else -%}
            {{- entities_2 if entities_2 is defined else [] -}}
          {%- endif -%}
        label_2: >-
          {%- if not (parsed_cmd.index_2 is defined and parsed_cmd.index_2 is iterable and parsed_cmd.index_2 is not string) -%}
            {{- parsed_cmd.label_2 | default(none) -}}
          {%- else -%}{{- none -}}{%- endif -%}
        operator: "{{- parsed_cmd.operator | default('OR') -}}"
        expand_entities: "{{- parsed_cmd.expand_entities | default(false) -}}"
      response_variable: zen_index_response
      action: script.zen_dojotools_index
    - alias: Return Result
      event: zen_index_response
      event_data:
        correlation_id: "{{- correlation_id -}}"
        response: "{{- zen_index_response -}}"
    mode: parallel
